celebremos_su_gloria:
  name: Celebremos Su Gloria
  hymns:
    - number: 1
      title: Celebremos
      verses:
        - |-
          1. Celebremos la gloria de Dios porque Él es el Creador.
             Unamos nuestra voz a la de las huestes celestiales que cantaron a Dios en el comienzo de la creación.
        - |-
          2. Celebremos la gracia de Dios porque Él nos ha enviado un Salvador.
             Unamos nuestra voz a la de los ángeles que aquella maravillosa noche en Belén cantaron.
        - |-
          3. Celebremos la Palabra de Dios, que es la espada del Espíritu, porque ella es nuestro alimento y al cantarla nos trae mutua edificación.
        - |-
          4. Un día estaremos en la presencia de Dios, junto con toda su Iglesia.
             Entonces, con instrumentos musicales y cántico nuevo, proclamaremos.
    - number: 2
      title: Celebremos su gloria
      verses:
        - |-
          1. Celebremos su gloria con gran gozo,
             Alabemos su grandeza;
             Dios eterno es todopoderoso;
             Nuestro escudo y fortaleza.
        - |-
          CORO
            Celebremos y adoremos,
            Alabemos y cantemos
            Muy gozosos, oh hermanos,
            Al Señor, a nuestro Dios!
        - |-
          2. Celebremos su gloria indecible,
             Elevemos nuestro canto;
             Adoremos con corazón sensible
             Al Señor tres veces santo.
        - |-
          CORO
            Celebremos y adoremos,
            Alabemos y cantemos
            Muy gozosos, oh hermanos,
            Al Señor, a nuestro Dios!
        - |-
          3. Celebremos su gloria jubilosos,
             Cristo reina, soberano;
             Por su gracia nos guía victoriosos
             Con su poderosa mano.
        - |-
          CORO
            Celebremos y adoremos,
            Alabemos y cantemos
            Muy gozosos, oh hermanos,
            Al Señor, a nuestro Dios!
        - |-
          4. Celebremos su gloria exaltada;
             Jesucristo pronto viene
             a llevarnos, su Iglesia transformada
             A la Gloria para siempre.
        - |-
          CORO
            Celebremos y adoremos,
            Alabemos y cantemos
            Muy gozosos, oh hermanos,
            Al Señor, a nuestro Dios!
    - number: 3
      title: Santo, santo, grande eterno Dios
      verses:
        - |-
          1. Santo, santo, grande, eterno Dios!
             Con alegría hoy te alabamos,
             Rey de reyes, grande Capitán,
             Todo poderoso Guerrero.
             Honor y gloria, luz y dominio,
             Tributaremos todos a ti.
        - |-
          CORO
            Santo, santo, eres tú, Señor!
            Dios de las batallas, glorioso!
        - |-
          2. Alabadle cielos, tierra y mar,
             Toda su Iglesia, sus mensajeros;
             Alabanzas, cantos de loor, hoy unidos elevaremos.
             Juez majestuoso y reverendo,
             Fuego y vida eres, Señor.
        - |-
          CORO
            Santo, santo, eres tú, Señor!
            Dios de las batallas, glorioso!
        - |-
          3. Rey de siglos, solo eterno Dios,
             Veraz y justo, incomprensible;
             Inmortal, Autor de todo bien, eres tú el Anciano de Días.
             Y para siempre entonaremos
             El canto eterno de redención.
        - |-
          CORO
            Santo, santo, eres tú, Señor!
            Dios de las batallas, glorioso!
    - number: 4
      title: Santo, Santo, Santo
      verses:
        - |-
          1. Santo! Santo! Santo! Señor omnipotente,
             Siempre el labio mío loores te dará.
             Santo! Santo! Santo! te adoro reverente,
             Dios en tres personas, bendita Trinidad.
        - |-
          2. Santo! Santo! Santo! en numeroso coro,
             Santos escogidos te adoran sin cesar,
             De alegría llenos, y sus coronas de oro
             Rinden ante el trono y el cristalino mar.
        - |-
          3. Santo! Santo! Santo! la inmensa muchedumbre
             De ángeles que cumplen tu santa voluntad,
             Ante ti se postra, bañada de tu lumbre,
             Ante ti, que has sido, que eres y serás.
        - |-
          4. Santo! Santo! Santo! por más que estés velado,
             E imposible sea tu gloria contemplar;
             Santo tú eres solo, y nada hay a tu lado
             En poder perfecto, pureza y caridad.
        - |-
          5. Santo! Santo! Santo! la gloria de tu nombre
             Vemos en tus obras en cielo, tierra y mar;
             Santo! Santo! Santo! te adorará todo hombre,
             Dios en tres personas, bendita Trinidad.
    - number: 5
      title: Cantad alegres al Señor
      verses:
        - |-
          1. Cantad alegres al Señor,
             Mortales todos por doquier,
             Servidle siempre con fervor,
             Obedecedle con placer.
        - |-
          2. Con gratitud canción alzad
             Al Hacedor que el ser nos dio;
             Al Dios excelso adorad,
             Que como Padre nos amó.
        - |-
          3. Reconoced que es Dios y Rey,
             Nuestro potente Creador;
             Ovejas somos de su grey,
             Y pueblo suyo por su amor.
        - |-
          4. Con alabanza y gozo entrad
             A la presencia del Señor;
             Al Soberano aclamad,
             Y bendecidle con fervor.
             Amén.
    - number: 6
      title: Celebremos su gloria
      verses:
        - |-
          1. Vi yo al Señor sentado sobre un trono alto y sublime;
             y el borde de sus vestiduras llenaba el templo.
        - |-
          2. Y el que estaba sentado era semejante a una piedra de jaspe y de cornalina...
             También alrededor del trono había veinticuatro tronos,
             y sobre los tronos vi a veinticuatro ancianos sentados,
             vestidos de vestiduras blancas, con coronas de oro sobre sus cabezas.
        - |-
          3. Y echan sus coronas delante del trono, diciendo:
             "Digno eres tú, oh Señor y Dios nuestro,
             de recibir la gloria, la honra y el poder;
             porque tú has creado todas las cosas,
             y por tu voluntad tienen ser y fueron creadas".
        - |-
          4. Después de estas cosas, oí como la gran voz
             de una enorme multitud en el cielo, que decía:
             "¡Aleluya! La salvación y la gloria
             y el poder pertenecen a nuestro Dios".
    - number: 7
      title: Con cánticos, Señor
      verses:
        - |-
          1. Con cánticos, Señor,
             Mi corazón y voz
             Te adoran con fervor,
             Oh Trino, Santo Dios.
        - |-
          CORO
            En tu mansión yo te veré,
            Y paz eterna gozaré.
        - |-
          2. Tu mano paternal
             Marcó mi senda aquí;
             Mis pasos, cada cual,
             Velados son por ti.
        - |-
          CORO
            En tu mansión yo te veré,
            Y paz eterna gozaré.
        - |-
          3. Innumerables son
             Tus bienes y sin par;
             Y por tu compasión
             Los gozo sin cesar.
        - |-
          CORO
            En tu mansión yo te veré,
            Y paz eterna gozaré.
        - |-
          4. Tú eres ¡oh Señor!
             Mi sumo, todo bien;
             Mil lenguas tu amor
             Cantando siempre están.
        - |-
          CORO
            En tu mansión yo te veré,
            Y paz eterna gozaré.
    - number: 8
      title: Maravillosa Gracia
      verses:
        - |-
          1. Maravillosa gracia vino Jesús a dar,
             Más alta que los cielos, más honda que la mar,
             Más grande que mis culpas clavadas en la cruz
             Es la maravillosa gracia de Jesús.
        - |-
          CORO
            Inefable es la divina gracia,
            (Inefable es la divina, la divina gracia,)
            Es inmensurable cual la mar,
            (Es inmensurable cual la más profunda mar,)
            Fuente preciosa para el pecador, el pecador.
            (Como clara fuente, siempre suficiente a los pecadores rescatar).
            Perdonando todos mis pecados,
            (Perdonando todos mis pecados, todos,)
            Cristo me limpió de mi maldad;
            (Cristo me limpió de mi maldad, de mi maldad;)
            Alabaré su dulce nombre por la eternidad.
        - |-
          2. Maravillosa gracia, gracia de compasión,
             Gracia que sacia el alma con plena salvación,
             Gracia que lleva al cielo, gracia de paz y luz
             Es la maravillosa gracia de Jesús.
        - |-
          CORO
            Inefable es la divina gracia,
            (Inefable es la divina, la divina gracia,)
            Es inmensurable cual la mar,
            (Es inmensurable cual la más profunda mar,)
            Fuente preciosa para el pecador, el pecador.
            (Como clara fuente, siempre suficiente a los pecadores rescatar).
            Perdonando todos mis pecados,
            (Perdonando todos mis pecados, todos,)
            Cristo me limpió de mi maldad;
            (Cristo me limpió de mi maldad, de mi maldad;)
            Alabaré su dulce nombre por la eternidad.
        - |-
          3. Maravillosa gracia llama con dulce voz,
             Llamanos a ser hechos hijos de nuestro Dios;
             Colma de su consuelo, nos llena de virtud
             Es la maravillosa gracia de Jesús.
        - |-
          CORO
            Inefable es la divina gracia,
            (Inefable es la divina, la divina gracia,)
            Es inmensurable cual la mar,
            (Es inmensurable cual la más profunda mar,)
            Fuente preciosa para el pecador, el pecador.
            (Como clara fuente, siempre suficiente a los pecadores rescatar).
            Perdonando todos mis pecados,
            (Perdonando todos mis pecados, todos,)
            Cristo me limpió de mi maldad;
            (Cristo me limpió de mi maldad, de mi maldad;)
            Alabaré su dulce nombre por la eternidad.
    - number: 9
      title: Majestad
      verses:
        - |-
          1. ¡Majestad, excelsa majestad!
             Tributadle la gloria y el honor;
             ¡Majestad! Por siempre ensalzad
             Al Salvador, digno Señor,
             El Vencedor.
        - |-
          CORO
            Alabad, engrandeced su santo nombre,
            Adorad, magnificad al gran Redentor.
            ¡Majestad! La gloria celebrad
            Del Salvador, Cristo Jesús,
            Rey y Señor.
        - |-
          2. ¡Majestad, divina majestad!
             Dios eterno es Jesucristo el Señor;
             ¡Majestad! De su poder cantad;
             El es Creador, Sustentador, Gobernador.
        - |-
          CORO
            Alabad, engrandeced su santo nombre,
            Adorad, magnificad al gran Redentor.
            ¡Majestad! La gloria celebrad
            Del Salvador, Cristo Jesús,
            Rey y Señor.
        - |-
          3. ¡Majestad, eterna majestad
             Al que era, que es y siempre será!
             ¡Majestad! Su triunfo proclamad;
             Pronto vendrá, nos llevará y reinará.
        - |-
          CORO
            Alabad, engrandeced su santo nombre,
            Adorad, magnificad al gran Redentor.
            ¡Majestad! La gloria celebrad
            Del Salvador, Cristo Jesús,
            Rey y Señor.
    - number: 10
      title: Sólo tú eres santo
      verses:
        - |-
          1. Sólo tú eres santo,
             Sólo tú eres digno,
             Tú eres hermoso
             y maravilloso;
             En la cruz moriste
             y resucitaste;
             Tú me diste vida
             Y muy pronto volverás.
    - number: 11
      title: A Dios sea la gloria
      verses:
        - |-
          1. A Dios sea la gloria,
             A Dios sea la gloria;
             A Dios sea la gloria
             Por lo que hizo por mí;
             Con su sangre me ha limpiado,
             su poder me ha salvado,
             A Dios sea la gloria
             por lo que hizo por mí.
        - |-
          2. Quiero vivir, Señor,
             rendido siempre solo a ti;
             pongo a tus pies lo que soy,
             porque diste todo, Señor, por mí.
             Con su sangre me ha limpiado,
             Su poder me ha salvado,
             A Dios sea la gloria
             Por lo que hizo por mí.
    - number: 12
      title: Canta aleluya al Señor
      verses:
        - |-
          1. Canta aleluya al Señor,
             (Canta aleluya al Señor,)
             Canta aleluya al Señor;
             (Canta aleluya,)
             Canta aleluya, canta aleluya;
             (Aleluya,)
             Canta aleluya al Señor.
        - |-
          2. Cántale a Dios de corazón,
             Cántale a Dios de corazón;
             Canta aleluya, canta aleluya;
             Cántale a Dios de corazón.
        - |-
          3. Ya Cristo obró la redención,
             Ya Cristo obró la redención;
             Canta aleluya, canta aleluya;
             Ya Cristo obró la redención.
        - |-
          4. Venció la muerte el Señor,
             Venció la muerte el Señor;
             Canta aleluya, canta aleluya;
             Venció la muerte el Señor.
        - |-
          5. Cristo Jesús nos llevará,
             Cristo Jesús nos llevará,
             Canta aleluya, canta aleluya;
             Cristo Jesús nos llevará.
    - number: 13
      title: Gloria, Gloria
      verses:
        - |-
          1. Gloria, gloria in excelsis Deo!
             Gloria, gloria, aleluia, aleluia!
             ¡Gloria, gloria,
             en lo alto gloria!
             ¡Gloria, gloria,
             aleluya, aleluya!
    - number: 14
      title: La grandeza de Dios
      verses:
        - |-
          1. ¡Bendito seas tú...nuestro Padre desde la eternidad
             y hasta la eternidad!
        - |-
          2. Tuyos son, oh Señor, la grandeza, el poder,
             la gloria, el esplendor y la majestad;
             porque tuyas son todas las cosas
             que están en los cielos y en la tierra.
        - |-
          3. Tuyo es el reino, oh Señor,
             y tú te enalteces como cabeza sobre todo.
        - |-
          4. Y ahora, oh Dios nuestro, nosotros te damos
             gracias y alabamos tu glorioso nombre.
        - |-
          5. Señor nuestro, ¡cuán grande es tu nombre en toda la tierra!
             Has puesto tu gloria sobre los cielos.
        - |-
          6. De la boca de los pequeños
             y de los que todavía maman has establecido
             la alabanza frente a tus adversarios,
             para hacer callar al enemigo y al vengativo.
        - |-
          7. Cuando contemplo tus cielos, obra de tus dedos,
             la luna y las estrellas que tú has formado,
        - |-
          8. Digo: ¿Qué es el hombre, para que de él te
             acuerdes; y el hijo de hombre, para que lo visites?
        - |-
          9. Celebrarán los cielos tus maravillas, oh Señor, tu verdad
             también en la congregación de los santos.
        - |-
          10. Dios temible en la gran congregación
              de los santos,
              Y formidable sobre todos cuantos están alrededor de él.
        - |-
          11. Te alabaré entre los pueblos, oh Señor;
              cantaré de ti entre las naciones.
        - |-
          12. Porque grande es hasta los cielos tu misericordia,
              y hasta las nubes tu verdad.
        - |-
          13. Exaltado seas sobre los cielos, oh Dios; sobre
              toda la tierra sea tu gloria.
    - number: 15
      title: Al Dios de Abraham, loor
      verses:
        - |-
          1. ¡Al Dios de Abraham, loor!
             su nombre celebrad;
             ¡Al que era, es, y aún será, magnificad!
             El solo, eterno Dios, de todo es Creador:
             Al único Supremo Ser cantad loor.
        - |-
          2. ¡Cuán libre y sabio es
             su Espíritu al obrar!
             Su voz por el profeta aún nos quiere hablar.
             En todo corazón su ley escrita está;
             Es inmutable y siempre fiel en tierra y mar.
        - |-
          3. La vida infundió en cada humano ser.
             Su amor, amparo nos será sin fenecer.
             ¡Al vivo Dios, loor!
             su nombre celebrad;
             ¡Al que era, es, y aún será, magnificad!
        - |-
          4. Al Padre celestial,
             a Cristo el Redentor,
             Y al eternal Consolador, cantad loor.
             Cristianos, ensalzad
             su gracia y su bondad;
             Al trino Dios de Abraham
             hoy alabad. Amén.
    - number: 16
      title: Alma, bendice al Señor
      verses:
        - |-
          1. Alma, bendice al Señor,
             Rey potente de gloria;
             De sus mercedes esté viva en ti la memoria.
             ¡Oh, despertad, arpa y salterio!
             Entonad himnos de honor y victoria.
        - |-
          2. Alma, bendice al Señor que los orbes gobierna,
             Y te conduce paciente con mano paterna;
             Te perdonó, de todo mal te libró,
             porque su gracia es eterna.
        - |-
          3. Alma, bendice al Señor, de tu vida la fuente,
             Que te creó, y en salud te sostiene clemente;
             Tu defensor en todo trance y dolor,
             Su diestra es omnipotente.
        - |-
          4. Alma, bendice al Señor por su amor infinito;
             Con todo el pueblo de Dios su alabanza repito:
             Dios, mi salud, de todo bien plenitud,
             ¡Seas por siempre bendito!
    - number: 17
      title: Bueno es alabarte, oh Jehová
      verses:
        - |-
          1. Bueno es alabarte, oh Jehová.
             Bueno es alabarte, oh Jehová,
             Y cantar salmos a tu nombre, oh Altísimo;
             Anunciar por la mañana
             tu misericordia, tu misericordia
             y tu fidelidad cada noche.
        - |-
          2. Bueno es alabarte, oh Jehová.
             Bueno es alabarte, oh Jehová,
             Y cantar salmos a tu nombre, oh Altísimo.
    - number: 18
      title: Gloria a tu nombre, oh Dios
      verses:
        - |-
          1. ¡Oh bendito rey divino!
             te adoramos con fervor;
             Poderoso, admirable eres tú, ¡oh Salvador!
        - |-
          CORO
            Gloria, gloria,
            (// ¡Gloria a tu nombre, oh Dios! //)
            ¡Gloria a tu nombre, oh Dios!
            Gloria, gloria,
            (// ¡Gloria a tu nombre, oh Dios! //)
            ¡Gloria a tu nombre, oh Dios! (Amén)
        - |-
          2. De tu trono en los cielos
             a este mundo pecador,
             Has bajado para darte como nuestro Redentor.
        - |-
          CORO
            Gloria, gloria,
            (// ¡Gloria a tu nombre, oh Dios! //)
            ¡Gloria a tu nombre, oh Dios!
            Gloria, gloria,
            (// ¡Gloria a tu nombre, oh Dios! //)
            ¡Gloria a tu nombre, oh Dios! (Amén)
        - |-
          3. Ven, oh ven, Señor Eterno,
             ven con gloria divinal;
             Ven y lleva a tu Iglesia a tu reino celestial.
        - |-
          CORO
            Gloria, gloria,
            (// ¡Gloria a tu nombre, oh Dios! //)
            ¡Gloria a tu nombre, oh Dios!
            Gloria, gloria,
            (// ¡Gloria a tu nombre, oh Dios! //)
            ¡Gloria a tu nombre, oh Dios! (Amén)
    - number: 19
      title: Levantaos, Bendecid
      verses:
        - |-
          1. Y bendíjase el nombre tuyo,
             Glorioso y alto sobre
             toda bendición;
             Y bendíjase el nombre tuyo,
             Glorioso y alto sobre
             toda alabanza.
        - |-
          CORO
            Levantaos, bendecid
            a Jehová vuestro Dios
            Desde la eternidad
            hasta la eternidad.
        - |-
          2. Tú solo eres Jehová;
             Tú hiciste los cielos, la tierra,
             el mar y lo que en ellos hay;
             Tú solo eres Jehová;
             Tú hiciste los cielos, la tierra,
             el mar y todo te adora.
        - |-
          CORO
            Levantaos, bendecid
            a Jehová vuestro Dios
            Desde la eternidad
            hasta la eternidad.
    - number: 20
      title: Alabad al gran Rey
      verses:
        - |-
          1. Solemnes resuenen las voces de amor,
             Con gran regocijo tributen loor
             Al Rey Soberano, el buen Salvador;
             Dignísimo es Él del más alto honor.
        - |-
          CORO
            Alabad, alabad, alabad al gran Rey.
            Adorad, adorad, adoradle su grey.
            Es nuestro escudo, baluarte y sostén
            El Omnipotente por siglos. Amén.
        - |-
          2. Su amor infinito, ¿Qué lengua dirá?
             Y ¿Quién sus bondades jamás sondeará?
             Su misericordia no puede faltar,
             Mil himnos alaben su nombre sin par.
        - |-
          CORO
            Alabad, alabad, alabad al gran Rey.
            Adorad, adorad, adoradle su grey.
            Es nuestro escudo, baluarte y sostén
            El Omnipotente por siglos. Amén.
        - |-
          3. Inmensa la obra de Cristo en la cruz,
             Enorme la culpa se ve por su luz.
             Al mundo Él vino, nos iluminó,
             Y por nuestras culpas el Justo murió.
        - |-
          CORO
            Alabad, alabad, alabad al gran Rey.
            Adorad, adorad, adoradle su grey.
            Es nuestro escudo, baluarte y sostén
            El Omnipotente por siglos. Amén.
        - |-
          4. Velad, fieles todos, velad con fervor,
             Que viene muy pronto Jesús, el Señor.
             Con notas alegres vendrá a reinar;
             A su eterna gloria os ha de llevar.
        - |-
          CORO
            Alabad, alabad, alabad al gran Rey.
            Adorad, adorad, adoradle su grey.
            Es nuestro escudo, baluarte y sostén
            El Omnipotente por siglos. Amén.
    - number: 21
      title: Te alabaré, Señor
      verses:
        - |-
          1. Te alabaré, Señor, con todo mi corazón,
             con todo mi corazón, Te alabaré, Señor.
             Contaré todas tus maravillas,
             todas tus maravillas; te alabaré, Señor.
        - |-
          2. Me alegraré en ti y me regocijaré,
             y me regocijaré, Te alabaré, Señor.
             Cantaré a tu nombre,
             oh, Altísimo; oh, Altísimo,
             Te alabaré, Señor.
        - |-
          3. Te alabaré, Señor; te alabaré, Señor.
    - number: 22
      title: Bendeciré al Señor
      verses:
        - |-
          1. Bendeciré al Señor en todo tiempo;
             su alabanza en mi boca estará.
             En el Señor se gloriará mi alma;
             lo oirán los mansos y se alegrarán.
             Engrandeced al Señor conmigo,
             y exaltemos a una su nombre.
             Busqué al Señor y Él me oyó,
             y de todos mis temores me libró.
    - number: 23
      title: Santo es el Señor
      verses:
        - |-
          1. Santo, santo, santo,
             poderoso Dios;
             Santo, santo, santo,
             poderoso Dios.
             La tierra está llena de su gloria,
             La tierra está llena de su gloria,
             La tierra está llena de su gloria.
             Santo es el Señor.
    - number: 24
      title: Bendito es el Señor
      verses:
        - |-
          1. Bendito es el Señor,
             enaltecido sea Dios.
             Bendito es el Señor,
             enaltecido sea Dios.
        - |-
          CORO
            ¡Hosanna! Bendita sea la Roca,
            Bendita sea la Roca
            de mi salvación.
            ¡Hosanna! Bendita sea la Roca,
            Bendita sea la Roca
            de mi salvación.
        - |-
          2. Yo te amo, oh Señor,
             mi roca y libertador.
             Yo te amo, oh Señor,
             mi roca y libertador.
        - |-
          CORO
            ¡Hosanna! Bendita sea la Roca,
            Bendita sea la Roca
            de mi salvación.
            ¡Hosanna! Bendita sea la Roca,
            Bendita sea la Roca
            de mi salvación.
        - |-
          3. Yo te confesaré,
             y a tu nombre cantaré.
             Yo te confesaré,
             y a tu nombre cantaré.
        - |-
          CORO
            ¡Hosanna! Bendita sea la Roca,
            Bendita sea la Roca
            de mi salvación.
            ¡Hosanna! Bendita sea la Roca,
            Bendita sea la Roca
            de mi salvación.
    - number: 25
      title: De Jehová cantaré
      verses:
        - |-
          1. De Jehová cantaré yo las misericordias,
             cantaré, (cantaré,) cantaré. (cantaré.)
             De Jehová cantaré yo las misericordias,
             grandes misericordias cantaré.
             Con mi boca anunciaré
             tu gran verdad y fidelidad;
             Con mi boca anunciaré
             tu gran verdad por todos los siglos.
             De Jehová cantaré yo las misericordias,
             cantaré, (cantaré,) cantaré. (cantaré.)
             De Jehová cantaré yo las misericordias,
             grandes misericordias cantaré.
        - |-
          2. Con tu pueblo celebraré tus maravillas,
             cantaré, (cantaré,) cantaré. (cantaré.)
             Con tu pueblo celebraré tus maravillas,
             sí, de tus maravillas cantaré.
             Tu verdad proclamaré,
             pues eres Dios poderoso y fiel;
             Tu verdad proclamaré,
             pues eres nuestro Rey y escudo.
             Con tu pueblo celebraré tus maravillas,
             cantaré, (cantaré,) cantaré. (cantaré.)
             Con tu pueblo celebraré tus maravillas,
             sí, de tus maravillas cantaré.
    - number: 26
      title: Yo Celebraré
      verses:
        - |-
          1. Yo celebraré, cantaré a Él,
             Cantaré un nuevo canto.
             Yo celebraré, cantaré a Él,
             Cantaré un nuevo canto.
             Alabaré a Jehová
             porque Él ha vencido con poder.
             Yo celebraré, cantaré a Él,
             Cantaré un nuevo canto.
             Yo celebraré, cantaré a Él,
             Cantaré un nuevo canto.
    - number: 27
      title: Tuya es la gloria
      verses:
        - |-
          1. Tuya es la gloria,
             la honra también;
             Tuya para siempre,
             amén, amén.
        - |-
          2. Tuyos los dominios,
             los tronos también;
             Tuyos para siempre,
             amén, amén.
    - number: 28
      title: Himno al Padre
      verses:
        - |-
          1. Cantadle a una voz, Omnipotente Dios,
             Su nombre es Elohim, el trino Creador;
             Jehová es el gran "YO SOY",
             y eterno es El Olam,
             Postraos todos a sus pies,
             es nuestro Redentor.
        - |-
          2. Cantadle con amor, altísimo Señor,
             Su nombre es Adonai, del mundo dueño y rey;
             El Dios de bendición, nos cuida El Shaddai;
             Oh, alabadle sin temor, ovejas de su grey.
        - |-
          3. Cantadle con fervor, supremo y fiel pastor,
             Su nombre es El Elyon, el gran gobernador;
             El sempiterno Ser, nos guía con amor,
             Load a Jehová Jireh, de Sion sustentador.
        - |-
          4. Dad cánticos a Dios el Padre, en alta voz,
             Y al Hijo el Salvador mil salmos entonad;
             Con himnos ensalzad al Santo Espíritu;
             Tres veces santo, el trino Dios,
             servidle con lealtad.
    - number: 29
      title: Bendeciré al Señor
      verses:
        - |-
          1. Bendeciré al Señor con toda mi alma.
             ¡Cuán grande eres, Señor y Dios mío!
             Te has vestido de gloria y esplendor;
             Te has envuelto en un manto de luz.
        - |-
          2. Tú extendiste el cielo como un velo.
             Conviertes las nubes en tu carro;
             viajas sobre las alas del viento.
             Los vientos son tus mensajeros y
             las llamas de fuego tus servidores.
        - |-
          3. ¡Cuántas cosas has hecho, Señor!
             Todas las hiciste con sabiduría;
             la tierra está llena de todo lo que has creado.
        - |-
          4. La gloria del Señor es eterna.
             El Señor se alegra en su creación.
             Mientras yo exista y tenga vida cantaré himnos al
             Señor mi Dios.
    - number: 30
      title: Mi corazón te adora
      verses:
        - |-
          1. En la voz de los raudos huracanes,
             En el plácido arroyo, en el torrente,
             En el fuego, en la llama, en los volcanes:
             Allí, gran Dios, mi corazón te siente.
        - |-
          2. En los vergeles del florido mayo,
             En los dulces acordes de la lira,
             En la lluvia, en el trueno y en el rayo:
             Allí, gran Dios, mi corazón te admira.
        - |-
          3. En el aroma que a los cielos sube,
             En el árbol que erguido se levanta,
             En la sombra, en el astro y en la nube:
             Allí, gran Dios, mi corazón te canta.
        - |-
          4. En los trémulos rayos de la lumbre,
             En el ósculo suave de la aurora,
             En la hondura, en el llano y en la cumbre:
             Allí, gran Dios, mi corazón te adora.
    - number: 31
      title: La Creación
      verses:
        - |-
          1. Dios ha hecho todo lo que el ojo ve,
             Cada cosa de este mundo terrenal.
             Todo árbol y las plantas son de él,
             Las estrellas y el manto celestial.
        - |-
          CORO
            "¡Sea ya la luz!" ordenó Jehová
            Con su fuerte voz, y la luz fue ya.
            Hoy el buen Jesús, nuestro Redentor,
            Brinda al mundo luz con excelso amor.
        - |-
          2. A su imagen Dios formó al hombre Adán;
             Luego hizo una mujer tomada de él;
             Y los colocó en el Jardín de Edén,
             Donde habían de seguirle siempre fiel.
        - |-
          CORO
            "¡Sea ya la luz!" ordenó Jehová
            Con su fuerte voz, y la luz fue ya.
            Hoy el buen Jesús, nuestro Redentor,
            Brinda al mundo luz con excelso amor.
        - |-
          3. El perfecto gozo había en el Edén;
             Ellos se gozaban al andar con Dios.
             Comunión completa había allí también
             Al oír de Jehová la tierna voz.
        - |-
          CORO
            "¡Sea ya la luz!" ordenó Jehová
            Con su fuerte voz, y la luz fue ya.
            Hoy el buen Jesús, nuestro Redentor,
            Brinda al mundo luz con excelso amor.
    - number: 32
      title: Cuán grande es él
      verses:
        - |-
          1. Señor, mi Dios, al contemplar los cielos,
             El firmamento y las estrellas mil,
             Al oír tu voz en los potentes truenos
             Y ver brillar el sol en su cenit,
        - |-
          CORO
            Mi corazón entona la canción,
            ¡Cuán grande es él! ¡Cuán grande es él!
        - |-
          2. Al recorrer los montes y los valles
             Y ver las bellas flores al pasar,
             Al escuchar el canto de las aves
             Y el murmurar del claro manantial,
        - |-
          CORO
            Mi corazón entona la canción,
            ¡Cuán grande es él! ¡Cuán grande es él!
        - |-
          3. Cuando recuerdo del amor divino
             Que desde el cielo al Salvador envió,
             Aquel Jesús que por salvarme vino
             Y en una cruz sufrió por mí y murió,
        - |-
          CORO
            Mi corazón entona la canción,
            ¡Cuán grande es él! ¡Cuán grande es él!
        - |-
          4. Cuando el Señor me llame a su presencia,
             Al dulce hogar, al cielo de esplendor,
             Le adoraré cantando la grandeza
             De su poder y su infinito amor:
        - |-
          CORO
            Mi corazón entona la canción,
            ¡Cuán grande es él! ¡Cuán grande es él!
    - number: 33
      title: Oh, criaturas del Señor
      verses:
        - |-
          1. Oh, criaturas del Señor,
             Cantad con melodiosa voz: ¡Alabadle! ¡Aleluya!
             Ardiente sol con tu fulgor;
             Oh, luna de suave esplendor:
        - |-
          . REFRÁN
            ¡Alabadle! ¡Alabadle!
            ¡Aleluya! ¡Aleluya! ¡Aleluya! (Amén.)
        - |-
          2. Viento veloz, potente alud,
             Nubes en claro cielo azul: ¡Alabadle! ¡Aleluya!
             Suave, dorado amanecer;
             Tu manto, noche, al extender:
        - |-
          . REFRÁN
            ¡Alabadle! ¡Alabadle!
            ¡Aleluya! ¡Aleluya! ¡Aleluya! (Amén.)
        - |-
          3. Oh, fuentes de agua de cristal,
             A vuestro Creador cantad: ¡Alabadle! ¡Aleluya!
             Oh, fuego, eleva tu loor, tú que nos das luz y calor:
        - |-
          . REFRÁN
            ¡Alabadle! ¡Alabadle!
            ¡Aleluya! ¡Aleluya! ¡Aleluya! (Amén.)
        - |-
          4. Pródiga tierra maternal,
             Que frutos brindas sin cesar: ¡Alabadle! ¡Aleluya!
             Rica cosecha, bella flor, magnificad al Creador:
        - |-
          . REFRÁN
            ¡Alabadle! ¡Alabadle!
            ¡Aleluya! ¡Aleluya! ¡Aleluya! (Amén.)
        - |-
          5. Con gratitud y con amor,
             Cante la entera creación: ¡Alabadle! ¡Aleluya!
             Al Padre, al Hijo Redentor,
             y al Eternal Consolador:
        - |-
          . REFRÁN
            ¡Alabadle! ¡Alabadle!
            ¡Aleluya! ¡Aleluya! ¡Aleluya! (Amén.)
    - number: 34
      title: Creo en ti, Señor
      verses:
        - |-
          1. Cuando miro las estrellas en el cielo por doquier,
             Cuando veo que destellan y me muestran tu poder,
             Cuando veo el sol radiante y la luna en su fulgor,
             Todos a una voz me dicen que tú eres el Creador.
        - |-
          CORO
            Y creo en ti, en ti, sólo en ti, Señor,
            Y creo en ti, en ti como el Creador;
            Y creo en ti, en ti, sólo en ti, Señor,
            Y creo en ti, en ti como el Creador.
        - |-
          2. Cuando miro las montañas,
             los arroyos y el mar,
             Cuando nace la mañana con el sol al despuntar,
             Cuando veo un bebecito y el cuidado maternal,
             Con el corazón repito
             que mi Dios es el Creador.
        - |-
          CORO
            Y creo en ti, en ti, sólo en ti, Señor,
            Y creo en ti, en ti como el Creador;
            Y creo en ti, en ti, sólo en ti, Señor,
            Y creo en ti, en ti como el Creador.
    - number: 35
      title: El firmamento de esplendor
      verses:
        - |-
          1. El firmamento de esplendor,
             do estrellas lucen su fulgor,
             El sol y luna con placer, de Dios proclaman el poder.
             El alba con su claridad de él anuncia majestad;
             Sus himnos toda la creación
             eleva a Dios con profusión.
        - |-
          2. El sol cual novio celestial,
             que deja el tálamo nupcial,
             Prosigue su celeste andar, loando a Dios con su brillar.
             Y en la quietud reverencial de la familia sideral
             El universo en devoción a Dios tributa bendición.
    - number: 36
      title: Oh, Dios mi soberano Rey
      verses:
        - |-
          1. Oh, Dios mi soberano Rey, a ti daré loor;
             Tu nombre yo ensalzaré, santísimo Señor.
        - |-
          2. Tus obras evidencia son de infinito amor;
             Y cantan con alegre voz tu gloria y honor.
        - |-
          3. Tu mano veo por doquier en cielo, tierra y mar;
             La creación inclínase tu honra a proclamar.
        - |-
          4. Elevo a ti mi corazón en alabanzas hoy;
             Por todo lo que has hecho, Dios, mi adoración te doy.
    - number: 37
      title: Loor a ti
      verses:
        - |-
          1. ¡Santo, Santo, Santo,
             Señor, Jehová!
             Cielo y tierra, de tu amor
             Llenos hoy están, Señor;
             ¡Loor a ti! Amén.
    - number: 38
      title: Alabemos al Señor
      verses:
        - |-
          1. ¡Alabemos al Señor, Dios de toda creación!
             Todo su amor nos dio, ¡Aleluya!
        - |-
          CORO
            Grupo A (mujeres) Agua fresca el río nos dio,
            Y la luz del sol nos alumbró;
            Por la noche el Padre nos cuidó.
            (Todos) Alabemos al Señor, ¡Aleluya!
            Grupo B (varones) ¡Aleluya! ¡Aleluya! ¡Aleluya! ¡Aleluya!
            (todos) Alabemos al Señor, ¡Aleluya!
        - |-
          2. ¡Alabemos al Señor por la vida que nos da!
             Pues al alma trae paz, ¡Aleluya!
        - |-
          CORO
            Grupo A (mujeres) Agua fresca el río nos dio,
            Y la luz del sol nos alumbró;
            Por la noche el Padre nos cuidó.
            (Todos) Alabemos al Señor, ¡Aleluya!
            Grupo B (varones) ¡Aleluya! ¡Aleluya! ¡Aleluya! ¡Aleluya!
            (todos) Alabemos al Señor, ¡Aleluya!
    - number: 39
      title: Cantemos al Señor
      verses:
        - |-
          1. Cantemos al Señor un himno de alegría,
             Un cántico de amor al nacer el nuevo día;
             El hizo el cielo, el mar, el sol y las estrellas;
             En ellos vio bondad, pues sus obras eran bellas.
        - |-
          CORO
            ¡Aleluya! ¡Aleluya! Cantemos al Señor.
            ¡Aleluya! ¡Aleluya! ¡Aleluya!
            Cantemos al Señor. ¡Aleluya!
            (2nda voz) ¡Aleluya, aleluya, aleluya, aleluya!
            Cantemos al Señor. ¡Aleluya!
            ¡Aleluya, aleluya, aleluya, aleluya!
            Cantemos al Señor. ¡Aleluya!
        - |-
          2. Cantemos al Señor un himno de alabanza
             Que exprese nuestro amor, nuestra fe y nuestra esperanza;
             Hoy toda la creación pregona su grandeza,
             así nuestro cantar va anunciando su belleza.
        - |-
          CORO
            ¡Aleluya! ¡Aleluya! Cantemos al Señor.
            ¡Aleluya! ¡Aleluya! ¡Aleluya!
            Cantemos al Señor. ¡Aleluya!
            (2nda voz) ¡Aleluya, aleluya, aleluya, aleluya!
            Cantemos al Señor. ¡Aleluya!
            ¡Aleluya, aleluya, aleluya, aleluya!
            Cantemos al Señor. ¡Aleluya!
    - number: 40
      title: Aleluya, Aleluya
      verses:
        - |-
          1. Aleluya, aleluya,
             aleluya, aleluya.
        - |-
          2. Aleluya, aleluya,
             aleluya, aleluya.
        - |-
          3. Aleluya, aleluya.
    - number: 41
      title: Anunciemos su poder
      verses:
        - |-
          1. ¿Quién midió las aguas con el hueco de su mano y
             los cielos con su palmo, con tres dedos juntó el
             polvo de la tierra, y pesó los montes con balanza y
             con pesas los collados?
        - |-
          2. He aquí que las naciones le son como la gota de
             agua que cae del cubo, y como menudo polvo en
             las balanzas le son estimadas; he aquí que hace
             desaparecer las islas como polvo.
        - |-
          3. Levantad en alto vuestros ojos, y mirad quién creó
             estas cosas; él saca y cuenta su ejército;
        - |-
          4. A todas llama por sus nombres; ninguna faltará;
             tal es la grandeza de su fuerza, y el poder de su
             dominio.
        - |-
          5. ¿No has sabido, no has oído que el Dios eterno es
             Jehová, el cual creó los confines de la tierra?
             No desfallece, ni se fatiga con cansancio, y su
             entendimiento no hay quien lo alcance.
        - |-
          6. Oh Jehová, Dios de los ejércitos, ¿quién como tú?
             Poderoso eres, Jehová, y tu fidelidad te rodea.
        - |-
          7. Tú tienes dominio sobre la braveza del mar;
             cuando se levantan sus ondas, tú las sosiegas.
        - |-
          8. Tuyos son los cielos, tuya también la tierra; el
             mundo y su plenitud, tú lo fundaste.
        - |-
          9. Tuyo es el brazo potente; fuerte es tu mano,
             exaltada tu diestra.
        - |-
          10. Justicia y juicio son el cimiento de tu trono; misericordia y verdad van delante de tu rostro.
        - |-
          11. Bienaventurado el pueblo que sabe aclamarte;
              andará, oh Jehová, a la luz de tu rostro.
    - number: 42
      title: Reina Dios
      verses:
        - |-
          1. Cuán bellos son los pies de aquel que
             anuncia hoy noticias del Señor;
             Predica paz,
             proclama gozo y salvación:
             ¡Reina Dios! ¡Reina Dios!
        - |-
          CORO
            ¡Reina Dios! ¡Reina Dios!
            ¡Reina Dios, nuestro Dios!
        - |-
          2. No vimos hermosura ni atractivo en él
             cuando en la cruz murió;
             Fue afligido,
             mas su boca no abrió; Redención él obró.
        - |-
          CORO
            ¡Reina Dios! ¡Reina Dios!
            ¡Reina Dios, nuestro Dios!
        - |-
          3. Venció la tumba con poder
             y gloria real, resucitó Jesús;
             Hoy a la diestra de su Padre él está;
             ¡Gloria a Dios, vive hoy!
        - |-
          CORO
            ¡Reina Dios! ¡Reina Dios!
            ¡Reina Dios, nuestro Dios!
    - number: 43
      title: Nuestra Fortaleza
      verses:
        - |-
          1. Nuestra fortaleza, nuestra protección,
             Nuestro fiel socorro, nuestro paladión,
             Nuestro gran refugio, nuestra salvación
             Es el Dios que adora nuestro corazón.
        - |-
          CORO
            Nuestra fortaleza, nuestra protección
            Es el Dios que adora nuestro corazón.
        - |-
          2. Que la tierra toda cambie de lugar,
             Y los montes rueden por el ancho mar;
             Nuestra fortaleza firme habrá de estar,
             Porque lo inmutable no podrá mudar.
        - |-
          CORO
            Nuestra fortaleza, nuestra protección
            Es el Dios que adora nuestro corazón.
        - |-
          3. A la voz tan sólo de su voluntad
             Túrbanse los mares en su majestad;
             Tiembla la montaña, todo es vanidad,
             Al vibrar su acento por la inmensidad.
        - |-
          CORO
            Nuestra fortaleza, nuestra protección
            Es el Dios que adora nuestro corazón.
        - |-
          4. Que otros en sus fuerzas quieran descansar,
             O en las que el mundo les promete dar;
             Nunca todas ellas se han de comparar
             Con la que pudimos en el cielo hallar.
        - |-
          CORO
            Nuestra fortaleza, nuestra protección
            Es el Dios que adora nuestro corazón.
    - number: 44
      title: Señor Jehová, omnipotente Dios
      verses:
        - |-
          1. Señor Jehová, omnipotente Dios,
             Tú que los astros riges con poder,
             Oye clemente nuestra humilde voz,
             Nuestra canción hoy dígnate atender.
        - |-
          2. Eterno Padre, nuestro corazón
             A ti profesa un inefable amor;
             Entre nosotros tu presencia pon;
             Tiéndenos, pues, tu brazo protector.
        - |-
          3. A nuestra patria da tu bendición;
             Enséñanos tus leyes a guardar;
             Alumbra la conciencia y la razón;
             Domina siempre tú en todo hogar.
        - |-
          4. Defiéndenos del enemigo cruel;
             Concede a nuestras faltas corrección;
             Nuestro servicio sea siempre fiel;
             Y séanos tú la grande protección.
             Amén, amén.
    - number: 45
      title: Castillo Fuerte
      verses:
        - |-
          1. Castillo fuerte es nuestro Dios, defensa y
             buen escudo; Con su poder nos librará
             en este trance agudo. Con furia y con afán
             acósanos Satán; Por armas deja ver
             astucia y gran poder; Cual él no hay en la tierra.
        - |-
          2. Nuestro valor es nada aquí, con él todo es
             perdido; Mas por nosotros pugnará
             de Dios el Escogido. Es nuestro Rey Jesús,
             el que venció en la cruz, Señor y Salvador,
             y siendo él solo Dios, El triunfa en la batalla.
        - |-
          3. Aunque estén demonios mil prontos a
             devorarnos, no temeremos, porque Dios
             sabrá como ampararnos. Que muestre su vigor
             Satán, y su furor; dañarnos no podrá;
             pues condenado es ya por la Palabra Santa.
        - |-
          4. Esa palabra del Señor, que el mundo no apetece,
             Por el Espíritu de Dios muy firme permanece.
             Nos pueden despojar de bienes y hogar,
             El cuerpo destruir, mas siempre ha de existir
             De Dios el Reino eterno.
    - number: 46
      title: Canten a Dios
      verses:
        - |-
          1. Canten a Dios con alegría con todo el corazón,
             Porque nos ha librado y nos ha mostrado su salvación;
             ¡Gloria a Dios, gloria a Dios!
             Porque ha hecho maravillas, Canten alegres al Creador.
        - |-
          2. Canten a Dios todos los pueblos, toquen arpa y tambor,
             Con guitarra y trompeta canten alegres al Creador;
             ¡Gloria a Dios, gloria a Dios!
             Porque ha hecho maravillas, Canten alegres al Creador.
    - number: 47
      title: Grandes y maravillosas son
      verses:
        - |-
          1. Grandes y maravillosas son tus obras,
             Señor Dios Todopoderoso;
             Justos y verdaderos
             son tus caminos, Rey de los santos,
             Rey de los santos, Rey de los santos.
        - |-
          2. ¿Quién no te temerá, oh Señor,
             y glorificará tu nombre?
             Pues sólo tú eres santo;
             por lo cual todas las naciones vendrán
             y te adorarán, y te adorarán.
             ¡Aleluya, amén! ¡Aleluya, amén!
        - |-
          3. Temed a Dios y dadle gloria, porque su juicio
             ha llegado; Y adorad a aquel que hizo el cielo y
             la tierra, el mar y las fuentes de las aguas.
             ¡Aleluya, amén! ¡Aleluya, amén!
             ¡Aleluya, amén! ¡Aleluya, amén!
    - number: 48
      title: Al trono majestuoso
      verses:
        - |-
          1. Al trono majestuoso del Dios de potestad,
             Humilde vuestra frente, naciones inclinad.
             El es el ser supremo, de todos el Señor,
             Y nada al fin resiste a Dios el Hacedor.
        - |-
          2. Del polvo de la tierra su mano nos formó,
             Y nos donó la vida su aliento creador;
             Después, al vernos ciegos, caídos en error,
             Cual padre al hijo amado salud nos proveyó.
        - |-
          3. La gratitud sincera nos dictará el cantar,
             Y en tiernos dulces sones al cielo subirá;
             Con los celestes himnos cantados a Jehová,
             La armónica alabanza doquier resonará.
        - |-
          4. Señor, a tu Palabra sujeto el mundo está,
             Y del mortal perecen la astucia y la maldad;
             Después de haber cesado los siglos de correr,
             Tu amor, verdad y gloria han de permanecer.
    - number: 49
      title: Oh, que tuviera lenguas mil
      verses:
        - |-
          1. ¡Oh, que tuviera lenguas mil
             para poder cantar
             Las glorias de mi Dios y Rey,
             y sus triunfos alabar!
        - |-
          2. Su nombre trae consuelo y paz,
             nos libra del temor;
             Salud, aliento y gozo es;
             vida da al pecador.
        - |-
          3. Quebranta el poder del mal,
             al preso libra hoy;
             Su sangre limpia al ser más vil,
             ¡Aleluya! limpio estoy.
        - |-
          4. Oh, mudos, de su amor hablad;
             y sordos, oid su voz;
             Oh, cojos, de emoción saltad;
             ciegos, ved al Salvador.
        - |-
          5. Señor Jesús, ayúdame
             tu nombre a proclamar
             A todo el mundo en derredor,
             tu grandeza ensalzar.
    - number: 50
      title: Te damos gracias, Señor
      verses:
        - |-
          1. Te damos gracias,
             Señor Dios Todopoderoso,
             El que eres y que eras
             Y que has de venir,
             Porque has tomado tu gran poder,
             Y has reinado.
    - number: 51
      title: Nuestra esperanza y protección
      verses:
        - |-
          1. Nuestra esperanza y protección
             y nuestro eterno hogar
             Has sido, eres y serás
             tan sólo tú, Señor.
        - |-
          2. Aún no habías la creación
             formado con bondad,
             Mas desde la eternidad
             tú eras sólo Dios.
        - |-
          3. Delante de tus ojos son
             mil años, al pasar,
             Tan sólo un día que fugaz
             fenece con el sol.
        - |-
          4. El tiempo corre arrollador
             como impetuoso mar;
             Y así, cual sueño ves pasar
             cada generación.
        - |-
          5. Nuestra esperanza y protección
             y nuestro eterno hogar,
             En la tormenta o en la paz sé siempre tú, Señor.
    - number: 52
      title: Jehová es mi luz y salvación
      verses:
        - |-
          1. Jehová es mi luz y salvación,
             ¿De quién temeré?
             Jehová es la fortaleza de mi vida;
             ¿De quién he de atemorizarme?
             Aguarda a Jehová,
             Esfuérzate y aliéntese tu corazón;
             Sí, espera a Jehová.
             Jehová es mi luz y salvación,
             ¿De quién temeré?
    - number: 53
      title: Jehová está en medio de ti
      verses:
        - |-
          1. Jehová está en medio de ti, poderoso;
             El salvará, se gozará sobre ti con alegría;
             Callará de amor,
             se gozará sobre ti con cánticos.
             Jehová está en medio de ti,
             poderoso, ¡Poderosísimo!
    - number: 54
      title: Poderoso es él
      verses:
        - |-
          1. Aquel que es poderoso,
             muy poderoso,
             Para guardaros sin caída,
             ¡Poderoso es él!
             Y presentaros sin mancha delante de su gloria
             Con gran alegría, ¡Poderoso es él!
        - |-
          2. Al único y sabio Dios,
             nuestro Salvador,
             Sea gloria y majestad, imperio y potencia,
             Ahora y por todos los siglos. Amén.
        - |-
          3. Aquel que es poderoso,
             muy poderoso,
             Para guardaros sin caída, ¡Poderoso es él!
             Y presentaros sin mancha delante de su gloria
             Con gran alegría, ¡Poderoso es él!
    - number: 55
      title: Te alabarán, oh Jehová
      verses:
        - |-
          1. Te alabarán, oh Jehová, todos los reyes,
             Todos los reyes de la tierra;
             Porque han oído
             los dichos de tu boca,
             Y cantarán de los caminos de Jehová.
        - |-
          2. Porque la gloria de Jehová es grande,
             Porque Jehová es excelso en sus caminos;
             Porque Jehová atiende al humilde,
             Mas mira de lejos al altivo.
    - number: 56
      title: El que habita al abrigo de Dios
      verses:
        - |-
          1. El que habita al abrigo de Dios
             Morará bajo sombras de amor;
             Sobre él no vendrá ningún mal
             Y en sus alas feliz vivirá.
        - |-
          CORO
            Oh, yo quiero habitar al abrigo de Dios,
            Sólo allí encontraré paz y profundo amor.
            Mi delicia es con él comunión disfrutar
            Y por siempre su nombre alabar.
        - |-
          2. El que habita al abrigo de Dios
             muy feliz ciertamente será;
             Angeles guardarán su salud
             Y sus pies nunca resbalarán.
        - |-
          CORO
            Oh, yo quiero habitar al abrigo de Dios,
            Sólo allí encontraré paz y profundo amor.
            Mi delicia es con él comunión disfrutar
            Y por siempre su nombre alabar.
        - |-
          3. El que habita al abrigo de Dios
             Para siempre seguro estará;
             Caerán a su diestra diez mil
             Mas a él no vendrá mortandad.
        - |-
          CORO
            Oh, yo quiero habitar al abrigo de Dios,
            Sólo allí encontraré paz y profundo amor.
            Mi delicia es con él comunión disfrutar
            Y por siempre su nombre alabar.
    - number: 57
      title: Cantemos de su amor
      verses:
        - |-
          1. Bueno es alabarte, oh Jehová, y cantar salmos a tu nombre, oh Altísimo;
             Anunciar por la mañana tu misericordia,
             y tu fidelidad cada noche.
        - |-
          2. Alabad a Jehová, naciones todas;
             pueblos todos, alabadle.
        - |-
          3. Porque ha engrandecido sobre nosotros su
             misericordia, y la fidelidad de Jehová
             es para siempre. Aleluya.
        - |-
          4. En esto se mostró el amor de Dios para con
             nosotros, en que Dios envió a su Hijo unigénito
             al mundo, para que vivamos por él.
        - |-
          5. Y nosotros hemos conocido y creído el amor
             que Dios tiene para con nosotros.
             Dios es amor; y el que permanece en amor,
             permanece en Dios, y Dios en él.
        - |-
          6. Nosotros le amamos a él, porque él nos amó primero.
        - |-
          7. Venid, aclamemos alegremente a Jehová;
             cantemos con júbilo a la roca de nuestra
             salvación.
    - number: 58
      title: Cantad, alabad
      verses:
        - |-
          1. ¡Cantad, (cantad,)
             Cantad, (cantad,)
             Cantad, alabad a Dios!
    - number: 59
      title: Grande es tu fidelidad
      verses:
        - |-
          1. Oh, Dios Eterno, tu misericordia
             Ni una sombra de duda tendrá;
             Tu compasión y bondad nunca fallan
             Y por los siglos el mismo serás.
        - |-
          CORO
            ¡Oh, tu fidelidad! ¡Oh, tu fidelidad!
            Cada momento la veo en mí.
            Nada me falta, pues todo provees,
            ¡Grande, Señor, es tu fidelidad!
        - |-
          2. La noche oscura, el sol y la luna,
             Las estaciones del año también,
             Unen su canto cual fieles criaturas,
             Porque eres bueno, por siempre eres fiel.
        - |-
          CORO
            ¡Oh, tu fidelidad! ¡Oh, tu fidelidad!
            Cada momento la veo en mí.
            Nada me falta, pues todo provees,
            ¡Grande, Señor, es tu fidelidad!
        - |-
          3. Tú me perdonas, me impartes el gozo,
             Tierno me guías por sendas de paz;
             Eres mi fuerza, mi fe, mi reposo,
             Y por los siglos mi Padre serás.
        - |-
          CORO
            ¡Oh, tu fidelidad! ¡Oh, tu fidelidad!
            Cada momento la veo en mí.
            Nada me falta, pues todo provees,
            ¡Grande, Señor, es tu fidelidad!
    - number: 60
      title: Nuestro Dios y Padre eterno
      verses:
        - |-
          1. Nuestro Dios y Padre eterno
             a sus hijos cuida tierno;
             Con amor los guía siempre,
             en su seno los protege.
        - |-
          2. En pobreza o abundancia
             su fiel provisión alcanza;
             Aunque pruebas mil asaltan,
             sus cuidados nunca faltan.
        - |-
          3. Sabe de sus aflicciones;
             siente sus tribulaciones;
             Les consuela en tristeza,
             y les da su fortaleza.
        - |-
          4. De su amor constante y fuerte,
             ni la vida ni la muerte
             Nunca pueden separarles;
             protección se goza en darles.
        - |-
          5. A sus hijos Dios sustenta,
             bendiciones les aumenta;
             Ni avecillas en su nido
             tal cuidado han recibido.
    - number: 61
      title: El Señor es mi pastor
      verses:
        - |-
          1. El Señor es mi pastor, y nada, pues, me faltará;
             Entre pastos delicados me hará él descansar;
             Junto a aguas de reposo siempre me pastoreará,
        - |-
          CORO
            El Señor es mi pastor,
            Nada, pues, me faltará.
        - |-
          2. Fortalecerá mi alma cuando débil yo esté;
             Guiaráme por las sendas de justicia por amor;
             Aunque ande entre sombras, mal ninguno temeré,
        - |-
          CORO
            El Señor es mi pastor,
            Nada, pues, me faltará.
        - |-
          3. Con tu vara y tu cayado siempre aliento me darás;
             Aderezarás mi mesa ante todo angustiador;
             Tú ungiste mi cabeza y mi copa llena está,
        - |-
          CORO
            El Señor es mi pastor,
            Nada, pues, me faltará.
        - |-
          4. Ciertamente sus bondades cada día gozaré,
             Y en la casa de mi Padre largos días moraré;
             Mientras tanto por su gracia este salmo cantaré:
        - |-
          CORO
            El Señor es mi pastor,
            Nada, pues, me faltará.
    - number: 62
      title: Eres mi protector
      verses:
        - |-
          1. Eres mi protector, llenas mi corazón
             Con cánticos de liberación;
             De angustia me guardarás.
             Confiaré en ti,
             Confiaré en ti; débil soy,
             mas fuerte seré con poder del Señor.
             Eres mi protector, llenas mi corazón
             Con cánticos de liberación;
             De angustia me guardarás.
             Confiaré en ti.
    - number: 63
      title: Oh amor de Dios
      verses:
        - |-
          1. ¡Oh amor de Dios! Su inmensidad,
             El hombre no podría contar, ni comprender
             la gran verdad que Dios al hombre pudo amar.
             Cuando el pecar entró al hogar de Adán y
             Eva en Edén, Dios les sacó, mas prometió
             un Salvador también.
        - |-
          CORO
            ¡Oh amor de Dios! brotando está,
            inmensurable, eternal;
            Por las edades durará, inagotable raudal.
        - |-
          2. Si fuera tinta todo el mar, y todo el cielo un
             gran papel, y cada hombre un escritor,
             Y cada hoja un pincel,
             Nunca podrían describir el gran amor de Dios
             Que al hombre pudo redimir de su pecado atroz.
        - |-
          CORO
            ¡Oh amor de Dios! brotando está,
            inmensurable, eternal;
            Por las edades durará, inagotable raudal.
        - |-
          3. Y cuando el tiempo pasará con cada reino mundanal,
             y cada reino caerá con cada trama y plan carnal,
             El gran amor del Redentor por siempre durará;
             La gran canción de salvación su pueblo cantará.
        - |-
          CORO
            ¡Oh amor de Dios! brotando está,
            inmensurable, eternal;
            Por las edades durará, inagotable raudal.
    - number: 64
      title: Dios es amor
      verses:
        - |-
          1. ¡Dios es amor! ¡Dios es amor!
             La Biblia nos dice el mensaje sublime
             que Dios es amor, ¡Oh sí!
             ¡Dios es amor! ¡Dios es amor!
             Los ángeles cantan,
             los hombres proclaman
             Que ¡Dios es amor!
    - number: 65
      title: Qué maravilla es
      verses:
        - |-
          1. Cuán hermosa es la luz del ocaso,
             Y precioso es el amanecer,
             Pero más glorioso es el gran amor
             Que el Señor derramó en mi ser.
        - |-
          CORO
            ¡Qué maravilla es, qué maravilla es
            Que el Señor me ama a mí!
            ¡Qué maravilla es, qué maravilla es
            Que el Señor me ama a mí!
        - |-
          2. Admirable es la siega abundante,
             Las estrellas, la luna y el sol,
             Pero más glorioso es el gran amor
             Que me da nueva vida y perdón.
        - |-
          CORO
            ¡Qué maravilla es, qué maravilla es
            Que el Señor me ama a mí!
            ¡Qué maravilla es, qué maravilla es
            Que el Señor me ama a mí!
    - number: 66
      title: "REFLEXION: Mi Dios y Padre Celestial"
      verses:
        - |-
          1. Dios mío, estoy maravillado ante tu grandeza.
             Eres el Creador que esparciste en el espacio vacío
             los miles de millones de estrellas y que llamas
             a cada una por nombre.
        - |-
          2. Tú formaste nuestro bello mundo con sus
             majestuosas montañas y vastos mares.
             Diseñaste la fragante rosa y diste melodías
             al ruiseñor. Sostienes las galaxias inmensas,
             así como los átomos invisibles.
        - |-
          3. Tú encauzas la historia por tu soberano poder.
             Las grandes naciones te son como el polvo en
             la balanza y ni un solo pajarillo cae sin ti.
             Eres el principio y el fin; desde la eternidad
             hasta la eternidad, tú eres Dios.
        - |-
          4. Eres perfecto en santidad y justicia, pero
             también grande en amor y misericordia.
             Enviaste a tu Hijo a morir por mí, un pecador
             condenado, y me diste nueva vida por fe en él.
             Ahora soy tuyo para siempre.
        - |-
          5. ¡Padre celestial, cuando contemplo la magnitud
             de tu persona y tus obras, un cántico de adoración y
             gratitud brota de mi corazón hacia ti!
    - number: 67
      title: Padre Eterno
      verses:
        - |-
          1. Padre eterno, me postro ante ti,
             Padre eterno, me postro ante ti;
             Yo te amo, te adoro, te rindo loor;
             Padre eterno, me postro ante ti.
        - |-
          2. Jesucristo, te alabaré,
             Jesucristo, te alabaré;
             Yo te amo, te adoro,
             Te rindo loor; Jesucristo, te alabaré.
        - |-
          3. Santo Espíritu Consolador,
             Santo Espíritu Consolador;
             Tú me guías, me ayudas, y vives en mí,
             Santo Espíritu Consolador.
        - |-
          4. Tres personas en un solo Dios,
             Tres personas en un solo Dios;
             ¡Maravilla sublime, te exaltaré!
             Tres personas en un solo Dios.
    - number: 68
      title: A nuestro Padre Dios
      verses:
        - |-
          1. A nuestro Padre Dios alcemos nuestra voz,
             ¡Gloria a Él! Tal fue su amor que dio
             al Hijo que murió,
             Y así nos redimió, ¡Gloria a Él!
        - |-
          2. A nuestro Salvador demos con fe loor;
             ¡Gloria a Él! Su sangre derramó;
             con ella nos lavó,
             Y el cielo nos abrió, ¡Gloria a Él!
        - |-
          3. Al fiel Consolador celebre nuestra voz;
             ¡Gloria a Él! Con celestial fulgor
             nos muestra el amor
             De Cristo, el Señor; ¡Gloria a Él!
        - |-
          4. Con gozo y amor, cantemos con fervor
             Al Trino Dios. En la eternidad mora la Trinidad;
             ¡Por siempre alabad al Trino Dios!
    - number: 69
      title: De boca y corazón
      verses:
        - |-
          1. De boca y corazón load al Dios del cielo;
             Pues dionos bendición, salud, paz y consuelo.
             Tan sólo a su bondad debemos nuestro ser;
             Su santa voluntad nos guía por doquier.
        - |-
          2. Oh, Padre celestial, ven, danos este día
             Un corazón filial y lleno de alegría.
             Consérvenos la paz tu brazo protector;
             Deseamos ver tu faz en comunión, Señor.
        - |-
          3. Dios Padre, Creador, con gozo te adoramos.
             Dios Hijo, Redentor, tu salvación cantamos.
             Dios Santificador, te honramos en verdad.
             Te ensalza nuestra voz, bendita Trinidad.
    - number: 70
      title: Himno a la Trinidad
      verses:
        - |-
          1. ¡Gloria al Todopoderoso,
             el Autor de salvación!
             Padre Santo, te exaltamos con la voz y el corazón,
             Por tu gracia sempiterna, por tu amor y tu bondad,
             Por tu gran misericordia, tu justicia y santidad.
        - |-
          2. ¡Gloria al Verbo encarnado,
             Jesucristo el Mediador!
             Guíanos, Pastor bendito, en la senda de tu amor;
             Redentor y luz del mundo, muéstranos tu potestad;
             Soberano Rey del cielo, haz aquí tu voluntad.
        - |-
          3. ¡Gloria al Santo Paracleto,
             nuestro fiel Consolador!
             Llenanos de paz y gozo, danos fuerza y valor;
             Ilumina nuestras mentes, guíanos en tu verdad,
             Para que podamos siempre caminar en santidad.
        - |-
          4. ¡Gloria al Trino Dios cantamos,
             quien nos dio la redención!
             Nuestros labios toca ahora para hablar con compasión,
             Nuestro oído haz que escuche de las almas el clamor,
             Nuestros ojos abre para ver al mundo con tu amor.
    - number: 71
      title: Padre, te adoro
      verses:
        - |-
          1. Padre, te adoro;
             Doy a ti mi vida;
             Cuánto te amo.
        - |-
          2. Cristo, te adoro;
             Doy a ti mi vida;
             Cuánto te amo.
        - |-
          3. Espíritu Santo,
             Doy a ti mi vida;
             Cuánto te amo
    - number: 72
      title: Oh Padre, eterno Dios
      verses:
        - |-
          1. ¡Oh Padre, eterno Dios!
             Alzamos nuestra voz en gratitud
             Por lo que tú nos das con sin igual amor,
             Hallando nuestra paz en ti, Señor.
        - |-
          2. ¡Bendito Salvador!
             Te damos con amor el corazón;
             Y aquí nos puedes ver, que humildes a tu altar
             Venimos a ofrecer precioso don.
        - |-
          3. ¡Espíritu de Dios!
             Escucha nuestra voz, y tu bondad
             Derrame en nuestro ser divina claridad,
             Para poder vivir en santidad.
    - number: 73
      title: Te loamos, oh Dios
      verses:
        - |-
          1. Te loamos ¡Oh Dios!
             con unánime voz,
             Porque en Cristo tu Hijo
             nos diste perdón.
        - |-
          CORO
            ¡Aleluya! te alabamos,
            ¡Cuán grande es tu amor!
            ¡Aleluya! te adoramos, bendito Señor.
        - |-
          2. Te loamos, Jesús,
             Quien tu trono de luz
             Has dejado por darnos salud en la cruz.
        - |-
          CORO
            ¡Aleluya! te alabamos,
            ¡Cuán grande es tu amor!
            ¡Aleluya! te adoramos, bendito Señor.
        - |-
          3. Te damos loor, Santo Consolador,
             Quien nos llenas de gozo y santo valor.
        - |-
          CORO
            ¡Aleluya! te alabamos,
            ¡Cuán grande es tu amor!
            ¡Aleluya! te adoramos, bendito Señor.
        - |-
          4. Unidos load a la gran Trinidad,
             Que es la fuente de gracia,
             virtud y verdad.
        - |-
          CORO
            ¡Aleluya! te alabamos,
            ¡Cuán grande es tu amor!
            ¡Aleluya! te adoramos, bendito Señor.
    - number: 74
      title: Loor a tu nombre
      verses:
        - |-
          1. Oh Dios, como es tu nombre, así es tu alabanza
             hasta los confines de la tierra;
        - |-
          2. No a nosotros, SEÑOR, no a nosotros
             Sino a tu nombre da gloria,
             Por tu misericordia, por tu verdad.
    - number: 75
      title: Cantad al Señor
      verses:
        - |-
          1. Cantad al Señor un cántico nuevo,
             Cantad al Señor un cántico nuevo,
             Cantad al Señor un cántico nuevo;
             Cantad al Señor, cantad al Señor.
        - |-
          2. El es Creador y dueño de todo,
             El es Creador y dueño de todo,
             El es Creador y dueño de todo;
             Cantad al Señor, cantad al Señor.
        - |-
          3. Cantad a Jesús, porque Él es digno,
             Cantad a Jesús, porque Él es digno,
             Cantad a Jesús, porque Él es digno;
             Cantad al Señor, cantad al Señor.
        - |-
          4. Es Él quien nos dio su Espíritu Santo,
             Es Él quien nos dio su Espíritu Santo,
             Es Él quien nos dio su Espíritu Santo;
             Cantad al Señor, cantad al Señor.
        - |-
          5. Cantad al Señor, "¡Amén, aleluya!"
             Cantad al Señor, "¡Amén, aleluya!"
             Cantad al Señor, "¡Amén, aleluya!"
             Cantad al Señor, cantad al Señor.
    - number: 76
      title: Santo, Santo
      verses:
        - |-
          1. Santo, santo; santo, santo;
             Santo, santo eres tú, Señor amado;
             Elevamos nuestra voz en alabanza ante ti;
             Santo, santo; santo, santo.
        - |-
          2. Padre eterno, Padre eterno;
             Somos hijos bendecidos, Padre eterno;
             Y con cánticos de gozo te rendimos gratitud;
             Padre eterno, Padre eterno.
        - |-
          3. Jesucristo, Jesucristo;
             Somos salvos por tu sangre, Jesucristo;
             Y con notas de alegría hoy cantamos tu loor;
             Jesucristo, Jesucristo.
        - |-
          4. Santo Espíritu, Santo Espíritu;
             Nos enseñas y nos guías, Santo Espíritu;
             Y con gracias te alabamos por tu obra en nuestro ser;
             Santo Espíritu, Santo Espíritu.
        - |-
          5. Aleluya, aleluya; Con amor te adoramos,
             Dios bendito; Y ofrecemos nuestra vida
             en señal de gratitud; Aleluya, aleluya.
    - number: 77
      title: Honremos a la Trinidad
      verses:
        - |-
          1. Bendito sea el Dios y Padre de nuestro
             Señor Jesucristo, Padre de misericordias
             y Dios de toda consolación,
        - |-
          2. Es también quien nos ha sellado
             y ha puesto como garantía al Espíritu
             en nuestros corazones.
        - |-
          3. Ahora bien, hay diversidad de dones;
             pero el Espíritu es el mismo.
        - |-
          4. Hay también diversidad de ministerios,
             pero el Señor es el mismo.
        - |-
          5. También hay diversidad de actividades,
             pero el mismo Dios es el que realiza
             todas las cosas en todos.
        - |-
          6. Hay un solo cuerpo y un solo Espíritu,
             así como habéis sido llamados a una
             sola esperanza de vuestro llamamiento.
        - |-
          7. Hay un solo Señor, una sola fe,
             un solo bautismo,
        - |-
          8. Un solo Dios y Padre de todos,
             quien es sobre todos, a través
             de todos y en todos.
    - number: 78
      title: Gloria a tu nombre por doquier
      verses:
        - |-
          1. Padre, te amo, te alabo y te adoro;
             Gloria a tu nombre por doquier.
             Gloria a ti, Señor, Gloria a ti, Señor;
             Gloria a tu nombre por doquier.
        - |-
          2. Cristo, te amo, te alabo y te adoro;
             Gloria a tu nombre por doquier.
             Gloria a ti, Señor, Gloria a ti, Señor;
             Gloria a tu nombre por doquier.
        - |-
          3. Espíritu, te alabo y te adoro;
             Gloria a tu nombre por doquier.
             Gloria a ti, Señor, Gloria a ti, Señor;
             Gloria a tu nombre por doquier.
    - number: 79
      title: Eterno Padre celestial
      verses:
        - |-
          1. Eterno Padre celestial,
             Autor de toda la creación,
             Que en el espacio sideral
             Pusiste astros, luna y sol;
             Oh, guárdanos de todo mal, Concédenos tu protección.
        - |-
          2. Oh, Luz que brota de su luz,
             Brillando siempre en sombra y sol,
             Con inefable magnitud,
             De Dios eterno resplandor;
             Radiante Sol de plenitud, Oh, llenanos de tu amor.
        - |-
          3. Tu Santo Espíritu aquí
             Dirija siempre nuestra acción;
             Gozoso el día pase así,
             Por tu constante dirección;
             Al descansar repose en ti,
             Seguro, nuestro corazón.
    - number: 80
      title: Adoradle
      verses:
        - |-
          1. Dad al Padre toda gloria,
             Dad al Hijo todo honor,
             Y al Espíritu Divino, alabanzas de loor.
        - |-
          CORO
            Adoradle, adoradle, Adorad al Salvador.
            (al Salvador.) Tributadle toda gloria,
            Pueblo suyo por su grande amor.
        - |-
          2. Entonadle un canto nuevo,
             Huestes libres del Señor;
             Tierra, cielo, mar y luna,
             Gloria dan al Trino Dios.
        - |-
          CORO
            Adoradle, adoradle, Adorad al Salvador.
            (al Salvador.) Tributadle toda gloria,
            Pueblo suyo por su grande amor.
        - |-
          3. ¡Adoradle, oh Iglesia!
             Por Jesús tu Redentor, rescatada por su gracia,
             Libre por su grande amor.
        - |-
          ULTIMO CORO
            Yo te adoro, yo te adoro,
            Yo te adoro, buen Jesús. (mi buen Jesús.)
            Yo te adoro reverente,
            ¡Oh, Cordero santo de mi Dios!
    - number: 81
      title: Lo que respira
      verses:
        - |-
          1. Alabad a nuestro Dios en su santuario,
             por la hermosura de su cielo,
             por sus proezas alabadle a él.
        - |-
          2. Alabadle por la grandeza de su nombre,
             con el sonido de bocina,
             salterio y arpa, a la vez cantad.
        - |-
          3. Alabadle con el alegre pandero,
             con el candor de la danza;
             cantad con gozo al Señor.
        - |-
          4. Alabadle con cuerdas,
             flautas y címbalos
             de júbilo resonantes.
        - |-
          5. En su lenguaje todo lo que respira
             alabe al Señor.
             Lo que respira alabe al Señor.
             ¡Amén!
    - number: 82
      title: Te alabaremos, Señor
      verses:
        - |-
          1. Cantad alegres a Dios,
             habitantes de toda la tierra.
        - |-
          2. Servid a Jehová con alegría;
             venid ante su presencia con regocijo.
        - |-
          3. Reconoced que Jehová es Dios;
             Él nos hizo, y no nosotros
             a nosotros mismos; pueblo suyo somos,
             y ovejas de su prado.
        - |-
          4. Entrad por sus puertas con acción
             de gracias, por sus atrios con alabanza;
             alabadle, bendecid su nombre.
    - number: 83
      title: A Dios cantad
      verses:
        - |-
          1. Al Padre alabad,
             Al Hijo load,
             A Dios cantad;
             Al Santo Espíritu adorad, a Dios celebrad.
        - |-
          2. Shalom javerim!
             Shalom javerim!
             ¡Shalom! ¡Shalom!
             La paz del Señor contigo está,
             ¡Shalom! ¡Shalom!
    - number: 84
      title: Entraré por sus puertas
      verses:
        - |-
          1. Entraré por sus puertas con cantos de loor,
             Por sus atrios con alabanza;
             Y diré,
             "Este es el día que hizo el Señor;
             Me gozaré y alegraré en él".
             Yo le alabaré, yo le alabaré,
             Me gozaré y alegraré en él.
             Yo le alabaré, yo le alabaré,
             Me gozaré y alegraré en él.
    - number: 85
      title: Dios está aquí
      verses:
        - |-
          1. Dios está aquí,
             tan cierto como el aire que respiro,
             Tan cierto como la mañana se levanta,
             Tan cierto como que le canto y
             me puede oír.
    - number: 86
      title: Yo te exalto
      verses:
        - |-
          1. Yo te exalto, Dios mi Padre;
             Yo te exalto, Dios mi Rey.
             Eres sublime sobre la tierra
             Y te adoro, oh mi Dios.
    - number: 87
      title: Adoremos a Dios
      verses:
        - |-
          1. Dios es espíritu; y es necesario
             que los que le adoran, le adoren
             en espíritu y en verdad.
        - |-
          2. Y amarás al Señor tu Dios con todo tu corazón,
             con toda tu alma y con todas tus fuerzas.
        - |-
          3. ¡Aleluya! Ciertamente es bueno
             cantar salmos a nuestro Dios;
             Ciertamente es agradable y bella la alabanza.
    - number: 88
      title: Venid, nuestras voces unamos
      verses:
        - |-
          1. Venid, nuestras voces con gozo unamos
             Cantando alabanzas a Cristo el Señor;
             Las huestes del cielo le están glorificando;
             Loémosle también con sincero amor.
        - |-
          2. Los ángeles cantan "Es digno el Cordero";
             Pues él por nosotros murió en la cruz;
             Con su sacrificio pagó nuestro pecado;
             Con gratitud cantemos a Cristo Jesús.
        - |-
          3. Venció a la muerte y resucitado
             Subió exaltado a la diestra de Dios;
             Es digno de honra, poder y alabanza;
             Su nombre bendecimos, con alma y voz.
        - |-
          4. Un día la entera creación, de rodillas,
             Reconocerá que Jesús es Señor;
             Por todos los siglos él reinará triunfante;
             Los salvos cantaremos al gran Redentor.
    - number: 89
      title: Vine a alabar a Dios
      verses:
        - |-
          1. Vine a alabar a Dios,
             Vine a alabar a Dios,
             Vine a alabar su nombre,
             Vine a alabar a Dios.
        - |-
          2. El vino a mi vida un día muy especial,
             Cambió mi corazón,
             me enseñó un camino mejor,
             Y esa es la razón por la que digo que
             vine a alabar a Dios.
    - number: 90
      title: Te exaltaré, mi Dios, mi Rey
      verses:
        - |-
          1. Te exaltaré, mi Dios, mi Rey,
             Y bendeciré tu nombre
             Eternamente y para siempre;
             Cada día te bendeciré.
             Y alabaré tu nombre
             eternamente y para siempre;
             Grande es Jehová
             y digno de suprema alabanza;
             Y su grandeza es inescrutable;
             Cada día te bendeciré.
        - |-
          2. Generación a generación
             Celebrará tus obras,
             Y anunciará tus poderosos hechos;
             Cada día te bendeciré.
             Y alabaré tu nombre
             eternamente y para siempre;
             Grande es Jehová
             y digno de suprema alabanza;
             Y su grandeza es inescrutable;
             Cada día te bendeciré.
    - number: 91
      title: Señor, ¿quién entrará?
      verses:
        - |-
          1. Señor, ¿quién entrará
             en tu santuario para adorar?
             Señor, ¿quién entrará en tu santuario para adorar?
             El limpio de manos, de corazón puro,
             Que no es vanidoso, y sabe amar.
        - |-
          2. Señor, yo quiero entrar
             en tu santuario para adorar.
             Señor, yo quiero entrar en tu santuario para adorar.
             Mis manos, oh, limpia, mi ser purifica,
             Mi vanidad quita, y dame tu amor.
        - |-
          3. Señor, ya puedo entrar
             en tu santuario para adorar.
             Señor, ya puedo entrar
             en tu santuario para adorar.
             Pues tú me has limpiado, me has perdonado,
             Tu Espíritu Santo me llena de amor.
    - number: 92
      title: El cielo canta alegría
      verses:
        - |-
          1. ¡El cielo canta alegría! ¡Aleluya!
             Porque en tu vida y la mía brilla la gloria de Dios.
             ¡Aleluya! ¡Aleluya!
        - |-
          2. ¡El cielo canta alegría! ¡Aleluya!
             Porque a tu vida y la mía vino el amor de Jesús.
             ¡Aleluya! ¡Aleluya!
        - |-
          3. ¡El cielo canta alegría! ¡Aleluya!
             Porque tu vida y la mía proclamarán al Señor.
             ¡Aleluya! ¡Aleluya!
    - number: 93
      title: Aleluya
      verses:
        - |-
          1. Aleluya, aleluya, aleluya, aleluya,
             Aleluya, aleluya, aleluya, aleluya.
        - |-
          2. Dios mi Padre, yo te amo,
             Aleluya, aleluya.
        - |-
          3. Jesucristo, te alabo,
             Aleluya, aleluya.
        - |-
          4. Santo Espíritu, te adoro,
             Aleluya, aleluya.
    - number: 94
      title: Por la mañana
      verses:
        - |-
          1. Por la mañana yo dirijo mi alabanza
             A Dios que ha sido y es mi única esperanza.
             Por la mañana yo le invoco con el alma
             Y le suplico que me dé su dulce calma.
             El nos escucha, pues nos ama tanto,
             Y nos alivia de cualquier quebranto.
             Nos da su mano poderosa y fuerte,
             Para librarnos de la misma muerte.
        - |-
          2. Cuando la noche se aproxima, tenebrosa,
             En elevarle mi oración mi alma goza;
             Siento su paz inagotable, dulce y grata
             Porque temores y ansiedad, Cristo los mata.
             También elevo mi cantar al cielo
             Cuando a la tierra baja negro velo.
             El sol se oculta, pero queda Cristo,
             A quien mis ojos en el sueño han visto.
        - |-
          3. Brilla su lumbre
             bienhechora mientras duermo;
             Pone su mano sobre mí si estoy enfermo.
             Me fortalece, me alienta con el sueño,
             Pues es mi Dios, mi Redentor y Él es mi dueño.
        - |-
          4. Y al despertar por la mañana siento
             Que Dios invade mi alma y pensamiento;
             Veo a Jesús, mi Redentor amado,
             Por mi pecado en una cruz clavado.
        - |-
          5. Veo la sangre de sus manos que ha brotado;
             Veo la sangre borbotando en un costado;
             Una corona con espinas en su frente,
             La multitud escarneciéndole insolente.
             Pero, ¡qué dicha cuando al cielo sube,
             Lleno de gloria en majestuosa nube!
             Pero, ¡qué dicha cuando al cielo sube,
             Lleno de gloria en majestuosa nube!
    - number: 95
      title: Ante su presencia
      verses:
        - |-
          1. Ante su presencia canta,
             "Aleluya,
             Aleluya,
             Aleluya".
    - number: 96
      title: Las primicias del día
      verses:
        - |-
          1. Me despierto con ganas de verlo;
             Las primicias del día le doy.
             Comenzar con el Rey me anima;
             Confesarle, "Señor, tuyo soy".
        - |-
          CORO
            Yo te doy este día, Señor;
            Yo te doy esta vida, Señor.
            De tu mano yo quiero seguir, Controlado por ti al vivir.
        - |-
          2. Un momento contigo es oro;
             Conversar con el Rey es mi honor.
             Me impartes tu sabiduría;
             Me inspira tu carta de amor.
        - |-
          CORO
            Yo te doy este día, Señor;
            Yo te doy esta vida, Señor.
            De tu mano yo quiero seguir, Controlado por ti al vivir.
    - number: 97
      title: Señor, Señor
      verses:
        - |-
          1. Señor, Señor, tú antes, tú después,
             tú en la inmensa hondura del vacío
             y en la hondura interior:
             Tú en la aurora que canta
             y en la noche que piensa;
             Tú en la flor de los cardos
             y en los cardos sin flor.
    - number: 98
      title: Te amo, Rey
      verses:
        - |-
          1. Te amo, Rey, y levanto mi voz
             Para adorarte, mi Salvador.
             Me gozo en ti y te alabo, mi Dios;
             Dulce sea mi canto a ti, oh Señor.
    - number: 99
      title: Quiero Alabarte
      verses:
        - |-
          1. Quiero alabarte más y más aún;
             Buscar tu voluntad, Tu gracia conocer, quiero alabarte.
        - |-
          2. Quiero amarte más y más aún;
             Buscar tu voluntad, Tu gracia conocer, quiero amarte.
        - |-
          3. Quiero servirte más y más aún;
             Buscar tu voluntad, Tu gracia conocer, quiero servirte.
    - number: 100
      title: En mi vida gloria te doy
      verses:
        - |-
          1. En mi vida gloria te doy, gloria te doy,
             En mi vida gloria te doy, Señor.
        - |-
          2. En mi canto gloria te doy, gloria te doy,
             En mi canto gloria te doy, Señor.
        - |-
          3. En tu iglesia gloria te doy, gloria te doy,
             En tu iglesia gloria te doy, Señor.
    - number: 101
      title: Bendice, alma mía
      verses:
        - |-
          1. Bendice, alma mía,
             bendice al Señor,
             Bendiga mi ser su santo nombre.
        - |-
          2. Bendice, alma mía,
             bendice al Señor,
             No olvides jamás sus beneficios.
    - number: 102
      title: Canta, canta alma mía
      verses:
        - |-
          1. Canta, canta, alma mía,
             A tu Rey y tu Señor;
             Reconoce sus bondades;
             Te bendice con favor.
             Canta, canta, alma mía, canta de su gran amor.
        - |-
          2. Canta su misericordia,
             Que a tus padres protegió;
             En su amor te dio la vida,
             Te cuidó y perdonó.
             Canta, canta, alma mía, canta al Dios que te salvó.
        - |-
          3. Como padre te conoce,
             Sabe tu debilidad,
             Con su brazo te conduce,
             Te protege de maldad.
             Canta, canta, alma mía, canta su fidelidad.
        - |-
          4. Angeles y querubines,
             Que su majestad cantáis,
             Oh, estrellas, sol y luna,
             Que los cielos domináis,
             Todos juntos, alabemos, adorando a nuestro Dios.
    - number: 103
      title: Cantaré a tu nombre
      verses:
        - |-
          1. A Jehová cantaré en mi vida;
             a mi Dios cantaré salmos mientras viva.
        - |-
          2. Mi corazón está dispuesto, oh Dios;
             cantaré y entonaré salmos; esta es mi gloria.
        - |-
          3. Te alabaré, oh Jehová, entre los pueblos;
             a ti cantaré salmos entre las naciones.
        - |-
          4. Porque más grande que los cielos es tu
             misericordia, y hasta los cielos tu verdad.
        - |-
          5. Exaltado seas sobre los cielos, oh Dios,
             y sobre toda la tierra sea enaltecida tu gloria.
        - |-
          6. Te amo, oh Jehová, fortaleza mía.
        - |-
          7. Jehová, roca mía y castillo mío, y mi libertador;
             Dios mío, fortaleza mía, en él confiaré;
             Mi escudo, y la fuerza de mi salvación,
             mi alto refugio.
        - |-
          8. Invocaré a Jehová, quien es digno
             de ser alabado.
        - |-
          9. Viva Jehová, y bendita sea mi roca,
             y enaltecido sea el Dios de mi salvación;
        - |-
          10. Por tanto yo te confesaré entre las
              naciones, oh Jehová, y cantaré a tu nombre.
    - number: 104
      title: Nunca, Dios mío
      verses:
        - |-
          1. Nunca, Dios mío, cesará mi labio
             De bendecirte, de cantar tu gloria,
             Porque conservo de tu amor inmenso grata memoria.
        - |-
          2. Cuando perdido en mundanal sendero,
             No me cercaba sino niebla oscura,
             Tú me miraste, y alumbróme un rayo de tu luz pura.
        - |-
          3. Cuando inclinaba mi abatida frente
             Del mal obrar el oneroso yugo,
             Dulce reposo y eficaz alivio
             Darme te plugo.
    - number: 105
      title: Alabad al Rey del cielo
      verses:
        - |-
          1. Alabad al Rey del cielo,
             A sus pies rendid loor;
             Redimidos, perdonados,
             Alabadle con amor.
        - |-
          CORO
            Aleluya, aleluya, aleluya,
            Alabadle sin cesar;
            Alabadle sin cesar.
        - |-
          2. Cual pastor Jesús os cuida;
             Ya no habrá debilidad;
             Con sus manos os conduce:
             Hoy cantad su gran bondad.
        - |-
          CORO
            Aleluya, aleluya, aleluya,
            Alabadle sin cesar;
            Alabadle sin cesar.
        - |-
          3. En la altura le adora
             La gran hueste celestial;
             Con los santos alabemos
             Al Señor con voz triunfal.
        - |-
          CORO
            Aleluya, aleluya, aleluya,
            Alabadle sin cesar;
            Alabadle sin cesar.
    - number: 106
      title: Rey de Reyes
      verses:
        - |-
          1. Rey de reyes,
             Señor de señores,
             ¡Gloria, aleluya!
        - |-
          2. Cristo,
             Príncipe de Paz,
             ¡Gloria, aleluya!
    - number: 107
      title: Al Rey adorad
      verses:
        - |-
          1. Al Rey adorad, grandioso Señor,
             Y con gratitud cantad de su amor.
             Anciano de Días, el gran Defensor,
             De gloria vestido, le damos loor.
        - |-
          2. Decid de su amor, su gracia cantad;
             Vestido de luz y de majestad.
             Su carro de fuego en las nubes mirad;
             Son negras sus huellas en la tempestad.
        - |-
          3. ¿Quién puede tu providencia contar?
             Pues tu aire me das para respirar.
             En valles y en montes alumbra tu luz,
             Y con gran dulzura me cuida Jesús.
        - |-
          4. Muy frágiles son los hombres aquí,
             Mas por tu bondad confiamos en ti.
             Tu misericordia ¡Cuán firme! ¡Cuán fiel!
             Creador, Salvador y Amigo es él.
    - number: 108
      title: Jubilosos, te adoramos
      verses:
        - |-
          1. Jubilosos, te adoramos, Dios de gloria y Salvador;
             Nuestras vidas te entregamos
             Como se abre al sol la flor.
             Ahuyenta nuestros males y tristezas, oh Jesús;
             Danos bienes celestiales, llenanos de gozo y luz.
        - |-
          2. Tierra y cielo están gozosos, reflejando tu amor;
             Angeles y estrellas todos cantan siempre tu loor.
             Monte, valle, río y fuente, campo, selva y ancho mar
             Nos recuerdan que constante te debemos alabar.
        - |-
          3. Dios, que libre proporcionas
             bienestar y bendición,
             Y en tu gracia nos perdonas, gozo da al corazón.
             Tú, de todo amor la fuente,
             haz que amemos en verdad;
             Ilumina nuestra mente con divina claridad.
        - |-
          4. Oh, mortales, hoy cantemos con el coro celestial;
             Como hermanos habitemos en amor santo y real.
             Alabando siempre vamos en la lucha a conquistar;
             Si confiando en ti andamos nos ayudas a triunfar.
    - number: 109
      title: El nacimiento de Jesucristo
      verses:
        - |-
          1. José subió de Galilea,...a Belén, por cuanto era
             de la casa y familia de David;
        - |-
          2. para ser empadronado con María su mujer,
             desposada con él, la cual estaba encinta.
        - |-
          3. Y aconteció que estando ellos allí,
             se cumplieron los días de su alumbramiento.
        - |-
          4. Y dio a luz a su hijo primogénito, y lo envolvió
             en pañales, y lo acostó en un pesebre,
             porque no había lugar para ellos en el mesón.
        - |-
          5. Había pastores en la misma región, que velaban y
             guardaban las vigilias de la noche sobre su rebaño.
        - |-
          6. Y he aquí, se les presentó un ángel del Señor,
             y la gloria del Señor los rodeó de resplandor;
             y tuvieron gran temor.
        - |-
          7. Pero el ángel les dijo: No temáis; porque he aquí
             os doy nuevas de gran gozo, que será para todo
             el pueblo: Que os ha nacido hoy, en la ciudad
             de David, un Salvador, que es CRISTO el Señor.
    - number: 110
      title: Y tú Belén
      verses:
        - |-
          1. Y tú Belén, tierra de Judá,
             No eres pequeñita, pues de ti saldrá el Guiador.
             No eres pequeñita, pues de ti saldrá el Guiador.
        - |-
          2. Promesa fiel el profeta dio,
             Y al tiempo en tus campos el Señor Jesús nació.
             Y al tiempo en tus campos el Señor Jesús nació.
        - |-
          3. Dios ha mostrado su gran amor,
             ¡Cantadle cielo y tierra y adorad al Salvador!
             ¡Cantadle cielo y tierra y adorad al Salvador!
    - number: 111
      title: Oh ven, bendito Emanuel
      verses:
        - |-
          1. Oh ven, oh ven, bendito Emanuel,
             De la maldad rescata a Israel,
             Que llora en triste desolación,
             Y espera ansioso su liberación.
        - |-
          CORO
            ¡Cantad! ¡Cantad! Pues vuestro Emanuel
            vendrá a ti muy pronto, Israel.
        - |-
          2. Oh ven, Sabiduría Celestial,
             Y líbranos del mal a cada cual;
             Corrígenos y haznos saber
             Que con tu ayuda hemos de vencer.
        - |-
          CORO
            ¡Cantad! ¡Cantad! Pues vuestro Emanuel
            vendrá a ti muy pronto, Israel.
        - |-
          3. Oh ven, oh ven, glorioso Rey de Sion,
             Y ten tu trono en cada corazón;
             Disipa toda la oscuridad,
             Y enséñanos tu santa voluntad.
        - |-
          CORO
            ¡Cantad! ¡Cantad! Pues vuestro Emanuel
            vendrá a ti muy pronto, Israel.
        - |-
          4. Oh ven, Mesías victorioso, ven
             de nuevo a este mundo a reinar;
             Destruye para siempre el mal,
             Y reina aquí en gloria celestial.
        - |-
          CORO
            ¡Cantad! ¡Cantad! Pues vuestro Emanuel
            vendrá a ti muy pronto, Israel.
    - number: 112
      title: Emanuel
      verses:
        - |-
          1. Dios nos amó, a su Hijo dio,
             Y lo nombró nuestro Emanuel.
             La profecía fue en él cumplida;
             Dios con nosotros, nuestro Emanuel.
        - |-
          2. Dios descendió y se encarnó;
             Jesús nació, nuestro Emanuel.
             Vino a salvarnos, vino a redimirnos;
             Dios con nosotros, nuestro Emanuel.
    - number: 113
      title: Despunta el alba
      verses:
        - |-
          1. Despunta el alba del nuevo día;
             cantan las aves a su Creador.
             Dan alabanza con alegría
             a Jesucristo, nuestro Señor.
        - |-
          2. Ya nuestro Salvador ha venido;
             a este mundo trajo la luz.
             Es nuestro Redentor prometido.
             ¡Gloria al Mesías, Cristo Jesús!
    - number: 114
      title: Suenen dulces himnos
      verses:
        - |-
          1. ¡Suenen dulces himnos gratos al Señor,
             Y óiganse en concierto universal!
             Desde el alto cielo baja el Salvador
             Para beneficio del mortal.
        - |-
          CORO
            ¡Gloria! ¡Gloria sea a nuestro Dios!
            ¡Gloria! Sí, cantemos a una voz,
            Y el cantar de gloria que se oyó en Belén,
            Sea nuestro cántico también.
        - |-
          2. Salte, de alegría lleno el corazón,
             La abatida y pobre humanidad;
             Dios se compadece viendo su aflicción,
             Y le muestra buena voluntad.
        - |-
          CORO
            ¡Gloria! ¡Gloria sea a nuestro Dios!
            ¡Gloria! Sí, cantemos a una voz,
            Y el cantar de gloria que se oyó en Belén,
            Sea nuestro cántico también.
        - |-
          3. Sientan nuestras almas noble gratitud
             Hacia el que nos brinda redención;
             Y a Jesús el Cristo, que nos da salud,
             Tributemos nuestra adoración.
        - |-
          CORO
            ¡Gloria! ¡Gloria sea a nuestro Dios!
            ¡Gloria! Sí, cantemos a una voz,
            Y el cantar de gloria que se oyó en Belén,
            Sea nuestro cántico también.
    - number: 115
      title: Venid Pastores
      verses:
        - |-
          1. Venid pastores, venid, oh
             venid a Belén, oh venid al portal;
             Yo no me voy de Belén sin al
             Niño Jesús un momento adorar.
        - |-
          CORO
            Y la estrella de Belén os guiará con su luz,
            Hasta el humilde portal donde nació Jesús.
        - |-
          2. Venid pastores, venid, con gran gozo,
             dejando en el campo la grey;
             Oíd a los ángeles quienes
             anuncian que hoy ha nacido el Rey.
        - |-
          CORO
            Y la estrella de Belén os guiará con su luz,
            Hasta el humilde portal donde nació Jesús.
    - number: 116
      title: Oh, pueblecito de Belén
      verses:
        - |-
          1. ¡Oh, pueblecito de Belén, durmiendo en dulce paz!
             Los astros brillan sobre ti con suave claridad;
             Mas en tus quietas calles hoy surge eterna luz,
             Y la promesa de Emanuel se cumple en Jesús.
        - |-
          2. Al niño que ha nacido hoy el coro celestial
             Entona con sonora voz un cántico triunfal.
             ¡El santo nacimiento, estrellas, proclamad;
             A Dios el Rey cantad loor; honor y gloria dad!
        - |-
          3. Con celestial serenidad, desciende nuestro don;
             Así concede Dios su amor a cada corazón;
             No se oye su venida, mas el Señor vendrá
             Al que le quiera recibir; con él habitará.
        - |-
          4. El Santo Niño de Belén es nuestro Salvador,
             Quien por su sangre perdonó el mal con tanto amor;
             Unimos nuestras voces al coro angelical
             Y proclamamos por doquier su gloria celestial.
    - number: 117
      title: Porque un niño
      verses:
        - |-
          1. Porque un niño nos es nacido,
             Porque un niño nos es nacido;
             Porque un hijo ya nos es dado,
             Y el principado sobre su hombro;
        - |-
          2. Y se llamará su nombre Admirable,
             Consejero, Dios fuerte;
             Y se llamará su nombre
             Padre eterno,
             El Príncipe de paz.
    - number: 118
      title: Al mundo paz
      verses:
        - |-
          1. ¡Al mundo paz, nació Jesús!
             Nació ya nuestro Rey; el corazón ya tiene luz,
             Y paz su santa grey, y paz, y paz su santa grey.
        - |-
          2. ¡Al mundo paz, el Salvador
             En tierra reinará! ya es feliz el pecador,
             Jesús perdón le da, Jesús, Jesús perdón le da.
        - |-
          3. Al mundo él gobernará con gracia y con poder;
             A las naciones mostrará
             Su amor y su poder, Su amor, su amor y su poder.
    - number: 119
      title: Gloria a Dios en las alturas
      verses:
        - |-
          1. ¡Gloria a Dios en las alturas! Que mostró
             su gran amor, dándoles a sus criaturas
             un potente Salvador. Con los himnos de los santos
             Hagan coro nuestros cantos de alabanza y gratitud,
             Por la divinal salud, y digamos a una voz:
             ¡En los cielos gloria a Dios!
        - |-
          2. ¡Gloria a Dios! la tierra cante al gozar
             de su bondad, pues le brinda paz constante
             En su buena voluntad. Toda tribu y lenguas todas
             Al excelso eleven odas, por Jesús, Rey Emanuel,
             Que les vino de Israel, y prorrumpan a una voz:
             ¡En los cielos gloria a Dios!
        - |-
          3. ¡Gloria a Dios! la Iglesia entona,
             rota al ver su esclavitud
             por Jesús, que es su corona,
             Su cabeza y plenitud. Vigilante siempre vive
             y a la lucha se apercibe, mientras llega su solaz
             En la gloria y plena paz, donde exclame a una voz:
             ¡En los cielos gloria a Dios!
    - number: 120
      title: Oh santísimo, felicísimo
      verses:
        - |-
          1. ¡Oh santísimo, felicísimo, grato tiempo de Navidad!
             Al mundo perdido Cristo le ha nacido;
             ¡Alegría, alegría, cristiandad!
        - |-
          2. ¡Oh santísimo, felicísimo, grato tiempo de Navidad!
             Coros celestiales oyen los mortales;
             ¡Alegría, alegría, cristiandad!
        - |-
          3. ¡Oh santísimo, felicísimo, grato tiempo de Navidad!
             Príncipe del cielo, danos tu consuelo;
             ¡Alegría, alegría, cristiandad!
    - number: 121
      title: Venid, Pastorcillos
      verses:
        - |-
          1. Venid, pastorcillos,
             venid a adorar
             Al Rey de los cielos que nace en Judá.
             Sin ricas ofrendas podemos llegar,
             Que el Niño prefiere la fe y la bondad.
        - |-
          2. Un rústico techo abrigo le da;
             Por cuna un pesebre, por templo un portal;
             En lecho de pajas incógnito está
             Quien quiso a los astros su gloria prestar.
        - |-
          3. Hermoso lucero
             le vino a anunciar,
             Y magos de oriente buscándole van;
             Delante se postran del Rey de Judá,
             De incienso, oro y mirra tributo le dan.
    - number: 122
      title: Angeles, alzad el canto
      verses:
        - |-
          1. Angeles, alzad el canto,
             la noticia celebrad;
             Proclamad al mundo entero
             nuevas de consuelo y paz.
        - |-
          CORO
            Adoremos, adoremos
            al recién nacido Rey.
        - |-
          2. Oh, pastores que oísteis
             el gran coro celestial,
             El mensaje tan sublime
             por doquiera anunciad.
        - |-
          CORO
            Adoremos, adoremos
            al recién nacido Rey.
        - |-
          3. Sabios, contemplad con gozo
             de la estrella el fulgor,
             Ese astro portentoso
             que os guía al Salvador.
        - |-
          CORO
            Adoremos, adoremos
            al recién nacido Rey.
        - |-
          4. Fieles, todos adoradle
             con humilde gratitud;
             Todo honor y homenaje
             tributad al Rey Jesús.
        - |-
          CORO
            Adoremos, adoremos
            al recién nacido Rey.
    - number: 123
      title: Ved al niñito
      verses:
        - |-
          1. Ved al niñito en un pesebre,
             Es Jesucristo, Hijo de Dios;
             Todo el mundo canta alegre,
             Pues él nos trae la salvación.
        - |-
          2. Desde los cielos a este mundo
             Vino a nacer en pobre mesón;
             Angeles cantan sus alabanzas;
             Reyes le rinden adoración.
        - |-
          3. Ya se cumplieron las profecías,
             Pues ha nacido el Redentor;
             Démonos gloria y alabanza,
             Porque merece todo honor.
    - number: 124
      title: Al rústico pesebre
      verses:
        - |-
          1. Al rústico pesebre del niñito Jesús
             Las estrellas del cielo le destellan su luz;
             Fue pobre el establo donde Cristo nació,
             Y humilde la cuna en que él descansó.
        - |-
          2. El niño del pesebre es Jesús mi Señor,
             Adorarle yo quiero con sincero amor;
             Mi corazón pequeño hoy su cuna será,
             Y allí Jesucristo bienvenida tendrá.
    - number: 125
      title: Cristianos, hoy cantad a Dios
      verses:
        - |-
          1. Cristianos, hoy cantad a Dios
             con alma, corazón y voz; Grata nueva proclamad:
             ¡Cantad! Jesucristo vino ya.
             Ved al Niño sin temor, él es del mundo el Redentor;
             Cristo ya nació, Cristo ya nació.
        - |-
          2. Cristianos, hoy cantad a Dios
             con alma, corazón y voz; A la muerte no temáis;
             ¡Cantad! Jesucristo nos da paz.
             El ofrece salvación a los que buscan su perdón;
             Cristo nos salvó, Cristo nos salvó.
        - |-
          3. Cristianos, hoy cantad a Dios
             con alma, corazón y voz; Las tinieblas conquistó;
             ¡Cantad! Jesucristo luz nos dio.
             Homenaje tributad y gloria al Cordero dad;
             Cristo reinará, Cristo reinará.
    - number: 126
      title: Oíd un son en alta esfera
      verses:
        - |-
          1. Oíd un son en alta esfera:
             "¡En los cielos gloria a Dios!
             ¡Y al mortal paz en la tierra!" canta la celeste voz.
             Con los cielos alabemos al eterno Rey; cantemos
             A Jesús que es nuestro bien, con el coro de Belén;
             Canta la celeste voz: "¡En los cielos gloria a Dios!"
        - |-
          2. El Señor de los señores, el Ungido celestial,
             Por salvar a pecadores toma forma corporal.
             ¡Gloria al Verbo encarnado, en humanidad velado!
             ¡Gloria a nuestro Redentor, a Jesús, Rey y Señor!
             Canta la celeste voz: "¡En los cielos gloria a Dios!"
        - |-
          3. Príncipe de paz eterna, gloria a ti, Señor Jesús;
             Con tu vida y con tu muerte nos ofreces vida y luz.
             Has tu majestad dejado,
             a buscarnos te has dignado;
             Para darnos el vivir, en la cruz fuiste a morir.
             Canta la celeste voz: "¡En los cielos gloria a Dios!"
    - number: 127
      title: En la noche los pastores
      verses:
        - |-
          1. En la noche los pastores a sus ovejitas velan;
             Angeles del cielo alaban,
             ángeles del cielo cantan:
             Pastorcitos, id, pastorcitos, ya
        - |-
          CORO
            Adorad al Niño, adorad al Niño,
            Que en Belén está, que en Belén está.
            Adorad al Niño, adorad al Niño,
            Que en Belén está, que en Belén está.
        - |-
          2. Del oriente, Reyes Magos
             siguen la brillante estrella;
             Quieren ofrecer regalos, traen ricos aguinaldos,
             Magos, oh venid, magos, oh llegad;
        - |-
          CORO
            Adorad al Niño, adorad al Niño,
            Que en Belén está, que en Belén está.
            Adorad al Niño, adorad al Niño,
            Que en Belén está, que en Belén está.
        - |-
          3. Con alegre reverencia
             en la bella Nochebuena,
             Los cristianos hoy alaban, los cristianos todos cantan:
             Pueblos, oh venid, pueblos, oh llegad;
        - |-
          CORO
            Adorad al Niño, adorad al Niño,
            Que en Belén está, que en Belén está.
            Adorad al Niño, adorad al Niño,
            Que en Belén está, que en Belén está.
    - number: 128
      title: Jesús es el Mesías
      verses:
        - |-
          1. ¿Qué niño es el que tierno
             duerme en brazos de María?
             El ángel a pastores da
             las nuevas de alegría.
        - |-
          CORO
            Es Cristo el Señor a quien
            los cielos dan loor;
            ¡Nació el Salvador!
            Jesús es el Mesías.
        - |-
          2. Con buey y asno en rudo
             establo duerme el Rey divino;
             Dios encarnado ha bajado;
             a salvarnos vino.
        - |-
          CORO
            Es Cristo el Señor a quien
            los cielos dan loor;
            ¡Nació el Salvador!
            Jesús es el Mesías.
        - |-
          3. Le traen oro, incienso y mirra
             magos del oriente;
             Mas quiere el don de un corazón
             humilde y penitente.
        - |-
          CORO
            Es Cristo el Señor a quien
            los cielos dan loor;
            ¡Nació el Salvador!
            Jesús es el Mesías.
    - number: 129
      title: Allá en el pesebre
      verses:
        - |-
          1. Allá en el pesebre, do nace Jesús,
             La cuna de paja nos vierte gran luz;
             Estrellas lejanas del cielo al mirar
             Se inclinan gozosas su lumbre a prestar.
        - |-
          2. Pastores del campo, teniendo temor,
             Cercados de luz y de gran resplandor,
             Acuden aprisa buscando a Jesús,
             Nacido en pesebre, del mundo la luz.
        - |-
          3. Oh Cristo, pedimos hoy tu bendición,
             Rogamos que atiendas a nuestra oración;
             A todos, oh Cristo, nos muestras amor,
             Nosotros te amamos también, Salvador.
    - number: 130
      title: Angeles cantando están
      verses:
        - |-
          1. Angeles cantando están tan dulcísima canción;
             Las montañas su eco dan como fiel contestación.
        - |-
          CORO
            Gloria, en lo alto gloria,
            Gloria, en lo alto gloria a Dios.
            (Gloria in excelsis Deo, Gloria in excelsis Deo.)
        - |-
          2. Los pastores sin cesar sus loores dan a Dios;
             Cuán glorioso es el cantar de su melodiosa voz.
        - |-
          CORO
            Gloria, en lo alto gloria,
            Gloria, en lo alto gloria a Dios.
            (Gloria in excelsis Deo, Gloria in excelsis Deo.)
        - |-
          3. Oh, venid pronto a Belén para contemplar con fe
             A Jesús, autor del bien, al recién nacido Rey.
        - |-
          CORO
            Gloria, en lo alto gloria,
            Gloria, en lo alto gloria a Dios.
            (Gloria in excelsis Deo, Gloria in excelsis Deo.)
    - number: 131
      title: Santa la noche
      verses:
        - |-
          1. Santa la noche, hermosas las estrellas,
             La noche cuando nació el Señor.
             El mundo envuelto estuvo en sus querellas
             Hasta que Dios nos mandó al Salvador.
             Una esperanza todo el mundo siente,
             La luz de un nuevo día sin igual;
             Con gratitud postrados adoradle;
             Oíd de lo alto la voz angelical;
             ¡Oíd, cantad! Nació el Salvador.
        - |-
          2. Hoy por la fe llegamos al pesebre
             A contemplar al bendito Jesús,
             Como también los magos del oriente
             Llegaron guiados por célica luz.
             Fue por nacer así humildemente
             Que nuestras pruebas sabe comprender;
             Hoy Emanuel es "Dios ya con nosotros";
             Cantemos al Rey, a Jesús el Salvador;
             ¡Regocijad! Nació el Redentor.
        - |-
          3. Nos enseñó a amarnos tiernamente,
             Nos dio su ley de amor y su paz.
             Libra al esclavo que en cadenas gime,
             Y a su nombre huirá Satanás.
             Con cánticos de gozo alabemos
             Al Rey de reyes, nuestro Salvador;
             Hoy con amor cantemos reverentes;
             Alcemos la voz proclamando su poder,
             ¡Dad gloria a Dios! Amén, por siempre amén.
    - number: 132
      title: Oh niños, venid
      verses:
        - |-
          1. Oh, niños de todos los pueblos venid;
             Los cantos de ángeles miles oíd.
             En un pueblecito, llamado Belén,
             El Hijo de Dios ha nacido recién.
        - |-
          2. Mirad sobre el heno al niño Jesús;
             Le adoran pastores que han visto gran luz;
             Brillando en el cielo con gran claridad,
             Señal fue que Dios ama al mundo en verdad.
        - |-
          3. Los magos de oriente le ofrecen loor;
             Proclaman los ángeles gloria al Señor.
             José y María le adoran también;
             Oh niños, cantad a Jesús de Belén.
        - |-
          4. Oh, niños de todos los pueblos venid;
             Con huestes celestes la nueva esparcid.
             Felices, unid vuestras voces de amor;
             Alegre anunciad que nació el Salvador.
    - number: 133
      title: Noche de paz
      verses:
        - |-
          1. ¡Noche de paz, noche de amor!
             Todo duerme en derredor.
             Entre los astros que esparcen su luz,
             Bella anunciando al niñito Jesús,
             Brilla la estrella de paz,
             Brilla la estrella de paz.
        - |-
          2. ¡Noche de paz, noche de amor!
             Oye humilde el fiel pastor
             Coros celestes que anuncian salud,
             Gracias y glorias en gran plenitud,
             Por nuestro buen Redentor,
             Por nuestro buen Redentor.
        - |-
          3. ¡Noche de paz, noche de amor!
             Ved qué bello resplandor
             Luce en el rostro del niño Jesús,
             En el pesebre, del mundo la luz,
             Astro de eterno fulgor,
             Astro de eterno fulgor.
    - number: 134
      title: Navidad Latina
      verses:
        - |-
          1. Nuestra patria canta alegre
             en el tiempo de la Navidad;
             Pues ya sabe que en pesebre Jesús trajo la libertad.
        - |-
          CORO
            Hoy gozosos celebremos
            la venida del Señor;
            Elevemos nuestro canto al Niñito de Belén.
            A tocar nuestros instrumentos,
            Celebremos la fiesta de amor;
            Qué gloriosos son estos momentos:
            ¡Cristo Jesús nació!
        - |-
          2. Hay colores y aromas
             que anuncian la gran Navidad;
             En los valles y las lomas
             Jesús nos da felicidad.
        - |-
          CORO
            Hoy gozosos celebremos
            la venida del Señor;
            Elevemos nuestro canto al Niñito de Belén.
            A tocar nuestros instrumentos,
            Celebremos la fiesta de amor;
            Qué gloriosos son estos momentos:
            ¡Cristo Jesús nació!
    - number: 135
      title: En Belén nació Jesús
      verses:
        - |-
          1. En Belén nació Jesús, Aleluya;
             A los hombres trajo luz, Aleluya.
        - |-
          CORO
            En lo alto gloria a Dios, Aleluya;
            En lo alto gloria a Dios, Aleluya.
        - |-
          2. Por nosotros él murió, Aleluya;
             Con poder resucitó, Aleluya.
        - |-
          CORO
            En lo alto gloria a Dios, Aleluya;
            En lo alto gloria a Dios, Aleluya.
        - |-
          3. Cristo salva al pecador, Aleluya;
             Si confía en su amor, Aleluya.
        - |-
          CORO
            En lo alto gloria a Dios, Aleluya;
            En lo alto gloria a Dios, Aleluya.
        - |-
          4. A vivir con él iré, Aleluya;
             En su amor me gozaré, Aleluya.
        - |-
          CORO
            En lo alto gloria a Dios, Aleluya;
            En lo alto gloria a Dios, Aleluya.
    - number: 136
      title: Hoy es Navidad
      verses:
        - |-
          1. Campanas por doquier resuenan sin cesar;
             Proclaman con placer que hoy es Navidad.
             Los niños con canción la grata nueva dan
             De este día de amor y buena voluntad.
        - |-
          CORO
            ¡Navidad! ¡Navidad! ¡Hoy es Navidad!
            Es un día de alegría y felicidad.
        - |-
          2. El Niño de Belén nos trae la salvación;
             Con júbilo sin par se entona la canción.
             Yo te amo, mi Jesús; tus glorias cantaré;
             En este día tan feliz me regocijaré.
        - |-
          CORO
            ¡Navidad! ¡Navidad! ¡Hoy es Navidad!
            Es un día de alegría y felicidad.
    - number: 137
      title: De tierra lejana venimos
      verses:
        - |-
          1. De tierra lejana venimos a verle;
             Nos sirve de guía la estrella de Oriente.
        - |-
          CORO
            Oh brillante estrella
            que anuncias la aurora,
            No nos falte nunca tu luz bienhechora.
            ¡Gloria en las alturas al Hijo de Dios!
            ¡Gloria en las alturas y en la tierra paz!
        - |-
          2. Al recién nacido, quien es Rey de reyes,
             Oro le regalo para ornar sus sienes.
        - |-
          CORO
            Oh brillante estrella
            que anuncias la aurora,
            No nos falte nunca tu luz bienhechora.
            ¡Gloria en las alturas al Hijo de Dios!
            ¡Gloria en las alturas y en la tierra paz!
        - |-
          3. Como es Dios el Niño, le regalo incienso
             Con aroma dulce que sube hasta el cielo.
        - |-
          CORO
            Oh brillante estrella
            que anuncias la aurora,
            No nos falte nunca tu luz bienhechora.
            ¡Gloria en las alturas al Hijo de Dios!
            ¡Gloria en las alturas y en la tierra paz!
        - |-
          4. Al Niño del cielo que bajó a la tierra
             Le regalo mirra que inspira tristeza.
        - |-
          CORO
            Oh brillante estrella
            que anuncias la aurora,
            No nos falte nunca tu luz bienhechora.
            ¡Gloria en las alturas al Hijo de Dios!
            ¡Gloria en las alturas y en la tierra paz!
    - number: 138
      title: Tras hermoso lucero
      verses:
        - |-
          1. Tras hermoso lucero, los magos viajaban
             pensando a palacio llegar.
             Y llevaban regalos preciosos al
             Rey que deseaban venir a adorar.
             Al llegar a Belén ¡ved qué bella!
             Al llegar a Belén ¡ved la estrella!
             Con su luz alumbraba un establo y allí,
             En el heno dormía el gran Rey.
        - |-
          2. En el campo pastores cuidaban ovejas
             y vieron un gran resplandor.
             Luego el ángel del cielo les dijo:
             "Os doy nuevas que hoy nació el Salvador".
             Muchos ángeles bellos cantaron
             Al Señor, al Eterno alabaron.
             Los pastores buscaron al Niño y allí,
             En el heno dormía el gran Rey.
        - |-
          3. Ofrecieron los magos al Niño Jesús
             ricos dones con gran devoción.
             Los pastores humildes le dieron
             cariño de tierno y de fiel corazón.
             Yo también, oh Jesús, hoy me acerco;
             Yo también, oh Jesús, hoy te adoro,
             Y te ofrezco mi vida, regalo de amor;
             ¡Haz en ella tu trono, mi Rey!
    - number: 139
      title: Tú dejaste tu trono
      verses:
        - |-
          1. Tú dejaste tu trono y corona por mí,
             Al venir a Belén a nacer;
             Mas a ti no fue dado el entrar al mesón,
             Y en pesebre te hicieron nacer.
        - |-
          2. Alabanzas celestes los ángeles dan
             En que rinden al Verbo loor;
             Mas humilde viniste a la tierra, Señor,
             A dar vida al más vil pecador.
        - |-
          3. Siempre pueden las zorras sus cuevas tener,
             Y las aves sus nidos también;
             Mas el Hijo del Hombre no tuvo un lugar
             En el cual reclinara su sien.
        - |-
          4. Tú viniste, Señor, con tu gran bendición
             Para dar libertad y salud;
             Mas con odio y desprecio te hicieron morir,
             Aunque vieron tu amor y virtud.
        - |-
          5. Alabanzas sublimes los cielos darán,
             Cuando vengas glorioso de allí,
             Y tu voz en las nubes dirá: "Ven a mí,
             Que hay lugar junto a mí para ti".
    - number: 140
      title: Venid, fieles todos
      verses:
        - |-
          1. Venid, fieles todos, a Belén marchemos:
             De gozo triunfantes, henchidos de amor;
             Y al Rey de los cielos humilde le veremos:
        - |-
          CORO
            Venid, adoremos, venid, adoremos.
            Venid, adoremos a Cristo el Señor.
        - |-
          2. El que es Hijo eterno del eterno Padre,
             Y Dios verdadero que al mundo creó,
             De seno virgíneo nació de una madre:
        - |-
          CORO
            Venid, adoremos, venid, adoremos.
            Venid, adoremos a Cristo el Señor.
        - |-
          3. En pobre pesebre yace reclinado,
             Al hombre ofreciendo eternal salvación,
             El santo Mesías, el Verbo humanado:
        - |-
          CORO
            Venid, adoremos, venid, adoremos.
            Venid, adoremos a Cristo el Señor.
        - |-
          4. Cantad jubilosas, célicas criaturas;
             Resuenen los cielos con vuestra canción:
             ¡Al Dios bondadoso dad gloria en las alturas!
        - |-
          CORO
            Venid, adoremos, venid, adoremos.
            Venid, adoremos a Cristo el Señor.
        - |-
          5. Jesús, celebremos tu bendito nombre
             Con himnos solemnes de grato loor;
             Por siglos eternos adórete el hombre:
        - |-
          CORO
            Venid, adoremos, venid, adoremos.
            Venid, adoremos a Cristo el Señor.
    - number: 141
      title: Oveja Perdida
      verses:
        - |-
          1. Oveja perdida, ven
             sobre mis hombros; que hoy,
             no sólo tu pastor soy,
             sino tu pasto también.
        - |-
          2. Por descubrirte mejor
             cuando balabas perdida,
             dejé en un árbol la vida,
             donde me subió tu amor;
             si prenda quieres mayor,
             mis obras hoy te la den.
        - |-
          3. Pasto al fin tuyo hecho,
             ¿Cuál dará mayor asombro,
             el traerte yo en el hombro,
             o traerme tú en el pecho?
             Prendas son de amor estrecho,
             que aún los más ciegos las ven.
        - |-
          4. Oveja perdida, ven
             sobre mis hombros; que hoy,
             no sólo tu pastor soy,
             sino tu pasto también.
    - number: 142
      title: Maravilloso Es
      verses:
        - |-
          1. Maravilloso es,
             maravilloso es,
             Maravilloso es Cristo el Señor.
             Rey soberano es,
             Autor de todo bien;
             Maravilloso es Cristo el Señor.
        - |-
          2. El buen Pastor es,
             el Rey de los siglos,
             Omnipotente Dios.
             Gloria le damos, y le adoramos;
             Maravilloso es Cristo el Señor.
    - number: 143
      title: Jesús el buen Pastor
      verses:
        - |-
          1. Jesús, el buen Pastor, mostrando su tierno amor,
             del vil abismo me sacó; Su mano me extendió,
             del lodo me levantó, mis pasos él enderezó.
        - |-
          CORO
            Querido Salvador,
            Canto hoy de tu inmenso amor;
            Arde mi corazón de gratitud.
            Solo, no puedo andar, a tu lado yo quiero estar;
            Llévame, oh Salvador, a la celestial mansión.
        - |-
          2. Andando con Jesús, por sendas de gozo y luz,
             el mundo pierde su atracción; Ya pertenezco a él,
             y anhelo servirle fiel; el mundo es vana ilusión.
        - |-
          CORO
            Querido Salvador,
            Canto hoy de tu inmenso amor;
            Arde mi corazón de gratitud.
            Solo, no puedo andar, a tu lado yo quiero estar;
            Llévame, oh Salvador, a la celestial mansión.
        - |-
          3. Con Cristo moraré y siempre le cantaré
             por toda la eternidad; De reyes es el Rey,
             tributo le brindaré, pues tiene toda potestad.
        - |-
          CORO
            Querido Salvador,
            Canto hoy de tu inmenso amor;
            Arde mi corazón de gratitud.
            Solo, no puedo andar, a tu lado yo quiero estar;
            Llévame, oh Salvador, a la celestial mansión.
    - number: 144
      title: Cordero de gloria
      verses:
        - |-
          1. Cristo tanto me amó
             que en la cruz por mí murió;
             Por su sangre me limpió
             de mi pecado y transgresión.
        - |-
          CORO
            Al Cordero gloria, oh, qué excelsa historia;
            El nos salva por su amor, ¡Dad al Cordero gloria!
        - |-
          2. Dios al mundo descendió;
             mi castigo en sí tomó;
             Pena y muerte él sufrió,
             mas con poder resucitó.
        - |-
          CORO
            Al Cordero gloria, oh, qué excelsa historia;
            El nos salva por su amor, ¡Dad al Cordero gloria!
    - number: 145
      title: Gloria por siempre
      verses:
        - |-
          1. Gloria por siempre al Cordero de Dios,
             A Jesús el Señor, al León de Judá,
             La Raíz de David que ha vencido
             y el Libro abrirá. Amén.
        - |-
          2. Los cielos, la tierra y el mar,
             y todo lo que en ellos hay,
             Le adorarán y proclamarán:
             "Jesucristo es el Señor".
    - number: 146
      title: El es Señor
      verses:
        - |-
          1. El es Señor, (Jesucristo es Señor,)
             Él es Señor; (Jesucristo es Señor,)
             Resucitado de entre los muertos,
             Él es Señor. (Jesucristo es Señor.)
        - |-
          2. Toda rodilla se doblará,
             toda lengua confesará:
             Jesucristo es el Señor,
             Jesucristo es el Señor.
    - number: 147
      title: Gloria a tu nombre
      verses:
        - |-
          1. Yo sé que Cristo salvó mi alma,
             yo sé que Cristo me redimió.
             Me dio la vida, me dio la calma,
             y del infierno me rescató.
        - |-
          CORO
            ¡Gloria a tu nombre, Cristo bendito!
            ¡Gloria a tu nombre, mi buen Jesús!
            Con mis dolores fuiste cargado
            cuando moriste por mí en la cruz.
        - |-
          2. Y cuando al cielo llegue algún día,
             con tus amados te alabaré.
             Porque salvaste el alma mía,
             sé que en la gloria te cantaré.
        - |-
          CORO
            ¡Gloria a tu nombre, Cristo bendito!
            ¡Gloria a tu nombre, mi buen Jesús!
            Con mis dolores fuiste cargado
            cuando moriste por mí en la cruz.
        - |-
          3. Me diste vida por mis dolores,
             me diste gozo por mi pesar.
             Cambiaste en gloria mis sinsabores;
             por eso ahora puedo cantar.
        - |-
          CORO
            ¡Gloria a tu nombre, Cristo bendito!
            ¡Gloria a tu nombre, mi buen Jesús!
            Con mis dolores fuiste cargado
            cuando moriste por mí en la cruz.
    - number: 148
      title: Algunos nombres de Cristo
      verses:
        - |-
          1. Dios Todopoderoso (Gn. 17:1)
             Redentor (Job 19:25)
             Admirable Consejero (Is. 9:6)
             Príncipe de Paz (Is. 9:6)
             Dios Fuerte (Is. 9:6)
             Varón de Dolores (Is. 53:3)
             Santo de Israel (Is. 60:9)
             Sol de Justicia (Mal. 4:2)
             Jesús (Mt. 1:21)
             Emanuel (Mt. 1:23)
             Hijo del Hombre (Mt. 13:37)
             Cordero de Dios (Jn. 1:29)
             Hijo de Dios (Jn. 1:34)
             Mesías (Jn. 1:41)
             Rabí (Jn. 3:2)
             Hijo Unigénito (Jn. 3:16)
             Pan de Vida (Jn. 6:35)
             La Luz del Mundo (Jn. 8:12)
             Yo Soy (Jn. 8:58)
             La Resurrección y la Vida (Jn. 11:25)
             Maestro (Jn. 13:13)
             El Camino (Jn. 14:6)
             La Verdad (Jn. 14:6)
        - |-
          2. La Vida (Jn. 14:6)
             La Vid (Jn. 15:1)
             Señor de todos (Hch. 10:36)
             Cristo (Hch. 17:3)
             Roca (1 Co. 10:4)
             La Cabeza de la Iglesia (Ef. 1:22)
             Principal Piedra del ángulo (Ef. 2:20)
             Juez Justo (2 Ti. 4:8)
             Autor y Consumador de la Fe (Heb. 12:2)
             Príncipe de los pastores (1 P. 5:4)
             Verbo de Vida (1 Jn. 1:1)
             Abogado (1 Jn. 2:1)
             El Salvador (Jud. v. 25)
             Alfa y Omega (Ap. 1:8)
             León de Judá (Ap. 5:5)
             Rey de reyes (Ap. 19:16)
             Señor de señores (Ap. 19:16)
             La Estrella de la Mañana (Ap. 22:16)
    - number: 149
      title: En el nombre de Jesús
      verses:
        - |-
          1. En el nombre de Jesús se doble,
             doble toda rodilla
             De los que están en los cielos,
             y en la tierra,
             y debajo de la tierra;
             Y toda lengua confiese que
             Jesucristo es el Señor,
             para gloria del Padre.
        - |-
          2. Y tú, amigo, confiesa que
             Jesucristo es el Señor,
             para gloria del Padre.
    - number: 150
      title: Cristo es la peña de Horeb
      verses:
        - |-
          1. Cristo es la peña de Horeb
             que está brotando
             Agua de vida saludable para ti.
             Cristo es la peña de Horeb
             que está brotando
             Agua de vida saludable para ti.
        - |-
          2. Ven a tomarla que es más dulce que la miel;
             Refresca el alma, refresca todo tu ser.
             Cristo es la peña de Horeb
             que está brotando
             Agua de vida saludable para ti.
        - |-
          3. Cristo es el lirio del valle de las flores;
             El es la rosa blanca y pura de Sarón.
             Cristo es la vida y amor de los amores;
             El es la eterna fuente de la salvación.
        - |-
          4. Ven a buscarla en tu triste condición;
             Refresca el alma, refresca todo tu ser.
             Cristo es el lirio del valle de las flores;
             El es la rosa blanca y pura de Sarón.
    - number: 151
      title: Cristo, nombre glorioso
      verses:
        - |-
          1. Cristo, nombre glorioso,
             Salvador bello, precioso Señor;
             (glorioso)
             Emanuel, Dios con nosotros;
             Pan de la vida, Cordero de Dios.
        - |-
          2. Cristo, nombre glorioso,
             Alfa y Omega, eterno Yo Soy;
             (glorioso)
             Creador omnipotente,
             Rey de los siglos, el gran Vencedor.
    - number: 152
      title: Jesús es la Roca
      verses:
        - |-
          1. Jesús es la roca de mi salvación;
             El es quien me libra de condenación.
             Jesús es mi fuerte, mi gran protector;
             Yo sé que soy hijo de todo su amor.
        - |-
          2. Jesús me defiende de negra traición;
             El lava las manchas de mi corazón.
             Jesús me rescata del mundo falaz;
             Me lleva a su seno, su seno de paz.
        - |-
          3. Por eso en mis horas de negro dolor,
             Yo busco el consuelo de mi Redentor.
             Venid, si por Cristo ser salvos queréis,
             Al lado de Cristo lugar hallaréis.
        - |-
          4. Su paz os ofrece, su paz él os da;
             Aquel que le busca, ser salvo podrá.
             Yo fui mucho tiempo esclavo del mal,
             Mas hoy Jesucristo me dio libertad.
        - |-
          5. Jesús es la fuente de la redención;
             El sana las llagas de mi corazón.
             El sana al leproso, al ciego da luz;
             Por eso confío tan sólo en Jesús.
    - number: 153
      title: Oh Cristo, nuestra Roca aquí
      verses:
        - |-
          1. ¡Oh Cristo! nuestra Roca aquí
             y abrigo de la tempestad;
             Dichoso quien se esconda en ti,
             Abrigo de la tempestad.
        - |-
          CORO
            En tierra de cansancio Jesús roca es,
            Jesús roca es, Jesús roca es;
            En tierra de cansancio Jesús roca es,
            y abrigo de la tempestad.
        - |-
          2. Sombra eres tú y escudo fiel,
             y abrigo de la tempestad;
             ¿Por qué temer con tal broquel
             y abrigo de la tempestad?
        - |-
          CORO
            En tierra de cansancio Jesús roca es,
            Jesús roca es, Jesús roca es;
            En tierra de cansancio Jesús roca es,
            y abrigo de la tempestad.
        - |-
          3. Refugio tú eres, Salvador,
             y abrigo de la tempestad;
             Sé nuestro gran auxiliador
             y abrigo de la tempestad.
        - |-
          CORO
            En tierra de cansancio Jesús roca es,
            Jesús roca es, Jesús roca es;
            En tierra de cansancio Jesús roca es,
            y abrigo de la tempestad.
    - number: 154
      title: Cristo cual pastor
      verses:
        - |-
          1. Cristo, cual pastor, oh guía
             nuestros pasos en tu amor;
             Nuestras almas siempre cuida,
             guárdalas, oh Salvador.
             Oh, bendito Jesucristo, nos compraste por tu amor;
             Oh, bendito Jesucristo, somos tuyos ya, Señor.
        - |-
          2. Tuyos somos, fiel Amigo,
             sé tú nuestro Defensor;
             Da al rebaño tuyo abrigo de este mundo pecador.
             Oh, bendito Jesucristo, oye nuestra petición.
        - |-
          3. Aunque somos tan indignos
             nos prometes recibir;
             Tú ofreces bendecirnos, del pecado redimir.
             Oh, bendito Jesucristo, te buscamos hoy, Señor.
        - |-
          4. ¡Oh Pastor! Hoy te buscamos,
             te pedimos tu favor;
             Llenanos de amor, rogamos; óyenos, buen Salvador.
             Oh, bendito Jesucristo, sin cesar tu amor nos das;
             Oh, bendito Jesucristo, hasta el fin nos amarás.
    - number: 155
      title: El es la imagen
      verses:
        - |-
          1. El es la imagen del Dios invisible,
             El Hijo amado y nuestro Redentor;
             El es el primogénito de la creación:
             Te adoro, Jesucristo, mi Dios y Salvador.
        - |-
          2. El hizo las cosas que hay en el cielo,
             También de la tierra él es el Creador,
             Y todo lo que hay subsiste sólo en él:
             Te adoro, Jesucristo, mi Dios y Salvador.
        - |-
          3. El es la cabeza del cuerpo, la Iglesia,
             De entre los muertos, supremo Vencedor;
             En el Señor habita toda plenitud:
             Te adoro, Jesucristo, mi Dios y Salvador.
        - |-
          4. El hizo la paz por su sangre preciosa,
             Y el Padre lo ha puesto por Reconciliador;
             Sin mancha ante Dios él nos presentará:
             Te adoro, Jesucristo, mi Dios y Salvador.
    - number: 156
      title: Hay un canto nuevo en mi ser
      verses:
        - |-
          1. Hay un canto nuevo en mi ser,
             Es la voz de mi Jesús,
             Que me dice: "Ven a descansar;
             Tu paz conquisté en la cruz".
        - |-
          CORO
            Cristo, Cristo, Cristo, nombre sin igual,
            Llena siempre mi alma de esa nota celestial.
        - |-
          2. Tengo de su gracia celestial,
             Gozo en su santo amor;
             Y riquezas fluyen a raudal,
             Desde el trono del Señor.
        - |-
          CORO
            Cristo, Cristo, Cristo, nombre sin igual,
            Llena siempre mi alma de esa nota celestial.
        - |-
          3. Por las aguas hondas me llevó;
             Pruebas en mi senda hallé;
             Do áspero sendero él me guió,
             Mas sus huellas seguiré.
        - |-
          CORO
            Cristo, Cristo, Cristo, nombre sin igual,
            Llena siempre mi alma de esa nota celestial.
        - |-
          4. Cristo en las nubes volverá,
             Bajo el bello cielo azul;
             A su lado él me llevará
             A vivir en gloria y luz.
        - |-
          CORO
            Cristo, Cristo, Cristo, nombre sin igual,
            Llena siempre mi alma de esa nota celestial.
    - number: 157
      title: Jesús es la luz del mundo
      verses:
        - |-
          1. El mundo perdido en pecado se vio,
             ¡Jesús es la luz del mundo!
             Mas en las tinieblas la gloria brilló,
             ¡Jesús es la luz del mundo!
        - |-
          CORO
            ¡Ven a la luz; no quieres perder
            Gozo perfecto al amanecer!
            Yo ciego fui, mas ya puedo ver,
            ¡Jesús es la luz del mundo!
        - |-
          2. Si ciego te encuentras en la oscuridad,
             ¡Jesús es la luz del mundo!
             Te manda lavarte y verás su verdad,
             ¡Jesús es la luz del mundo!
        - |-
          CORO
            ¡Ven a la luz; no quieres perder
            Gozo perfecto al amanecer!
            Yo ciego fui, mas ya puedo ver,
            ¡Jesús es la luz del mundo!
        - |-
          3. En día la noche se cambia con él,
             ¡Jesús es la luz del mundo!
             Irás en la luz si a su ley eres fiel,
             ¡Jesús es la luz del mundo!
        - |-
          CORO
            ¡Ven a la luz; no quieres perder
            Gozo perfecto al amanecer!
            Yo ciego fui, mas ya puedo ver,
            ¡Jesús es la luz del mundo!
        - |-
          4. Ni soles ni lunas el cielo tendrá,
             ¡Jesús es la luz del mundo!
             La luz de su rostro lo iluminará,
             ¡Jesús es la luz del mundo!
        - |-
          CORO
            ¡Ven a la luz; no quieres perder
            Gozo perfecto al amanecer!
            Yo ciego fui, mas ya puedo ver,
            ¡Jesús es la luz del mundo!
    - number: 158
      title: Yo soy la luz del mundo
      verses:
        - |-
          1. Yo soy la luz del mundo,
             El que me siga tendrá la luz que le da la vida,
             Y nunca andará en la oscuridad.
             (En la oscuridad).
        - |-
          2. Dios es luz, paz y amor;
             (Soy la luz del mundo).
        - |-
          3. Dios es la luz, Dios es la paz, Dios es amor, oh, sí;
             Dios es la luz, Dios es la paz, Dios es amor.
             (Soy la luz del mundo).
        - |-
          4. Dios es luz, paz y amor;
             (Soy la luz del mundo).
    - number: 159
      title: Fruto del amor divino
      verses:
        - |-
          1. Fruto del amor divino,
             génesis de la creación;
             El es Alfa y Omega,
             es principio y conclusión
             De lo que es, de lo que ha sido,
             de lo nuevo en formación;
             Y así será por siempre.
        - |-
          2. Es el mismo que el profeta
             vislumbrara en su visión
             Y encendiera en el salmista
             la más alta inspiración;
             Ahora brilla y es corona
             de la antigua expectación. Y así será por siempre.
        - |-
          3. Las legiones celestiales
             ahora canten su loor;
             Los dominios hoy le adoren
             como Rey y Redentor;
             Y los pueblos de la tierra
             le proclamen su Señor. Y así será por siempre.
    - number: 160
      title: Grande amor, sublime, eterno
      verses:
        - |-
          1. Grande amor, sublime, eterno,
             Más profundo es que la mar,
             Y más alto que los cielos;
             Insondable es y sin par.
        - |-
          CORO
            El me abrirá la puerta
            y así entrar podré;
            Redención me ha comprado,
            y perdón me da por fe.
            El me abrirá la puerta
            y así entrar podré;
            Redención me ha comprado,
            y perdón me da por fe.
        - |-
          2. Grande amor, sublime, eterno;
             En la cruenta cruz murió
             Mi bendito Jesucristo;
             Mi castigo así llevó.
        - |-
          CORO
            El me abrirá la puerta
            y así entrar podré;
            Redención me ha comprado,
            y perdón me da por fe.
        - |-
          3. Grande amor, sublime, eterno;
             Soy indigno pecador,
             Mas el Hijo incomparable
             Dio su vida en mi favor.
        - |-
          CORO
            El me abrirá la puerta
            y así entrar podré;
            Redención me ha comprado,
            y perdón me da por fe.
    - number: 161
      title: Cuán grande amor
      verses:
        - |-
          1. Que Cristo me haya salvado, tan malo como yo fui,
             Me deja maravillado, pues él se entregó por mí.
        - |-
          CORO
            ¡Cuán grande amor! (¡Oh cuán grande amor!)
            ¡Tan grande amor! (¡Oh cuán grande amor!)
            el de Cristo para mí;
            ¡Cuán grande amor! (¡Oh cuán grande amor!)
            ¡Tan grande amor! (¡Oh cuán grande amor!)
            pues por él salvado fui.
        - |-
          2. Oró por mí en el huerto: "No se haga mi voluntad".
             Y todo aquel sufrimiento causado fue por mi mal.
        - |-
          CORO
            ¡Cuán grande amor! (¡Oh cuán grande amor!)
            ¡Tan grande amor! (¡Oh cuán grande amor!)
            el de Cristo para mí;
            ¡Cuán grande amor! (¡Oh cuán grande amor!)
            ¡Tan grande amor! (¡Oh cuán grande amor!)
            pues por él salvado fui.
        - |-
          3. Por mí se hizo pecado; mis culpas su amor llevó.
             En cruenta cruz fue clavado, mas mi alma él rescató.
        - |-
          CORO
            ¡Cuán grande amor! (¡Oh cuán grande amor!)
            ¡Tan grande amor! (¡Oh cuán grande amor!)
            el de Cristo para mí;
            ¡Cuán grande amor! (¡Oh cuán grande amor!)
            ¡Tan grande amor! (¡Oh cuán grande amor!)
            pues por él salvado fui.
        - |-
          4. Cuando al final con los santos su gloria contemplaré,
             Con gratitud y con cantos por siempre le alabaré.
        - |-
          CORO
            ¡Cuán grande amor! (¡Oh cuán grande amor!)
            ¡Tan grande amor! (¡Oh cuán grande amor!)
            el de Cristo para mí;
            ¡Cuán grande amor! (¡Oh cuán grande amor!)
            ¡Tan grande amor! (¡Oh cuán grande amor!)
            pues por él salvado fui.
    - number: 162
      title: El amor de Cristo
      verses:
        - |-
          1. ¿Quién nos separará del amor de Cristo?
             ¿Tribulación, o angustia, o persecución,
             o hambre, o desnudez, o peligro, o espada?
        - |-
          2. Antes, en todas estas cosas somos más que
             vencedores por medio de aquel que nos amó.
        - |-
          3. Por lo cual estoy seguro de que ni la
             muerte, ni la vida, ni ángeles, ni principados,
             ni potestades, ni lo presente, ni lo por venir,
        - |-
          4. Ni lo alto, ni lo profundo, ni ninguna otra
             cosa creada nos podrá separar del amor de Dios,
             que es en Cristo Jesús Señor nuestro.
        - |-
          5. Para que habite Cristo por la fe en
             vuestros corazones, a fin de que,
             arraigados y cimentados en amor,
        - |-
          6. Seáis plenamente capaces de comprender
             con todos los santos cuál sea la anchura,
             la longitud, la profundidad y la altura,
        - |-
          7. Y de conocer el amor de Cristo, que
             excede a todo conocimiento, para que
             seáis llenos de toda la plenitud de Dios.
    - number: 163
      title: Yo cantaré de mi Jesucristo
      verses:
        - |-
          1. Yo cantaré de mi Jesucristo,
             y de su grande y tierno amor,
             del que sufrió en la cruz del Calvario
             para librar al vil pecador.
        - |-
          CORO
            Yo cantaré de mi Jesucristo,
            pues con su sangre me redimió;
            Y en la cruz me dio el indulto; de mi pecado me libró.
        - |-
          2. Yo cantaré la excelsa historia
             de su gloriosa y gran redención;
             Al que decide hoy recibirle
             El le da vida y salvación.
        - |-
          CORO
            Yo cantaré de mi Jesucristo,
            pues con su sangre me redimió;
            Y en la cruz me dio el indulto; de mi pecado me libró.
        - |-
          3. Yo cantaré loor a mi Cristo,
             porque triunfó con su gran poder;
             Y al pecado, infierno y muerte,
             El me ayudará a vencer.
        - |-
          CORO
            Yo cantaré de mi Jesucristo,
            pues con su sangre me redimió;
            Y en la cruz me dio el indulto; de mi pecado me libró.
        - |-
          4. Yo cantaré de mi Jesucristo,
             de su eterno y tierno amor;
             Hijo de Dios yo soy por su gracia,
             Gracia de Cristo mi Salvador.
        - |-
          CORO
            Yo cantaré de mi Jesucristo,
            pues con su sangre me redimió;
            Y en la cruz me dio el indulto; de mi pecado me libró.
    - number: 164
      title: Oh qué inmenso amor
      verses:
        - |-
          1. ¡Oh qué amor!
             ¡Qué inmenso amor!
             el de mi Salvador. ¡Oh qué amor!
             ¡Qué inmenso amor! el de mi Salvador.
        - |-
          2. Dios desde el cielo al Salvador
             mandó a morir por mí.
        - |-
          3. Por ti murió, por mí murió;
             dio sangre carmesí.
        - |-
          4. ¡Oh qué amor!
             ¡Qué inmenso amor! el de mi Salvador.
    - number: 165
      title: Gracia Admirable
      verses:
        - |-
          1. ¡Gracia admirable del Dios de amor
             Que excede a todo nuestro pecar!
             Cristo en la cruz por el pecador
             Su vida ha dado. ¡Qué amor sin par!
        - |-
          CORO
            ¡Gracia! (¡Gracia de Dios!) ¡Gracia! (¡Gracia sin par!)
            ¡Gracia de Dios que nos da perdón!
            ¡Gracia! (¡Gracia de Dios!) ¡Gracia! (¡Gracia sin par!)
            ¡Gracia que limpia el corazón!
        - |-
          2. Negras las olas de la maldad
             Me amenazaron con perdición;
             Pudo en la gracia de Dios hallar
             Dulce refugio mi corazón.
        - |-
          CORO
            ¡Gracia! (¡Gracia de Dios!) ¡Gracia! (¡Gracia sin par!)
            ¡Gracia de Dios que nos da perdón!
            ¡Gracia! (¡Gracia de Dios!) ¡Gracia! (¡Gracia sin par!)
            ¡Gracia que limpia el corazón!
        - |-
          3. Nunca tu mancha podrás limpiar
             Sino en la sangre del buen Jesús;
             En ella, sí, la podrás lavar,
             Hoy sin cesar fluye de la cruz.
        - |-
          CORO
            ¡Gracia! (¡Gracia de Dios!) ¡Gracia! (¡Gracia sin par!)
            ¡Gracia de Dios que nos da perdón!
            ¡Gracia! (¡Gracia de Dios!) ¡Gracia! (¡Gracia sin par!)
            ¡Gracia que limpia el corazón!
        - |-
          4. Gracia infinita recibirá
             Todo el que cree en Cristo el Señor;
             Si del pecado cansado estás,
             Ven, gracia ofrece tu Salvador.
        - |-
          CORO
            ¡Gracia! (¡Gracia de Dios!) ¡Gracia! (¡Gracia sin par!)
            ¡Gracia de Dios que nos da perdón!
            ¡Gracia! (¡Gracia de Dios!) ¡Gracia! (¡Gracia sin par!)
            ¡Gracia que limpia el corazón!
    - number: 166
      title: Maravilloso es el gran amor
      verses:
        - |-
          1. Maravilloso es el gran amor que Cristo el Salvador
             derramó en mí; Siendo rebelde y pecador,
             yo de su muerte causa fui. ¡Grande, sublime,
             inmensurable amor! Por mí murió el Salvador.
        - |-
          CORO
            ¡Oh, maravilla de su amor,
            por mí murió el Salvador!
        - |-
          2. El su celeste hogar abandonó, dejando posición,
             gloria y honor; De todo ello se despojó
             por rescatar al pecador. Misericordia inmensa
             él mostró; su gran amor me alcanzó.
        - |-
          CORO
            ¡Oh, maravilla de su amor,
            por mí murió el Salvador!
        - |-
          3. ¡Grande misterio! Dios el inmortal muriendo en la
             cruz entregó su ser; ni mente humana ni angelical
             jamás lo puede comprender. Inexplicable
             es el infinito amor que demostró mi Salvador.
        - |-
          CORO
            ¡Oh, maravilla de su amor,
            por mí murió el Salvador!
        - |-
          4. En vil prisión mi alma padeció, atada en pecado
             y oscuridad; pronto en mi celda resplandeció
             la clara luz de su verdad. Cristo las férreas
             cadenas destruyó; Quedé ya libre, ¡Gloria a Dios!
        - |-
          CORO
            ¡Oh, maravilla de su amor,
            por mí murió el Salvador!
        - |-
          5. Hoy ya no temo la condenación; Jesús
             es mi Señor, y yo suyo soy. Vivo en él
             que es mi salvación, vestido en su justicia voy.
             Libre acceso al Padre gozo ya y entrada al trono celestial.
        - |-
          CORO
            ¡Oh, maravilla de su amor,
            por mí murió el Salvador!
    - number: 167
      title: En tu presencia
      verses:
        - |-
          1. En tu presencia hay consuelo;
             En tu presencia hay amor;
             Al buscar tu corazón
             encontramos paz y gozo
             En tu presencia, oh Señor.
    - number: 168
      title: De su trono a un pesebre
      verses:
        - |-
          1. De su trono a un pesebre, de riqueza y honor,
             A buscarnos Cristo descendió;
             De las calles celestiales a la cruz de cruel dolor,
             Vino y por la humanidad su vida dio.
        - |-
          CORO
            ¡Cuán grande amor! ¡Jesús me ha redimido!
            ¡Cuán grande amor, sublime y eternal!
            Yo cantaré por siempre su alabanza,
            Con gozo unido al coro celestial.
        - |-
          2. De la diestra de su Padre a su creación bajó,
             Mas rechazo y odio él sufrió;
             Yo fui pecador perdido mas su amor me encontró;
             Por su sangre paz y vida me compró.
        - |-
          CORO
            ¡Cuán grande amor! ¡Jesús me ha redimido!
            ¡Cuán grande amor, sublime y eternal!
            Yo cantaré por siempre su alabanza,
            Con gozo unido al coro celestial.
        - |-
          3. El sufrió nuestros dolores, el quebranto,
             la aflicción, nuestra angustia y pena conoció;
             Azotado y herido fue por nuestra rebelión,
             Y el pecado nuestro, Dios en él cargó.
        - |-
          CORO
            ¡Cuán grande amor! ¡Jesús me ha redimido!
            ¡Cuán grande amor, sublime y eternal!
            Yo cantaré por siempre su alabanza,
            Con gozo unido al coro celestial.
    - number: 169
      title: Demos gracias al Señor
      verses:
        - |-
          1. Demos gracias al Señor,
             demos gracias al Señor,
             demos gracias al Señor
             porque es bueno.
        - |-
          2. Demos gracias al Señor,
             demos gracias al Señor,
             demos gracias al Señor
             porque es bueno.
    - number: 170
      title: Yo quisiera hablarte
      verses:
        - |-
          1. Yo quisiera hablarte del amor de Cristo,
             Pues en él hallé un amigo fuerte y fiel.
             Por su gracia transformó mi vida entera;
             Lo que en esta vida soy lo debo a él.
        - |-
          CORO
            Nadie pudo amarme como Cristo,
            Es incomparable su amistad;
            Sólo él pudo redimirme del pecado
            Por su amor y su bondad.
        - |-
          2. Mi alma estaba llena de ayes y tristezas,
             Llena estaba de miserias y dolor;
             Con ternura Cristo me tendió la mano,
             Y me guió por el sendero del amor.
        - |-
          CORO
            Nadie pudo amarme como Cristo,
            Es incomparable su amistad;
            Sólo él pudo redimirme del pecado
            Por su amor y su bondad.
        - |-
          3. Cada día viene a darme nuevo aliento;
             A mi corazón infunde dulce paz;
             No comprenderé por qué vino a salvarme,
             Hasta que en el cielo pueda ver su faz.
        - |-
          CORO
            Nadie pudo amarme como Cristo,
            Es incomparable su amistad;
            Sólo él pudo redimirme del pecado
            Por su amor y su bondad.
    - number: 171
      title: ¿Con qué pagaremos?
      verses:
        - |-
          1. ¿Con qué pagaremos amor tan inmenso?
             Que diste tu vida por el pecador;
             En cambio recibes la ofrenda humilde,
             La ofrenda humilde, Señor Jesucristo,
             de mi corazón. La ofrenda humilde,
             Señor Jesucristo, de mi corazón.
        - |-
          2. Y cuando la noche extiende su manto,
             Mis ojos en llanto en ti fijaré;
             Alzando mis ojos veré las estrellas;
             Yo sé que tras ellas cual Padre amoroso
             tú velas por mí. Yo sé que tras ellas
             cual Padre amoroso tú velas por mí.
        - |-
          3. No puedo pagarte con oro ni plata
             el gran sacrificio que hiciste por mí;
             No tengo qué darte por tanto amarme;
             Recibe este canto mezclado con llanto,
             y mi corazón. Recibe este canto mezclado
             con llanto, y mi corazón.
    - number: 172
      title: Gracias dad a Jesucristo
      verses:
        - |-
          1. Gracias dad a Jesucristo por su sempiterno amor;
             Alabadle, santos todos, él es nuestro Salvador.
             Que sus siervos por doquiera canten su benignidad;
             Los que temen a su nombre hablen de su libertad.
        - |-
          2. De cadenas de amargura le pedí liberación;
             Escuchó mi voz, y mi alma la salvó de la prisión.
             Si me asalta el enemigo nada tengo que temer;
             En la lucha tenebrosa con Jesús podré vencer.
        - |-
          3. Quien confía en Jesucristo la victoria llevará,
             Mas si espera en el hombre siempre éste fallará.
             Oh Señor, tu santo nombre alabamos sin cesar,
             Por tu amor incomparable
             gracias te queremos dar.
    - number: 173
      title: Dime la historia de Cristo
      verses:
        - |-
          1. Dime la historia de Cristo; grábala en mi corazón;
             Dime la historia preciosa, ¡cuán melodioso es su son!
             Di cómo cuando nacía, ángeles con dulce voz
             "Paz en la tierra", cantaron,
             "y en las alturas gloria a Dios".
        - |-
          CORO
            Dime la historia de Cristo; grábala en mi corazón;
            Dime la historia preciosa, ¡cuán melodioso es su son!
        - |-
          2. Dime del tiempo en que a solas en el desierto se halló;
             De Satanás fue tentado, mas con poder le venció.
             Dime de todas sus obras, de su tristeza y dolor,
             Pues sin hogar, despreciado anduvo nuestro Salvador.
        - |-
          CORO
            Dime la historia de Cristo; grábala en mi corazón;
            Dime la historia preciosa, ¡cuán melodioso es su son!
        - |-
          3. Di cuando crucificado él por nosotros murió;
             Di del sepulcro sellado; di cómo resucitó.
             En esa historia tan tierna miro las pruebas de amor;
             Mi redención ha comprado el bondadoso Salvador.
        - |-
          CORO
            Dime la historia de Cristo; grábala en mi corazón;
            Dime la historia preciosa, ¡cuán melodioso es su son!
    - number: 174
      title: Qué bella historia
      verses:
        - |-
          1. ¡Qué bella historia! de su excelsa gloria
             Bajó el Salvador, Jesús, mi Redentor.
             Nació en pesebre, despreciado y pobre,
             Varón de lágrimas y de dolor.
        - |-
          CORO
            ¡Oh cuánto le amo! y fiel le adoro;
            El es mi vida, mi Redentor;
            El Rey de gloria vino a salvarme,
            Y a revelarme al Dios de amor.
        - |-
          2. ¡Qué gran misterio, tan incomprensible!
             El Verbo se encarnó y al mundo descendió.
             El plan oculto revelóse al hombre,
             Y por su tierno amor me levantó.
        - |-
          CORO
            ¡Oh cuánto le amo! y fiel le adoro;
            El es mi vida, mi Redentor;
            El Rey de gloria vino a salvarme,
            Y a revelarme al Dios de amor.
        - |-
          3. ¡Don admirable, tan incomparable!
             De plena salvación, y eterna redención.
             El sol divino brilla en mi camino;
             Su luz alumbrará mi corazón.
        - |-
          CORO
            ¡Oh cuánto le amo! y fiel le adoro;
            El es mi vida, mi Redentor;
            El Rey de gloria vino a salvarme,
            Y a revelarme al Dios de amor.
    - number: 175
      title: Oh profundo, inmenso amor
      verses:
        - |-
          1. ¡Oh amor, profundo, inmenso amor!
             de gozo llena el corazón
             Que el Dios eterno, en su bondad,
             tomara forma corporal.
        - |-
          2. Fue por nosotros su oración,
             su enseñanza y su labor:
             Jamás buscó su propio bien;
             se hizo siervo, siendo rey.
        - |-
          3. El por nosotros padeció
             blasfemias, burlas y dolor;
             Y para darnos vida y luz
             halló la muerte en una cruz.
        - |-
          4. Mas en su triunfo el nuestro está,
             y junto al Padre, nuestro hogar;
             Nos da su Espíritu, y en él
             hallamos gozo, paz, poder.
    - number: 176
      title: Vida Abundante
      verses:
        - |-
          1. En la cruz murió mi Jesús;
             con su muerte vida me dio;
             Por su gracia me transformó
             y la vida abundante me concedió.
        - |-
          CORO
            Vida abundante Jesús ofrece,
            vida triunfante de día en día;
            El es la fuente de vida eterna
            que brota siempre en mi corazón.
        - |-
          2. La mujer que fue y tocó
             el vestido de mi Señor;
             Por su fe salud recibió
             y la vida abundante Jesús le dio.
        - |-
          CORO
            Vida abundante Jesús ofrece,
            vida triunfante de día en día;
            El es la fuente de vida eterna
            que brota siempre en mi corazón.
        - |-
          3. En la cruz pidió el malhechor
             de su alma la salvación;
             Vida eterna pudo alcanzar,
             pues la vida abundante Jesús le dio.
        - |-
          CORO
            Vida abundante Jesús ofrece,
            vida triunfante de día en día;
            El es la fuente de vida eterna
            que brota siempre en mi corazón.
    - number: 177
      title: Es Jesús ¡Qué bella historia!
      verses:
        - |-
          1. ¿Quién es el que en Belén
             reyes y pastores ven?
             ¿Quién a solas ayunó, y la tentación venció?
        - |-
          CORO
            Es Jesús, ¡Qué bella historia!
            mi Señor el Rey de gloria;
            A sus pies le adoraré,
            ¡Aleluya! cantaré.
        - |-
          2. ¿Quién tres años enseñó y al enfermo levantó?
             ¿Quién a niños recibió, con amor los abrazó?
        - |-
          CORO
            Es Jesús, ¡Qué bella historia!
            mi Señor el Rey de gloria;
            A sus pies le adoraré,
            ¡Aleluya! cantaré.
        - |-
          3. ¿Quién al Padre siempre oró
             y su voluntad buscó?
             ¿Quién por mí en la cruz murió, y mi pena allí pagó?
        - |-
          CORO
            Es Jesús, ¡Qué bella historia!
            mi Señor el Rey de gloria;
            A sus pies le adoraré,
            ¡Aleluya! cantaré.
        - |-
          4. ¿Quién la tumba conquistó,
             con poder resucitó?
             ¿Quién al cielo ascendió, junto al Padre se sentó?
        - |-
          CORO
            Es Jesús, ¡Qué bella historia!
            mi Señor el Rey de gloria;
            A sus pies le adoraré,
            ¡Aleluya! cantaré.
    - number: 178
      title: Sea la paz
      verses:
        - |-
          1. ¡Maestro, se encrespan las aguas
             y ruge la tempestad! Los grandes abismos
             del cielo se llenan de oscuridad.
             ¿No ves que aquí perecemos? ¿Puedes dormir así,
             Cuando el mar agitado nos abre profundo sepulcro aquí?
        - |-
          CORO
            Los vientos, las ondas oirán tu voz,
            "¡Sea la paz!" ("¡Sea la paz, sea la paz!")
            Calmas las iras del negro mar,
            Las luchas del alma las haces cesar,
            Y así la barquilla do va el Señor,
            Hundirse no puede en el mar traidor.
            Doquier se cumple tu voluntad,
            "¡Sea la paz!" "¡Sea la paz!"
            Tu voz resuena en la inmensidad, "¡Sea la paz!"
        - |-
          2. Maestro, mi ser angustiado
             te busca con ansiedad;
             De mi alma en los antros profundos
             se libra cruel tempestad.
             Asalta el pecado a torrentes sobre mi frágil ser.
             ¡Y perezco, perezco, Maestro! ¡Oh, quiéreme socorrer!
        - |-
          CORO
            Los vientos, las ondas oirán tu voz,
            "¡Sea la paz!" ("¡Sea la paz, sea la paz!")
            Calmas las iras del negro mar,
            Las luchas del alma las haces cesar,
            Y así la barquilla do va el Señor,
            Hundirse no puede en el mar traidor.
            Doquier se cumple tu voluntad,
            "¡Sea la paz!" "¡Sea la paz!"
            Tu voz resuena en la inmensidad, "¡Sea la paz!"
        - |-
          3. Maestro, pasó la tormenta,
             los vientos no rugen ya,
             Y sobre el cristal de las aguas
             el sol resplandecerá.
             Maestro, prolonga esta calma,
             no me abandones más;
             Cruzaré los abismos contigo, gozando bendita paz.
        - |-
          CORO
            Los vientos, las ondas oirán tu voz,
            "¡Sea la paz!" ("¡Sea la paz, sea la paz!")
            Calmas las iras del negro mar,
            Las luchas del alma las haces cesar,
            Y así la barquilla do va el Señor,
            Hundirse no puede en el mar traidor.
            Doquier se cumple tu voluntad,
            "¡Sea la paz!" "¡Sea la paz!"
            Tu voz resuena en la inmensidad, "¡Sea la paz!"
    - number: 179
      title: A la casa de Jairo
      verses:
        - |-
          1. A la casa de Jairo iba Jesús;
             una gran multitud iba tras él.
             Y una pobre mujer llena de fe,
             no miró la multitud, mas le tocó.
        - |-
          CORO
            Haz tú cual la mujer que le tocó
            el borde del vestido del Señor.
            Virtud salió de él, y ella sanó;
            si crees tú en él, salvo serás.
        - |-
          2. Aquel pueblo inmenso le escuchó;
             una parte creía al Señor,
             Pero el resto furioso rechazó
             a este Mensajero del excelso amor.
        - |-
          CORO
            Haz tú cual la mujer que le tocó
            el borde del vestido del Señor.
            Virtud salió de él, y ella sanó;
            si crees tú en él, salvo serás.
        - |-
          3. Jesucristo, fui yo quien te tocó;
             mi mal ningún doctor pudo quitar,
             Mas tu mano potente me sanó;
             ya mi alma y cuerpo traigo a tu altar.
        - |-
          CORO
            Haz tú cual la mujer que le tocó
            el borde del vestido del Señor.
            Virtud salió de él, y ella sanó;
            si crees tú en él, salvo serás.
    - number: 180
      title: La mujer samaritana
      verses:
        - |-
          1. "De tu cántaro dame, dame tú de beber",
             A la Samaritana, dijo un día Jesús.
             "¿Por qué, siendo judío me diriges la voz?"
             Respondió con vehemencia
             la mujer que ignoraba la grandeza de Dios.
        - |-
          2. "¡Oh! si tú conocieses este don que es de Dios
             Y quien viene a rogarte que le des de beber,
             Quizá tú pedirías y él podría darte
             Agua más deleitosa, que en los pozos
             terrenos no podrás encontrar.
        - |-
          3. Quien bebiere de esta agua volverá a tener sed,
             Mas aquel que bebiere de la que le daré,
             Para siempre, declaro que más sed no tendrá;
             En su alma una fuente para vida
             eterna con poder saltará.
    - number: 181
      title: El ciego Bartimeo
      verses:
        - |-
          1. Cuando el ciego escuchó que Jesús iba a ir,
             Caminó a Jericó, lo salió a recibir;
             Le gritaba, "¡Señor, ten piedad tú de mí!
             Porque ciego soy yo y no puedo vivir".
             Cristo le preguntó: "¿Qué podré por ti hacer?"
             Y con fe respondió: "Haz que yo pueda ver".
        - |-
          2. Al salir de allí daba gracias a Dios
             Porque ya pudo ver, pues Jesús lo sanó;
             El Señor le mostró su amor y poder
             Cuando al ciego sanó, permitiéndole ver.
             El también lo sacó de otra noche sin luz,
             Pues su pena pagó Cristo allí en la cruz.
        - |-
          3. Este mismo Jesús poderoso de ayer
             Es el mismo que hoy te dará su poder;
             Como escrito está, todo puede el Señor,
             Como ayer, también hoy y por la eternidad.
             Si tú vienes a él, salvación tú tendrás;
             Dale tu corazón; libre y salvo serás.
    - number: 182
      title: El ministerio terrenal de Jesús
      verses:
        - |-
          1. Al comenzar su ministerio, Jesús tenía como treinta
             años. Fue a Nazaret, donde se había criado,
             y conforme a su costumbre, el día sábado entró
             en la sinagoga, y se levantó para leer.
        - |-
          2. Se le entregó el rollo del profeta Isaías;
             y cuando abrió el rollo, encontró el lugar
             donde estaba escrito:
        - |-
          3. El Espíritu del Señor está sobre mí, porque me ha ungido
             para anunciar buenas nuevas a los pobres;
             Me ha enviado para proclamar libertad a los
             cautivos y vista a los ciegos, para poner en
             libertad a los oprimidos y para
             proclamar el año agradable del Señor.
        - |-
          4. Después de enrollar el libro y devolverlo al ayudante, se
             sentó. Y los ojos de todos en la sinagoga estaban fijos en él.
        - |-
          5. Entonces comenzó a decirles: "Hoy se ha
             cumplido esta Escritura en vuestros oídos".
        - |-
          6. Y se asombraban de su enseñanza, porque su
             palabra era con autoridad.
        - |-
          7. Pero él les dijo: "Me es necesario anunciar el
             evangelio del reino de Dios a otras ciudades
             también, porque para esto he sido enviado".
        - |-
          8. Su fama se extendía cada vez más, y se juntaban a él
             muchas multitudes para oírle y para ser sanadas de
             sus enfermedades.
        - |-
          9. Pero él se apartaba a los lugares desiertos y oraba.
    - number: 183
      title: Tierra de la Palestina
      verses:
        - |-
          1. Tierra bendita y divina es la de Palestina,
             donde nació Jesús; Eres, de las naciones,
             cumbre bañada por la lumbre
             que derramó su luz.
        - |-
          CORO
            Eres la historia inolvidable,
            porque en tu seno se derramó
            La sangre, preciosa sangre,
            del unigénito Hijo de Dios;
            La sangre, preciosa sangre,
            del unigénito Hijo de Dios.
        - |-
          2. Cuenta la historia del pasado
             que en tu seno sagrado vivió
             el Salvador, y en tus hermosos olivares,
             habló a los millares la palabra de amor.
        - |-
          CORO
            Eres la historia inolvidable,
            porque en tu seno se derramó
            La sangre, preciosa sangre,
            del unigénito Hijo de Dios;
            La sangre, preciosa sangre,
            del unigénito Hijo de Dios.
        - |-
          3. Quedan en ti testigos mudos,
             que son los viejos muros de la Jerusalén;
             Viejas paredes destruidas, que si tuvieran vida,
             nos hablarían también.
        - |-
          CORO
            Eres la historia inolvidable,
            porque en tu seno se derramó
            La sangre, preciosa sangre,
            del unigénito Hijo de Dios;
            La sangre, preciosa sangre,
            del unigénito Hijo de Dios.
    - number: 184
      title: Las Palmas
      verses:
        - |-
          1. Palmas y flores que se ven brotar,
             Hoy día sus perfumes ricos dan,
             Pues viene Cristo el llanto a enjugar
             Y revelarnos el divino plan.
        - |-
          CORO
            A Cristo dad hosannas,
            (¡Gloria! ¡Hosanna!)
            Himnos cantad a Cristo con
            triunfo y grande aclamación;
            ¡Gloria al Señor! ¡Hosanna!
            (¡Hosanna! ¡Gloria al Señor!)
            ¡Gloria al que viene trayéndonos salvación!
        - |-
          2. Los pueblos, al oír su regia voz,
             Del mal que oprime alcanzan libertad.
             Contemplan otra vez la luz de Dios,
             Regocijada está la humanidad.
        - |-
          CORO
            A Cristo dad hosannas,
            (¡Gloria! ¡Hosanna!)
            Himnos cantad a Cristo con
            triunfo y grande aclamación;
            ¡Gloria al Señor! ¡Hosanna!
            (¡Hosanna! ¡Gloria al Señor!)
            ¡Gloria al que viene trayéndonos salvación!
        - |-
          3. Hoy día alégrate, Jerusalén;
             Viene a librarte tu divino Rey,
             Pues el amor del Cristo de Belén
             Trae esperanza, paz y eterna fe.
        - |-
          CORO
            A Cristo dad hosannas,
            (¡Gloria! ¡Hosanna!)
            Himnos cantad a Cristo con
            triunfo y grande aclamación;
            ¡Gloria al Señor! ¡Hosanna!
            (¡Hosanna! ¡Gloria al Señor!)
            ¡Gloria al que viene trayéndonos salvación!
    - number: 185
      title: En el nombre de Dios
      verses:
        - |-
          1. Hay poder, esperanza y amor
             En el nombre de nuestro Señor;
             Aclamemos a Cristo el Rey,
             ¡Bendito el que viene en el
             nombre de Dios!
    - number: 186
      title: ¡Hosanna! (Mantos y palmas)
      verses:
        - |-
          1. Mantos y palmas esparciendo va
             El pueblo alegre de Jerusalén,
             Y a lo lejos ya se puede ver
             En un pollino a Jesús el Rey;
        - |-
          CORO
            Mientras mil voces resuenan
            por doquier, "Hosanna al que viene
            en el nombre del Señor"; Con un estruendo
            de gran exclamación prorrumpen con voz triunfal:
            "¡Hosanna, hosanna al Rey!
            ¡Hosanna! ¡Hosanna al Rey!"
        - |-
          2. Como en la entrada de Jerusalén,
             Un día todos vamos a cantar,
             Cuando regrese Cristo otra vez
             Para llevarnos al eterno hogar;
        - |-
          CORO
            Mientras mil voces resuenan
            por doquier, "Hosanna al que viene
            en el nombre del Señor"; Con un estruendo
            de gran exclamación prorrumpen con voz triunfal:
            "¡Hosanna, hosanna al Rey!
            ¡Hosanna! ¡Hosanna al Rey!"
    - number: 187
      title: Cabalga Majestuoso
      verses:
        - |-
          1. Cabalga majestuoso tan alto embajador,
             Seguido de sus fieles del Olivar a Sion.
             Las multitudes cantan con gozo y con fervor:
             ¡Hosanna al rey que viene en nombre del Señor!
        - |-
          2. Con palmas y con ramos
             el pueblo marcha en pos;
             Aclámanle los niños, rindiendo gloria a Dios.
             Las multitudes cantan con gozo y con fervor:
             ¡Hosanna al rey que viene en nombre del Señor!
        - |-
          3. Cubrid de mirto y flores la senda del Señor,
             Con corazón y labios rendidle adoración.
             Cantadle, multitudes, con gozo y con fervor:
             ¡Hosanna al rey que viene en nombre del Señor!
    - number: 188
      title: La entrada triunfal
      verses:
        - |-
          1. Al día siguiente, cuando oyeron que Jesús
             venía a Jerusalén,
        - |-
          2. La gran multitud que había venido a la fiesta
             tomó ramas de palmera y salió a recibirle,
             y le aclamaban a gritos: "¡Hosanna!"
        - |-
          3. Ellos decían: "¡Bendito el rey que viene en el nombre
             del Señor! ¡Paz en el cielo, y gloria en las alturas!"
        - |-
          4. Cuando llegó cerca, al ver la ciudad, lloró por ella.
    - number: 189
      title: Hosanna en el cielo
      verses:
        - |-
          1. Santo, santo,
             santo es el Señor;
             Dios del universo,
             santo es el Señor.
        - |-
          2. Santo, santo, santo, santo es el Señor;
             Dios del universo, santo es el Señor.
        - |-
          3. ¡Hosanna en el cielo!
             ¡Hosanna en la tierra!
             ¡Bendito el que viene en el nombre del Señor!
    - number: 190
      title: Jerusalén la hermosa
      verses:
        - |-
          1. Una noche con la luna, Cristo lloraba,
             Y contemplaba la ciudad santa.
             ¡Oh, Jerusalén la hermosa! Tú que has matado
             Cuantos te ha enviado mi Padre Dios.
        - |-
          CORO
            ¡Oh Jerusalén, Jerusalén, ciudad de Sion!
            Llora por ti hoy mi corazón: Como el ave
            al hijo le da siempre protección, vine yo
            a traerte salvación. ¡Oh, Jerusalén
            la hermosa! Tú que has matado
            Cuantos te ha enviado mi Padre Dios.
        - |-
          2. Y cuando Jesús moría en cruz clavado,
             Al vil malvado él bendecía. Si tú aceptas
             hoy la sangre que ha derramado,
             Serás llevado a Jerusalén.
        - |-
          CORO
            ¡Oh Jerusalén, Jerusalén, ciudad de Sion!
            Llora por ti hoy mi corazón: Como el ave
            al hijo le da siempre protección, vine yo
            a traerte salvación. ¡Oh, Jerusalén
            la hermosa! Tú que has matado
            Cuantos te ha enviado mi Padre Dios.
    - number: 191
      title: ¿Qué quiero mi Jesús?
      verses:
        - |-
          1. ¿Qué quiero, mi Jesús?... Quiero quererte,
             quiero cuanto hay en mí, del todo darte
             sin tener más placer que el agradarte,
             sin tener más temor que el ofenderte.
        - |-
          2. Quiero olvidarlo todo y conocerte,
             quiero dejarlo todo por buscarte,
             quiero perderlo todo por hallarte,
             quiero ignorarlo todo por saberte.
        - |-
          3. Quiero, amable Jesús, abismarme
             en ese dulce hueco de tu herida,
             y en tus divinas llamas abrasarme.
        - |-
          4. Quiero, por fin, en ti transfigurarme,
             morir a mí, para vivir tu vida,
             perderme en ti, Jesús, y no encontrarme.
    - number: 192
      title: Cristo nuestra ofrenda es
      verses:
        - |-
          1. Cristo nuestra ofrenda es: holocausto excelso;
             Al Cordero alabad; conquistó el Calvario.
        - |-
          CORO
            "Santos seréis, porque santo soy
            yo Jehová vuestro Dios".
        - |-
          2. Cristo nuestra ofrenda es: oblación tan fragante;
             Es olor suave hacia Dios; load al Hijo amante.
        - |-
          CORO
            "Santos seréis, porque santo soy
            yo Jehová vuestro Dios".
        - |-
          3. Cristo nuestra ofrenda es, quien logró
             para el hombre, paz y comunión
             con Dios, ¡gloria dad a su nombre!
        - |-
          CORO
            "Santos seréis, porque santo soy
            yo Jehová vuestro Dios".
        - |-
          4. Cristo nuestra ofrenda es el que quita
             el pecado; Por su muerte eficaz
             vida ofrece al mundo.
        - |-
          CORO
            "Santos seréis, porque santo soy
            yo Jehová vuestro Dios".
        - |-
          5. Cristo nuestra ofrenda es:
             expiación consumada;
             Queda satisfecho Dios, y el alma limpiada.
        - |-
          CORO
            "Santos seréis, porque santo soy
            yo Jehová vuestro Dios".
    - number: 193
      title: Fue de Dios la santa voluntad
      verses:
        - |-
          1. A solas en Getsemaní el Salvador sufrió;
             La copa amarga de dolor mi buen Jesús bebió.
             A solas en el tribunal las burlas aguantó,
             Pues fue de Dios la santa voluntad.
        - |-
          CORO
            Se despojó del trono y todo su esplendor;
            Fue despreciado y desechado el Salvador,
            Mas como oveja no abrió su boca mi Señor,
            Pues fue de Dios la santa voluntad.
        - |-
          2. A solas al Calvario, Cristo el Redentor subió;
             Sin murmurar, mis negras penas
             en la cruz sufrió.
             "Dios mío, ¿por qué me has dejado?"
             con dolor clamó,
             Mas fue de Dios la santa voluntad.
        - |-
          CORO
            Se despojó del trono y todo su esplendor;
            Fue despreciado y desechado el Salvador,
            Mas como oveja no abrió su boca mi Señor,
            Pues fue de Dios la santa voluntad.
    - number: 194
      title: Los amó hasta el fin
      verses:
        - |-
          1. Antes de la fiesta de la Pascua, sabiendo
             Jesús que había llegado su hora
             para pasar de este mundo al Padre,
        - |-
          2. Como había amado a los suyos que
             estaban en el mundo, los amó hasta el fin.
        - |-
          3. Así que, después de haberles lavado los pies,
             tomó su manto, se volvió a sentar a la mesa
             y les dijo: '¿Entendéis lo que os he hecho?
        - |-
          4. 'Un mandamiento nuevo os doy: que os améis
             los unos a los otros. Como os he amado,
             amaos también vosotros los unos a los otros.
        - |-
          5. Entonces llegó Jesús con ellos a un lugar que
             se llama Getsemaní, y dijo a los discípulos:
             'Sentaos aquí, hasta que yo vaya allí y ore.
        - |-
          6. Tomó consigo a Pedro, y a los dos
             hijos de Zebedeo, y comenzó a
             entristecerse y a angustiarse.
        - |-
          7. Pasando un poco más adelante, se postró
             sobre su rostro, orando y diciendo:
        - |-
          8. 'Padre mío, de ser posible, pase de mí esta copa.
             Pero, no sea como yo quiero, sino como tú.
    - number: 195
      title: Rasgóse el velo
      verses:
        - |-
          1. ¡Rasgóse el velo! ya no más distancia mediará;
             Al trono mismo de su Dios el alma llegará.
        - |-
          2. ¡Rasgóse el velo, sombras id! la luz resplandeció;
             La cara misma de su Dios Jesús ya reveló.
        - |-
          3. ¡Rasgóse el velo! hecha está eterna redención;
             El alma pura y limpia ya no teme perdición.
        - |-
          4. ¡Rasgóse el velo! Dios abrió los brazos de su amor;
             Entrar podemos donde entró Jesús, el Salvador.
    - number: 196
      title: El Varón de gran dolor
      verses:
        - |-
          1. El Varón de gran dolor es el Hijo del Señor;
             Vino al mundo por amor, ¡Aleluya! ¡Es mi Cristo!
        - |-
          2. El llevó la cruenta cruz para darnos vida y luz;
             Ya mi cuenta él pagó, ¡Aleluya! ¡Es mi Cristo!
        - |-
          3. Quiso él por mí morir; puedo hoy por él vivir.
             Quiero sólo a él servir, ¡Aleluya! ¡Es mi Cristo!
        - |-
          4. Cuando venga nuestro Rey, Luego yo su faz veré,
             Y sus glorias cantaré, ¡Aleluya! ¡Es mi Cristo!
    - number: 197
      title: Mirad al Salvador Jesús
      verses:
        - |-
          1. Mirad al Salvador Jesús, el Príncipe benigno,
             Por mí muriendo en la cruz, por mí, tan vil, indigno.
        - |-
          CORO
            De amor la prueba hela aquí: el Salvador murió por mí.
            Por mí, (por mí,) por mí, (por mí,) Jesús murió por mí.
        - |-
          2. El sol su rostro encubrió al ver su agonía;
             La dura peña se partió; ¿Lo oyes, alma mía?
        - |-
          CORO
            De amor la prueba hela aquí: el Salvador murió por mí.
            Por mí, (por mí,) por mí, (por mí,) Jesús murió por mí.
        - |-
          3. Y yo también al ver la cruz, por ella soy vencido;
             Mi corazón te doy, Jesús, A tu amor rendido.
        - |-
          CORO
            De amor la prueba hela aquí: el Salvador murió por mí.
            Por mí, (por mí,) por mí, (por mí,) Jesús murió por mí.
    - number: 198
      title: Mi vida di por ti
      verses:
        - |-
          1. Mi vida di por ti,
             mi sangre derramé;
             Por ti inmolado fui, por gracia te salvé;
             Por ti, por ti inmolado fui, ¿Qué has dado tú por mí?
        - |-
          2. Mi celestial mansión,
             mi trono de esplendor,
             Dejé por rescatar al mundo pecador;
             Sí, todo yo dejé por ti, ¿Qué dejas tú por mí?
        - |-
          3. Reproches, aflicción y
             angustias yo sufrí;
             La copa amarga fue que yo por ti bebí;
             Reproches yo por ti sufrí, ¿Qué sufres tú por mí?
        - |-
          4. De mi celeste hogar,
             te traigo el rico don
             Del Padre Dios de amor, la plena salvación;
             Mi don de amor te traigo a ti, ¿Qué ofreces tú por mí?
    - number: 199
      title: En la vergonzosa cruz
      verses:
        - |-
          1. En la vergonzosa cruz padeció por mí, Jesús;
             Por la sangre que vertió, mis pecados él expió;
             Lavará de todo mal ese rojo manantial,
             El que abrió por mí, Jesús, en la vergonzosa cruz.
        - |-
          CORO
            Sí, fue por mí, (Sí, fue por mí,)
            sí, fue por mí, (Sí, fue por mí,)
            Fue por mí, murió Jesús en la vergonzosa cruz.
        - |-
          2. ¡Oh, qué amor, qué inmenso amor
             reveló mi Salvador! La maldad que hice yo,
             al suplicio le llevó. Ahora a ti mi todo doy,
             cuerpo y alma tuyo soy; Mientras permanezca
             aquí, hazme siempre fiel a ti.
        - |-
          CORO
            Sí, fue por mí, (Sí, fue por mí,)
            sí, fue por mí, (Sí, fue por mí,)
            Fue por mí, murió Jesús en la vergonzosa cruz.
        - |-
          3. Yo de Cristo sólo soy, a seguirle presto estoy;
             Al bendito Redentor serviré con firme amor;
             Sea mi alma ya su hogar, y mi corazón su altar;
             Vida emana, paz y luz, del Calvario, de la cruz.
        - |-
          CORO
            Sí, fue por mí, (Sí, fue por mí,)
            sí, fue por mí, (Sí, fue por mí,)
            Fue por mí, murió Jesús en la vergonzosa cruz.
    - number: 200
      title: Crucificado por nosotros
      verses:
        - |-
          1. Los principales sacerdotes y los ancianos persuadieron a la
             multitud que pidiese a Barrabás, y que Jesús fuese muerto.
        - |-
          2. Pilato les dijo: '¿Qué, pues, haré de Jesús,
             llamado el Cristo?
        - |-
          3. Todos le dijeron: '¡Sea crucificado!
        - |-
          4. Y Pilato, queriendo satisfacer al pueblo,
             les soltó a Barrabás, y entregó a Jesús,
             después de azotarle, para que fuese crucificado.
        - |-
          5. Y le llevaron a un lugar llamado Gólgota,
             que traducido es: Lugar de la Calavera.
        - |-
          6. Era la hora tercera cuando le crucificaron.
        - |-
          7. Crucificaron también con él a dos ladrones, uno a
             su derecha, y el otro a su izquierda.
        - |-
          8. Y se cumplió la Escritura que dice:
             Y fue contado con los inicuos.
        - |-
          9. Cuando vino la hora sexta, hubo tinieblas
             sobre toda la tierra hasta la hora novena.
        - |-
          10. Mas Jesús, dando una gran voz, expiró.
        - |-
          11. Entonces el velo del templo se rasgó en dos, de arriba abajo.
        - |-
          12. Y el centurión que estaba frente a él, viendo
              que después de clamar había expirado así, dijo:
              'Verdaderamente este hombre era hijo de Dios.
        - |-
          13. Cristo padeció por nosotros,
        - |-
          14. Quien llevó el mismo nuestros pecados en su
              cuerpo sobre el madero, para que nosotros,
              estando muertos a los pecados, vivamos a la justicia.
    - number: 201
      title: Pies Divinos
      verses:
        - |-
          1. Pies divinos, pies divinos, pies divinos;
             Pies divinos, pies divinos de Jesús,
             Que en la cumbre del Calvario
             Los clavaron en la cruz.
        - |-
          2. Vedlos fríos y desnudos por los campos,
             Caminando, caminando sin cesar;
             Por las cumbres, por los valles,
             Por la orilla de la mar.
        - |-
          3. Van llevando por Judea la semilla
             Del bendito Evangelio del amor,
             Y calmando del enfermo
             Las tristezas y el dolor.
        - |-
          4. ¡Cuán hermosos y cuán santos, cuán benditos,
             De Jesús el Nazareno son los pies!
             ¡Oh yo quiero que a la tierra
             Vengan pronto otra vez!
        - |-
          5. Pies divinos, pies divinos, pies sangrantes,
             Horadados por mi culpa sin igual,
             Nos librasteis del pecado
             y del juicio eternal.
    - number: 202
      title: Cristo Padeció
      verses:
        - |-
          1. Padeció una sola vez mi Cristo,
             padeció una sola vez por mí;
             Por los pecados padeció,
             por los pecados padeció,
             El justo por los injustos;
             Padeció una sola vez mi Cristo,
             padeció una sola vez por mí;
             Para llevarnos a Dios,
             para llevarnos a Dios;
             Padeció por nosotros Jesús.
    - number: 203
      title: Cabeza Ensangrentada
      verses:
        - |-
          1. Cabeza ensangrentada, herida por mi bien,
             De espinas coronada, por fe mis ojos ven;
             De todos despreciada, mi eterno bien será;
             Por todas las edades mi ser te adorará.
        - |-
          2. Pues oprimida tu alma fue por el pecador;
             La transgresión fue mía, mas tuyo fue el dolor;
             Hoy vengo contristado, merezco tu dolor,
             Concédeme tu gracia; ¡oh! dame tu favor.
        - |-
          3. Te doy loor eterno, bendito Salvador,
             Por tu dolor y muerte, por tu divino amor;
             Oh Salvador, deseo tu gracia conocer;
             Junto a tu cruz espero, te entrego a ti mi ser.
    - number: 204
      title: Alzad la cruz
      verses:
        - |-
          1. Venid, unidos el pendón llevad,
             El Hijo de Dios es nuestro Capitán.
        - |-
          CORO
            ¡Alzad la cruz de Cristo el Salvador
            Y proclamad su nombre en derredor!
        - |-
          2. Es el madero símbolo de paz,
             Amor, fe, justicia y de libertad.
        - |-
          CORO
            ¡Alzad la cruz de Cristo el Salvador
            Y proclamad su nombre en derredor!
        - |-
          3. Todo creyente en el Redentor
             Ostenta en la frente el sello del perdón.
        - |-
          CORO
            ¡Alzad la cruz de Cristo el Salvador
            Y proclamad su nombre en derredor!
        - |-
          4. Por Jesucristo con fervor luchad,
             Y él la victoria os concederá.
        - |-
          CORO
            ¡Alzad la cruz de Cristo el Salvador
            Y proclamad su nombre en derredor!
    - number: 205
      title: Las siete palabras
      verses:
        - |-
          1. "Padre, perdónalos, porque no
             saben lo que hacen". Lucas 23:34
        - |-
          2. "Hoy estarás conmigo en el paraíso". Lucas 23:43
        - |-
          3. "Mujer, he allí tu hijo...He allí tu madre". Juan 19:26-27
        - |-
          4. "Dios mío, Dios mío, ¿por qué
             me has desamparado?" Marcos 15:34
        - |-
          5. "Tengo sed". Juan 19:28
        - |-
          6. "Consumado es". Juan 19:30
        - |-
          7. "Padre, en tus manos encomiendo mi espíritu". Lucas 23:46
    - number: 206
      title: La visión de la cruz
      verses:
        - |-
          1. Ese triste día, mi Jesús sufría
             En la cruz clavado por nuestro pecado;
             Tiernamente dijo a Juan y a la madre:
             "He aquí tu hijo, he aquí tu madre".
        - |-
          2. Cuando le clavaban y le denostaban,
             Imploró clemencia, perdón y paciencia
             En favor de aquellos que en tinieblas yacen,
             "Pues ignoran ellos", dijo, "lo que hacen".
        - |-
          3. En su angustia, llama; "¡Sed yo tengo!" exclama.
             ¿Y sabéis qué hicieron? vinagre le dieron.
             A aquel penitente que buscarle quiso,
             Le ofreció la fuente de su paraíso.
        - |-
          4. Con solemne calma encomienda su alma,
             A su Padre amado que ya le ha dejado
             Por el vil pecado de un mundo errado,
             Y clama angustiado: "¡Ya es consumado!"
        - |-
          5. ¡Cuán felices fuimos desde que creímos
             En el Cristo amado que fuera inmolado!
             Fue a la tumba fría, y resucitado,
             Un hermoso día fue glorificado.
    - number: 207
      title: Junto a la cruz de Cristo
      verses:
        - |-
          1. Junto a la cruz de Cristo yo quiero siempre estar,
             Pues mi alma albergue fuerte
             y fiel allí puede encontrar.
             En medio del desierto aquí, allí encuentro hogar
             Do del calor y del trajín yo pueda descansar.
        - |-
          2. Bendita cruz de Cristo, a veces veo en ti
             La misma forma en fiel visión del que sufrió por mí;
             Hoy mi contrito corazón confiesa la verdad
             De tu asombrosa redención y de mi indignidad.
        - |-
          3. Oh, Cristo, en ti he hallado completa y dulce paz;
             No busco bendición mayor que la de ver tu faz;
             Sin atractivo el mundo está, ya que ando por tu luz;
             Avergonzado de mi mal, mi gloria es ya la cruz.
    - number: 208
      title: Un Día
      verses:
        - |-
          1. Un día que el cielo sus glorias cantaba,
             Un día que el mal imperaba más cruel,
             Jesús descendió, y al nacer de una virgen,
             Nos dio por su vida ejemplo tan fiel.
        - |-
          CORO
            Vivo, me amaba; muerto, salvóme;
            Y en el sepulcro mi mal enterró;
            Resucitado, él es mi justicia;
            Un día él viene, pues lo prometió.
        - |-
          2. Un día lleváronle al monte Calvario,
             Un día claváronle sobre una cruz;
             Sufriendo dolores y pena de muerte,
             Expiando el pecado, salvóme Jesús.
        - |-
          CORO
            Vivo, me amaba; muerto, salvóme;
            Y en el sepulcro mi mal enterró;
            Resucitado, él es mi justicia;
            Un día él viene, pues lo prometió.
        - |-
          3. Un día dejaron su cuerpo en el huerto,
             Un día Jesús de dolor reposó.
             Velaban los ángeles sobre el sepulcro
             De quien por nosotros su vida entregó.
        - |-
          CORO
            Vivo, me amaba; muerto, salvóme;
            Y en el sepulcro mi mal enterró;
            Resucitado, él es mi justicia;
            Un día él viene, pues lo prometió.
        - |-
          4. Un día la tumba ocultarle no pudo,
             Un día el ángel la piedra quitó;
             Habiendo Jesús a la muerte vencido,
             A estar con su Padre en gloria ascendió.
        - |-
          CORO
            Vivo, me amaba; muerto, salvóme;
            Y en el sepulcro mi mal enterró;
            Resucitado, él es mi justicia;
            Un día él viene, pues lo prometió.
        - |-
          5. Un día él viene con voz de arcángel,
             Un día en su gloria el Señor brillará;
             ¡Oh día admirable, en que unido, su pueblo
             Loores a Cristo por siempre alzará!
        - |-
          CORO
            Vivo, me amaba; muerto, salvóme;
            Y en el sepulcro mi mal enterró;
            Resucitado, él es mi justicia;
            Un día él viene, pues lo prometió.
    - number: 209
      title: Manos Cariñosas
      verses:
        - |-
          1. Manos cariñosas, manos de Jesús;
             Manos que llevaron la pesada cruz,
             Manos que supieron sólo hacer el bien,
             ¡Gloria a esas manos! ¡Aleluya, amén!
        - |-
          2. Blancas azucenas, lirios de amor,
             Fueron esas manos de mi Redentor;
             Manos que a los ciegos dieron la visión
             Con el real consuelo de su gran perdón.
        - |-
          3. Manos que supieron calmar el dolor,
             ¡Oh, manos divinas de mi Redentor!
             Que multiplicaron los peces y el pan,
             Manos milagrosas que la vida dan.
        - |-
          4. Manos que sufrieron el clavo y la cruz;
             Manos redentoras de mi buen Jesús;
             De esas manos bellas yo confiado estoy;
             Ellas van guiando, pues al cielo voy.
        - |-
          5. ¡Oh, Jesús! tus manos yo las vi en visión
             Y vertí mi llanto con el corazón;
             Vi sus dos heridas y la sangre vi
             Que tú derramaste por salvarme a mí.
    - number: 210
      title: En la cruz
      verses:
        - |-
          1. Con pena amarga fui a Jesús; mostréle mi dolor;
             Perdido, errante, vi su luz; bendíjome en su amor.
        - |-
          CORO
            En la cruz, en la cruz, do primero vi la luz,
            Y las manchas de mi alma yo lavé,
            Fue allí por fe do vi a Jesús,
            Y siempre feliz con él seré.
        - |-
          2. Sobre una cruz, mi buen Señor su sangre derramó
             Por este pobre pecador, a quien así salvó.
        - |-
          CORO
            En la cruz, en la cruz, do primero vi la luz,
            Y las manchas de mi alma yo lavé,
            Fue allí por fe do vi a Jesús,
            Y siempre feliz con él seré.
        - |-
          3. Venció la muerte con poder, y al cielo se exaltó;
             Confiar en él es mi placer, morir no temo yo.
        - |-
          CORO
            En la cruz, en la cruz, do primero vi la luz,
            Y las manchas de mi alma yo lavé,
            Fue allí por fe do vi a Jesús,
            Y siempre feliz con él seré.
        - |-
          4. Aunque él se fue, solo no estoy; mandó
             al Consolador, Divino Espíritu que hoy
             me da perfecto amor.
        - |-
          CORO
            En la cruz, en la cruz, do primero vi la luz,
            Y las manchas de mi alma yo lavé,
            Fue allí por fe do vi a Jesús,
            Y siempre feliz con él seré.
    - number: 211
      title: "REFLEXION: Mi Señor Jesucristo"
      verses:
        - |-
          1. ¡Jesucristo, mi Señor! Me asombra el hecho de
             que tú, el Dios eterno, te hiciste hombre por mí. Dejaste
             el esplendor celestial por el establo de Belén.
             Anduviste por las polvorientas veredas de Palestina,
             enseñando y haciendo el bien. Calmaste el mar
             furioso; sanaste al enfermo y diste esperanza al
             desalentado.
        - |-
          2. Tú, el perfecto Hijo de Dios, tomaste mi pecado y
             llevaste mi castigo. Sufriste el dolor, el rechazo, la
             soledad...y la muerte. Eres Jesús, mi Salvador.
        - |-
          3. Resucitaste triunfante del sepulcro. Desde que te
             recibí por la fe, vives en mí y estás transformando
             mi pensar y mis anhelos. Has quebrantado el poder
             del pecado en mi vida. Eres Cristo, mi Libertador.
        - |-
          4. Hoy ocupas el lugar de honor a la diestra de tu Padre,
             donde intercedes por mí. Y cuando regreses a este
             mundo en gloria, toda rodilla se doblará y toda lengua
             confesará que eres el Señor, Dios todopoderoso.
        - |-
          5. ¡Jesucristo, tú eres mi Señor! Te amo, te adoro
             y te alabo con el canto que surge de mi ser.
    - number: 212
      title: La tumba le encerró
      verses:
        - |-
          1. La tumba le encerró, Cristo, mi Cristo;
             El alba allí esperó Cristo el Señor.
        - |-
          CORO
            Cristo la tumba venció, (la venció,)
            Y con gran poder resucitó;
            De sepulcro y muerte Cristo es vencedor,
            Vive para siempre nuestro Salvador;
            ¡Gloria a Dios! (¡Gloria a Dios!)
            ¡Gloria a Dios! (¡Gloria a Dios!)
            El Señor resucitó.
        - |-
          2. De guardas escapó Cristo, mi Cristo;
             El sello destruyó Cristo el Señor.
        - |-
          CORO
            Cristo la tumba venció, (la venció,)
            Y con gran poder resucitó;
            De sepulcro y muerte Cristo es vencedor,
            Vive para siempre nuestro Salvador;
            ¡Gloria a Dios! (¡Gloria a Dios!)
            ¡Gloria a Dios! (¡Gloria a Dios!)
            El Señor resucitó.
        - |-
          3. La muerte dominó Cristo, mi Cristo;
             y su poder venció Cristo el Señor.
        - |-
          CORO
            Cristo la tumba venció, (la venció,)
            Y con gran poder resucitó;
            De sepulcro y muerte Cristo es vencedor,
            Vive para siempre nuestro Salvador;
            ¡Gloria a Dios! (¡Gloria a Dios!)
            ¡Gloria a Dios! (¡Gloria a Dios!)
            El Señor resucitó.
    - number: 213
      title: Resucitó Jesús
      verses:
        - |-
          1. Resucitó Jesús,
             la tumba abierta está;
             Con gran poder se levantó
             y vive ya.
        - |-
          2. Merece todo honor,
             alabanza, gratitud y amor;
             Cantemos al Señor Jesús,
             el Salvador.
        - |-
          3. En gloria celestial
             él reina vencedor;
             La muerte y tumba derrotó
             Cristo el Señor.
        - |-
          4. Rindamos hoy loor
             con los ángeles al Redentor;
             Cantemos al Señor Jesús,
             el Salvador.
             Amén.
    - number: 214
      title: El sepulcro vacío
      verses:
        - |-
          1. Y el primer día de la semana, muy de mañana, fueron
             al sepulcro...
        - |-
          2. Y hallaron removida la piedra del sepulcro;
             pero al entrar, no hallaron el cuerpo de Jesús,
        - |-
          3. Que fue sepultado y que resucitó al tercer día,
             conforme a las Escrituras;
        - |-
          4. Que el Cristo había de padecer, y ser el primero
             de la resurrección de los muertos.
    - number: 215
      title: El Señor resucitó
      verses:
        - |-
          1. El Señor resucitó, ¡Aleluya! (¡Aleluya! ¡aleluya!)
             Muerte y tumba él venció; ¡Aleluya! (¡Aleluya! ¡aleluya!)
             Con su fuerza y su virtud ¡Aleluya! (¡Aleluya! ¡aleluya!)
             Cautivó a la esclavitud. ¡Aleluya!
             (¡Aleluya, aleluya, gloria a Dios!)
        - |-
          2. El que al polvo se humilló, ¡Aleluya!
             (¡Aleluya! ¡aleluya!)
             Vencedor se levantó; ¡Aleluya! (¡Aleluya! ¡aleluya!)
             Cante hoy la cristiandad ¡Aleluya! (¡Aleluya! ¡aleluya!)
             Su gloriosa majestad. ¡Aleluya!
             (¡Aleluya, aleluya, gloria a Dios!)
        - |-
          3. Cristo que la cruz sufrió, ¡Aleluya!
             (¡Aleluya! ¡aleluya!)
             Y en desolación se vio, ¡Aleluya! (¡Aleluya! ¡aleluya!)
             Hoy en gloria celestial ¡Aleluya! (¡Aleluya! ¡aleluya!)
             Reina vivo e inmortal. ¡Aleluya!
             (¡Aleluya, aleluya, gloria a Dios!)
        - |-
          4. Cristo nuestro Salvador, ¡Aleluya!
             (¡Aleluya! ¡aleluya!)
             De la muerte vencedor, ¡Aleluya! (¡Aleluya! ¡aleluya!)
             Pronto vamos sin cesar ¡Aleluya! (¡Aleluya! ¡aleluya!)
             Tus loores a cantar. ¡Aleluya!
             (¡Aleluya, aleluya, gloria a Dios!)
    - number: 216
      title: Aleluya, gloria a Cristo
      verses:
        - |-
          1. ¡Aleluya! Gloria a Cristo, poderoso Salvador;
             ¡Aleluya! La victoria por sí solo conquistó.
             Escuchad las alabanzas del gran coro celestial;
             Jesucristo, con su sangre, redención al hombre da.
        - |-
          2. ¡Aleluya! No temamos, con nosotros Cristo está;
             ¡Aleluya! Su presencia gozo y confianza da.
             Recordemos la promesa que Jesús, al ascender,
             Hizo a sus seguidores: "Con vosotros estaré".
        - |-
          3. ¡Aleluya! Por su muerte él la muerte conquistó;
             ¡Aleluya! Vive ahora, con poder resucitó.
             Nuestro Sumo Sacerdote a los cielos ascendió;
             Intercede por nosotros ante el santo Padre Dios.
        - |-
          4. ¡Aleluya! Rey supremo, Dios eterno, Gran Señor;
             ¡Aleluya! El es digno; Dadle gloria y honor.
             Cantan seres celestiales; hombres, levantad la voz;
             Todo lo creado cante alabanza a nuestro Dios.
    - number: 217
      title: Gloria, gloria al Vencedor
      verses:
        - |-
          1. ¡Gloria, gloria al Vencedor! ¡Alelú, aleluya! (¡Aleluya!)
             ¡Mil hosannas repetid! ¡Alelú, aleluya! (¡Aleluya!)
             Cristo lleno de esplendor ¡Alelú, aleluya! (¡Aleluya!)
             Triunfa en portentosa lid. ¡Alelú, aleluya! (¡Aleluya!)
        - |-
          2. Roca, sellos, guardias son ¡Alelú, aleluya! (¡Aleluya!)
             Vano intento, pues triunfal ¡Alelú, aleluya! (¡Aleluya!)
             De la fosa el gran Campeón ¡Alelú, aleluya! (¡Aleluya!)
             Surge invicto e inmortal. ¡Alelú, aleluya! (¡Aleluya!)
        - |-
          3. El averno se hunde ya: ¡Alelú, aleluya! (¡Aleluya!)
             Caen la muerte y la maldad; ¡Alelú, aleluya! (¡Aleluya!)
             El sepulcro se abre y da ¡Alelú, aleluya! (¡Aleluya!)
             Paso a la inmortalidad. ¡Alelú, aleluya! (¡Aleluya!)
        - |-
          4. ¡Alabanzas cántenle! ¡Alelú, aleluya! (¡Aleluya!)
             Cristo en su resurrección ¡Alelú, aleluya! (¡Aleluya!)
             Asegura nuestra fe ¡Alelú, aleluya! (¡Aleluya!)
             Y eterna salvación. ¡Alelú, aleluya! (¡Aleluya!)
    - number: 218
      title: ¡Resucitó, Resucitó!
      verses:
        - |-
          1. ¡Resucitó, resucitó!
             ¡Aleluya, aleluya, resucitó!
             La muerte, ¿dónde está tu aguijón?
             ¡Aleluya, aleluya, resucitó!
        - |-
          2. Cristo ha vencido, ¡gloria al Señor!
             ¡Aleluya, aleluya, resucitó!
             El es el Rey, el Vencedor.
             ¡Aleluya, aleluya, resucitó!
    - number: 219
      title: Resucitó Jesús el Señor
      verses:
        - |-
          1. ¡Aleluya! ¡Aleluya! ¡Aleluya!
             Resucitó Jesús el Señor,
             de infierno y muerte es vencedor;
             Suenen pues himnos en su loor. ¡Aleluya!
        - |-
          2. Huyen las sombras y el dolor;
             deja la tumba el Salvador;
             Démosle gloria y todo honor. ¡Aleluya!
        - |-
          3. Por sus heridas el Redentor
             nos libra hoy de pena y temor;
             El del sepulcro es conquistador. ¡Aleluya!
        - |-
          4. Nuestro rescate Cristo pagó;
             al cielo entrada él nos abrió;
             Su gracia libre nos concedió. ¡Aleluya!
        - |-
          5. Suenen pues himnos en su loor,
             y celebremos su gran amor:
             ¡Cristo ha triunfado!
             ¡Gloria al Señor!
             ¡Aleluya! Amén.
    - number: 220
      title: A ti la gloria
      verses:
        - |-
          1. A ti la gloria ¡oh nuestro Señor!
             A ti la victoria, gran Libertador.
             Te alzaste pujante, lleno de poder,
             Más que el sol radiante al amanecer.
        - |-
          CORO
            A ti la gloria ¡oh nuestro Señor!
            A ti la victoria, gran Libertador.
        - |-
          2. Gozo, alegría, reinen por doquier,
             Porque Cristo hoy día muestra su poder;
             Angeles cantando himnos al Señor
             Vanle aclamando como vencedor.
        - |-
          CORO
            A ti la gloria ¡oh nuestro Señor!
            A ti la victoria, gran Libertador.
        - |-
          3. Libre de penas, nuestro rey Jesús
             Rompe las cadenas de la esclavitud.
             ¡Ha resucitado, ya no morirá!
             Quien muera al pecado en Dios vivirá.
        - |-
          CORO
            A ti la gloria ¡oh nuestro Señor!
            A ti la victoria, gran Libertador.
    - number: 221
      title: Jesús venció la muerte
      verses:
        - |-
          1. A Jesús crucificado lo llevaron al jardín;
             A Jesús lo han sepultado entre flores de jazmín.
             A Jesús lo han sepultado entre flores de jazmín.
        - |-
          2. Vino un ángel al sepulcro y la piedra le quitó;
             Y Jesús venció la muerte, el Señor resucitó.
             Y Jesús venció la muerte, el Señor resucitó.
        - |-
          3. Alegres las aves cantan, perfuman las flores ya;
             Porque vive el bien amado, Jesús resucitado ha.
             Porque vive el bien amado, Jesús resucitado ha.
        - |-
          4. Oh Jesús resucitado, te adoramos con amor;
             Príncipe de nuestras almas sé tú, oh buen Salvador.
             Príncipe de nuestras almas sé tú, oh buen Salvador.
        - |-
          5. Alegres hoy te cantamos, te amamos, oh buen Señor.
             Gloria a Dios por la victoria del poderoso Salvador.
             Gloria a Dios por la victoria del poderoso Salvador.
    - number: 222
      title: Porque él vive
      verses:
        - |-
          1. Dios nos envió a su Hijo Cristo;
             El es amor, paz y perdón.
             Por mí murió en el Calvario,
             Mas de la tumba con poder resucitó.
        - |-
          CORO
            Porque él vive no temo el mañana;
            Porque él vive seguro estoy,
            Porque yo sé, yo sé que el futuro es suyo
            Y que la vida vale, porque él vive hoy.
        - |-
          2. Grato es tener a un tierno niño,
             Precioso don que Dios nos da.
             Cuánto mejor cuando él recibe
             Al Salvador, y vida eterna gozará.
        - |-
          CORO
            Porque él vive no temo el mañana;
            Porque él vive seguro estoy,
            Porque yo sé, yo sé que el futuro es suyo
            Y que la vida vale, porque él vive hoy.
        - |-
          3. Se acabará mi vida un día;
             Enfrentaré muerte y dolor.
             Mas a Jesús veré en la gloria,
             Y reinaré con mi triunfante Salvador.
        - |-
          CORO
            Porque él vive no temo el mañana;
            Porque él vive seguro estoy,
            Porque yo sé, yo sé que el futuro es suyo
            Y que la vida vale, porque él vive hoy.
    - number: 223
      title: Glorificaremos al Señor
      verses:
        - |-
          1. Glorificaremos al Señor,
             por su muerte en la cruz;
             De la tumba él se levantó,
             ¡Gloria al Salvador Jesús!
        - |-
          2. Por cuarenta días regresó;
             a los suyos se mostró.
             A sus seguidores dio la paz
             y en las nubes ascendió.
        - |-
          3. Vive victorioso nuestro Rey,
             exaltado Redentor.
             En el cielo reina en majestad,
             el glorioso Salvador.
        - |-
          4. Aleluya a Cristo el Señor,
             al Cordero, nuestra Luz,
             El Mesías vive, el "Yo soy";
             Rey de reyes es Jesús.
    - number: 224
      title: Al Cristo vivo sirvo
      verses:
        - |-
          1. Al Cristo vivo sirvo y él en el mundo está;
             Aunque otros lo negaren, yo sé que él vive ya.
             Su mano tierna veo, su voz consuelo da,
             Y cuando yo le llamo, muy cerca está.
        - |-
          CORO
            El vive, (él vive,) él vive, (él vive,)
            Hoy vive el Salvador;
            conmigo está y me guardará
            mi amante Redentor.
            El vive, (él vive,) él vive, (él vive,)
            Me imparte salvación;
            sé que él viviendo está porque
            vive en mi corazón.
        - |-
          2. En todo el mundo entero contemplo yo su amor,
             Y al sentirme triste, consuélame el Señor;
             Seguro estoy que Cristo mi vida guiando está,
             Y que otra vez al mundo regresará.
        - |-
          CORO
            El vive, (él vive,) él vive, (él vive,)
            Hoy vive el Salvador;
            conmigo está y me guardará
            mi amante Redentor.
            El vive, (él vive,) él vive, (él vive,)
            Me imparte salvación;
            sé que él viviendo está porque
            vive en mi corazón.
        - |-
          3. Regocijad, cristianos, hoy himnos entonad;
             Eternas aleluyas a Cristo el Rey cantad.
             Ayuda y esperanza es del mundo pecador;
             No hay otro tan amante como el Señor.
        - |-
          CORO
            El vive, (él vive,) él vive, (él vive,)
            Hoy vive el Salvador;
            conmigo está y me guardará
            mi amante Redentor.
            El vive, (él vive,) él vive, (él vive,)
            Me imparte salvación;
            sé que él viviendo está porque
            vive en mi corazón.
    - number: 225
      title: Cristo Resucitado
      verses:
        - |-
          1. En la misma hora se levantaron y se volvieron
             a Jerusalén. Hallaron reunidos a los once y
             a los que estaban con ellos, quienes decían:
        - |-
          2. '¡Verdaderamente el Señor ha resucitado
             y ha aparecido a Simón!
        - |-
          3. Mientras hablaban estas cosas, Jesús se
             puso en medio de ellos y les dijo:
        - |-
          4. 'Paz a vosotros...Mirad mis manos y mis
             pies, que yo mismo soy. Palpad y ved, pues
             un espíritu no tiene carne ni huesos como
             veis que yo tengo.
        - |-
          5. Entonces les abrió el entendimiento para que
             comprendiesen las Escrituras, y les dijo:
        - |-
          6. 'Así está escrito, y así fue necesario que
             el Cristo padeciese y resucitase
             de los muertos al tercer día.
        - |-
          7. Entonces él los llevó fuera hasta Betania,
             y alzando sus manos les bendijo.
        - |-
          8. Aconteció que al bendecirlos, se fue
             de ellos, y era llevado arriba al cielo.
    - number: 226
      title: Rey Exaltado
      verses:
        - |-
          1. Rey exaltado en gloria
             es Cristo Jesús y le alabo.
             Rey exaltado por siempre
             es Cristo y yo le alabaré.
             (alabaré.)
        - |-
          2. El es Señor,
             por siempre él reinará;
             La creación su nombre proclamará.
             Rey exaltado en gloria
             es Cristo Jesús.
    - number: 227
      title: ¡Victoria, Victoria!
      verses:
        - |-
          1. ¡Victoria! ¡Victoria! Cantemos la gloria del Rey
             poderoso que resucitó. Quedó abolido
             el poder de la muerte:
             El fuerte vencido por uno más fuerte;
             Satán derrotado y Jesús vencedor.
        - |-
          2. El Crucificado, por Dios coronado,
             Es Rey soberano, glorioso Señor;
             Daránle honores, dominio y grandeza;
             Reconocerán su eterna realeza,
             Pues digno es Cristo de todo loor.
        - |-
          3. Corona celeste adorna su frente,
             los ángeles todos le rinden honor.
             Ya pronto el cetro terreste empuñando,
             Cual rey le veremos en paz dominando,
             En cielos y tierra triunfante Señor.
    - number: 228
      title: Venid, Adoremos
      verses:
        - |-
          1. Venid, adoremos,
             venid, adoremos; venid, adoremos
             a Cristo el Señor.
        - |-
          2. Jesús, tú eres digno,
             Jesús, tú eres digno; Jesús, tú eres digno
             de todo honor.
        - |-
          3. A ti daremos gloria,
             a ti daremos gloria; a ti daremos gloria
             por siempre, Señor.
    - number: 229
      title: Hoy en gloria celestial
      verses:
        - |-
          1. Hoy en gloria celestial,
             reina vivo e inmortal
             Cristo que la cruz sufrió;
             con poder se levantó.
             Su gloriosa majestad,
             cante, pues, la cristiandad.
        - |-
          2. Muerte y tumba ya venció
             el que al polvo se humilló;
             Su poder y gran virtud
             cautivó la esclavitud.
             Su gloriosa majestad,
             cante, pues, la cristiandad.
        - |-
          3. A los cielos ascendió;
             por su amor nos redimió;
             Cristo el victorioso Rey
             intercede por su grey.
             Su gloriosa majestad,
             cante, pues, la cristiandad.
    - number: 230
      title: Yo vivo, Señor
      verses:
        - |-
          1. Yo vivo, Señor, porque tú vives;
             Porque tú vives, Señor, es que yo vivo.
             Me das consuelo, me das abrigo,
             Y en la aflicción, mi Señor, estás conmigo.
        - |-
          2. Soy salvo, Señor, pues me salvaste,
             Pues me salvaste, Señor, eternamente.
             Yo voy al cielo, voy a la gloria,
             Porque, Señor, tú me diste la victoria.
    - number: 231
      title: Alabad a Cristo
      verses:
        - |-
          1. Alabad a Cristo,
             alabad a Cristo;
             Roca es, mi refugio;
             es mi Libertador,
             En él confiaré;
             alabad a Cristo.
    - number: 232
      title: Cordero
      verses:
        - |-
          1. Cordero, que bajaste del cielo
             a morir en la cruz
             para darme la luz y tu gran salvación,
             Vertiste sangre inmaculada
             con la cual mi maldad,
             al morir en la cruz, la borraste, Jesús.
        - |-
          CORO
            Hoy yo te alabo, Señor,
            con todo mi corazón,
            Cordero, porque eres mi Dios
            y mi buen Salvador que moriste por mí.
        - |-
          2. Tú eres el que diste a mi vida
             esa paz sin igual,
             que en el mundo falaz, no la pude encontrar.
             Por eso mi alma alegre te canta,
             disfrutando el amor
             que en la cruz de dolor me extendiste, Jesús.
        - |-
          CORO
            Hoy yo te alabo, Señor,
            con todo mi corazón,
            Cordero, porque eres mi Dios
            y mi buen Salvador que moriste por mí.
    - number: 233
      title: Digno Eres
      verses:
        - |-
          1. Digno eres, digno eres, digno eres, Señor,
             Digno de gloria, gloria y honra,
             gloria y honra y poder.
             Pues todas las cosas por ti fueron hechas,
             existen por tu voluntad; Todo lo creaste
             para tu gloria, ¡Digno eres, Señor!
        - |-
          2. Digno eres, digno eres, digno eres, Señor,
             de la riqueza, la fortaleza,
             de alabanza y honor.
             Pues fuiste inmolado por nuestro pecado,
             moriste en nuestro lugar; Y con tu sangre
             nos redimiste, ¡Digno eres, Señor!
    - number: 234
      title: Digno es el Cordero
      verses:
        - |-
          1. Digno es el Cordero que inmolado fue
             De tomar el reino, honra, gloria y prez;
             Para abrir el libro nadie se encontró;
             El fue sólo digno: ¡Cante nuestra voz!
        - |-
          CORO
            A Jesús loor, a Jesús loor,
            A Jesús loor, porque él es digno;
            A Jesús loor, a Jesús loor, a Jesús loor,
            porque él es digno.
        - |-
          2. Digno es el Cordero que en la cruz murió
             Por llevar el mundo cerca de su Dios;
             Y donde reinaba densa oscuridad,
             El la luz del cielo vino a derramar.
        - |-
          CORO
            A Jesús loor, a Jesús loor,
            A Jesús loor, porque él es digno;
            A Jesús loor, a Jesús loor, a Jesús loor,
            porque él es digno.
        - |-
          3. Digno es el Cordero, canten voces mil,
             Que la humana raza vino a redimir;
             Digno es el Cordero: ¡Salvación a él!
             Y al que está en el trono, hoy y siempre ¡Amén!
        - |-
          CORO
            A Jesús loor, a Jesús loor,
            A Jesús loor, porque él es digno;
            A Jesús loor, a Jesús loor, a Jesús loor,
            porque él es digno.
    - number: 235
      title: A Cristo coronad
      verses:
        - |-
          1. A Cristo coronad, divino Salvador;
             Sentado en alta majestad es digno de loor;
             Al Rey de gloria y paz loores tributad,
             Y bendecid al Inmortal por toda eternidad.
        - |-
          2. A Cristo coronad, Señor de nuestro amor;
             Al Rey triunfante celebrad, glorioso vencedor;
             Potente Rey de paz, el triunfo consumó,
             Y por su muerte de dolor su grande amor mostró.
        - |-
          3. A Cristo coronad, Señor de vida y luz;
             Con alabanzas proclamad los triunfos de la cruz;
             A él solo adorad, Señor de salvación;
             Loor eterno tributad de todo corazón.
    - number: 236
      title: Cristo, Jesucristo
      verses:
        - |-
          1. Cristo, Jesucristo
             maravilloso es Jesús,
             Su rostro brilla más que el sol;
             Más hermoso es Cristo
             que el lirio de los valles,
             Y dulce, más dulce que la miel.
        - |-
          2. Cual es la rosa de Sarón,
             así tan bello es él,
             Y le amo, sí, de corazón.
             Más hermoso es Cristo
             que el lirio de los valles,
             Y dulce, más dulce que la miel.
    - number: 237
      title: Cariñoso Salvador
      verses:
        - |-
          1. Cariñoso Salvador, huyo de la tempestad
             A tu seno protector, fiándome de tu bondad.
             Sálvame, Señor Jesús, de las olas del turbión:
             Hasta el puerto de salud,
             guía tú mi embarcación.
        - |-
          2. Otro asilo ¿dónde hallar? indefenso acudo a ti;
             Sólo pude desmayar, porque mi peligro vi.
             Solamente tú, Señor, puedes dar consuelo y luz;
             Vengo lleno de temor a los pies de mi Jesús.
        - |-
          3. Cristo, encuentro todo en ti,
             y no necesito más;
             Débil, me pusiste en pie, triste, ánimo me das.
             Al enfermo das salud; guías tierno al que no ve;
             Con amor y gratitud tu bondad ensalzaré. Amén.
    - number: 238
      title: Al Señor Jesús loemos
      verses:
        - |-
          1. Al Señor Jesús loemos,
             porque tanto le debemos;
             Lo que somos y tenemos,
             sólo es nuestro en él.
        - |-
          2. Es Jesús su nombre amado;
             a su pueblo él ha salvado;
             Es el triunfo asegurado
             por su gran poder.
        - |-
          3. ¡Oh, confiad en este amigo!
             nos liberta del peligro,
             Nos es hoy un fuerte abrigo
             y hasta el fin será.
        - |-
          4. Cumpliráse nuestro anhelo,
             en el día en que sin velo
             Le veremos en el cielo
             al Señor Jesús.
    - number: 239
      title: Por los siglos de los siglos
      verses:
        - |-
          1. Yo Juan,... estaba en la isla llamada Patmos
             por causa de la palabra de Dios y del testimonio
             de Jesús.
        - |-
          2. Y..., vi siete candeleros de oro, y en medio
             de los candeleros vi a uno semejante al
             Hijo del Hombre,
        - |-
          3. Vestido con una vestidura que le llegaba hasta
             los pies y tenía el pecho ceñido con un cinto de oro.
        - |-
          4. Su cabeza y sus cabellos eran blancos como la
             lana blanca, como la nieve, y sus ojos eran
             como llama de fuego.
        - |-
          5. Sus pies eran semejantes al bronce bruñido, ardiente
             como en un horno. Su voz era como el estruendo
             de muchas aguas.
        - |-
          6. Tenía en su mano derecha siete estrellas, y de su
             boca salía una espada aguda de dos filos.
        - |-
          7. Su rostro era como el sol cuando resplandece en su
             fuerza.
        - |-
          8. Cuando le vi, caí como muerto a sus pies. Y puso
             sobre mí su mano derecha, y me dijo:
        - |-
          9. 'No temas. Yo soy el primero y el último, el que vive.
             Estuve muerto, y he aquí que vivo por los siglos
             de los siglos.
    - number: 240
      title: Coronadle
      verses:
        - |-
          1. Ved al Cristo, Rey de gloria,
             es del mundo el vencedor;
             De la guerra vuelve invicto, todos deben dar loor.
        - |-
          CORO
            Coronadle, santos todos;
            coronadle Rey de reyes;
            Coronadle, santos todos; coronad al Salvador.
        - |-
          2. Exaltadle, exaltadle,
             ricos triunfos trae Jesús;
             Entronadle en los cielos,en la refulgente luz.
        - |-
          CORO
            Coronadle, santos todos;
            coronadle Rey de reyes;
            Coronadle, santos todos; coronad al Salvador.
        - |-
          3. Pecadores se burlaron,
             coronando al Salvador;
             Angeles y santos danle su riquísimo amor.
        - |-
          CORO
            Coronadle, santos todos;
            coronadle Rey de reyes;
            Coronadle, santos todos; coronad al Salvador.
        - |-
          4. Escuchad las alabanzas
             que se elevan hacia él;
             Victorioso reina el Cristo; adorad a Emanuel.
        - |-
          CORO
            Coronadle, santos todos;
            coronadle Rey de reyes;
            Coronadle, santos todos; coronad al Salvador.
    - number: 241
      title: Loores dad a Cristo el Rey
      verses:
        - |-
          1. Loores dad a Cristo el Rey,
             suprema potestad;
             De su divino amor la ley postrados aceptad;
             De su divino amor la ley postrados aceptad.
        - |-
          2. Vosotros, hijos de Israel, ovejas de la grey;
             Loores dad a Emanuel y proclamadle Rey;
             Loores dad a Emanuel y proclamadle Rey.
        - |-
          3. Gentiles que por su perdón
             gozáis de libertad,
             Al que de la condenación os libra, hoy load;
             Al que de la condenación os libra, hoy load.
        - |-
          4. Naciones todas, escuchad y obedeced su ley
             De gracia y de santidad, y proclamadle Rey;
             De gracia y de santidad, y proclamadle Rey.
        - |-
          5. Con la celeste multitud del trono en derredor,
             Alzad canción de gratitud a Cristo el Salvador;
             Alzad canción de gratitud a Cristo el Salvador.
    - number: 242
      title: Gloria a Cristo
      verses:
        - |-
          1. Gloria a Cristo,
             gloria a Emanuel;
             Rey de reyes y Señor
             de los señores;
             Y por siempre cantaré
             tus alabanzas;
             Te adoraré por la eternidad.
    - number: 243
      title: Jesús es mi Rey soberano
      verses:
        - |-
          1. Jesús es mi Rey soberano,
             Mi gozo es cantar su loor;
             Es Rey, y me ve cual hermano,
             Es Rey y me imparte su amor.
             Dejando su trono de gloria,
             Me vino a sacar de la escoria,
             Y yo soy feliz, y yo soy feliz por él.
        - |-
          2. Jesús es mi amigo anhelado,
             Y en sombras o en luz siempre va
             Paciente y humilde a mi lado;
             Ayuda y socorro me da. Por eso constante lo sigo,
             Porque él es mi Rey y mi amigo,
             Y yo soy feliz, y yo soy feliz por él.
        - |-
          3. Señor, ¿qué pudiera yo darte
             Por tanta bondad para mí?
             ¿Me basta servirte y amarte?
             ¿Es todo entregarme yo a ti?
             Entonces, acepta mi vida, que a ti solo queda rendida,
             Pues yo soy feliz, pues yo soy feliz por ti.
    - number: 244
      title: Glorioso Cristo
      verses:
        - |-
          1. Glorioso Cristo, Rey de lo creado,
             Hombre y Dios, te doy loor;
             Quiero amarte, mi dulce amigo, corona mía y Salvador.
        - |-
          2. Bello es el campo, más aún los bosques
             En la estación primaveral; Cristo es más bello,
             Cristo es más puro, que al alma triste gozo da.
        - |-
          3. Bella es la luna, es el sol más bello, y las estrellas,
             sin igual; Pero el Cristo es quien más brilla
             En todo el Reino celestial.
        - |-
          4. Bellas las flores, bello es el hombre
             en su lozana juventud; Mas su belleza
             pronto perece, sólo es eterna en Jesús.
        - |-
          5. De tierra y cielo toda la hermosura
             se muestra en Cristo, mi Señor;
             Nadie merece cual Jesucristo
             nuestra alabanza y nuestro amor.
             Amén.
    - number: 245
      title: ¡Oh, cuánto le amo!
      verses:
        - |-
          1. Es Cristo quien por mí murió, mis culpas por borrar;
             Dolor y penas él sufrió, mi alma por salvar.
        - |-
          CORO
            ¡Oh, cuánto le amo! ¡Oh, cuánto le amo!
            ¡Oh, cuánto le amo! Porque él murió por mí.
        - |-
          2. Jesús el nombre sin igual, precioso es para mí;
             Cual grata nota musical resuena en mi oír.
        - |-
          CORO
            ¡Oh, cuánto le amo! ¡Oh, cuánto le amo!
            ¡Oh, cuánto le amo! Porque él murió por mí.
        - |-
          3. Con Cristo yo seguro estoy, me da perfecta paz;
             Conmigo va, pues suyo soy; no temeré jamás.
        - |-
          CORO
            ¡Oh, cuánto le amo! ¡Oh, cuánto le amo!
            ¡Oh, cuánto le amo! Porque él murió por mí.
        - |-
          4. En horas tristes de dolor consuelo da Jesús;
             Me ofrece fuerzas y valor, me guía en su luz.
        - |-
          CORO
            ¡Oh, cuánto le amo! ¡Oh, cuánto le amo!
            ¡Oh, cuánto le amo! Porque él murió por mí.
    - number: 246
      title: Cristo, maravilloso eres tú
      verses:
        - |-
          1. Cristo, maravilloso eres tú;
             Eres tan bueno, tan lleno de amor;
             Brillas como brilla el sol;
             Cristo, maravilloso eres tú.
    - number: 247
      title: En momentos así
      verses:
        - |-
          1. En momentos así levanto mi voz,
             Levanto mi canto a Cristo;
             En momentos así levanto mi ser,
             Levanto mi alma a él.
        - |-
          2. Cuánto te amo, Dios, cuánto te amo, Dios;
             Cuánto te amo, Dios, te amo.
    - number: 248
      title: "REFLEXION: El Espíritu Santo, mi Consolador"
      verses:
        - |-
          1. Espíritu de Dios, ¡cuán maravilloso eres!
             Desde la eternidad existes con el Padre y el Hijo,
             con quienes creaste el mundo.
        - |-
          2. Es por obra tuya también que yo soy una
             nueva creación. Tú me convenciste de mi pecado
             y me llevaste a la fe en Cristo. Me diste nueva
             vida e hiciste tu morada en mí. Eres el sello que
             garantiza mi redención final.
        - |-
          3. Hoy eres mi Guía y Consolador. Me ayudas
             a entender la Biblia, la que tú mismo inspiraste.
        - |-
          4. Te entristeces por mi desobediencia; señalas mis
             errores y me impulsas a confesarlos. Me das poder
             para vencer la tentación y el pecado.
        - |-
          5. Cultivas en el huerto de mi vida el fruto
             que te agrada. Utilizas para beneficio de tu
             iglesia las habilidades con las cuales
             me has capacitado.
        - |-
          6. ¡Qué privilegio es tenerte como mi Ayudador!
             Cuando me someto a tu control, mi corazón rebosa
             con melodías de alabanza y gratitud a Dios.
    - number: 249
      title: Himno al Espíritu Santo
      verses:
        - |-
          1. Santo Espíritu, excelsa paloma,
             inmutable ser del trino Dios,
             Mensajero de paz que procedes del Padre,
             hoy consuélanos con suave voz.
             Tu fragancia y llenura anhelamos;
             embalsama tu templo, tu altar;
             Y la sombra feliz de tus alas de gracia
             Nos cobije, ¡oh Amigo sin par!
        - |-
          2. Santo Espíritu, fuego celeste,
             en el día de Pentecostés
             Cual la nube de gloria, bajaste a la Iglesia
             como al templo de Sion otra vez.
             Para el nuevo cristiano eres sello;
             cada uno de ti tiene un don;
             Todo hijo de Dios elegido es y goza
             ya las arras de tu salvación.
        - |-
          3. Santo Espíritu, aceite bendito,
             cual producto del verde olivar,
             Luminaria y calor en la tienda sagrada
             Donde Aarón se acercaba a adorar;
             Agua viva y regeneradora,
             santifícanos contra el mal; somos uno en Jesús
             los creyentes del mundo por tu santa labor bautismal.
        - |-
          4. Santo Espíritu, viento potente,
             fuente y fuerza de paz y amor,
             Paracleto veraz que consuelo nos brinda
             Y aboga a nuestro favor;
             Séanos luz que ilumine la Biblia,
             nuestros pies dirigiendo al andar;
             Hoy rendimos a ti
             nuestras almas ansiosas;
             Sólo ungidos podremos triunfar.
             Amén.
    - number: 250
      title: El divino Consolador
      verses:
        - |-
          1. Yo rogaré al Padre, y os daré otro Consolador, para
             que esté con vosotros para siempre:
        - |-
          2. El Espíritu de verdad, al cual el mundo no puede
             recibir, porque no le ve, ni le conoce;
        - |-
          3. Pero vosotros le conocéis, porque mora con vosotros,
             y estará en vosotros.
        - |-
          4. Mas el Consolador, el Espíritu Santo, a quien
             el Padre enviará en mi nombre, él os enseñará
             todas las cosas.
        - |-
          5. Cuando venga el Consolador, a quien yo os enviaré
             del Padre, el Espíritu de verdad, el cual procede del
             Padre, él dará testimonio acerca de mí.
        - |-
          6. Y si el Espíritu de aquel que levantó de los
             muertos a Jesús mora en vosotros,
        - |-
          7. El que levantó de los muertos a Cristo Jesús
             vivificará también vuestros cuerpos mortales
             por su Espíritu que mora en vosotros.
        - |-
          8. Porque el Señor es el Espíritu; y donde está el
             Espíritu del Señor, allí hay libertad.
        - |-
          9. Por tanto, nosotros todos, mirando a cara descubierta
             como en un espejo la gloria del Señor,
        - |-
          10. Somos transformados de gloria en gloria
              en la misma imagen, como por el Espíritu del
              Señor.
    - number: 251
      title: Lluvias de gracia
      verses:
        - |-
          1. Dios nos ha dado promesa:
             lluvias de gracia enviaré,
             Dones que os den fortaleza; gran bendición os daré.
        - |-
          CORO
            Lluvias (lluvias) de gracia,
            lluvias pedimos, Señor;
            Mándanos lluvias copiosas, lluvias del Consolador.
        - |-
          2. Cristo nos dio la promesa
             del Santo Consolador,
             Dándonos paz y pureza, para su gloria y honor.
        - |-
          CORO
            Lluvias (lluvias) de gracia,
            lluvias pedimos, Señor;
            Mándanos lluvias copiosas, lluvias del Consolador.
        - |-
          3. ¡Oh Dios, a todo creyente
             muestra tu amor y poder!
             Tú eres de gracia la fuente; llena de paz nuestro ser.
        - |-
          CORO
            Lluvias (lluvias) de gracia,
            lluvias pedimos, Señor;
            Mándanos lluvias copiosas, lluvias del Consolador.
        - |-
          4. Obra en tus siervos piadosos
             celo, virtud y valor,
             Dándonos dones preciosos,
             dones del Consolador.
        - |-
          CORO
            Lluvias (lluvias) de gracia,
            lluvias pedimos, Señor;
            Mándanos lluvias copiosas, lluvias del Consolador.
    - number: 252
      title: Fuisteis sellados
      verses:
        - |-
          1. Habiendo oído la palabra de verdad,
             El evangelio que nos da la salvación;
             También habiendo creído en Cristo,
             En Jesucristo que da la redención;
        - |-
          2. Fuisteis sellados, sellados
             con el Espíritu,
             Con el Espíritu de la promesa;
             Fuisteis sellados, sellados
             con el Espíritu,
             Con el Espíritu Santo de Dios.
    - number: 253
      title: El fiel Consolador
      verses:
        - |-
          1. Doquier el hombre está, la nueva proclamad;
             Doquier haya aflicción, miserias y dolor,
             Cristianos, anunciad que el Padre nos envió
             Al fiel Consolador.
        - |-
          CORO
            El fiel Consolador, el fiel Consolador
            Que Dios nos prometió, al mundo descendió.
            Doquier el hombre está, decid que vino ya
            El fiel Consolador.
        - |-
          2. La noche ya pasó, y al fin brilló la luz
             Que vino a disipar las sombras del terror;
             Así del alma fue aurora celestial,
             El fiel Consolador.
        - |-
          CORO
            El fiel Consolador, el fiel Consolador
            Que Dios nos prometió, al mundo descendió.
            Doquier el hombre está, decid que vino ya
            El fiel Consolador.
        - |-
          3. El es quien da salud y plena libertad,
             A los que encadenó el fiero tentador;
             Los rotos hierros, hoy dirán que vino ya
             El fiel Consolador.
        - |-
          CORO
            El fiel Consolador, el fiel Consolador
            Que Dios nos prometió, al mundo descendió.
            Doquier el hombre está, decid que vino ya
            El fiel Consolador.
        - |-
          4. ¡Oh, grande, eterno amor! Mi lengua débil es
             Para poder hablar del don que recibí,
             Al renovar en mí la imagen celestial,
             El fiel Consolador.
        - |-
          CORO
            El fiel Consolador, el fiel Consolador
            Que Dios nos prometió, al mundo descendió.
            Doquier el hombre está, decid que vino ya
            El fiel Consolador.
    - number: 254
      title: Sed llenos, hermanos
      verses:
        - |-
          1. Sed llenos, hermanos,
             del Santo Espíritu,
             Hablando entre vosotros,
             mandó el Salvador,
             Con salmos e himnos y cánticos,
             Cantando y alabando al Señor.
    - number: 255
      title: En un aposento alto
      verses:
        - |-
          1. En un aposento alto, con unánime fervor,
             Ciento veinte esperaban
             La promesa del Señor.
        - |-
          CORO
            Dios, manda tu gran poder,
            Dios, manda tu gran poder,
            Dios, manda tu gran poder a cada corazón.
        - |-
          2. Con estruendo de los cielos
             Descendió en plenitud;
             Todos fueron bautizados Con el Santo Espíritu.
        - |-
          CORO
            Dios, manda tu gran poder,
            Dios, manda tu gran poder,
            Dios, manda tu gran poder a cada corazón.
        - |-
          3. Desde aquel feliz momento
             Mora el Consolador
             En el corazón creyente, Dando dones, paz y amor.
        - |-
          CORO
            Dios, manda tu gran poder,
            Dios, manda tu gran poder,
            Dios, manda tu gran poder a cada corazón.
        - |-
          4. El Espíritu de Cristo
             Hoy nos llena de poder
             Para ser testigos fieles, Predicando por doquier.
        - |-
          ULTIMO CORO
            Oh, Santo Espíritu, bendito celeste don,
            Divino Consolador, reina en mi corazón.
    - number: 256
      title: Andad en el Espíritu
      verses:
        - |-
          1. Mirad, pues, con cuidado, cómo os comportáis;
             no como imprudentes sino como prudentes.
        - |-
          2. Andad en el Espíritu, y así jamás satisfaréis
             los malos deseos de la carne.
        - |-
          3. ¿O no sabéis que vuestro cuerpo es templo del
             Espíritu Santo, que mora en vosotros, el cual
             tenéis de Dios, y que no sois vuestros?
        - |-
          4. Pues habéis sido comprados por precio.
             Por tanto, glorificad a Dios en vuestro cuerpo.
    - number: 257
      title: Espíritu de Cristo
      verses:
        - |-
          1. Espíritu de Cristo, Lléname de tu amor,
             Para que en mí se refleje la imagen del Salvador.
        - |-
          CORO
            Llena, llena, lléname de tu amor;
            Entrego a ti mi vida para servirte, Señor.
        - |-
          2. Espíritu de Cristo, lléname de tu poder,
             Para que anuncie valiente la salvación por doquier.
        - |-
          CORO
            Llena, llena, lléname de tu amor;
            Entrego a ti mi vida para servirte, Señor.
        - |-
          3. Espíritu de Cristo, lléname de santo ardor,
             Para que haga fielmente la obra de mi Señor.
        - |-
          CORO
            Llena, llena, lléname de tu amor;
            Entrego a ti mi vida para servirte, Señor.
    - number: 258
      title: Santo Consolador
      verses:
        - |-
          1. Santo Consolador, aviva tú mi ser;
             Que lo que amas pueda amar, y tu voluntad hacer.
        - |-
          2. Santo Consolador, puro quisiera ser,
             Servirte siempre con fervor, y la tentación vencer.
        - |-
          3. Santo Consolador, dame tu santa unción;
             Mantén el fuego de tu amor ardiendo en mi corazón.
        - |-
          4. Santo Consolador, lléname de virtud;
             Vida del cielo gozaré andando en tu plenitud.
    - number: 259
      title: Espíritu del Trino Dios
      verses:
        - |-
          1. Espíritu del Trino Dios,
             llena mi ser;
             Espíritu del Trino Dios,
             llena mi ser.
             Quebrántame, consúmeme,
             Transfórmame y úsame,
             Espíritu del Trino Dios,
             llena mi ser.
    - number: 260
      title: Transfórmame, Espíritu
      verses:
        - |-
          1. Transfórmame, Espíritu de Dios;
             líbrame de la ambición carnal;
             Renueva tú mi débil corazón,
             y haz que te ame como debo amar.
        - |-
          2. No pido sueños, celestial visión,
             Ni roto el velo del misterio ver,
             ni querubines, ni eternal mansión;
             Sólo que limpies, oh Señor, mi ser.
        - |-
          3. Hazme sensible a tu dirección;
             quiero vencer el mal con decisión;
             Calla la duda, la murmuración;
             dame constancia en la oración.
        - |-
          4. Quiero amarte, oh Señor, mi Dios;
             mi mente, alma y corazón te doy;
             Veo la cruz do Cristo padeció,
             y me consagro a tu servicio hoy.
    - number: 261
      title: Guiados por el Espíritu
      verses:
        - |-
          1. Pero cuando venga el Espíritu de verdad,
             él os guiará a toda la verdad;
        - |-
          2. El me glorificará; porque tomará
             de lo mío, y os lo hará saber.
        - |-
          3. Porque todos los que son guiados por el
             Espíritu de Dios, éstos son hijos de Dios.
        - |-
          4. Pues no habéis recibido el espíritu de
             esclavitud para estar otra vez en temor,
        - |-
          5. Sino que habéis recibido el espíritu de
             adopción, por el cual clamamos: ¡Abba, Padre!
        - |-
          6. El Espíritu mismo da testimonio nuestro
             espíritu, de que somos hijos de Dios.
        - |-
          7. Pero si sois guiados por el Espíritu, no estáis
             bajo la ley.
        - |-
          8. Mas el fruto del Espíritu es amor, gozo,
             paz, paciencia, benignidad, bondad, fe,
        - |-
          9. Mansedumbre, templanza; contra tales cosas no hay ley.
        - |-
          10. Si vivimos por el Espíritu, andemos
              también por el Espíritu.
    - number: 262
      title: Divino Espíritu de Dios
      verses:
        - |-
          1. Divino Espíritu de Dios,
             enviado por Jesús,
             Del bien condúcenos en pos
             y alúmbrenos tu luz.
        - |-
          2. Haz comprender al corazón
             cuán grave es su maldad,
             Y danos el precioso don
             de andar en santidad.
        - |-
          3. Venza la fuerza de tu luz
             al fiero tentador
             Por Cristo, quien muriendo en cruz
             nuestro dolor sufrió.
        - |-
          4. Sé nuestro guía al transitar
             La senda que él trazó;
             Danos poder para triunfar,
             Siguiendo de él en pos.
    - number: 263
      title: Santo Espíritu, controla
      verses:
        - |-
          1. Santo Espíritu, controla
             mi errante corazón;
             Llena hoy de tu presencia esta humilde habitación.
        - |-
          CORO
            Llena hoy, llena hoy, lléname con tu poder;
            Tu amor y tu presencia llenen hoy mi humilde ser.
        - |-
          2. Débil soy, oh sí, muy débil;
             a tus pies postrado estoy,
             Esperando que tu gracia con poder me llene hoy.
        - |-
          CORO
            Llena hoy, llena hoy, lléname con tu poder;
            Tu amor y tu presencia llenen hoy mi humilde ser.
        - |-
          3. Santo Espíritu, tú eres
             ese prometido don;
             Quiero siempre obedecerte y gozar tu bendición.
        - |-
          CORO
            Llena hoy, llena hoy, lléname con tu poder;
            Tu amor y tu presencia llenen hoy mi humilde ser.
        - |-
          4. Oh, ayúdame, te pido,
             a vivir en santidad;
             Guíame en tus caminos, haz en mí tu voluntad.
        - |-
          CORO
            Llena hoy, llena hoy, lléname con tu poder;
            Tu amor y tu presencia llenen hoy mi humilde ser.
    - number: 264
      title: Oh, divino Espíritu
      verses:
        - |-
          1. Oh, divino Espíritu,
             templo puro quiero ser;
             Guía todo mi andar, para no caer.
        - |-
          2. Oh, divino Espíritu,
             comprensión tú me darás;
             Los mandatos de mi Dios clarificarás.
        - |-
          3. Oh, divino Espíritu,
             don de ti yo recibí;
             Usame con tu poder, ¡Gloria sea a ti!
    - number: 265
      title: El fruto del Espíritu
      verses:
        - |-
          1. El fruto del Espíritu
             es amor, gozo y paz;
             El fruto es paciencia,
             benignidad, bondad y fe;
             El fruto del Espíritu
             es mansedumbre y templanza;
             Vivamos por el Espíritu,
             y andemos siempre en él.
             Vivamos por el Espíritu,
             y andemos siempre en él.
    - number: 266
      title: Satúrame, Señor
      verses:
        - |-
          1. Satúrame, Señor, con tu Espíritu;
             Satúrame, Señor, con tu Espíritu,
             Y déjame sentir el fuego de tu amor
             Aquí en mi corazón, oh Dios.
        - |-
          2. Bendíceme, Señor, con tu Espíritu;
             Bendíceme, Señor, con tu Espíritu,
             Y déjame sentir el gozo de tu amor
             Momento tras momento, oh Dios.
        - |-
          3. Envíame, Señor, con tu Espíritu;
             Envíame, Señor, con tu Espíritu,
             Y déjame sentir tu corazón de amor
             Y al mundo proclamarlo, oh Dios.
    - number: 267
      title: Abre mis ojos
      verses:
        - |-
          1. Abre mis ojos a la luz; tu rostro quiero ver, Jesús;
             Pon en mi corazón tu bondad y dame paz y santidad.
             Humildemente acudo a ti, porque tu tierna voz oí;
             Mi guía sé, Espíritu Consolador.
        - |-
          2. Abre mi oído a tu verdad; Yo quiero oir con claridad
             Bellas palabras de dulce amor,
             ¡Oh mi bendito Salvador! Consagro a ti mi frágil ser;
             Tu voluntad yo quiero hacer.
             Llena mi ser, Espíritu Consolador.
        - |-
          3. Abre mis labios para hablar,
             Y a todo el mundo proclamar
             Que tú viniste a rescatar al más perdido pecador.
             La mies es mucha, ¡Oh, Señor! Obreros faltan de valor;
             Heme aquí, Espíritu Consolador.
        - |-
          4. Abre mi mente para ver más de tu amor y gran poder;
             Dame tu gracia para triunfar,
             y hazme en la lucha vencedor.
             Sé tú mi escondedero fiel, y aumenta mi valor y fe;
             Mi mano ten, Espíritu Consolador.
    - number: 268
      title: Lámpara es tu Palabra
      verses:
        - |-
          1. Lámpara es a mis pies tu palabra,
             Lámpara es a mis pies tu palabra,
             Lámpara es a mis pies tu palabra,
             Y lumbrera a mi camino.
        - |-
          2. La exposición de tus dichos alumbra,
             La exposición de tus dichos alumbra,
             La exposición de tus dichos alumbra,
             Y hace entender a los simples.
        - |-
          3. Y para siempre, oh Señor, permanece,
             Y para siempre, oh Señor, permanece,
             Y para siempre, oh Señor, permanece
             Tu palabra en los cielos.
    - number: 269
      title: Tu Palabra me habla
      verses:
        - |-
          1. Bendito tú, oh SEÑOR; enséñame tus estatutos.
        - |-
          2. Me he gozado en el camino de tus
             testimonios, más que en todas las riquezas.
        - |-
          3. Me deleitaré en tus estatutos, y no olvidaré tu palabra.
        - |-
          4. Abre mis ojos, para que vea las maravillas
             de tu ley.
        - |-
          5. Hazme entender el camino de tus preceptos,
             y meditaré en tus maravillas.
        - |-
          6. ¡Cuánto amo tu ley! Todo el día
             es ella mi meditación.
        - |-
          7. Escrito está: "No sólo de pan vivirá el hombre,
             Sino de toda palabra que sale de la boca de Dios".
        - |-
          8. Toda Escritura es inspirada por Dios y útil para
             enseñar, para reprender, para corregir, para instruir
             en justicia,
        - |-
          9. a fin de que el hombre de Dios sea perfecto,
             equipado para toda buena obra.
    - number: 270
      title: Santa Biblia
      verses:
        - |-
          1. Santa Biblia, para mí eres un tesoro aquí;
             Tú contienes con verdad la divina voluntad;
             Tú me dices lo que soy, de quién vine y a quién voy.
        - |-
          2. Tú reprendes mi dudar; tú me exhortas sin cesar;
             Eres faro que a mi pie va guiando por la fe
             A las fuentes del amor del bendito Salvador.
        - |-
          3. Eres infalible voz del Espíritu de Dios,
             Que vigor al alma da cuando en aflicción está;
             Tú me enseñas a triunfar de la muerte y el pecar.
        - |-
          4. Por tu santa letra sé que con Cristo reinaré;
             Yo que tan indigno soy, por tu luz al cielo voy;
             ¡Santa Biblia! para mí eres un tesoro aquí.
    - number: 271
      title: Los cielos anuncian tus obras
      verses:
        - |-
          1. Los cielos anuncian tus obras, Señor,
             La gloria y potencia de su Creador;
             El día y la noche levantan su voz,
             Y en toda la tierra alaban a Dios.
        - |-
          2. Oh Dios, tu palabra es fiel y veraz;
             A los que la guardan da gozo y paz.
             Tus leyes perfectas y límpidas son;
             Tu sabiduría dan al corazón.
        - |-
          3. Tus juicios excelsos son mucho mejor
             Que oro o joyas de grande valor;
             Aun miel que destila del rico panal
             No tiene dulzura que sea igual.
        - |-
          4. Que cada palabra que expresa mi voz,
             Las meditaciones de mi corazón,
             A ti sean gratas, te imploro, Señor,
             Mi Roca eterna y mi Redentor. Amén.
    - number: 272
      title: Cuán firme cimiento
      verses:
        - |-
          1. ¡Cuán firme cimiento se ha dado a la fe,
             De Dios en su eterna palabra de amor!
             ¿Qué más él pudiera en su libro añadir,
             Si todo a sus hijos lo ha dicho el Señor?
        - |-
          2. "No temas por nada, contigo yo soy;
             Tu Dios yo soy solo, tu ayuda seré;
             Tu fuerza y firmeza en mi diestra estarán,
             Y en ella sostén y poder te daré".
        - |-
          3. "La llama no puede dañarte jamás,
             Si en medio del fuego te ordeno pasar;
             El oro de tu alma más puro será,
             Pues sólo la escoria se habrá de quemar".
        - |-
          4. "No habrán de anegarte las ondas del mar,
             Si en aguas profundas te ordeno salir;
             Pues siempre contigo en angustia estaré,
             Y todas tus penas podré reducir".
        - |-
          5. "Al alma que anhele la paz que hay en mí,
             Jamás en sus luchas la habré de dejar;
             Si todo el infierno la quiere perder,
             ¡Yo nunca, no nunca, la puedo olvidar!"
    - number: 273
      title: Todas las promesas
      verses:
        - |-
          1. Todas las promesas del Señor Jesús
             Son apoyo poderoso de mi fe;
             Mientras luche aquí buscando yo su luz,
             Siempre en sus promesas confiaré.
        - |-
          CORO
            Grandes, fieles,
            (Grandes, grandes, fieles son, grandes, grandes, fieles son,)
            Las promesas que el Señor Jesús ha dado;
            Grandes, fieles,
            (Grandes, grandes, fieles son, grandes, grandes, fieles son,)
            En ellas para siempre confiaré.
        - |-
          2. Todas las promesas para el hombre fiel,
             El Señor en sus bondades cumplirá,
             Y confiado sé que para siempre en él,
             Paz eterna mi alma gozará.
        - |-
          CORO
            Grandes, fieles,
            (Grandes, grandes, fieles son, grandes, grandes, fieles son,)
            Las promesas que el Señor Jesús ha dado;
            Grandes, fieles,
            (Grandes, grandes, fieles son, grandes, grandes, fieles son,)
            En ellas para siempre confiaré.
        - |-
          3. Todas las promesas del Señor serán
             Gozo y fuerza en nuestra vida terrenal;
             Ellas en la dura lid nos sostendrán,
             Y triunfar podremos sobre el mal.
        - |-
          CORO
            Grandes, fieles,
            (Grandes, grandes, fieles son, grandes, grandes, fieles son,)
            Las promesas que el Señor Jesús ha dado;
            Grandes, fieles,
            (Grandes, grandes, fieles son, grandes, grandes, fieles son,)
            En ellas para siempre confiaré.
    - number: 274
      title: Dame de vida el pan
      verses:
        - |-
          1. Dame, mi buen Señor, de vida el pan,
             Como lo hiciste un día junto al mar;
             Mi alma te busca a ti, Verbo de Dios,
             Y en tu Palabra espero oír tu voz.
        - |-
          2. "El pan de vida soy", dice el Señor;
             Ven, alma hambrienta hoy al Salvador.
             "Hambre jamás tendrá quien viene a mí;
             Sed nunca más tendrá quien cree en mí".
        - |-
          3. Bendice, oh Salvador, hoy tu verdad,
             Cual bendijiste ayer el fresco pan;
             En ella nos darás la libertad,
             En ella encuentro gozo y solaz.
        - |-
          4. Con tu Espíritu toca mi ser,
             Y abre mis ojos tu verdad a ver.
             Muestra tu voluntad; dame tu luz;
             Quiero en tu Libro verte a ti, Jesús.
    - number: 275
      title: Nunca se apartará
      verses:
        - |-
          1. Nunca se apartará de tu boca
             este libro de la ley,
             Sino que de día y de noche tú meditarás en él;
             Para que guardes y hagas conforme
             A todo lo que en él está escrito;
             Porque entonces harás
             prosperar tu camino, Y todo te saldrá bien.
        - |-
          2. Nunca se apartará de tu boca
             Este libro de la ley,
             Sino que de día y de noche, tú meditarás en él.
    - number: 276
      title: Padre, tu Palabra
      verses:
        - |-
          1. Padre, tu Palabra es
             mi delicia y mi solaz;
             Guíe siempre aquí mis pies, y a mi alma traiga paz.
        - |-
          CORO
            Es tu ley, Señor, faro celestial,
            Que en perenne resplandor,
            Norte y guía da al mortal.
        - |-
          2. Sí, obediente oí tu voz,
             En tu gracia fuerza hallé,
             Y con firme pie y veloz por tus sendas caminé.
        - |-
          CORO
            Es tu ley, Señor, faro celestial,
            Que en perenne resplandor,
            Norte y guía da al mortal.
        - |-
          3. Tu verdad es mi sostén
             Contra duda y tentación,
             Y destila calma y bien
             Cuando asalta la aflicción.
        - |-
          CORO
            Es tu ley, Señor, faro celestial,
            Que en perenne resplandor,
            Norte y guía da al mortal.
        - |-
          4. Son tus dichos, para mí,
             Prendas fieles de salud;
             Dame, pues, que te oiga a ti,
             Con filial solicitud.
        - |-
          CORO
            Es tu ley, Señor, faro celestial,
            Que en perenne resplandor,
            Norte y guía da al mortal.
    - number: 277
      title: Tu Palabra es mi cántico
      verses:
        - |-
          1. Tu Palabra es mi cántico; esperanza y gozo da;
             Es espada, arma divinal
             Y escudo contra el mal.
        - |-
          CORO
            Por la Santa Biblia te alabo,
            Padre amante, mi Señor;
            Te adoro, Cristo, Rey eterno; Gracias, oh Consolador.
        - |-
          2. Tu Palabra es mi lámpara, luz divina y guía fiel;
             Más deseable que oro y plata es,
             Y más dulce que la miel.
        - |-
          CORO
            Por la Santa Biblia te alabo,
            Padre amante, mi Señor;
            Te adoro, Cristo, Rey eterno; Gracias, oh Consolador.
        - |-
          3. Tu Palabra es mi gran mentor; es semilla, eterno don;
             Quiero siempre en ella meditar,
             Hallo allí la salvación.
        - |-
          CORO
            Por la Santa Biblia te alabo,
            Padre amante, mi Señor;
            Te adoro, Cristo, Rey eterno; Gracias, oh Consolador.
        - |-
          4. Tu Palabra trae libertad, me consuela en aflicción;
             Cual martillo, y espejo es;
             Fuego en el corazón.
        - |-
          CORO
            Por la Santa Biblia te alabo,
            Padre amante, mi Señor;
            Te adoro, Cristo, Rey eterno; Gracias, oh Consolador.
        - |-
          5. Tu Palabra es mi agua y pan; limpia el ser y fuerza da;
             Leche y carne encuentro yo allí
             Que mi alma sostendrá.
        - |-
          CORO
            Por la Santa Biblia te alabo,
            Padre amante, mi Señor;
            Te adoro, Cristo, Rey eterno; Gracias, oh Consolador.
    - number: 278
      title: Gracias damos por la Biblia
      verses:
        - |-
          1. Gracias damos por la Biblia,
             Tu Palabra es, Señor; Inspiraste al salmista,
             Y al santo historiador. El profeta y el apóstol,
             Desde la antigüedad, por tu Espíritu guiados,
             Nos legaron tu verdad.
        - |-
          2. Gracias damos por la Biblia,
             Y por esa multitud de escribas abnegados,
             Que con gran exactitud a través de muchos siglos,
             Aun en gran persecución, cada letra preservaron,
             Para nuestra bendición.
        - |-
          3. Gracias damos por la Biblia,
             Y por cada traductor que la ha hecho entendible
             Al oyente y lector. Y por los que la publican,
             Y el ejército mundial que trabaja esparciendo
             Tu Palabra eternal.
        - |-
          4. Gracias damos por la Biblia,
             Tu Palabra es, Señor; La tenemos al alcance,
             Tu mensaje de amor. Oh ayúdanos, pedimos,
             A leerla con afán, y a cumplirla diariamente;
             Sus preceptos vida dan.
    - number: 279
      title: Proclamemos la Palabra
      verses:
        - |-
          1. Si alguien habla, hable conforme a las palabras de
             Dios.
        - |-
          2. Predica la palabra; mantente dispuesto a tiempo
             y fuera de tiempo; convence, reprende y exhorta
             con toda paciencia y enseñanza.
        - |-
          3. Porque la Palabra de Dios es viva y eficaz,
             y más penetrante que toda espada de dos filos.
        - |-
          4. Penetra hasta partir el alma y el espíritu, las
             coyunturas y los tuétanos, y discierne los
             pensamientos y las intenciones del corazón.
        - |-
          5. Por esto, la fe es por el oír, y el oír por la
             palabra de Cristo. Pues lo que fue escrito
             anteriormente fue escrito para nuestra enseñanza,
             a fin de que por la perseverancia y la exhortación de
             las Escrituras tengamos esperanza.
        - |-
          6. ¡Cuán hermosos son los pies de los que anuncian
             el evangelio de las cosas buenas!
    - number: 280
      title: Bellas palabras de vida
      verses:
        - |-
          1. ¡Oh! cantádmelas otra vez,
             Bellas palabras de vida;
             Hallo en ellas mi gozo y luz, Bellas palabras de vida.
             Sí, de luz y vida son sostén y guía;
        - |-
          CORO
            ¡Qué bellas son, qué bellas son!
            Bellas palabras de vida;
            ¡Qué bellas son, qué bellas son!
            Bellas palabras de vida.
        - |-
          2. Jesucristo a todos da
             Bellas palabras de vida;
             Oye su dulce voz, mortal, bellas palabras de vida.
             Bondadoso te salva, y al cielo te llama.
        - |-
          CORO
            ¡Qué bellas son, qué bellas son!
            Bellas palabras de vida;
            ¡Qué bellas son, qué bellas son!
            Bellas palabras de vida.
        - |-
          3. Grato el cántico sonará,
             Bellas palabras de vida;
             Tus pecados perdonará, bellas palabras de vida.
             Sólo Cristo redime, vida nueva te ofrece.
        - |-
          CORO
            ¡Qué bellas son, qué bellas son!
            Bellas palabras de vida;
            ¡Qué bellas son, qué bellas son!
            Bellas palabras de vida.
    - number: 281
      title: La Palabra del Señor
      verses:
        - |-
          1. La palabra del Señor predicad, predicad;
             Con anhelo y oración, predicad, predicad.
             Ante el mundo burlador
             sed testigos de su amor;
             El poder del Salvador predicad, predicad.
        - |-
          2. El ejemplo del Señor imitad, imitad;
             Su humildad y tierno amor imitad, imitad.
             Su constancia en la oración,
             su paciencia en la aflicción,
             Su bondad y compasión, imitad, imitad.
        - |-
          3. La venida del Señor esperad, esperad;
             El vendrá, no tardará, esperad, esperad.
             Como siervos del gran Rey,
             trabajad con celo y fe;
             Si sembráis, recogeréis; esperad, esperad.
    - number: 282
      title: Sembraré la simiente preciosa
      verses:
        - |-
          1. Sembraré la simiente preciosa
             del glorioso evangelio de amor.
             Sembraré, sembraré, mientras viva;
             dejaré el resultado al Señor.
        - |-
          CORO
            Sembraré, (Sembraré,) Sembraré, (Sembraré,)
            Mientras viva, simiente de amor.
            Segaré, (Segaré,) Segaré, (Segaré,)
            Al hallarme en la casa de Dios.
        - |-
          2. Sembraré en corazones sensibles
             la doctrina del Dios de perdón.
             Sembraré, sembraré, mientras viva;
             dejaré el resultado al Señor.
        - |-
          CORO
            Sembraré, (Sembraré,) Sembraré, (Sembraré,)
            Mientras viva, simiente de amor.
            Segaré, (Segaré,) Segaré, (Segaré,)
            Al hallarme en la casa de Dios.
        - |-
          3. Sembraré en corazones de mármol
             la bendita palabra de Dios.
             Sembraré, sembraré, mientras viva;
             dejaré el resultado al Señor.
        - |-
          CORO
            Sembraré, (Sembraré,) Sembraré, (Sembraré,)
            Mientras viva, simiente de amor.
            Segaré, (Segaré,) Segaré, (Segaré,)
            Al hallarme en la casa de Dios.
    - number: 283
      title: Esdras preparó su corazón
      verses:
        - |-
          1. Esdras preparó su corazón
             para inquirir la ley de Jehová;
             Esdras preparó su corazón
             Para inquirir las Escrituras.
             La buena mano de Dios estaba con Esdras;
             Esdras preparó su corazón
             Para inquirir las Escrituras.
        - |-
          2. Esdras preparó su corazón
             para así cumplir la ley de Jehová;
             Esdras preparó su corazón
             Para así cumplir las Escrituras.
             La buena mano de Dios estaba con Esdras;
             Esdras preparó su corazón para
             así cumplir las Escrituras.
        - |-
          3. Esdras preparó su corazón
             para enseñar la ley de Jehová;
             Esdras preparó su corazón para enseñar las Escrituras.
             La buena mano de Dios estaba con Esdras;
             Esdras preparó su corazón para enseñar las Escrituras.
    - number: 284
      title: Oh, Verbo encarnado
      verses:
        - |-
          1. Oh, Verbo encarnado, oh, celestial Verdad,
             Sabiduría eterna, luz en la oscuridad,
             Te loamos por tu Libro que luz eterna da;
             Cual lámpara divina su luz siempre dará.
        - |-
          2. Oh Cristo, a tu Iglesia legaste este don,
             Que cual brillante faro provee dirección.
             Es tu Palabra caja de joyas sin igual;
             Pintura que retrata tu imagen celestial.
        - |-
          3. Delante de tu pueblo cual estandarte va;
             Al mundo envuelto en nieblas
             sus rayos puros da;
             Es brújula, y carta que en tormentosa mar,
             por todos los peligros a Cristo saben guiar.
        - |-
          4. Haz que tu Iglesia sea lumbrera, oh Señor,
             Que brilla en las naciones
             con santo resplandor;
             Enseña al peregrino a guiarse por tu luz,
             Seguro, hasta verte en gloria, oh Jesús.
    - number: 285
      title: "REFLEXION: Mi Biblia, la Palabra de Dios"
      verses:
        - |-
          1. Te doy gracias, Señor, por tu Palabra, la Santa
             Biblia. Me deleita leerla, porque por medio de ella te
             has dado a conocer y me has mostrado el camino de
             la salvación.
        - |-
          2. Tu Palabra me es más preciosa que el oro. Es lám-
             para que ilumina mi senda y pan que alimenta mi
             alma; es agua que refresca y purifica mi espíritu. Es
             espejo que me muestra cómo soy y espada en mis
             luchas contra Satanás.
        - |-
          3. La Biblia proviene de ti y por lo tanto refleja lo que
             tú eres. Ella es absolutamente confiable, porque eres
             fiel y no puedes mentir. Permanece para siempre,
             porque tú existes eternamente.
        - |-
          4. Las Escrituras me instruyen en tu voluntad y me
             capacitan para servirte. En ellas escucho tu voz y al
             meditar en su mensaje encuentro consuelo y paz.
        - |-
          5. Con el salmista exclamo, "¡Oh, cuánto amo yo tu
             ley!". Tus enseñanzas son el tema de mi cántico.
             Impulsado por tu Palabra, elevo mi voz con notas de
             loor a ti.
    - number: 286
      title: Oh, Señor, procuro en vano
      verses:
        - |-
          1. Oh, Señor, procuro en vano mi conducta reformar,
             Pues ningún poder humano
             santidad me puede dar.
             Es mi vida de pecado diaria ofensa para ti;
             Pero mi alma ha confiado en tu sangre carmesí.
        - |-
          2. En tu reino está el contento;
             nada impuro allí entrará;
             Sin el nuevo nacimiento ninguna alma lo verá.
             Mira, pues, mi insuficiencia,
             muestra en mí tu gran poder;
             Manifiesta tu clemencia y de nuevo hazme nacer.
        - |-
          3. Ven, Espíritu divino; ven y escucha mi oración;
             Ante ti mi frente inclino
             por mi regeneración.
             No vacilo en la esperanza; he llegado a creer
             Que la bienaventuranza
             en el cielo he de tener.
    - number: 287
      title: Por fe en Jesús, el Salvador
      verses:
        - |-
          1. Por fe en Jesús, el Salvador, se hace salvo el pecador;
             Sin merecer tan rico don, recibe plena salvación.
        - |-
          CORO
            ¡Oh, excelsa gracia del amor,
            que Dios perdona al pecador!
            Si presto está a confesar
            sus culpas y en Jesús confiar;
            No hay otro autor de salvación,
            pues Cristo obró la redención.
        - |-
          2. La vida antigua ya pasó, y todo nuevo se tornó;
             Aquí cual peregrino es, hogar con Dios tendrá después.
        - |-
          CORO
            ¡Oh, excelsa gracia del amor,
            que Dios perdona al pecador!
            Si presto está a confesar
            sus culpas y en Jesús confiar;
            No hay otro autor de salvación,
            pues Cristo obró la redención.
    - number: 288
      title: El camino romano
      verses:
        - |-
          1. Por cuanto todos pecaron, todos pecaron,
             Y están destituidos de la gloria de Dios;
             Por cuanto todos pecaron, todos pecaron
             Y están destituidos de la gloria de Dios.
        - |-
          2. Porque la paga del pecado es muerte,
             Mas la dádiva de Dios es vida,
             Vida eterna en Cristo, Cristo Jesús Señor nuestro.
        - |-
          3. Porque con el corazón,
             con el corazón, se cree para justicia,
             Mas con la boca se confiesa, la boca se confiesa,
             Para salvación. Para salvación.
    - number: 289
      title: Oh, la sangre de Cristo
      verses:
        - |-
          1. Oh, la sangre de Cristo,
             Oh, la sangre de Cristo,
             Oh, la sangre de Cristo de culpa me lavó.
    - number: 290
      title: Cristo habita en mi corazón
      verses:
        - |-
          1. Cristo habita en mi corazón;
             Río divino es su inundación;
             Por ello paz y amor míos son; Cristo habita en mí.
        - |-
          2. Cristo conmigo, hermoso el don;
             Horas pasamos en conversación;
             Felicidad me da su comunión; Cristo habita en mí.
        - |-
          3. Quiero que Cristo controle mi ser;
             Quiero que el mundo su amor pueda ver.
             Quiero que él sea mi sumo placer; Cristo habita en mí.
    - number: 291
      title: Dios muestra su amor
      verses:
        - |-
          1. Mas Dios muestra su amor para con nosotros
             En que siendo aún pecadores, Cristo murió por nosotros.
    - number: 292
      title: Hay un solo Dios
      verses:
        - |-
          1. Porque hay un solo Dios, y un solo mediador
             Entre Dios y los hombres, Jesucristo el Redentor,
             Quien se dio a sí mismo en rescate al pecador.
             Ven, amigo, y acepta al Salvador.
    - number: 293
      title: Oh, bondad tan infinita
      verses:
        - |-
          1. ¡Oh, bondad tan infinita,
             Hacia el mundo pecador,
             Dios, en Cristo revelando
             Su eternal y santo amor!
        - |-
          CORO
            Es Jesús (Es Jesús)
            Para mí, (para mí,)
            La esperanza de salud;
            Sólo en él (sólo en él)
            Hallaré (hallaré) La divina plenitud.
        - |-
          2. Como el vasto firmamento,
             Como el insondable mar,
             Es la gracia salvadora
             Que Jesús al alma da.
        - |-
          CORO
            Es Jesús (Es Jesús)
            Para mí, (para mí,)
            La esperanza de salud;
            Sólo en él (sólo en él)
            Hallaré (hallaré) La divina plenitud.
        - |-
          3. Aunque fueran tus pecados
             Rojos como el carmesí,
             En el río del Calvario
             Hay limpieza para ti.
        - |-
          CORO
            Es Jesús (Es Jesús)
            Para mí, (para mí,)
            La esperanza de salud;
            Sólo en él (sólo en él)
            Hallaré (hallaré) La divina plenitud.
    - number: 294
      title: Cuán profundo es tu amor
      verses:
        - |-
          1. Cuán profundo es tu amor,
             (Cuán profundo es tu amor,)
             no lo puedo comprender;
             (no lo puedo comprender;)
             Alto es para mí, (Alto es para mí,) ¡Cuán inmenso es!
        - |-
          CORO
            ¡Cuán profundo es tu amor, Dios de los cielos!
            Más profundo que el mar
            es tu gran amor; Alto es, (Alto es,)
            inmenso es, (inmenso es,)
            profundo es (profundo es) tu gran amor.
        - |-
          2. Siendo yo pecador, (Siendo yo pecador,)
             te humillaste, Dios, por mí;
             (te humillaste, Dios, por mí;)
             Lo hiciste en amor, (Lo hiciste en amor)
             ¡Cuán inmenso es!
        - |-
          CORO
            ¡Cuán profundo es tu amor, Dios de los cielos!
            Más profundo que el mar
            es tu gran amor; Alto es, (Alto es,)
            inmenso es, (inmenso es,)
            profundo es (profundo es) tu gran amor.
        - |-
          3. Viendo la inmensidad (Viendo la inmensidad)
             y el poder de tu amor, (y el poder de tu amor,)
             Sólo puedo decir: (Sólo puedo decir:)
             ¡Cuán inmenso es!
        - |-
          CORO
            ¡Cuán profundo es tu amor, Dios de los cielos!
            Más profundo que el mar
            es tu gran amor; Alto es, (Alto es,)
            inmenso es, (inmenso es,)
            profundo es (profundo es) tu gran amor.
    - number: 295
      title: Dios al mundo amó
      verses:
        - |-
          1. Dios al mundo amó; a su Hijo dio
             para que todo aquel que cree en él
             No se pierda, mas tenga vida eterna.
        - |-
          2. Dios al mundo amó; a su Hijo dio
             Para que todo aquel que cree en él
             Vida eterna, vida eterna.
    - number: 296
      title: Nuestro Dios nos salvó
      verses:
        - |-
          1. Nuestro Dios nos salvó, no por obras
             Que nosotros hubiéramos hecho,
             Sino por su misericordia
             Nos lavó y nos regeneró.
        - |-
          2. Nuestro Dios nos salvó, no por obras
             Que nosotros hubiéramos hecho,
             Sino por su misericordia
             Por su Espíritu nos renovó.
        - |-
          3. Nuestro Dios nos salvó por su gracia,
             Nuestro Dios nos salvó por su amor.
    - number: 297
      title: A ti me vuelvo
      verses:
        - |-
          1. A ti me vuelvo, gran Señor que alzaste
             a costa de tu sangre y de tu vida
             la mísera de Adán primer caída,
             y adonde él nos perdió nos recobraste;
        - |-
          2. A ti, Pastor bendito, que buscaste
             de las cien ovejuelas la perdida,
             hallándola del lobo perseguida,
             sobre tus hombros santos te la echaste.
    - number: 298
      title: ¿Qué me puede dar perdón?
      verses:
        - |-
          1. ¿Qué me puede dar perdón?
             Sólo de Jesús la sangre;
             ¿Y un nuevo corazón? Sólo de Jesús la sangre.
        - |-
          CORO
            Precioso es el raudal
            Que limpia todo mal;
            No hay otro manantial,
            Sólo de Jesús la sangre.
        - |-
          2. Fue el rescate eficaz, sólo de Jesús la sangre;
             Trajo santidad y paz, sólo de Jesús la sangre.
        - |-
          CORO
            Precioso es el raudal
            Que limpia todo mal;
            No hay otro manantial,
            Sólo de Jesús la sangre.
        - |-
          3. Veo para mi salud, sólo de Jesús la sangre;
             Tiene de sanar virtud, sólo de Jesús la sangre.
        - |-
          CORO
            Precioso es el raudal
            Que limpia todo mal;
            No hay otro manantial,
            Sólo de Jesús la sangre.
        - |-
          4. Cantaré junto a sus pies,
             Sólo de Jesús la sangre;
             El Cordero digno es, sólo de Jesús la sangre.
        - |-
          CORO
            Precioso es el raudal
            Que limpia todo mal;
            No hay otro manantial,
            Sólo de Jesús la sangre.
    - number: 299
      title: Por fe contemplo redención
      verses:
        - |-
          1. Por fe contemplo redención,
             la fuente carmesí;
             Jesús nos da la salvación; su vida dio por mí.
        - |-
          CORO
            La fuente sin igual hallé,
            De vida y luz el manantial;
            ¡Oh, gloria a Dios, me limpia a mí,
            Me limpia a mí, me limpia a mí!
        - |-
          2. Mi vida entrego a mi Jesús;
             Las dudas él quitó;
             Mi alma goza en su luz, mis deudas él pagó.
        - |-
          CORO
            La fuente sin igual hallé,
            De vida y luz el manantial;
            ¡Oh, gloria a Dios, me limpia a mí,
            Me limpia a mí, me limpia a mí!
        - |-
          3. ¡Cuán inefable gozo es
             Saber que salvo soy!
             Mi Rey aquí es mi Jesús; al cielo sé que voy.
        - |-
          CORO
            La fuente sin igual hallé,
            De vida y luz el manantial;
            ¡Oh, gloria a Dios, me limpia a mí,
            Me limpia a mí, me limpia a mí!
        - |-
          4. ¡Oh, gracia excelsa de mi Dios!
             Profundo es el amor de mi Jesús, divina luz,
             Cordero Redentor.
        - |-
          CORO
            La fuente sin igual hallé,
            De vida y luz el manantial;
            ¡Oh, gloria a Dios, me limpia a mí,
            Me limpia a mí, me limpia a mí!
    - number: 300
      title: Sublime Gracia
      verses:
        - |-
          1. Sublime gracia del Señor
             Que un infeliz salvó;
             Fui ciego mas hoy miro yo,
             Perdido y él me halló.
        - |-
          2. Su gracia me enseñó a temer;
             Mis dudas ahuyentó;
             ¡Oh cuán precioso fue a mi ser
             Cuando él me transformó!
        - |-
          3. En los peligros o aflicción
             Que yo he tenido aquí,
             Su gracia siempre me libró
             Y me guiará feliz.
        - |-
          4. Y cuando en Sion por siglos mil
             Brillando esté cual sol,
             Yo cantaré por siempre allí
             Su amor que me salvó.
    - number: 301
      title: ¿Sabes dónde hay una fuente?
      verses:
        - |-
          1. ¿Sabes dónde hay una fuente
             Pura de divino amor,
             Cuyas aguas celestiales manan
             con ferviente ardor?
             Esta fuente inagotable, de eficacia y de valor
             Es el Redentor bendito, el precioso Salvador.
        - |-
          CORO
            Es Jesús la viva fuente,
            donde he apagado yo
            Esa sed que consumía mi cuitado corazón.
        - |-
          2. Esa fuente siempre pura, nunca su cristal perdió;
             Y sus aguas refrescantes se te ofrecen, pecador.
             Si sediento y fatigado a Jesús, la fuente, vas,
             Satisfecho y aliviado al momento quedarás.
        - |-
          CORO
            Es Jesús la viva fuente,
            donde he apagado yo
            Esa sed que consumía mi cuitado corazón.
        - |-
          3. ¡Oh! recibe pues su oferta, no rechaces, no, su amor;
             Dile: "De esas aguas dame, y sabré su gran valor".
             Sin dinero, y sin precio, se te ofrece el grato don:
             Vida eterna, paz y gozo, de tus culpas el perdón.
        - |-
          CORO
            Es Jesús la viva fuente,
            donde he apagado yo
            Esa sed que consumía mi cuitado corazón.
    - number: 302
      title: Sin Cristo yo no tengo nada
      verses:
        - |-
          1. Sin Cristo yo no tengo nada;
             Sin Cristo no hay salvación;
             Sin Cristo yo voy por la vida como barco sin timón.
        - |-
          CORO
            ¡Cristo, oh Cristo! Si has oído su voz,
            Ven, acéptale hoy.
            ¡Oh Cristo, oh Cristo! con él seguro estoy.
        - |-
          2. Sin Cristo mi alma está muerta;
             Sin Cristo esclavo yo soy;
             Sin Cristo no hay esperanza, mas con él yo salvo soy.
        - |-
          CORO
            ¡Cristo, oh Cristo! Si has oído su voz,
            Ven, acéptale hoy.
            ¡Oh Cristo, oh Cristo! con él seguro estoy.
    - number: 303
      title: ¿Sabes tú de Cristo?
      verses:
        - |-
          1. ¿Vives cansado y triste?
             ¿Es grande tu aflicción?
             ¿Tu inquietud persiste?
             ¿Buscas feliz protección?
        - |-
          CORO
            ¿Sabes tú de Cristo? (¿Sabes tú?)
            ¿Le conoces ya? (¿Le conoces ya?)
            En su amor (en su amor) bendito
            Salvación y poder te dará. (te dará.)
        - |-
          2. ¿A quién te acercas, dime,
             Cuando te acosa el mal?
             Y cuando tu alma gime, ¿Quién es tu paz eternal?
        - |-
          CORO
            ¿Sabes tú de Cristo? (¿Sabes tú?)
            ¿Le conoces ya? (¿Le conoces ya?)
            En su amor (en su amor) bendito
            Salvación y poder te dará. (te dará.)
        - |-
          3. En tus desilusiones,
             Tu llanto enjugará;
             En rudas tentaciones, Tu ruego contestará.
        - |-
          CORO
            ¿Sabes tú de Cristo? (¿Sabes tú?)
            ¿Le conoces ya? (¿Le conoces ya?)
            En su amor (en su amor) bendito
            Salvación y poder te dará. (te dará.)
    - number: 304
      title: ¿Has hallado en Cristo?
      verses:
        - |-
          1. ¿Has hallado en Cristo tu buen Salvador?
             ¿Eres salvo por la sangre de Jesús?
             ¿Por la fe descansas en el Redentor?
             ¿Eres salvo por la sangre de Jesús?
        - |-
          CORO
            Lávame, (Lávame,) lávame, (lávame,)
            En tu sangre, Cordero de Dios, (de Dios,)
            Y con alma limpia me presentaré ante tu tribunal de luz.
        - |-
          2. ¿Vives siempre al lado de tu Salvador?
             ¿Eres salvo por la sangre de Jesús?
             ¿Del pecado eres siempre vencedor?
             ¿Eres salvo por la sangre de Jesús?
        - |-
          CORO
            Lávame, (Lávame,) lávame, (lávame,)
            En tu sangre, Cordero de Dios, (de Dios,)
            Y con alma limpia me presentaré ante tu tribunal de luz.
        - |-
          3. ¿Cuando él viniere te encontrarás
             Ya lavado en la sangre de Jesús?
             ¿Para su venida preparado estás,
             Ya lavado en la sangre de Jesús?
        - |-
          CORO
            Lávame, (Lávame,) lávame, (lávame,)
            En tu sangre, Cordero de Dios, (de Dios,)
            Y con alma limpia me presentaré ante tu tribunal de luz.
        - |-
          4. Si perdón y paz deseas, pecador,
             Tu refugio es la sangre de Jesús.
             Si librarte quieres de eternal dolor,
             Oh, acude a la sangre de Jesús.
        - |-
          CORO
            Lávame, (Lávame,) lávame, (lávame,)
            En tu sangre, Cordero de Dios, (de Dios,)
            Y con alma limpia me presentaré ante tu tribunal de luz.
    - number: 305
      title: Ven a los pies de Jesús
      verses:
        - |-
          1. Ven a los pies de Jesús; Ven, no desprecies su cruz.
             Ven por la senda de luz,
             Por la senda de luz que es tan sólo Jesús,
             quien tomando su cruz, te brindó salvación;
             Mira al Monte de Sion.
        - |-
          2. Oye la voz del Señor; Mira su inmenso dolor.
             Piensa en que Dios es amor,
             En que Dios es amor; Sufrió intenso dolor
             Por hacerte el favor de brindarte salud
             En su gran plenitud.
        - |-
          3. Vuelve tus ojos a Dios; Vuelve, escucha su voz.
             Y ya no más serán dos,
             Uno solo con Dios, uno solo con Dios;
             Ven y busca veloz aquel bello país
             Do serás más feliz.
        - |-
          4. Ábrele tu corazón a quien te ofrece perdón,
             Quien con su crucifixión
             Consumó redención, ofreciendo el perdón
             y la consolación, pues él quiso morir
             para hacernos vivir.
    - number: 306
      title: Cristo la ruta a la felicidad
      verses:
        - |-
          1. Cristo la ruta a la felicidad.
        - |-
          2. Tú eres pecador separado de Dios.
        - |-
          3. El pecado te trajo muerte eterna.
        - |-
          4. Dios te muestra su amor.
        - |-
          5. Cree en el Señor Jesucristo.
        - |-
          6. Por gracia y fe eres salvo.
        - |-
          7. Reconciliado con Dios por Cristo.
        - |-
          8. La felicidad tienes en Dios.
        - |-
          9. DIOS TE DICE EN LA BIBLIA:
             1. Yo he venido para que tengan vida, y la tengan en
             abundancia. Juan 10:10.
        - |-
          10. 2. Pero vuestras iniquidades han hecho división entre
              vosotros y vuestro Dios. Isaías 59:2.
        - |-
          11. 3. La paga del pecado es muerte. Romanos 6:23.
        - |-
          12. 4. Mas Dios muestra su amor para con nosotros, en que
              siendo aún pecadores, Cristo murió por nosotros. Romanos 5:8.
        - |-
          13. 5. Cree en el Señor Jesucristo y serás salvo. Hechos 16:31.
        - |-
          14. 6. Porque por gracia sois salvos por medio de la fe; y esto
              no de vosotros, pues es don de Dios; no por obras, para
              que nadie se gloríe. Efesios 2:8-9.
        - |-
          15. 7. Porque cuando éramos enemigos, fuimos reconciliados
              con Dios por la muerte de su Hijo. Romanos 5:10.
        - |-
          16. 8. El que cree en el Hijo tiene vida eterna. Juan 3:36.
        - |-
          17. TU DECISION:
              Si quieres la vida feliz y eterna, Dios sólo te pide que creas
              en Jesucristo como tu único Salvador personal. Hoy mismo
              lo puedes hacer. Dile a Dios estas palabras:
        - |-
          18. Dios mío, soy un triste pecador, condenado a muerte eterna.
              Pongo toda mi fe en Jesucristo que murió en la cruz en mi lugar y
              perdona todos mis pecados. Hoy recibo a tu Hijo como mi único y
              personal Salvador. Sé que mis obras no me salvan. Ahora soy salvo
              y feliz eternamente, todo esto es un regalo que tú me das. Te doy
              las gracias Padre mío, por medio de Cristo mi único mediador.
        - |-
          19. Ve hoy mismo a una iglesia evangélica y cuéntaselo al
              pastor y a los líderes. Ellos te dirán qué hacer para crecer en
              tu nueva vida cristiana.
    - number: 307
      title: Nuestra vida acabará
      verses:
        - |-
          1. Nuestra vida acabará, cual las hojas caerá,
             Cual el haz se ligará: busca a Dios.
             Vuela cada día veloz y volando da su voz:
             "Ven a dar tu cuenta a Dios". Busca a Dios.
        - |-
          CORO
            Busca a Dios, (Busca a Dios,)
            busca a Dios; (busca a Dios;)
            Entre tanto tengas tiempo, busca a Dios. (busca a Dios.)
            Si te atreves a esperar, Dios la puerta cerrará
            Y dirá, "Es tarde ya". Busca a Dios.
        - |-
          2. Pierde el hombre su vigor, se marchita cual la flor,
             Se disipa cual vapor: busca a Dios.
             Como el río aprisa va hasta entrar al vasto mar,
             Vas así a la eternidad: busca a Dios.
        - |-
          CORO
            Busca a Dios, (Busca a Dios,)
            busca a Dios; (busca a Dios;)
            Entre tanto tengas tiempo, busca a Dios. (busca a Dios.)
            Si te atreves a esperar, Dios la puerta cerrará
            Y dirá, "Es tarde ya". Busca a Dios.
        - |-
          3. Clama a Dios de corazón con sincera contrición;
             Por Jesús Dios da perdón: busca a Dios.
             Si no escuchas al Señor, si desprecias su perdón,
             Te acarreas perdición: busca a Dios.
        - |-
          CORO
            Busca a Dios, (Busca a Dios,)
            busca a Dios; (busca a Dios;)
            Entre tanto tengas tiempo, busca a Dios. (busca a Dios.)
            Si te atreves a esperar, Dios la puerta cerrará
            Y dirá, "Es tarde ya". Busca a Dios.
    - number: 308
      title: Tal como soy
      verses:
        - |-
          1. Tal como soy, de pecador,
             Sin más confianza que tu amor,
             Ya que me llamas, acudí;
             Cordero de Dios, heme aquí.
        - |-
          2. Tal como soy, buscando paz
             En mi desgracia y mal tenaz,
             Conflicto grande siento en mí;
             Cordero de Dios, heme aquí.
        - |-
          3. Tal como soy, me acogerás;
             Perdón, alivio me darás,
             Pues tu promesa ya creí;
             Cordero de Dios, heme aquí.
        - |-
          4. Tal como soy, tu compasión
             Vencido ha toda oposición;
             Ya pertenezco sólo a ti;
             Cordero de Dios, heme aquí.
    - number: 309
      title: Toma de la fuente de agua viva
      verses:
        - |-
          1. Vagué sediento en el pecado abrumador,
             Y nada a mi alma dio satisfacción;
             Mas cuando fui a la cruz de
             Cristo el Salvador,
             Agua abundante halló mi corazón.
        - |-
          CORO
            Toma de la fuente de agua viva,
            fuente eternal, agua del raudal;
            Toma de la fuente de agua viva,
            fuente de agua viva celestial.
        - |-
          2. ¡Oh cuán dulce raudal de Dios brotando está!
             Felicidad y gozo me brindó.
             En gloria, gracia y bendición mi vida irá;
             por eso ¡Aleluya! canto yo.
        - |-
          CORO
            Toma de la fuente de agua viva,
            fuente eternal, agua del raudal;
            Toma de la fuente de agua viva,
            fuente de agua viva celestial.
        - |-
          3. Oh pecador ¿por qué a Jesús no vienes hoy
             y así su agua de vida aceptar?
             El dice, "Fuente de agua eterna y libre soy;
             la sed de tu alma puedo aplacar".
        - |-
          CORO
            Toma de la fuente de agua viva,
            fuente eternal, agua del raudal;
            Toma de la fuente de agua viva,
            fuente de agua viva celestial.
    - number: 310
      title: Pecador, ven a Cristo Jesús
      verses:
        - |-
          1. Pecador, ven a Cristo Jesús,
             y feliz para siempre serás,
             Que si tú le quisieres tener,
             al divino Señor hallarás.
        - |-
          CORO
            Ven a él, (pecador,) ven a él, (pecador,)
            Que te espera tu buen Salvador.
        - |-
          2. Si cual hijo que necio pecó,
             vas buscando a sus pies compasión,
             Tierno Padre en Jesús hallarás,
             y tendrás en sus brazos perdón.
        - |-
          CORO
            Ven a él, (pecador,) ven a él, (pecador,)
            Que te espera tu buen Salvador.
        - |-
          3. Si en pecado te sientes morir,
             él será tu Doctor celestial,
             Y hallarás en su sangre también
             medicina que cure tu mal.
        - |-
          CORO
            Ven a él, (pecador,) ven a él, (pecador,)
            Que te espera tu buen Salvador.
        - |-
          4. Ovejuela que huyó del redil,
             ¡he aquí tu benigno Señor!
             Y en los hombros llevada serás
             de tan dulce y amante Pastor.
        - |-
          CORO
            Ven a él, (pecador,) ven a él, (pecador,)
            Que te espera tu buen Salvador.
    - number: 311
      title: ¿Quieres ser salvo?
      verses:
        - |-
          1. ¿Quieres ser salvo de toda maldad?
             Tan sólo hay poder en mi Jesús.
             ¿Quieres vivir y gozar santidad?
             Tan sólo hay poder en Jesús.
        - |-
          CORO
            Hay poder, (hay poder,) poder,
            sin igual poder en Jesús (en Jesús)
            quien murió; (quien murió;)
            Hay poder, (hay poder,) poder,
            sin igual poder en la sangre que él vertió.
        - |-
          2. ¿Quieres ser libre de orgullo y pasión?
             Tan sólo hay poder en mi Jesús.
             ¿Quieres vencer toda cruel tentación?
             Tan sólo hay poder en Jesús.
        - |-
          CORO
            Hay poder, (hay poder,) poder,
            sin igual poder en Jesús (en Jesús)
            quien murió; (quien murió;)
            Hay poder, (hay poder,) poder,
            sin igual poder en la sangre que él vertió.
        - |-
          3. ¿Quieres servir a tu Rey y Señor?
             Tan sólo hay poder en mi Jesús.
             Ven, y ser salvo podrás en su amor;
             Tan sólo hay poder en Jesús.
        - |-
          CORO
            Hay poder, (hay poder,) poder,
            sin igual poder en Jesús (en Jesús)
            quien murió; (quien murió;)
            Hay poder, (hay poder,) poder,
            sin igual poder en la sangre que él vertió.
    - number: 312
      title: A Jesucristo ven sin tardar
      verses:
        - |-
          1. A Jesucristo ven sin tardar,
             Que entre nosotros hoy él está,
             Y te convida con dulce afán,
             Tierno diciendo: "Ven".
        - |-
          CORO
            ¡Oh cuán grata nuestra reunión
            Cuando allí, Señor, en tu mansión,
            Contigo estemos en comunión
            Gozando eterno bien!
        - |-
          2. Piensa que él sólo puede colmar
             Tu triste pecho de gozo y paz,
             Y porque anhela tu bienestar,
             Vuelve a decirte: "Ven".
        - |-
          CORO
            ¡Oh cuán grata nuestra reunión
            Cuando allí, Señor, en tu mansión,
            Contigo estemos en comunión
            Gozando eterno bien!
        - |-
          3. Su voz escucha sin vacilar,
             Y grato acepta lo que hoy te da;
             Tal vez mañana no habrá lugar;
             No te detengas, ven.
        - |-
          CORO
            ¡Oh cuán grata nuestra reunión
            Cuando allí, Señor, en tu mansión,
            Contigo estemos en comunión
            Gozando eterno bien!
    - number: 313
      title: Ven amigo a Jesús
      verses:
        - |-
          1. Ven amigo a Jesús, pues él murió por ti;
             Recibirás la luz que quiere darte a ti.
             Mi buen Jesús murió para darte perdón;
             Abre tu corazón y dulce paz tendrás.
        - |-
          CORO
            Día fatal vendrá cuando
            no habrá lugar;
            La puerta se abre hoy, y tú podrás entrar.
            Más gracia ya no habrá,
            pues despreciaste hoy;
            Acepta, pecador, la salvación de Dios.
        - |-
          2. Las manos del Señor
             se abren hoy para ti;
             Ven y confía en él, y serás muy feliz.
             Tus cuitas pon en Dios,
             pues él las llevará;
             Quitará tu pesar por su consolación.
        - |-
          CORO
            Día fatal vendrá cuando
            no habrá lugar;
            La puerta se abre hoy, y tú podrás entrar.
            Más gracia ya no habrá,
            pues despreciaste hoy;
            Acepta, pecador, la salvación de Dios.
    - number: 314
      title: Vida nueva encontré
      verses:
        - |-
          1. Ya mi vida se la debo a Jesús, porque él
             Murió en la cruz por mí.
        - |-
          CORO
            Vida nueva encontré en la cruz de Jesús
            Porque Cristo mi deuda pagó.
        - |-
          2. Yo me rindo a los pies de Jesús mi Señor,
             Porque fui un infiel pecador.
        - |-
          CORO
            Vida nueva encontré en la cruz de Jesús
            Porque Cristo mi deuda pagó.
        - |-
          3. Pecador, el Santo Espíritu te llama a ti;
             Ven a Cristo y salvo serás.
        - |-
          CORO
            Vida nueva encontré en la cruz de Jesús
            Porque Cristo mi deuda pagó.
    - number: 315
      title: Visión Pastoral
      verses:
        - |-
          1. Eran cien ovejas las de su rebaño;
             Eran cien ovejas que amante cuidó,
             Pero una tarde al contarlas todas,
             Le faltaba una, le faltaba una y triste lloró.
             Las noventa y nueve dejó en el aprisco,
             Y por la montaña a buscarla fue;
             La encontró llorando, temblando de frío;
             Ungió sus heridas, la cargó en sus hombros
             y al redil volvió.
        - |-
          2. Esta antigua historia vuelve a repetirse;
             Hay aún ovejas que errabundas van;
             Con el alma rota van por los collados,
             Temblando de frío, vagando en el mundo,
             sin Dios y sin luz. Pero todavía
             existen pastores que por la montaña
             a buscarlas van,
             Y cuando las hallan, las traen al camino,
             Al camino bueno, la verdad y vida
             que es Cristo el Señor.
        - |-
          3. Si tú eres un alma que sufre angustia
             De sentirse sola en cruel lobreguez,
             Hoy te traigo nuevas, nuevas de gran gozo;
             Es el evangelio que salva y redime
             y te da la luz.
             Sea en la montaña o en la cumbre agreste,
             Ya fuera en el valle o en abismo cruel,
             Cristo el buen Pastor quiere en pastos verdes
             Confortar tu alma, vendar tus heridas
             y darte la paz.
    - number: 316
      title: Con voz benigna
      verses:
        - |-
          1. Con voz benigna te llama Jesús:
             invitación de puro amor.
             ¿Por qué le dejas en vano llamar?
             ¿Sordo serás, pecador?
        - |-
          CORO
            Hoy te convida, hoy te convida;
            Voz bendecida,
            benigna convídale hoy.
        - |-
          2. A los cansados convida Jesús;
             con compasión mira el dolor.
             Tráele tu carga, te bendecirá;
             te ayudará el Señor.
        - |-
          CORO
            Hoy te convida, hoy te convida;
            Voz bendecida,
            benigna convídale hoy.
        - |-
          3. Siempre aguardando
             contempla a Jesús:
             ¡Tanto esperar, con tanto amor!
             Hasta sus plantas ven, mísero, y trae
             tu tentación, tu dolor.
        - |-
          CORO
            Hoy te convida, hoy te convida;
            Voz bendecida,
            benigna convídale hoy.
    - number: 317
      title: Oh, Señor, recíbeme cual soy
      verses:
        - |-
          1. Oh Señor, recíbeme cual soy,
             ya no más, ya no quiero pecar.
             Del pecado me quiero apartar;
             Justifica mi ser, dame tu dulce paz
             y tu gran bendición.
        - |-
          2. Oh Señor, toma mi corazón
             y hazlo tuyo por la eternidad.
             Lléname de tu santa bondad,
             Y en mi alma tú pon una nueva canción
             de paz y dulce amor.
        - |-
          3. Pecador, tú que vagas sin Dios,
             ven ahora y acepta al Señor.
             El te quiere impartir su perdón;
             El te quiere salvar, él te quiere ayudar;
             hoy acepta el perdón.
    - number: 318
      title: A los sedientos, venid
      verses:
        - |-
          1. A los sedientos, venid a las aguas,
             Y los cansados, venid con valor;
             Hay una fuente preciosa de vida
             Que satisface del alma el clamor.
        - |-
          CORO
            Aguas tendrá el que vive sediento;
            Ríos habrá en el secadal;
            Busca al Señor mientras puedes hallarlo;
            Clama a él y salvado serás.
        - |-
          2. ¿Vives atado a los goces del mundo?
             ¿Vives cansado de tanto vagar?
             ¿Hay en tu ser un anhelo profundo?
             Ven a Jesús; él te quiere salvar.
        - |-
          CORO
            Aguas tendrá el que vive sediento;
            Ríos habrá en el secadal;
            Busca al Señor mientras puedes hallarlo;
            Clama a él y salvado serás.
        - |-
          3. A los creyentes se ofrece la gracia
             Que satisface de toda ansiedad,
             Que capacita, que limpia, que sacia:
             Santa promesa de toda verdad.
        - |-
          CORO
            Aguas tendrá el que vive sediento;
            Ríos habrá en el secadal;
            Busca al Señor mientras puedes hallarlo;
            Clama a él y salvado serás.
    - number: 319
      title: El agua viva
      verses:
        - |-
          1. Vino una mujer de Samaria a sacar agua; y Jesús
             le dijo: Dame de beber. Pues sus discípulos
             habían ido a la ciudad a comprar de comer.
        - |-
          2. La mujer samaritana le dijo: ¿Cómo tú, siendo
             judío, me pides a mí de beber, que soy mujer
             samaritana? Porque judíos y samaritanos no
             se tratan entre sí.
        - |-
          3. Respondió Jesús y le dijo: Si conocieras el don
             de Dios, y quién es el que te dice: Dame de
             beber, tú le pedirías, y él te daría agua viva.
        - |-
          4. Cualquiera que bebiere de esta agua, volverá a
             tener sed; mas el que bebiere del agua que yo le
             daré, no tendrá sed jamás; sino que el agua que yo
             le daré será en él una fuente de agua que salte
             para vida eterna.
        - |-
          5. La mujer le dijo: Señor, dame esa agua, para que no
             tenga yo sed, ni venga aquí a sacarla.
        - |-
          6. Y creyeron muchos más por la palabra de
             él, y decían a la mujer:
        - |-
          7. Ya no creemos solamente por tu dicho, porque nosotros
             mismos hemos oído, y sabemos que verdaderamente
             éste es el Salvador del mundo, el Cristo.
    - number: 320
      title: Cual la mar hermosa
      verses:
        - |-
          1. Cual la mar hermosa es la paz de Dios,
             fuerte y gloriosa, es eterna paz,
             grande y perfecta, premio de la cruz,
             fruto del Calvario, obra de Jesús.
        - |-
          CORO
            Descansando en Cristo
            siempre paz tendré;
            en Jehová confiando, nada temeré.
        - |-
          2. En el gran refugio de la paz de Dios,
             Nunca hay molestias, es perfecta paz;
             Nunca negra duda, pena ni pesar,
             Vejaciones crueles, pueden acosar.
        - |-
          CORO
            Descansando en Cristo
            siempre paz tendré;
            en Jehová confiando, nada temeré.
        - |-
          3. Toda nuestra vida cuidará Jesús;
             Cristo nunca cambia, él es nuestra paz;
             Fuertes y seguros en el Salvador,
             siempre moraremos en su grande amor.
        - |-
          CORO
            Descansando en Cristo
            siempre paz tendré;
            en Jehová confiando, nada temeré.
        - |-
          4. Oh Señor amado, tú nos das quietud,
             de ti recibimos celestial salud;
             haznos conocerte, te amaremos más;
             sé tú nuestro dueño, Príncipe de paz.
        - |-
          CORO
            Descansando en Cristo
            siempre paz tendré;
            en Jehová confiando, nada temeré.
    - number: 321
      title: Paz con Dios
      verses:
        - |-
          1. Paz con Dios, busqué ganarla
             con febril solicitud,
             Mas mis obras meritorias no me dieron la salud.
        - |-
          CORO
            ¡Oh, qué paz Jesús me da!
            Paz que antes ignoré;
            Todo nuevo se tornó, desde que su paz hallé.
        - |-
          2. Lleno estaba yo de dudas,
             temeroso de morir,
             Hoy en paz, mañana triste con temor del porvenir.
        - |-
          CORO
            ¡Oh, qué paz Jesús me da!
            Paz que antes ignoré;
            Todo nuevo se tornó, desde que su paz hallé.
        - |-
          3. Al final en desespero,
             "Ya no puedo", dije yo;
             Y del cielo oí respuesta,
             "Todo hecho ya quedó".
        - |-
          CORO
            ¡Oh, qué paz Jesús me da!
            Paz que antes ignoré;
            Todo nuevo se tornó, desde que su paz hallé.
        - |-
          4. De mis obras despojado,
             vi la obra de Jesús;
             Supe que la paz fue hecha
             por su sangre en la cruz.
        - |-
          CORO
            ¡Oh, qué paz Jesús me da!
            Paz que antes ignoré;
            Todo nuevo se tornó, desde que su paz hallé.
    - number: 322
      title: Años mi alma en vanidad vivió
      verses:
        - |-
          1. Años mi alma en vanidad vivió,
             Ignorando a quien por mí sufrió
             Y que en el Calvario sucumbió el Salvador.
        - |-
          CORO
            Mi alma allí divina gracia halló;
            Dios allí perdón y paz me dio;
            Del pecado allí me libertó el Salvador.
        - |-
          2. Por la Biblia miro que pequé,
             Y su ley divina quebranté;
             Mi alma entonces contempló con fe
             al Salvador.
        - |-
          CORO
            Mi alma allí divina gracia halló;
            Dios allí perdón y paz me dio;
            Del pecado allí me libertó el Salvador.
        - |-
          3. Toda mi alma a Cristo ya entregué;
             Hoy le quiero y sirvo como a Rey;
             Por los siglos siempre cantaré al Salvador.
        - |-
          CORO
            Mi alma allí divina gracia halló;
            Dios allí perdón y paz me dio;
            Del pecado allí me libertó el Salvador.
        - |-
          4. En la cruz su amor Dios demostró,
             Y de gracia al hombre revistió
             Cuando por nosotros se entregó el Salvador.
        - |-
          CORO
            Mi alma allí divina gracia halló;
            Dios allí perdón y paz me dio;
            Del pecado allí me libertó el Salvador.
    - number: 323
      title: Lejos de mi Padre Dios
      verses:
        - |-
          1. Lejos de mi Padre Dios, por Jesús fui hallado;
             Por su gracia y por su amor fui por él salvado.
        - |-
          CORO
            En Jesús, mi Señor, sea mi gloria eterna;
            El me amó y me salvó por su gracia tierna.
        - |-
          2. En Jesús, mi Salvador, pongo mi confianza;
             Toda mi necesidad suple en abundancia.
        - |-
          CORO
            En Jesús, mi Señor, sea mi gloria eterna;
            El me amó y me salvó por su gracia tierna.
        - |-
          3. Cerca de mi buen Pastor vivo cada día;
             Toda gracia en su Señor halla el alma mía.
        - |-
          CORO
            En Jesús, mi Señor, sea mi gloria eterna;
            El me amó y me salvó por su gracia tierna.
    - number: 324
      title: Jamás, Jamás
      verses:
        - |-
          1. Jamás, jamás
             mis pecados contará;
             Perdonados por siempre,
             y ante mi mente
             Nunca más los ha de mencionar.
        - |-
          2. Jamás oiré de los días de maldad;
             Cristo me ha redimido
             Y ha dado al olvido mi pecar.
    - number: 325
      title: En el monte Calvario
      verses:
        - |-
          1. En el monte Calvario se vio una cruz,
             Emblema de afrenta y dolor.
             Y yo aprecio esa cruz, do murió mi Jesús
             Por salvar al más vil pecador.
        - |-
          CORO
            ¡Cuánto estimo la cruz de Jesús!
            En sus triunfos mi gloria será.
            Y algún día en vez de una cruz,
            mi corona Jesús me dará.
        - |-
          2. En la cruz do su sangre Jesús derramó,
             Hermosura contemplo en visión,
             Pues en ella el Cordero inmolado murió
             Para darme pureza y perdón.
        - |-
          CORO
            ¡Cuánto estimo la cruz de Jesús!
            En sus triunfos mi gloria será.
            Y algún día en vez de una cruz,
            mi corona Jesús me dará.
        - |-
          3. Seguiré a Jesús, tomaré hoy mi cruz,
             Los desprecios con él sufriré;
             Y algún día feliz, con los santos en luz,
             Para siempre su gloria tendré.
        - |-
          CORO
            ¡Cuánto estimo la cruz de Jesús!
            En sus triunfos mi gloria será.
            Y algún día en vez de una cruz,
            mi corona Jesús me dará.
    - number: 326
      title: La hermosa visión de la cruz
      verses:
        - |-
          1. Largos años vague por el valle del mal,
             Sin consuelo, sin fe, sin amor;
             Y la sombra fatal de la senda que hollé
             puso en mi alma la hiel del dolor.
        - |-
          CORO
            A mis pies el infierno se abrió,
            (infierno se abrió,)
            Y clamé con el alma a Jesús;
            Y al instante la escena cambió
            (la escena cambió)
            en la hermosa visión de la cruz.
        - |-
          2. Desde entonces, por él, ya no soy lo que fui,
             Una sombra sin Dios y sin ley;
             Mi existencia le di, y le quiero ser fiel;
             Me constriñe el amor de mi Rey.
        - |-
          CORO
            A mis pies el infierno se abrió,
            (infierno se abrió,)
            Y clamé con el alma a Jesús;
            Y al instante la escena cambió
            (la escena cambió)
            en la hermosa visión de la cruz.
        - |-
          3. Peregrino que vais por el valle del mal,
             Vuestra senda sólo es de dolor;
             Esa carga fatal que en el alma lleváis,
             Ven y ponla a los pies del Señor.
        - |-
          CORO
            A mis pies el infierno se abrió,
            (infierno se abrió,)
            Y clamé con el alma a Jesús;
            Y al instante la escena cambió
            (la escena cambió)
            en la hermosa visión de la cruz.
    - number: 327
      title: Hallé un buen amigo
      verses:
        - |-
          1. Hallé un buen amigo, mi amado Salvador;
             Contaré lo que ha hecho él por mí;
             Hallándome perdido e indigno pecador,
             Me salvó y ya me guarda para sí.
             Me salva del pecado, me guarda de Satán,
             Promete estar conmigo hasta el fin. (¡Aleluya!)
             El consuela mi tristeza, me quita todo afán;
             ¡Grandes cosas Cristo ha hecho para mí!
        - |-
          2. Jesús jamás me falta; jamás me dejará;
             Es mi fuerte y poderoso Protector.
             Del mundo yo me aparto y de la vanidad
             Para consagrar mi vida a mi Señor.
             Si el mundo me persigue, si sufro tentación,
             Confiado en Cristo puedo resistir. (¡Aleluya!)
             La victoria me es segura, y elevo mi canción:
             ¡Grandes cosas Cristo ha hecho para mí!
        - |-
          3. Yo sé que Jesucristo muy pronto volverá,
             Y entre tanto me prepara un lugar
             En casa de su Padre, mansión de luz y paz,
             Do el creyente fiel con él ha de morar.
             Llegando a la gloria, con él yo estaré;
             Contemplaré su rostro siempre allí. (¡Aleluya!)
             Con los santos redimidos gozoso cantaré:
             ¡Grandes cosas Cristo ha hecho para mí!
    - number: 328
      title: Solamente en Cristo
      verses:
        - |-
          1. Solamente en Cristo, solamente en él,
             La salvación se encuentra en él.
             No hay otro nombre dado a los hombres;
             Solamente en Cristo,
             solamente en él.
        - |-
          2. En San Juan catorce y el verso seis,
             Dice Jesús, "Soy la verdad,
             Soy el camino, también la vida;
             Nadie viene al Padre
             sino por mí".
    - number: 329
      title: Fuente de la vida eterna
      verses:
        - |-
          1. Fuente de la vida eterna
             y de toda bendición,
             Ensalzar tu gracia tierna debe cada corazón.
             Tu piedad inagotable, abundante en perdonar,
             Unico Ser adorable, gloria a ti debemos dar.
        - |-
          2. De los cánticos celestes
             te quisiéramos cantar,
             Entonados por las huestes que lograste rescatar.
             Almas que a buscar viniste, porque les tuviste amor;
             De ellas te compadeciste con tiernísimo favor.
        - |-
          3. Toma nuestros corazones,
             llénalos de tu verdad,
             De tu Espíritu los dones, y de toda santidad.
             Guíanos en obediencia humildad y puro amor;
             Nos ampare tu presencia, oh bendito Salvador.
    - number: 330
      title: Hay una senda
      verses:
        - |-
          1. Hay una senda que el mundo no conoce;
             Hay una senda que yo pude encontrar;
             En Cristo tengo la salvación de mi alma;
             Cristo es la senda que me puede salvar.
             En Cristo tengo la salvación de mi alma;
             Cristo es la senda que me puede salvar.
        - |-
          2. Las amistades y todos mis parientes
             Fueron las gentes que yo relacioné;
             Me aborrecieron por causa de su nombre
             Cuando supieron que a Cristo me entregué;
             Me aborrecieron por causa de su nombre
             Cuando supieron que a Cristo me entregué.
        - |-
          3. Y aquel camino de tantos sufrimientos,
             Aquel camino que el cielo me trazó,
             Fue transformado en aquel feliz momento
             Cuando mi Cristo a mí me rescató;
             Fue transformado en aquel feliz momento
             Cuando mi Cristo al cielo me llamó.
    - number: 331
      title: El encuentro con Jesús
      verses:
        - |-
          1. Con Jesús un día me encontré y le expuse mi condición,
             Y a pesar de mi transgresión, Jesucristo me dio el perdón.
        - |-
          CORO
            Ese encuentro con Jesús Nunca lo podré olvidar;
            Por sentirme tan feliz, Jamás yo lo podré abandonar.
        - |-
          2. Esa paz que yo encontré, que consuela mi corazón,
             Nunca la experimenté por mi triste anterior situación.
        - |-
          CORO
            Ese encuentro con Jesús Nunca lo podré olvidar;
            Por sentirme tan feliz, Jamás yo lo podré abandonar.
        - |-
          3. Voy cantando ya por doquier
             Que Jesús me libró del mal; a gran precio él me compró.
             ¡Gloria a Dios por el don celestial!
        - |-
          CORO
            Ese encuentro con Jesús Nunca lo podré olvidar;
            Por sentirme tan feliz, Jamás yo lo podré abandonar.
    - number: 332
      title: Me salvó, me perdonó
      verses:
        - |-
          1. Vagaba por el mundo sin fe, sin esperanza,
             No sabiendo que había un Salvador,
             Que, por librar mi alma de muerte y pecado,
             En el Calvario murió el Buen Pastor.
        - |-
          CORO
            Me salvó, me perdonó,
            mi Jesucristo me redimió.
        - |-
          2. Cuando desalentado estoy en esta vida,
             Con el alma imploro al Salvador,
             Pidiéndole me mande del cielo su consuelo
             Para poder aguantar el cruel dolor.
        - |-
          CORO
            Me salvó, me perdonó,
            mi Jesucristo me redimió.
        - |-
          3. Eres, Jesús, el lirio que perfumó mi vida;
             Me libraste de toda iniquidad;
             Pusiste en mi boca un canto de alabanza;
             Es mi anhelo cumplir tu voluntad.
        - |-
          CORO
            Me salvó, me perdonó,
            mi Jesucristo me redimió.
        - |-
          4. Cerca de ti, oh Cristo, andar yo siempre quiero;
             Me ampara tu sacrosanto amor;
             Sin ti la vida es triste, muy llena de amarguras,
             Pero tú eres mi gran consolador.
        - |-
          CORO
            Me salvó, me perdonó,
            mi Jesucristo me redimió.
    - number: 333
      title: Hay un nombre en la gloria
      verses:
        - |-
          1. Una vez perdido vivía yo Lejos y vagante en error;
             Mas la voz de Cristo me alcanzó;
             Me llamó con tierno amor.
        - |-
          CORO
            Hay un nombre escrito en la gloria;
            Mío es, (mío es,) sí, mío es; (mío es;)
            Y los ángeles cantan la historia,
            "Salvo es el pecador". (pecador.)
            Oh hay un nombre escrito en la gloria;
            Mío es, (mío es,) sí, mío es; (mío es;)
            Todos mis pecados ya son perdonados,
            ¡Gloria al Señor!
        - |-
          2. En la Biblia dice que salvo soy;
             Por la gracia me redimió;
             Ya por fe en su nombre a la gloria voy,
             Desde que me rescató.
        - |-
          CORO
            Hay un nombre escrito en la gloria;
            Mío es, (mío es,) sí, mío es; (mío es;)
            Y los ángeles cantan la historia,
            "Salvo es el pecador". (pecador.)
            Oh hay un nombre escrito en la gloria;
            Mío es, (mío es,) sí, mío es; (mío es;)
            Todos mis pecados ya son perdonados,
            ¡Gloria al Señor!
        - |-
          3. Cantos de alegría elevo hoy
             a mi Rey y buen Salvador;
             Todos mis talentos a Cristo doy,
             que me use por su amor.
        - |-
          CORO
            Hay un nombre escrito en la gloria;
            Mío es, (mío es,) sí, mío es; (mío es;)
            Y los ángeles cantan la historia,
            "Salvo es el pecador". (pecador.)
            Oh hay un nombre escrito en la gloria;
            Mío es, (mío es,) sí, mío es; (mío es;)
            Todos mis pecados ya son perdonados,
            ¡Gloria al Señor!
    - number: 334
      title: Cuán bueno es Dios
      verses:
        - |-
          1. Cuán bueno es Dios, cuán bueno es Dios,
             Cuán bueno es Dios, su amor me dio.
        - |-
          2. Es siempre fiel, es siempre fiel,
             Es siempre fiel, no me dejará.
        - |-
          3. Me cuidará, me cuidará,
             Me cuidará, es mi buen Pastor.
        - |-
          4. Le serviré, le serviré,
             Le serviré, viviré por él.
    - number: 335
      title: Salvos por gracia
      verses:
        - |-
          1. Dios, que es rico en misericordia, por su gran amor con
             que nos amó,
        - |-
          2. Aun estando nosotros muertos en pecados, nos dio
             vida juntamente con Cristo (por gracia sois salvos),
        - |-
          3. En quien tenemos redención por su sangre, el perdón de
             pecados según las riquezas de su gracia,...no por obras,
             para que nadie se gloríe.
        - |-
          4. Y en ningún otro hay salvación; porque no hay otro
             nombre bajo el cielo, dado a los hombres, en que
             podamos ser salvos.
    - number: 336
      title: Mi culpa él llevó
      verses:
        - |-
          1. Cansado y triste vine al Salvador;
             mi culpa él llevó, mi culpa él llevó;
             Eterna dicha hallé en su amor; Mi culpa él llevó.
        - |-
          CORO
            Mi culpa él llevó, mi culpa él llevó;
            Alegre siempre cantaré.
            Al Señor gozoso alabaré, porque él me salvó.
        - |-
          2. Borrados todos mis pecados son;
             mi culpa él llevó, mi culpa él llevó;
             A él feliz elevo mi canción; mi culpa él llevó.
        - |-
          CORO
            Mi culpa él llevó, mi culpa él llevó;
            Alegre siempre cantaré.
            Al Señor gozoso alabaré, porque él me salvó.
        - |-
          3. Ya vivo libre de condenación;
             mi culpa él llevó, mi culpa él llevó;
             Su dulce paz tengo en mi corazón; mi culpa él llevó.
        - |-
          CORO
            Mi culpa él llevó, mi culpa él llevó;
            Alegre siempre cantaré.
            Al Señor gozoso alabaré, porque él me salvó.
        - |-
          4. Si vienes hoy a Cristo, pecador,
             tu culpa llevará, tu culpa llevará;
             Perdon tendrás si acudes al Señor; tu culpa llevará.
        - |-
          ULTIMO CORO
            Tu culpa llevará, tu culpa llevará,
            y limpiará tu corazón;
            Y dirás feliz en tu canción: "Mi culpa él llevó".
    - number: 337
      title: El vino a mi corazón
      verses:
        - |-
          1. Cuan glorioso es el cambio
             operado en mi ser,
             Viniendo a mi vida el Señor;
             Hay en mi alma una paz que yo ansiaba tener,
             La paz que me trajo su amor.
        - |-
          CORO
            El vino a mi corazón,
            él vino a mi corazón.
            Soy feliz con la vida que Cristo me dio;
            El vino a mi corazón.
        - |-
          2. Ya no voy por la senda que el mal me trazó,
             Do sólo encontré confusión;
             Mis pecados pasados Jesús los borró;
             El vino a mi corazón.
        - |-
          CORO
            El vino a mi corazón,
            él vino a mi corazón.
            Soy feliz con la vida que Cristo me dio;
            El vino a mi corazón.
        - |-
          3. Ni una sombra de duda oscurece su amor,
             Amor que me trajo el perdón;
             La esperanza que aliento la debo al Señor;
             El vino a mi corazón.
        - |-
          CORO
            El vino a mi corazón,
            él vino a mi corazón.
            Soy feliz con la vida que Cristo me dio;
            El vino a mi corazón.
    - number: 338
      title: A su nombre gloria
      verses:
        - |-
          1. Junto a la cruz, do murió el Salvador
             Por mis pecados, clamé con fervor;
             ¡Qué maravilla! Jesús me salvó.
             ¡A su nombre gloria!
        - |-
          CORO
            ¡A su nombre gloria!
            ¡A su nombre gloria!
            ¡Qué maravilla! Jesús me salvó.
            ¡A su nombre gloria!
        - |-
          2. Junto a la cruz recibí el perdón;
             Limpio en su sangre es mi corazón;
             Llena es mi alma de gozo y paz:
             ¡A su nombre gloria!
        - |-
          CORO
            ¡A su nombre gloria!
            ¡A su nombre gloria!
            ¡Qué maravilla! Jesús me salvó.
            ¡A su nombre gloria!
        - |-
          3. Ven sin tardar a la cruz, pecador;
             Allí te espera Jesús, Salvador.
             Allí de Dios hallarás el amor:
             ¡A su nombre gloria!
        - |-
          CORO
            ¡A su nombre gloria!
            ¡A su nombre gloria!
            ¡Qué maravilla! Jesús me salvó.
            ¡A su nombre gloria!
    - number: 339
      title: Comprado con sangre por Cristo
      verses:
        - |-
          1. Comprado con sangre por Cristo,
             Con gozo al cielo yo voy;
             Librado por gracia infinita, ya sé que su hijo yo soy.
        - |-
          CORO
            Lo sé, (Lo sé,) lo sé, (lo sé,)
            Comprado con sangre yo soy;
            Lo sé, (Lo sé,) lo sé, (lo sé,) con Cristo al cielo yo voy.
        - |-
          2. Soy libre de pena y culpa;
             su gozo él me hace sentir;
             El llena de gracia mi alma; con él es tan dulce vivir.
        - |-
          CORO
            Lo sé, (Lo sé,) lo sé, (lo sé,)
            Comprado con sangre yo soy;
            Lo sé, (Lo sé,) lo sé, (lo sé,) con Cristo al cielo yo voy.
        - |-
          3. En Cristo yo siempre medito,
             Y nunca le puedo olvidar;
             Callar sus favores no quiero; voy siempre a Jesús alabar.
        - |-
          CORO
            Lo sé, (Lo sé,) lo sé, (lo sé,)
            Comprado con sangre yo soy;
            Lo sé, (Lo sé,) lo sé, (lo sé,) con Cristo al cielo yo voy.
        - |-
          4. Yo sé que me espera corona,
             La cual a los fieles dará
             Jesús Salvador en el cielo; mi alma con él estará.
        - |-
          CORO
            Lo sé, (Lo sé,) lo sé, (lo sé,)
            Comprado con sangre yo soy;
            Lo sé, (Lo sé,) lo sé, (lo sé,) con Cristo al cielo yo voy.
    - number: 340
      title: Escogido fui de Dios
      verses:
        - |-
          1. Escogido fui de Dios en el Amado;
             En lugares celestiales su bendición me dio.
             Antes de la creación el plan fue hecho
             Por su santa voluntad.
        - |-
          CORO
            Escondido en Cristo estoy,
            nadie me apartará,
            Y las fuerzas de este mundo no me podrán dañar.
            Vivo y ando en esta vida con seguridad,
            Porque me escogió mi Dios.
        - |-
          2. Tengo un sello que el Espíritu me ha dado
             Cuando mi confianza puse sólo en mi Salvador,
             Prenda que el Señor me dio de vida eterna;
             Escogido fui de Dios.
        - |-
          CORO
            Escondido en Cristo estoy,
            nadie me apartará,
            Y las fuerzas de este mundo no me podrán dañar.
            Vivo y ando en esta vida con seguridad,
            Porque me escogió mi Dios.
        - |-
          3. Me escogió para alabanza de su gloria,
             Y sentóme en las alturas con Cristo mi Señor.
             Grande fue la admiración al ver su gracia,
             Cuando me escogió mi Dios.
        - |-
          CORO
            Escondido en Cristo estoy,
            nadie me apartará,
            Y las fuerzas de este mundo no me podrán dañar.
            Vivo y ando en esta vida con seguridad,
            Porque me escogió mi Dios.
    - number: 341
      title: Vida Eterna
      verses:
        - |-
          1. Dios nos ha dado vida eterna;
             y esta vida está en su Hijo.
             Dios nos ha dado vida eterna;
             y esta vida está en su Hijo.
        - |-
          2. El que tiene al Hijo,
             tiene la vida;
             El que no tiene al Hijo de Dios
             No tiene la vida.
        - |-
          3. Dios nos ha dado vida eterna;
             y esta vida está en su Hijo.
             Dios nos ha dado vida eterna;
             y esta vida está en su Hijo.
    - number: 342
      title: Un gran Salvador es Jesús
      verses:
        - |-
          1. Un gran Salvador es Jesús el Señor,
             Un gran Salvador para mí.
             Protege mi vida de todo temor, refugio me ofrece aquí.
        - |-
          CORO
            Protege mi alma de todo temor,
            la libra de toda ansiedad.
            Mis dudas quitó y yo sé que su amor
            feliz protección me dará,
        - |-
          2. Un gran Salvador es Jesús el Señor,
             mi horrendo pecado quitó.
             Me guarda y sostiene feliz en su amor,
             mi vida del mal redimió.
        - |-
          CORO
            Protege mi alma de todo temor,
            la libra de toda ansiedad.
            Mis dudas quitó y yo sé que su amor
            feliz protección me dará,
        - |-
          3. Raudales de gracia recibo de él,
             raudales de paz y virtud;
             Su Espíritu inunda del todo mi ser,
             de gozo, sin par plenitud.
        - |-
          CORO
            Protege mi alma de todo temor,
            la libra de toda ansiedad.
            Mis dudas quitó y yo sé que su amor
            feliz protección me dará,
        - |-
          4. Al ser transportado en las nubes feliz,
             con gloria mi Dios a encontrar,
             Su amor infinito, su gracia sin fin,
             mis labios habrán de alabar.
        - |-
          CORO
            Protege mi alma de todo temor,
            la libra de toda ansiedad.
            Mis dudas quitó y yo sé que su amor
            feliz protección me dará,
    - number: 343
      title: Yo te bendigo
      verses:
        - |-
          1. Yo te bendigo, oh mi Redentor,
             tú, la confianza de mi corazón;
             Ya que sufriste por mi condición,
             Quita mis penas, quita mi temor.
        - |-
          2. Tú eres Rey de gracia y perdón;
             omnipotente reinas por doquier;
             Señor Jesús, domina nuestro ser;
             tu luz alumbre siempre el corazón.
        - |-
          3. Eres la vida, nuestra inspiración;
             en ti descansa todo mi querer;
             Sosténnos siempre por tu gran poder,
             y en la prueba danos protección.
        - |-
          4. Tu providencia guarda del azar
             en esta corta vida terrenal;
             Otra esperanza no hay para el mortal;
             tus fuerzas siempre nos harán triunfar.
             Amén.
    - number: 344
      title: Yo sé a quién he creído
      verses:
        - |-
          1. No sé por qué la gracia del Señor
             a mí un día me alcanzó,
             Ni sé por qué obró la salvación
             en un indigno como yo.
        - |-
          CORO
            Mas yo sé a quién he creído,
            y es poderoso para guardarme
            Seguro hasta el día en que venga él por mí.
        - |-
          2. No sé por qué la gracia del Señor
             en mí él quiso demostrar,
             Ni sé por qué cuando era pecador
             por mí su vida vino a dar.
        - |-
          CORO
            Mas yo sé a quién he creído,
            y es poderoso para guardarme
            Seguro hasta el día en que venga él por mí.
        - |-
          3. No sé cómo es que su Espíritu
             convence al hombre de su error,
             Ni cómo obra en el corazón
             creando fe en el Señor.
        - |-
          CORO
            Mas yo sé a quién he creído,
            y es poderoso para guardarme
            Seguro hasta el día en que venga él por mí.
        - |-
          4. No sé cuándo el Señor regresará,
             De noche o al amanecer,
             Ni sé si por la muerte he de pasar
             O vivo subiré con él.
        - |-
          CORO
            Mas yo sé a quién he creído,
            y es poderoso para guardarme
            Seguro hasta el día en que venga él por mí.
    - number: 345
      title: Mi fe descansa en Jesús
      verses:
        - |-
          1. Mi fe descansa en Jesús, y en su redención;
             Confiando solamente en él, obtengo salvación.
        - |-
          CORO
            No necesito obra hacer, ni rito observar;
            Me basta que Jesús murió; murió en mi lugar.
        - |-
          2. Su obra suficiente es, mi pena él pagó;
             Su sangre cubre mi maldad, pues él me redimió.
        - |-
          CORO
            No necesito obra hacer, ni rito observar;
            Me basta que Jesús murió; murió en mi lugar.
        - |-
          3. Yo nada puedo agregar, descanso sólo en él;
             Seguridad perfecta da por su promesa fiel.
        - |-
          CORO
            No necesito obra hacer, ni rito observar;
            Me basta que Jesús murió; murió en mi lugar.
    - number: 346
      title: Del amor divino
      verses:
        - |-
          1. Del amor divino, ¿quién me apartará?
             Escondido en Cristo, ¿quién me tocará?
             Si Dios justifica, ¿quién condenará?
             Cristo por mí aboga, ¿quién me acusará?
        - |-
          CORO
            A los que a Dios aman,
            todo ayuda a bien;
            Esto es mi consuelo, esto es mi sostén.
        - |-
          2. Todo lo que pasa en mi vida aquí
             obra para bien, pues cuida él de mí.
             En mis pruebas duras, Dios me es siempre fiel.
             ¿Por qué, pues, las dudas? yo descanso en él.
        - |-
          CORO
            A los que a Dios aman,
            todo ayuda a bien;
            Esto es mi consuelo, esto es mi sostén.
        - |-
          3. Plagas hay y muerte en mi alrededor;
             Ordenó mi suerte el que es Dios de amor.
             Ni una sola flecha me podrá dañar;
             Mientras no permita, no me alcanzará.
        - |-
          CORO
            A los que a Dios aman,
            todo ayuda a bien;
            Esto es mi consuelo, esto es mi sostén.
    - number: 347
      title: Bajo sus alas
      verses:
        - |-
          1. Bajo sus alas habito seguro,
             en densa noche y en cruel tempestad;
             Confiar yo puedo, pues sé que él me guarda;
             Me ha rescatado su inmensa bondad.
        - |-
          CORO
            Seguro estoy, seguro estoy,
            ¿Quién de Jesús me separa?
            Seguro estoy en su gran amor;
            Salvo y seguro él me guarda.
        - |-
          2. Bajo sus alas refugio encuentro,
             En la tristeza, dolor y aflicción;
             Cuando temores y pruebas me asaltan,
             Cristo me cubre con su protección.
        - |-
          CORO
            Seguro estoy, seguro estoy,
            ¿Quién de Jesús me separa?
            Seguro estoy en su gran amor;
            Salvo y seguro él me guarda.
        - |-
          3. Bajo sus alas hay gozo inefable;
             Paz y certeza me da mi Señor.
             No puede mal ni enemigo vencerme;
             Salvo y seguro estoy en su amor.
        - |-
          CORO
            Seguro estoy, seguro estoy,
            ¿Quién de Jesús me separa?
            Seguro estoy en su gran amor;
            Salvo y seguro él me guarda.
    - number: 348
      title: Pues si vivimos
      verses:
        - |-
          1. Pues si vivimos, para él vivimos,
             Y si morimos, para él morimos.
             Sea que vivamos, o que muramos,
             Somos del Señor, somos del Señor.
        - |-
          2. Sea que vivamos, o que muramos,
             Somos del Señor, somos del Señor.
    - number: 349
      title: Del santo amor de Cristo
      verses:
        - |-
          1. Del santo amor de Cristo que no tendrá su igual,
             De su divina gracia, sublime y eternal,
             De su misericordia, inmensa como el mar
             Y cual los cielos alta, con gozo he de cantar.
        - |-
          CORO
            El amor de mi Señor grande y dulce es más y más;
            (El amor de mi Señor grande y dulce es más y más;)
            Rico e inefable, nada es comparable al amor de mi Jesús.
        - |-
          2. Cuando él vivió en el mundo la gente lo siguió,
             Sus penas y angustias en él depositó;
             Entonces, bondadoso, su amor brotó en raudal
             Incontenible, inmenso, venciendo todo mal.
        - |-
          CORO
            El amor de mi Señor grande y dulce es más y más;
            (El amor de mi Señor grande y dulce es más y más;)
            Rico e inefable, nada es comparable al amor de mi Jesús.
        - |-
          3. El puso en las pupilas del ciego nueva luz,
             la eterna luz de vida que brilla de la cruz,
             Y dio a sus seguidores la gloria de su ser
             Al impartir su gracia, su Espíritu y poder.
        - |-
          CORO
            El amor de mi Señor grande y dulce es más y más;
            (El amor de mi Señor grande y dulce es más y más;)
            Rico e inefable, nada es comparable al amor de mi Jesús.
        - |-
          4. Su amor, por las edades del mundo, es el fanal
             que marca esplendoroso la senda celestial,
             Y el paso de los años lo hará más dulce y más
             Precioso al darle al alma su incomparable paz.
        - |-
          CORO
            El amor de mi Señor grande y dulce es más y más;
            (El amor de mi Señor grande y dulce es más y más;)
            Rico e inefable, nada es comparable al amor de mi Jesús.
    - number: 350
      title: Confío en Jesús
      verses:
        - |-
          1. Confío en Jesús,
             el que por mí murió,
             Y que por mis pecados en la cruz pagó.
        - |-
          CORO
            Por mí (Por mí) murió, (murió,)
            y vive hoy; (por mí él vive, vive hoy;)
            Por toda la eternidad loor le doy.
        - |-
          2. No hay mérito en mí,
             indigno pecador;
             Mi única esperanza es el Salvador.
        - |-
          CORO
            Por mí (Por mí) murió, (murió,)
            y vive hoy; (por mí él vive, vive hoy;)
            Por toda la eternidad loor le doy.
        - |-
          3. Jesús en gloria está;
             por mí aboga allí;
             Sus manos traspasadas muestra él por mí.
        - |-
          CORO
            Por mí (Por mí) murió, (murió,)
            y vive hoy; (por mí él vive, vive hoy;)
            Por toda la eternidad loor le doy.
        - |-
          4. Su gracia me mostró;
             la gozo hoy por fe;
             Y en su obra en la cruz descansaré.
        - |-
          CORO
            Por mí (Por mí) murió, (murió,)
            y vive hoy; (por mí él vive, vive hoy;)
            Por toda la eternidad loor le doy.
    - number: 351
      title: Amarte sólo a ti, Señor
      verses:
        - |-
          1. Amarte sólo a ti, Señor,
             amarte sólo a ti, Señor,
             amarte sólo a ti, Señor, y hacer tu voluntad;
             Seguir tu caminar, Señor,
             seguir sin desmayar, Señor,
             seguir hasta el final, Señor, y no mirar atrás.
             Seguir tu caminar, Señor,
             seguir sin desmayar, Señor,
             seguir hasta el final, Señor, y no mirar atrás.
        - |-
          2. Confiar tan sólo en ti, Señor,
             confiar tan sólo en ti, Señor,
             confiar tan sólo en ti,Señor,
             y hacer tu voluntad;
             Seguir tu caminar, Señor,
             seguir sin desmayar, Señor,
             seguir hasta el final, Señor, y no mirar atrás.
             Seguir tu caminar, Señor,
             seguir sin desmayar, Señor,
             seguir hasta el final, Señor, y no mirar atrás.
    - number: 352
      title: Ya pertenezco a Cristo
      verses:
        - |-
          1. Cristo el Señor me ama por siempre,
             mi vida guarda él tiernamente.
             Vence el pecado,
             cuida del mal, ya pertenezco a él.
        - |-
          CORO
            Ya pertenezco a Cristo, él pertenece a mí,
            No sólo por el tiempo aquí,
            mas por la eternidad.
        - |-
          2. Cristo bajó del cielo a buscarme;
             cubierto de pecado encontróme:
             Me levantó de vergüenzas mil,
             ya pertenezco a él.
        - |-
          CORO
            Ya pertenezco a Cristo, él pertenece a mí,
            No sólo por el tiempo aquí,
            mas por la eternidad.
        - |-
          3. Gozo indecible inunda mi alma.
             Ya libertado estoy y mi vida
             Llena está de felicidad;
             ya pertenezco a él.
        - |-
          CORO
            Ya pertenezco a Cristo, él pertenece a mí,
            No sólo por el tiempo aquí,
            mas por la eternidad.
    - number: 353
      title: Un mandamiento nuevo
      verses:
        - |-
          1. Un mandamiento nuevo os doy:
             Que os améis unos a otros.
             Un mandamiento nuevo os doy:
             Que os améis unos a otros.
             Como yo os he amado,
             como yo os he amado,
             Que os améis también vosotros.
        - |-
          2. Amémonos de corazón,
             no de labios solamente.
             Amémonos de corazón, no de labios solamente.
             Para cuando Cristo venga,
             para cuando Cristo venga
             nos encuentre bien unidos.
        - |-
          3. Y ¿Cómo puedo yo orar
             resentido con mi hermano?
             Y ¿Cómo puedo yo orar resentido con mi hermano?
             Dios no escucha la oración,
             Dios no escucha la oración
             si no estoy reconciliado.
    - number: 354
      title: El amor permanecerá
      verses:
        - |-
          1. Si yo hablase en lenguas
             Y no tengo amor,
             Soy metal que resuena; Vengo a ser sin valor.
        - |-
          CORO
            Permanecen la fe,
            La esperanza, el amor, pero debes tener
            El mayor de los tres.
            El amor siempre es; todo se acabará,
            Pero éste permanecerá.
        - |-
          2. El amor es sufrido;
             No se irrita, es benigno.
             Nunca busca lo suyo; ¡oh, excelso camino!
        - |-
          CORO
            Permanecen la fe,
            La esperanza, el amor, pero debes tener
            El mayor de los tres.
            El amor siempre es; todo se acabará,
            Pero éste permanecerá.
        - |-
          3. Sigue, pues, este amor;
             Nunca dejes de amar;
             Lograrás así a Dios con tu vida agradar.
        - |-
          CORO
            Permanecen la fe,
            La esperanza, el amor, pero debes tener
            El mayor de los tres.
            El amor siempre es; todo se acabará,
            Pero éste permanecerá.
    - number: 355
      title: La gente de nuestro tiempo
      verses:
        - |-
          1. La gente de nuestro tiempo
             no sabe lo que es el amor,
             Que vive perdiendo el tiempo,
             buscando y sin encontrar.
        - |-
          CORO
            Amor (amor, amor) es entregarse
            En alma y cuerpo a la humanidad;
            Vivir (vivir, vivir) siempre sirviendo,
            Sin que tú esperes algo para ti.
        - |-
          2. En Cristo yo he encontrado
             ejemplo de paz y de amor.
             La muerte del crucificado
             me cuenta de su gran amor.
        - |-
          CORO
            Amor (amor, amor) es entregarse
            En alma y cuerpo a la humanidad;
            Vivir (vivir, vivir) siempre sirviendo,
            Sin que tú esperes algo para ti.
        - |-
          3. Y siempre debes hablar que
             en Cristo sí hay salvación,
             Llevando el grato mensaje
             de muerte y resurrección.
        - |-
          CORO
            Amor (amor, amor) es entregarse
            En alma y cuerpo a la humanidad;
            Vivir (vivir, vivir) siempre sirviendo,
            Sin que tú esperes algo para ti.
    - number: 356
      title: Mi Paz
      verses:
        - |-
          1. Mi paz te doy a ti,
             Es la paz que el mundo no da,
             Es la paz que el mundo no entiende.
             Para ti, recíbela, mi paz te doy a ti.
        - |-
          2. Mi amor te doy a ti,
             Es amor que el mundo no da,
             Es amor que el mundo no entiende.
             Para ti, recíbelo, mi amor te doy a ti.
    - number: 357
      title: Amor, Amor
      verses:
        - |-
          1. Amor, amor, amor, amor;
             Cristo dice, "Debes amar".
             Ama a tu vecino como a tu hermano.
             Dios es amor.
    - number: 358
      title: Somos uno en espíritu
      verses:
        - |-
          1. Somos uno en espíritu, somos uno en el Señor;
             Somos uno en espíritu, somos uno en el Señor;
             Y pedimos que todos sean uno,
             Y pedimos que todos sean uno,
             Un solo amor, un solo corazón.
        - |-
          2. Llevaremos las cargas unos de otros,
             Llevaremos las cargas unos de otros;
             Y así cumpliremos la ley del Señor,
             Y así cumpliremos la ley del Señor,
             Un solo amor, un solo corazón.
    - number: 359
      title: El gozo del Señor
      verses:
        - |-
          1. El gozo del Señor mi fortaleza es,
             Su gozo sin medida él me da.
        - |-
          2. Si tienes ese gozo puedes tú cantar,
             Su gozo sin medida él me da.
        - |-
          3. Me da del agua viva; sed no tengo más;
             Su gozo sin medida él me da.
    - number: 360
      title: Canten con alegría
      verses:
        - |-
          1. Canten con alegría las alabanzas
             de Cristo el Rey; Anden en los caminos
             que nos mostrara su augusta grey.
             Vivan los redimidos en las
             victorias del Vencedor;
             Para que todos juntos veamos las glorias del Redentor.
        - |-
          2. Cristo es la luz del mundo, y el que
             le sigue, la luz tendrá; Cristo es el pan
             de vida, y el que de él come no morirá.
             Cristo es la fuente viva, y el que de él bebe
             no tendrá sed; Y si queréis la vida,
             id a la fuente y allí bebed.
        - |-
          3. Cristo es, de las ovejas que él redimiera,
             su Buen Pastor; Vino para salvarlas,
             pero sufriendo cruento dolor. Y al derramar
             su sangre en el madero de aquella cruz,
             Vida, paz y esperanza, y eterna
             gloria nos dio Jesús.
        - |-
          4. Ahora ya no estoy triste sino que vivo
             siempre feliz, con la dulce esperanza
             de que algún día iré al país, ese país
             amado donde moradas fue a preparar
             Cristo, el Pastor Eterno, que a sus
             ovejas vino a salvar.
    - number: 361
      title: Grande gozo hay en mi alma
      verses:
        - |-
          1. Grande gozo hay en mi alma hoy, pues Jesús
             conmigo está, y su paz, que ya gozando
             estoy, por siempre durará.
        - |-
          CORO
            Grande gozo, ¡Cuán hermoso!
            (Grande gozo para mí, ¡Cuán hermoso con Jesús!)
            Paso todo el tiempo bien feliz; (bien feliz)
            Porque veo de Cristo la sonriente faz,
            Grande gozo siento en mí.
        - |-
          2. Hay un canto en mi alma hoy,
             Melodías a mi Rey; en su amor feliz
             y libre soy, y salvo por la fe.
        - |-
          CORO
            Grande gozo, ¡Cuán hermoso!
            (Grande gozo para mí, ¡Cuán hermoso con Jesús!)
            Paso todo el tiempo bien feliz; (bien feliz)
            Porque veo de Cristo la sonriente faz,
            Grande gozo siento en mí.
        - |-
          3. Paz divina hay en mi alma hoy, porque Cristo
             me salvó; las cadenas rotas ya están;
             Jesús me libertó.
        - |-
          CORO
            Grande gozo, ¡Cuán hermoso!
            (Grande gozo para mí, ¡Cuán hermoso con Jesús!)
            Paso todo el tiempo bien feliz; (bien feliz)
            Porque veo de Cristo la sonriente faz,
            Grande gozo siento en mí.
        - |-
          4. Gratitud hay en mi alma hoy, y alabanzas
             a Jesús; por su gracia a la gloria voy,
             gozándome en la luz.
        - |-
          CORO
            Grande gozo, ¡Cuán hermoso!
            (Grande gozo para mí, ¡Cuán hermoso con Jesús!)
            Paso todo el tiempo bien feliz; (bien feliz)
            Porque veo de Cristo la sonriente faz,
            Grande gozo siento en mí.
    - number: 362
      title: Solo no estoy
      verses:
        - |-
          1. Solo no estoy, Jesús está a mi lado,
             Amigo fiel que no me dejará. Solo no estoy;
             En tempestad o en calma
             Mi buen Jesús Su protección me da.
        - |-
          2. Aunque la tempestad me azote,
             Y el mundo me desprecie,
             No temeré llevar la cruz,
             Pues me guía con su amor.
        - |-
          3. Así camino con pleno gozo;
             Solo no estoy, Jesús conmigo está.
    - number: 363
      title: Oh mi santo Dios
      verses:
        - |-
          1. Oh mi santo Dios,
             Mi alma espera en ti, y anhela descanso en ti.
        - |-
          CORO
            En tu seno, oh Dios,
            Siempre me cuidarás y tu paz eternal me darás.
        - |-
          2. La serenidad
             Que en Dios encontré cada día alienta mi fe.
        - |-
          CORO
            En tu seno, oh Dios,
            Siempre me cuidarás y tu paz eternal me darás.
        - |-
          3. Si muriera hoy,
             Al celeste hogar yo iría con Dios a morar.
        - |-
          CORO
            En tu seno, oh Dios,
            Siempre me cuidarás y tu paz eternal me darás.
    - number: 364
      title: Jehová es mi Pastor
      verses:
        - |-
          1. Jehová es mi Pastor, me apacienta con amor,
             En sus pastos delicados paceré;
             Descansando sin temor al abrigo del Señor,
             De las aguas de reposo beberé.
        - |-
          CORO
            El Señor me pastorea,
            nada aquí me faltará;
            Junto a él caminaré, en su brazo confiaré,
            Nada del amor de Dios me apartará.
        - |-
          2. Mi Pastor me guardará, siempre me confortará,
             Por las sendas de justicia me guiará;
             En el tiempo de dolor me será Consolador;
             En mi corazón su paz infundirá.
        - |-
          CORO
            El Señor me pastorea,
            nada aquí me faltará;
            Junto a él caminaré, en su brazo confiaré,
            Nada del amor de Dios me apartará.
        - |-
          3. ¡Oh, tan fiel es mi Pastor! Tan constante
             es en su amor que mi copa rebosando
             siempre está; Cuando en valle oscuro esté,
             Mal ninguno temeré;
             A la casa de mi Dios iré a morar.
        - |-
          CORO
            El Señor me pastorea,
            nada aquí me faltará;
            Junto a él caminaré, en su brazo confiaré,
            Nada del amor de Dios me apartará.
    - number: 365
      title: Los que esperan en Jehová
      verses:
        - |-
          1. Los que esperan en Jehová
             Nuevas fuerzas poseerán;
             Caminando sin descansar, nunca se fatigarán.
        - |-
          CORO
            Cual las águilas alzarán,
            Con el poder de Cristo el Rey,
            Fuertes alas para volar, los que esperan en Jehová.
        - |-
          2. En los brazos de mi Jesús,
             Hay lugar de consuelo y luz;
             El nos brinda su gozo y paz en el sitio de solaz.
        - |-
          CORO
            Cual las águilas alzarán,
            Con el poder de Cristo el Rey,
            Fuertes alas para volar, los que esperan en Jehová.
    - number: 366
      title: En Jesucristo
      verses:
        - |-
          1. En Jesucristo se halla la paz;
             En horas negras de tempestad
             Tienen las almas dulce solaz,
             Grato consuelo, felicidad.
        - |-
          CORO
            Gloria cantemos al Redentor
            Que por nosotros quiso morir;
            Y que la gracia del Salvador
            Siempre dirija nuestro vivir.
        - |-
          2. En nuestras luchas, en el dolor,
             En tristes horas de tentación,
             Calma le infunde, santo vigor,
             Nuevos alientos al corazón.
        - |-
          CORO
            Gloria cantemos al Redentor
            Que por nosotros quiso morir;
            Y que la gracia del Salvador
            Siempre dirija nuestro vivir.
        - |-
          3. Cuando en la lucha falta la fe
             Y el alma vese desfallecer,
             Cristo nos dice: "Siempre os daré
             Gracia divina, santo poder".
        - |-
          CORO
            Gloria cantemos al Redentor
            Que por nosotros quiso morir;
            Y que la gracia del Salvador
            Siempre dirija nuestro vivir.
    - number: 367
      title: Confiado Estoy
      verses:
        - |-
          1. Se oculta el sol; La noche cerca está
             Y el día que se fue no volverá jamás;
             Y yo seguro dormiré, sabiendo que mi Dios
             Me velará también.
        - |-
          CORO
            Confiado estoy en mi Señor;
            Libra mi alma de temor;
            Le obedecí; Me rescató y con sus alas me cubrió.
            Confiado estoy en mi Señor;
            El es mi guía y pastor; Sé que mi vida cuidará
            Y que hasta el fin me guardará.
        - |-
          2. Igual que hoy más días pasarán,
             Y algunos que, tal vez, el sol no lucirá.
             Sé bien que Dios conmigo está,
             Y aquel que espera en él, en paz descansará.
        - |-
          CORO
            Confiado estoy en mi Señor;
            Libra mi alma de temor;
            Le obedecí; Me rescató y con sus alas me cubrió.
            Confiado estoy en mi Señor;
            El es mi guía y pastor; Sé que mi vida cuidará
            Y que hasta el fin me guardará.
        - |-
          3. Pensando estoy que triste debe ser
             Vivir sin su calor, vivir sin entender
             Que al fin la vida acabará y verás que andar
             sin Dios es sólo vanidad.
        - |-
          CORO
            Confiado estoy en mi Señor;
            Libra mi alma de temor;
            Le obedecí; Me rescató y con sus alas me cubrió.
            Confiado estoy en mi Señor;
            El es mi guía y pastor; Sé que mi vida cuidará
            Y que hasta el fin me guardará.
    - number: 368
      title: Día en día
      verses:
        - |-
          1. Día en día Cristo está conmigo;
             Me consuela en medio del dolor,
             Pues confiando en su poder eterno,
             No me afano, ni me da temor.
             Sobrepuja todo entendimiento
             La perfecta paz del Salvador.
             En su amor tan grande e infinito
             Siempre me dará lo que es mejor.
        - |-
          2. Día en día Cristo me acompaña
             Y me brinda dulce comunión.
             Todos mis cuidados él los lleva;
             A él le entrego mi alma y corazón.
             No hay medida del amor supremo
             De mi bondadoso y fiel Pastor.
             El me suple lo que necesito,
             Pues el pan de vida es mi Señor.
        - |-
          3. Oh Señor, ayúdame este día
             A vivir de tal manera aquí
             Que tu nombre esté glorificado,
             Pues anhelo honrarte sólo a ti.
             Con la diestra de tu gran justicia
             Me sustentas en la turbación.
             Tus promesas son sostén y guía;
             Siempre en ellas hay consolación.
    - number: 369
      title: Cuando Cristo vino
      verses:
        - |-
          1. Cuando Cristo vino a mi corazón,
             Mi vida entera cambió.
             Su paz y su amor alejaron de mí
             Las dudas, las sombras y el temor.
        - |-
          CORO
            Mi vida comenzó cuando el Señor llegó,
            Y hoy puedo cantar yo de su amor.
            Mi vida comenzó cuando el Señor llegó,
            Y hoy puedo cantar yo de su amor.
        - |-
          2. Hoy quiero que Cristo te transforme a ti,
             Que cambie tu vida también;
             Oh, piensa en la cruz donde murió por ti
             Y ábrele ya tu corazón.
        - |-
          CORO
            Mi vida comenzó cuando el Señor llegó,
            Y hoy puedo cantar yo de su amor.
            Mi vida comenzó cuando el Señor llegó,
            Y hoy puedo cantar yo de su amor.
    - number: 370
      title: La paz con Dios
      verses:
        - |-
          1. Justificados, pues, por la fe, tenemos
             paz para con Dios por medio de nuestro
             Señor Jesucristo.
        - |-
          2. En él tenemos libertad y acceso
             a Dios con confianza, por medio
             de la fe en él.
    - number: 371
      title: Cuán dulce es confiar
      verses:
        - |-
          1. ¡Cuán dulce es confiar en Cristo
             Y entregarse todo a él,
             Esperar en sus promesas,
             Y en sus sendas serle fiel!
        - |-
          CORO
            Jesucristo, Jesucristo,
            Ya tu amor probaste en mí;
            Jesucristo, Jesucristo,
            Siempre confiaré en ti.
        - |-
          2. Dulce sí es confiar en Cristo
             Y cumplir su voluntad,
             No dudando su palabra,
             Que es la luz y la verdad.
        - |-
          CORO
            Jesucristo, Jesucristo,
            Ya tu amor probaste en mí;
            Jesucristo, Jesucristo,
            Siempre confiaré en ti.
        - |-
          3. Siempre en ti confiar yo quiero,
             Mi precioso Salvador;
             En la vida y en la muerte
             Protección me dé tu amor.
        - |-
          CORO
            Jesucristo, Jesucristo,
            Ya tu amor probaste en mí;
            Jesucristo, Jesucristo,
            Siempre confiaré en ti.
    - number: 372
      title: Jesús me pastorea
      verses:
        - |-
          1. Jesús me pastorea,
             Camino yo con él;
             Con él, con él,
             Camino yo con él.
    - number: 373
      title: Estoy Bien
      verses:
        - |-
          1. De paz inundada mi senda está
             O cúbrala un mar de aflicción,
             Cualquiera que sea mi suerte, diré:
             "Estoy bien, tengo paz, ¡Gloria a Dios!"
        - |-
          CORO
            Estoy bien, (Estoy bien,)
            ¡Gloria a Dios! (¡Gloria a Dios!)
            Tengo paz en mi ser, ¡Gloria a Dios!
        - |-
          2. Ya venga la prueba o me tiente Satán,
             No amengua mi fe ni mi amor;
             Pues Cristo comprende mis luchas, mi afán,
             Y su sangre obrará en mi favor.
        - |-
          CORO
            Estoy bien, (Estoy bien,)
            ¡Gloria a Dios! (¡Gloria a Dios!)
            Tengo paz en mi ser, ¡Gloria a Dios!
        - |-
          3. Feliz yo me siento al saber que Jesús
             Libróme de yugo opresor;
             Quitó mi pecado, clavólo en la cruz;
             Gloria demos al buen Salvador.
        - |-
          CORO
            Estoy bien, (Estoy bien,)
            ¡Gloria a Dios! (¡Gloria a Dios!)
            Tengo paz en mi ser, ¡Gloria a Dios!
        - |-
          4. La fe tornarése en feliz realidad
             Al irse la niebla veloz;
             Desciende Jesús con su gran majestad,
             ¡Aleluya, estoy bien con mi Dios!
        - |-
          CORO
            Estoy bien, (Estoy bien,)
            ¡Gloria a Dios! (¡Gloria a Dios!)
            Tengo paz en mi ser, ¡Gloria a Dios!
    - number: 374
      title: Sigo confiando en Jesús
      verses:
        - |-
          1. Sigo confiando en Jesús mi Salvador;
             Sigo confiando en Jesús, no tendré temor;
             Si vienen pruebas y afán puedo cantar;
             Sigo confiando en Jesús, nunca faltará.
        - |-
          2. Es amigo fiel, Tan fiel para mí,
             Me ayudará Hasta el fin.
             Si vienen pruebas y afán puedo cantar;
             Sigo confiando en Jesús, nunca faltará.
    - number: 375
      title: Siempre conmigo está
      verses:
        - |-
          1. He visto el fúlgido rayo, y oído el trueno rugir;
             Las olas con su estallido queríanme destruir;
             Oí la voz de mi Cristo, calmó la cruel tempestad;
             Pues prometió no dejarme; siempre conmigo está.
        - |-
          CORO
            No me desamparará, ni me dejará,
            Pues prometió no dejarme; él conmigo está.
            No me desamparará, ni me dejará,
            Pues prometió no dejarme; siempre conmigo está.
        - |-
          2. Mundanas nubes me envuelven, y tentaciones también;
             Ante Jesús se disuelven, Jesús es mi sostén;
             Me guarda en todo peligro, su protección él me da;
             Pues prometió no dejarme; siempre conmigo está.
        - |-
          CORO
            No me desamparará, ni me dejará,
            Pues prometió no dejarme; él conmigo está.
            No me desamparará, ni me dejará,
            Pues prometió no dejarme; siempre conmigo está.
        - |-
          3. Por mí murió en el Monte, por mí su sangre vertió,
             Por mí abrió esa fuente que libertad me dio.
             Me espera allí en la gloria, sentado en gran majestad;
             Y desde allí me promete siempre conmigo estar.
        - |-
          CORO
            No me desamparará, ni me dejará,
            Pues prometió no dejarme; él conmigo está.
            No me desamparará, ni me dejará,
            Pues prometió no dejarme; siempre conmigo está.
    - number: 376
      title: Confiad en Jehová
      verses:
        - |-
          1. Tú guardarás en completa paz
             A aquel cuyo pensamiento
             En ti persevera, en ti persevera;
             Porque en ti ha confiado.
        - |-
          2. Confiad en Jehová perpetuamente
             Porque en Jehová el Señor está
             la fortaleza de los siglos;
             Confiad en Jehová.
    - number: 377
      title: Descanso en ti
      verses:
        - |-
          1. Descanso en ti, mi Defensor y Escudo,
             Pues en la lid contigo a salvo estoy;
             En tu poder a combatir acudo;
             Descanso en ti, y en tu nombre voy.
        - |-
          2. Oh Salvador, voy en tu santo nombre,
             Tu nombre amado, digno de loor,
             Justicia, paz y redención del hombre,
             Rey de la gloria y Príncipe de amor.
        - |-
          3. Por fe yo voy, sintiendo mi flaqueza,
             Mas en tu gracia apoyado estoy;
             En tu poder está mi fortaleza;
             Descanso en ti, y en tu nombre voy.
        - |-
          4. Descansaré contigo al fin en gloria,
             Entrando por portales de esplendor.
             Tuya es la lucha, tuya la victoria,
             Y la alabanza a ti será, Señor.
             Amén
    - number: 378
      title: Noble Sostén
      verses:
        - |-
          1. Noble sostén de la esperanza mía,
             Fuente bendita de la vida eterna,
             Tan sólo el alma que en tus fuerzas fía
             Tiene paz, tiene paz.
        - |-
          CORO
            Mi sostén es Jesús,
            Nunca en la lucha desmayar podré;
            Mi sostén es Jesús (el Señor),
            Nunca en la lucha desmayar podré.
        - |-
          2. Yo soy muy débil, pero en ti soy fuerte;
             Nunca en la lucha desmayar podré;
             Si tu estás conmigo, ni a la misma muerte
             Temeré, temeré.
        - |-
          CORO
            Mi sostén es Jesús,
            Nunca en la lucha desmayar podré;
            Mi sostén es Jesús (el Señor),
            Nunca en la lucha desmayar podré.
        - |-
          3. Dura es la lucha, difícil la tarea,
             Mas tú me dotas de tu gran poder;
             Mi espíritu renuevas con la idea nueva
             De vencer, de vencer.
        - |-
          ULTIMO CORO
            Alelú, alelú,
            nunca en la lucha desmayar podré;
            Alelú, aleluya,
            nunca en la lucha desmayar podré.
    - number: 379
      title: Anímate y esfuérzate
      verses:
        - |-
          1. David dijo a su hijo:
             "No temas, ni desmayes
             Porque Jehová mi Dios estará contigo".
        - |-
          CORO
            Anímate y esfuérzate,
            Y manos a la obra,
            Anímate y esfuérzate; y manos a la obra.
        - |-
          2. "El no te dejará
             Ni te desampará
             Hasta que acabes toda la obra de Dios".
        - |-
          CORO
            Anímate y esfuérzate,
            Y manos a la obra,
            Anímate y esfuérzate; y manos a la obra.
    - number: 380
      title: Límpiame, Señor
      verses:
        - |-
          1. Límpiame, Señor, de toda mi maldad;
             Borra mi pecado, dame santidad.
             Quiero por tu sangre el perdón gozar;
             Límpiame, Señor, para adorar.
        - |-
          2. Límpiame, Señor, de toda mi maldad;
             Sé que no busqué hacer tu voluntad.
             Te confieso, Cristo, que rebelde fui;
             Líbrame, Señor; acudo a ti.
        - |-
          3. Líbrame, Señor, tu voz escucharé;
             Con humilde corazón te seguiré.
             En sinceridad te quiero alabar;
             Libre estoy, Señor, para adorar.
    - number: 381
      title: Tú me perdonas, Señor
      verses:
        - |-
          1. De una misma boca proceden bendición y
             maldición. Hermanos míos, esto no debe ser así.
        - |-
          2. Porque donde hay celos y contensión,
             allí hay perturbación y toda obra perversa.
        - |-
          3. Someteos, pues, a Dios; resistid al diablo, y huirá
             de vosotros.
        - |-
          4. Acercaos a Dios, y él se acercará a vosotros.
        - |-
          5. Pecadores, limpiad las manos; y vosotros
             los de doble ánimo, purificad vuestros corazones.
        - |-
          6. Si andamos en luz, como él está en luz,
             tenemos comunión unos con otros,
        - |-
          7. Y la sangre de Jesucristo su Hijo nos limpia de
             todo pecado.
        - |-
          8. Si confesamos nuestros pecados, él es fiel
             y justo para perdonar nuestros pecados,
             y limpiarnos de toda maldad.
        - |-
          9. Hijitos míos, estas cosas os escribo para que no
             pequéis;
        - |-
          10. Y si alguno hubiere pecado, abogado
              tenemos para con el Padre, a Jesucristo el
              justo.
        - |-
          11. Examíname, oh Dios, y conoce mi corazón;
              Pruébame y conoce mis pensamientos;
        - |-
          12. Y ve si hay en mí camino de perversidad,
              y guíame en el camino eterno.
    - number: 382
      title: Mi corazón, oh examina hoy
      verses:
        - |-
          1. Mi corazón, oh examina hoy;
             Mis pensamientos prueba, oh Señor.
             Ve si en mí perversidades hay;
             Por sendas rectas guíame por tu amor.
        - |-
          2. Límpiame, Dios, de toda mi maldad;
             Aviva hoy mi errante corazón.
             Quiero andar contigo en santidad;
             Llena mi vida de tu bendición.
    - number: 383
      title: Si fui motivo de dolor
      verses:
        - |-
          1. Si fui motivo de dolor, oh Cristo,
             Si por mi causa el débil tropezó,
             Si en tus pisadas caminar no quise,
             Perdón te ruego, mi Señor y Dios.
        - |-
          CORO
            Escucha, oh Dios, mi confesión humilde
            Y líbrame de tentación sutil;
            Oh, guarda siempre mi alma en tu rebaño;
            Perdón te ruego, mi Señor y Dios.
        - |-
          2. Si vana y fútil mi palabra ha sido,
             Si al que sufría, en su dolor dejé,
             Si sólo agrado mío he buscado,
             Perdón te ruego, mi Señor y Dios.
        - |-
          CORO
            Escucha, oh Dios, mi confesión humilde
            Y líbrame de tentación sutil;
            Oh, guarda siempre mi alma en tu rebaño;
            Perdón te ruego, mi Señor y Dios.
        - |-
          3. Si por la vida quise andar sin penas,
             Tranquilo, libre y sin luchar por ti,
             Cuando anhelabas verme en la lucha,
             Perdón te ruego, mi Señor y Dios.
        - |-
          CORO
            Escucha, oh Dios, mi confesión humilde
            Y líbrame de tentación sutil;
            Oh, guarda siempre mi alma en tu rebaño;
            Perdón te ruego, mi Señor y Dios.
    - number: 384
      title: Haz lo que quieras
      verses:
        - |-
          1. Haz lo que quieras de mí, Señor;
             Tú el Alfarero, yo el barro soy;
             Dócil y humilde anhelo ser;
             Cúmplase siempre en mí tu querer.
        - |-
          2. Haz lo que quieras de mí, Señor;
             Mírame y prueba mi corazón;
             Lávame y quita toda maldad
             Para que tuyo sea en verdad.
        - |-
          3. Haz lo que quieras de mí, Señor;
             Cura mis llagas y mi dolor;
             Tuyo es, oh Cristo, todo poder;
             Tu mano extiende y sana mi ser.
        - |-
          4. Haz lo que quieras de mí, Señor;
             Del Paracleto dame la unción;
             Dueño absoluto sé de mi ser;
             Que el mundo a Cristo
             pueda en mí ver.
    - number: 385
      title: Perdón
      verses:
        - |-
          1. Jehová tardo para la ira;
             Jehová grande en misericordia;
             Que perdona la iniquidad,
             Que perdona la rebelión;
        - |-
          2. Perdona ahora la iniquidad,
             Perdona ahora la gran rebelión
             De este pueblo, según la grandeza
             De tu divina misericordia.
    - number: 386
      title: Cristo es mi dulce Salvador
      verses:
        - |-
          1. Cristo es mi dulce Salvador,
             mi bien, mi paz, mi luz;
             Mostróme su infinito amor muriendo en dura cruz.
             Cuando estoy triste encuentro en él
             Consolador y amigo fiel;
             Consolador, amigo fiel, es Jesús.
        - |-
          2. Cristo es mi dulce Salvador;
             su sangre me compró;
             Con sus heridas y dolor, perfecta paz me dio.
             Dicha inmortal allí tendré, con Cristo siempre reinaré;
             Dicha inmortal allí tendré con Jesús.
        - |-
          3. Cristo es mi dulce Salvador, mi eterno Redentor;
             ¡Oh! nunca yo podré pagar la deuda de su amor.
             Le seguiré, pues, en la luz;
             no temeré llevar su cruz;
             No temeré llevar la cruz de Jesús.
        - |-
          4. Cristo es mi dulce Salvador, por él salvado soy,
             La Roca de la Eternidad, en quien seguro estoy.
             Gloria inmortal allí tendré,
             con Cristo siempre reinaré;
             Gloria inmortal allí tendré con Jesús.
    - number: 387
      title: Dulce Comunión
      verses:
        - |-
          1. Dulce comunión la que gozo ya
             En los brazos de mi Salvador;
             ¡Qué gran bendición en su paz me da!
             ¡Oh! yo siento en mí su tierno amor.
        - |-
          CORO
            Libre, salvo, del pecado y del temor;
            Libre, salvo, en los brazos de mi Salvador.
        - |-
          2. ¡Cuán dulce es vivir, cuán dulce es gozar!
             En los brazos de mi Salvador;
             Allí quiero ir y con él morar,
             Siendo objeto de su tierno amor.
        - |-
          CORO
            Libre, salvo, del pecado y del temor;
            Libre, salvo, en los brazos de mi Salvador.
        - |-
          3. No hay que temer, ni que desconfiar,
             En los brazos de mi Salvador;
             Por su gran poder él me guardará
             De los lazos del engañador.
        - |-
          CORO
            Libre, salvo, del pecado y del temor;
            Libre, salvo, en los brazos de mi Salvador.
    - number: 388
      title: Hay Momentos
      verses:
        - |-
          1. Hay momentos que las palabras no me alcanzan
             Para decirte lo que siento por ti, mi buen Jesús.
        - |-
          2. Hay momentos que las palabras no me alcanzan
             Para decirte lo que siento por ti, mi buen Jesús.
        - |-
          3. Yo te agradezco por todo lo que has hecho,
             Por todo lo que haces, y todo lo que harás.
        - |-
          4. Yo te agradezco por todo lo que has hecho,
             Por todo lo que haces, y todo lo que harás.
    - number: 389
      title: Amarte es lo mejor
      verses:
        - |-
          1. Amarte, Dios, es lo mejor
             que puedo hacer;
             A tu amor yo quiero siempre responder.
             Quiero amarte más, quiero amarte más;
             Amarte, Dios, es lo mejor que puedo hacer.
        - |-
          2. Servirte, Dios, es lo mejor
             que puedo hacer;
             A tu amor yo quiero siempre responder.
             Quiero servirte más, quiero servirte más;
             Servirte, Dios, es lo mejor
             que puedo hacer.
    - number: 390
      title: Cristo vive en mí
      verses:
        - |-
          1. Con Cristo he sido juntamente
             crucificado, crucificado;
             Y ya no vivo yo,
             sino que Cristo vive en mí.
        - |-
          2. Lo que ahora vivo en la carne,
             lo vivo por la fe en el Hijo de Dios
             Quien me amó y se entregó
             a sí mismo por mí,
             Quien me amó y se entregó
             a sí mismo por mí.
    - number: 391
      title: Ciertamente el bien de Dios
      verses:
        - |-
          1. Yo fui peregrino errabundo;
             en la garras del mal me envolví.
             Mas Cristo apartóme del mundo
             Y por siempre mi alma le di.
        - |-
          CORO
            Ciertamente el bien
            y la compasión de Dios,
            Hasta el fin, hasta el fin me seguirán.
            Ciertamente el bien y la compasión de Dios,
            Hasta el fin, hasta el fin me seguirán.
        - |-
          2. Jesús mi alma triste conforta;
             Nuevas fuerzas a diario tendré.
             Su fuente de paz no se agota,
             en su hogar celestial moraré.
        - |-
          CORO
            Ciertamente el bien
            y la compasión de Dios,
            Hasta el fin, hasta el fin me seguirán.
            Ciertamente el bien y la compasión de Dios,
            Hasta el fin, hasta el fin me seguirán.
        - |-
          3. Si ando en el valle de sombra,
             Va conmigo mi buen Salvador.
             Si tú quieres que él te proteja,
             Hoy recibe su gracia y amor.
        - |-
          CORO
            Ciertamente el bien
            y la compasión de Dios,
            Hasta el fin, hasta el fin me seguirán.
            Ciertamente el bien y la compasión de Dios,
            Hasta el fin, hasta el fin me seguirán.
            Y en la casa de Dios moraré por siempre;
            Y comeré de la mesa de Jehová.
            Ciertamente el bien y la compasión de Dios,
            Hasta el fin, hasta el fin me seguirán.
    - number: 392
      title: Comunión con Cristo
      verses:
        - |-
          1. Lo que hemos visto y oído lo anunciamos
             también a vosotros, para que vosotros
             también tengáis comunión con nosotros.
        - |-
          2. Y nuestra comunión es con el Padre
             y con su Hijo Jesucristo.
        - |-
          3. Si decimos que tenemos comunión con él y andamos
             en tinieblas, mentimos y no practicamos la verdad.
        - |-
          4. Permaneced en él para que, cuando
             aparezca, tengamos confianza y no nos
             avergoncemos delante de él, en su venida.
        - |-
          5. Amados, ahora somos hijos de Dios, y aún
             no se ha manifestado lo que seremos.
        - |-
          6. Pero sabemos que cuando él sea
             manifestado, seremos semejantes a él,
             porque le veremos tal como él es.
        - |-
          7. Y todo aquel que tiene esta esperanza en él,
             se purifica a sí mismo, como él también es puro.
        - |-
          8. Ahora vemos oscuramente por medio de un
             espejo, pero entonces veremos cara a cara.
        - |-
          9. Ahora conozco en parte, pero entonces conoceré
             plenamente, así como fui conocido.
        - |-
          10. Y ahora permanecen la fe, la esperanza
              y el amor, estos tres;
        - |-
          11. Pero el mayor de ellos es el amor.
        - |-
          12. Fiel es Dios, por medio de quien
              fuisteis llamados a la comunión de
              su Hijo Jesucristo, nuestro Señor.
    - number: 393
      title: A los pies de Jesucristo
      verses:
        - |-
          1. A los pies de Jesucristo
             es el sitio aquí mejor,
             Escuchando cual María las palabras de su amor.
             A los pies de Jesucristo, gozaré su comunión,
             Pues su mano fiel y tierna me ha provisto protección.
        - |-
          2. A los pies de Jesucristo,
             hallo tierna compasión;
             El quitó ya mis afanes, y me dio su bendición.
             Puedo yo decirle a Cristo mis cuidados y temor,
             Y con él tendrá mi alma gozo, paz, eterno amor.
        - |-
          3. A los pies de Jesucristo,
             yo tendré su bendición;
             En sus ojos hay dulzura, y en su seno protección.
             ¡Qué feliz es el momento
             que yo paso junto a ti!
             Y anhelo el encuentro cuando vengas tú por mí.
    - number: 394
      title: Cuando andamos con Dios
      verses:
        - |-
          1. Cuando andamos con Dios,
             escuchando su voz,
             Nuestra senda florida será;
             Cumpliremos su ley
             porque es nuestro Rey,
             Y su amor siempre nos guiará.
        - |-
          CORO
            Obedecer, y confiar en Jesús,
            Es la senda marcada para andar en la luz.
        - |-
          2. Cuando Cristo murió
             nuestro llanto enjugó;
             Proclamarle debemos doquier;
             Gozarán del amor del bendito Señor
             Los que humildes le entregan su ser.
        - |-
          CORO
            Obedecer, y confiar en Jesús,
            Es la senda marcada para andar en la luz.
        - |-
          3. No podremos probar
             sus delicias sin par
             Si seguimos mundano el placer;
             Disfrutamos su amor y divino favor
             Al ser fieles en obedecer.
        - |-
          CORO
            Obedecer, y confiar en Jesús,
            Es la senda marcada para andar en la luz.
    - number: 395
      title: Oh Cristo, yo te amo
      verses:
        - |-
          1. ¡Oh Cristo! yo te amo, que mío eres sé;
             Ya todo pecado por ti dejaré.
             ¡Oh Cristo precioso! por ti salvo soy;
             Jesús, si te amaba yo te amo más hoy.
        - |-
          2. Me amaste primero y así te amo a ti,
             Pues sobre el Calvario moriste por mí;
             Por lo que sufriste, mi vida te doy;
             Jesús, si te amaba yo te amo más hoy.
        - |-
          3. Y mientras que viva en este vaivén,
             En la hora final de la muerte también,
             Yo te amaré siempre; cantándote estoy,
             "Jesús, si te amaba yo te amo más hoy".
        - |-
          4. Al fin en tu gloria por gracia entraré
             Y allí con los santos loor te daré;
             Por siglos eternos a cantarte voy,
             "Jesús, si te amaba yo te amo más hoy".
    - number: 396
      title: Oh, Cristo mío, Rey de mi alma
      verses:
        - |-
          1. Oh Cristo mío, Rey de mi alma,
             Salvásteme del mal con gracia sin igual
             Por tu preciosa sangre purísima;
             Ninguna mancha ya me contamina.
        - |-
          CORO
            Tanto me amaste, que te ofreciste,
            Sacrificándote sobre una cruz
            Para mi redención con tanto amor;
            Sé que te amo, Cristo mi Salvador.
        - |-
          2. Cuando iba errante, tú me buscaste,
             No me dejaste perder el alma;
             Por plena gracia compraste mi salud,
             Y me impartiste tu santa virtud.
        - |-
          CORO
            Tanto me amaste, que te ofreciste,
            Sacrificándote sobre una cruz
            Para mi redención con tanto amor;
            Sé que te amo, Cristo mi Salvador.
    - number: 397
      title: En mis angustias
      verses:
        - |-
          1. En mis angustias me ayuda Jesús;
             Sobre mi alma derrama su luz;
             Todos los días consuelo me da;
             Cada momento conmigo está.
        - |-
          CORO
            Cada momento me guardas, Señor,
            Cada momento en gracia y amor;
            Vida abundante yo tengo en ti;
            Cada momento tú vives en mí.
        - |-
          2. Yo acudo al trono de gracia con fe;
             Oye mi voz, y mis lágrimas ve
             Cristo Jesús en el cielo, y allí,
             Cada momento se acuerda de mí.
        - |-
          CORO
            Cada momento me guardas, Señor,
            Cada momento en gracia y amor;
            Vida abundante yo tengo en ti;
            Cada momento tú vives en mí.
        - |-
          3. Cristo es mi Roca, mi Libertador;
             Es mi Escudo, mi gran Defensor;
             El a mi lado en las luchas está
             Cada momento, y ayuda me da.
        - |-
          CORO
            Cada momento me guardas, Señor,
            Cada momento en gracia y amor;
            Vida abundante yo tengo en ti;
            Cada momento tú vives en mí.
    - number: 398
      title: Pacientemente
      verses:
        - |-
          1. (Mujeres) Pacientemente le esperé;
             (Varones) Me oyó, me oyó.
        - |-
          2. (Mujeres) Del hoyo de la destrucción
             (Varones) Me sacó, me sacó.
    - number: 399
      title: Un canto de alabanza
      verses:
        - |-
          1. Al SEÑOR esperé pacientemente, y él se
             inclinó a mí y oyó mi clamor.
        - |-
          2. Me sacó del hoyo de la destrucción,
             del lodo cenagoso; asentó mis pies
             sobre roca, y afirmó mis pasos.
        - |-
          3. Puso en mi boca un cántico nuevo, un
             canto de alabanza a nuestro Dios; muchos
             verán esto y temerán, y confiarán en el SEÑOR.
        - |-
          4. Cuán bienaventurado es el hombre
             que ha puesto en el SEÑOR su confianza,
             y no se ha vuelto a los soberbios ni a los
             que caen en falsedad.
        - |-
          5. Muchas son, SEÑOR, Dios mío, las maravillas
             que tú has hecho, y muchos tus designios para
             con nosotros;
        - |-
          6. Nadie hay que se compare contigo;
             si los anunciara, y hablara de ellos, no
             podrían ser enumerados.
        - |-
          7. Me deleito en hacer tu voluntad, Dios
             mío; tu ley está dentro de mi corazón.
        - |-
          8. He proclamado buenas nuevas
             de justicia en la gran congregación;
        - |-
          9. He aquí, no refrenaré mis labios, oh SEÑOR,
             tú lo sabes.
        - |-
          10. No he escondido tu justicia dentro de mi
              corazón; he proclamado tu fidelidad y
              tu salvación;
        - |-
          11. No he ocultado a la gran congregación tu
              misericordia y tu verdad.
        - |-
          12. Regocíjense y alégrense en ti todos los
              que te buscan; que digan continuamente:
              ¡Engrandecido sea el SEÑOR! los que aman
              tu salvación.
    - number: 400
      title: Quiero cantar una linda canción
      verses:
        - |-
          1. Quiero cantar una linda canción
             De un hombre que me transformó,
             Quiero cantar una linda canción
             De aquel que mi vida cambió.
        - |-
          2. Es mi amigo Jesús, es mi amigo Jesús,
             El es Dios, él es Rey, es amor y verdad.
             Sólo en él encontré esa paz que busqué,
             Sólo en él encontré la felicidad.
        - |-
          3. Cuando Jesús a mi vida llegó
             Esa paz y ese gozo me dio;
             Quiero que sepas que tú también
             Puedes gozar siempre de su amor.
        - |-
          4. Si creyeres en él, si confiares también,
             Su amor te dará, y con él vivirás.
             Como yo, cantarás esta linda canción
             Y amor llevarás a la humanidad.
    - number: 401
      title: Mi pensamiento eres tú, Señor
      verses:
        - |-
          1. Mi pensamiento eres tú, Señor,
             Mi pensamiento eres tú, Señor,
             Porque tú eres mi buen pastor,
             me alimentas con tu amor,
             Y tu Palabra me da vigor,
             seguro estoy;
        - |-
          2. Porque tú eres mi buen pastor,
             me alimentas con tu amor,
             Y tu Palabra me da vigor,
             seguro estoy.
    - number: 402
      title: La vid y los pámpanos
      verses:
        - |-
          1. Yo soy la vid y mi Padre el Labrador,
             Vosotros pámpanos, dice el Salvador.
             Estad en mí (estad en mí) Y yo en ti (y yo en ti)
             Y fruto llevaréis; Porque sin mí (porque sin mí)
             Nada podéis (nada podéis) hacer jamás.
        - |-
          2. Dios nos ha puesto los frutos a llevar
             Que permanezcan como un testimonio a él.
        - |-
          3. El que estuviere en la vid le limpiará,
             Para que frutos abunden más y más.
             Luego pedid (luego pedid) Sin desmayar (sin desmayar)
             Todo lo que deseéis; El Dios de amor (el Dios de amor)
             A quien amáis (a quien amáis) os lo dará.
        - |-
          4. Glorificado así mi Padre es en que llevéis
             mucho fruto y seáis siempre fiel.
        - |-
          5. Por mis palabras vosotros limpios sois;
             Con el amor de mi Padre amo yo.
             Dejad mi amor (dejad mi amor)
             Siempre brillar (siempre brillar)
             Con todo su fulgor; Grato será (grato será)
             Obedecer (obedecer) mi voluntad.
        - |-
          6. Todo mi gozo en vosotros estará
             Y vuestro gozo con fruto cumplido será.
    - number: 403
      title: Oh Dios, revélame tu voluntad
      verses:
        - |-
          1. Oh Dios, revélame tu voluntad;
             La senda hazme ver con claridad
             Por donde debo andar, qué pasos he de dar,
             para poder gozar tu voluntad.
        - |-
          2. Imprime en mí, Señor, tu voluntad;
             Pon en mi corazón seguridad.
             Tu voz anhelo oír haciéndome sentir
             El ansia de cumplir tu voluntad.
        - |-
          3. He de aceptar, Señor, tu voluntad
             En tiempos de dolor y adversidad;
             En medio de aflicción, en prueba y tentación,
             Que sea mi porción tu voluntad.
        - |-
          4. Quiero probar, Señor, tu voluntad,
             Y el gran poder sentir de tu verdad.
             Por fe deseo andar, tu plenitud tomar,
             Y en todo tiempo amar tu voluntad.
        - |-
          5. Cúmplase en mí, Señor, tu voluntad;
             Confío en tu poder y gran bondad.
             Rindo mi ser a ti, que viva Cristo en mí,
             He de cumplir así tu voluntad.
             Amén.
    - number: 404
      title: Oh deja que el Señor
      verses:
        - |-
          1. Oh deja que el Señor
             te envuelva con su Espíritu de amor,
             Satisfaga hoy tu alma y corazón.
             Entrégale lo que te impida
             en tu caminar con Dios
             Y tu vida llenará de bendición.
        - |-
          CORO
            Cristo, oh Cristo, llenanos, Señor.
            Cristo, oh Cristo, llenanos, Señor.
        - |-
          2. Alzamos nuestra voz con gozo,
             Alabando al Señor;
             Con dulzura le entregamos
             nuestro ser.
             Entrega toda tu tristeza
             en el nombre de Jesús
             y abundante vida
             hoy tendrás en él.
        - |-
          CORO
            Cristo, oh Cristo, llenanos, Señor.
            Cristo, oh Cristo, llenanos, Señor.
    - number: 405
      title: Cuán dulce el nombre de Jesús
      verses:
        - |-
          1. ¡Cuán dulce el nombre de Jesús
             Es para el hombre fiel!
             Consuelo, paz, vigor, salud
             Encuentra siempre en él.
        - |-
          2. Al pecho herido fuerzas da,
             Y calma al corazón;
             Al alma hambrienta es cual maná,
             Y alivia su aflicción.
        - |-
          3. Tan dulce nombre es para mí,
             De dones plenitud;
             Raudal que nunca exhausto vi
             De gracia y de salud.
        - |-
          4. Jesús, mi amigo y mi sostén,
             Bendito Salvador,
             Mi vida y luz, mi eterno bien,
             Acepta mi loor.
        - |-
          5. Si es pobre ahora mi cantar,
             Cuando en la gloria esté
             Y allí te pueda contemplar,
             Mejor te alabaré.
    - number: 406
      title: Si dejas tú que Dios te guíe
      verses:
        - |-
          1. Si dejas tú que Dios te guíe,
             confiando solamente en él,
             En tus angustias y conflictos
             tendrás su ayuda grande y fiel.
             El inmutable amor de Dios roca eterna y firme es.
        - |-
          2. Espera en Dios pacientemente,
             con gozo en tu corazón;
             Con gratitud acepta siempre
             del cielo toda bendición.
             Dios quiere siempre lo mejor para los hijos de su amor.
        - |-
          3. En la oración fiel permanece;
             sé obediente a su ley;
             Su protección Dios te ofrece,
             en sus promesas pon tu fe.
             Jehová no olvida nunca al fiel,
             ni al justo que confía en él. Amén
    - number: 407
      title: Me guía él
      verses:
        - |-
          1. Me guía él, con cuánto amor
             me guía siempre mi Señor;
             En todo tiempo puedo ver con cuánto amor me guía él.
        - |-
          CORO
            Me guía él, me guía él
            Con cuánto amor me guía él;
            No abrigo dudas ni temor,
            Pues me conduce el buen Pastor.
        - |-
          2. En el abismo del dolor
             O donde intenso brilla el sol,
             En dulce paz o en lucha cruel,
             Con gran bondad me guía él.
        - |-
          CORO
            Me guía él, me guía él
            Con cuánto amor me guía él;
            No abrigo dudas ni temor,
            Pues me conduce el buen Pastor.
        - |-
          3. La mano quiero yo tomar
             De Cristo y nunca vacilar,
             Cumpliendo con fidelidad
             su sabia y santa voluntad.
        - |-
          CORO
            Me guía él, me guía él
            Con cuánto amor me guía él;
            No abrigo dudas ni temor,
            Pues me conduce el buen Pastor.
        - |-
          4. Y la carrera al terminar,
             El alba eterna al vislumbrar,
             No habrá ni dudas ni temor,
             Pues me guiará mi buen Pastor.
        - |-
          CORO
            Me guía él, me guía él
            Con cuánto amor me guía él;
            No abrigo dudas ni temor,
            Pues me conduce el buen Pastor.
    - number: 408
      title: Cristo es Guía de mi vida
      verses:
        - |-
          1. Cristo es Guía de mi vida,
             ya no hay nada que temer;
             Nunca puedo yo dudarle,
             pues me sabe defender.
             Paz, consuelo y vida eterna
             por la fe yo tengo en él,
             Y con él ya nada temo
             porque Cristo es Guía fiel.
        - |-
          2. Cristo es Guía de mi vida,
             libre estoy de todo afán;
             En las pruebas me da gracia, es de mi alma el vivo Pan.
             Si de sed estoy sufriendo, si mi paso lento va,
             El prepara fuente viva
             que mi ser refrescará.
        - |-
          3. Cristo es Guía de mi vida,
             ¡oh qué plenitud de amor!
             En su hogar celeste ofrece dar descanso el Salvador.
             Cuando de este mundo parta,
             viviré con él, yo sé:
             "Jesucristo fue mi guía", por los siglos cantaré.
    - number: 409
      title: Cristo mi camino guió
      verses:
        - |-
          1. Un día el mundo dejaré;
             a la dorada playa iré;
             Llegando al cielo cantaré,
             "Cristo mi camino guió".
        - |-
          CORO
            Cristo mi camino guió;
            paso a paso me llevó.
            Al final de la jornada,
            a los ángeles diré, "Cristo mi camino guió".
        - |-
          2. Y desde el cielo al revisar
             a mi terrestre caminar,
             Seguro estoy que he de probar:
             Cristo mi camino guió.
        - |-
          CORO
            Cristo mi camino guió;
            paso a paso me llevó.
            Al final de la jornada,
            a los ángeles diré, "Cristo mi camino guió".
        - |-
          3. Mi senda aquí enderezó;
             las sombras negras me quitó;
             Mi corazón él transformó;
             Cristo mi camino guió.
        - |-
          CORO
            Cristo mi camino guió;
            paso a paso me llevó.
            Al final de la jornada,
            a los ángeles diré, "Cristo mi camino guió".
    - number: 410
      title: Que mi vida entera esté
      verses:
        - |-
          1. Que mi vida entera esté consagrada a ti, Señor;
             Que a mis manos pueda guiar el impulso de tu amor.
        - |-
          CORO
            Lávame en tu sangre, Salvador, (mi Salvador),
            Límpiame de toda mi maldad. (de mi maldad).
            Traigo a ti mi vida, para ser, Señor,
            Tuya por la eternidad.
        - |-
          2. Que mis pies tan sólo en pos de lo santo puedan ir,
             Y que a ti, Señor, mi voz se complazca en bendecir.
        - |-
          CORO
            Lávame en tu sangre, Salvador, (mi Salvador),
            Límpiame de toda mi maldad. (de mi maldad).
            Traigo a ti mi vida, para ser, Señor,
            Tuya por la eternidad.
        - |-
          3. Que mi tiempo todo esté consagrado a tu loor,
             Que mis labios al hablar, hablen sólo de tu amor.
        - |-
          CORO
            Lávame en tu sangre, Salvador, (mi Salvador),
            Límpiame de toda mi maldad. (de mi maldad).
            Traigo a ti mi vida, para ser, Señor,
            Tuya por la eternidad.
        - |-
          4. Toma ¡oh Dios! mi voluntad, y hazla tuya, nada más;
             Toma, sí, mi corazón; por tu trono lo tendrás.
        - |-
          CORO
            Lávame en tu sangre, Salvador, (mi Salvador),
            Límpiame de toda mi maldad. (de mi maldad).
            Traigo a ti mi vida, para ser, Señor,
            Tuya por la eternidad.
        - |-
          5. Toma tú mi amor, que hoy a tus pies vengo a poner;
             Toma todo lo que soy; todo tuyo quiero ser.
        - |-
          ULTIMO CORO
            Quiero entregarme a ti señor(a ti señor),
            Quiero siempre andar en santidad (en santidad).
            Traigo a ti mi vida, para ser, Señor,
            Tuya por la eternidad. 
    - number: 411
      title: Cautívame, Señor
      verses:
        - |-
          1. Cautívame, Señor, y libre en ti seré;
             Anhelo ser un vencedor,
             rindiéndome a tus pies.
             No puedo ya confiar tan sólo en mi poder;
             En ti yo quiero descansar, y fuerte habré de ser.
        - |-
          2. Mi débil corazón vacila sin cesar,
             Y es como nave sin timón en turbulento mar.
             Concédele, Señor, perfecta libertad;
             Envuélvele en tu santo amor, y libre así será.
        - |-
          3. Sin fuerzas para amar
             y así mejor vivir;
             Tú solo puedes inspirar el gozo de servir.
             Quisiera desplegar mis alas, oh Señor,
             Mas sólo lo podré lograr
             al soplo de tu amor.
        - |-
          4. Cautívame, Señor, que en ti mi voluntad
             Tendrá un bautismo de vigor,
             firmeza y santidad.
             Podrá la tentación mi vida sacudir;
             No habrá más cierta protección
             que la que encuentre en ti.
    - number: 412
      title: Oh yo quiero andar con Cristo
      verses:
        - |-
          1. ¡Oh! yo quiero andar con Cristo;
             quiero oír su tierna voz,
             Meditar en su palabra,
             siempre andar de él en pos.
             Consagrar a él mi vida, cumplir fiel su voluntad,
             Y algún día con mi Cristo, gozaré la claridad.
        - |-
          CORO
            ¡Oh, yo quiero andar con Cristo!
            ¡Oh, yo quiero vivir con Cristo!
            ¡Oh, yo quiero morir con Cristo!
            Quiero serle un testigo fiel.
        - |-
          2. ¡Oh! yo quiero andar con Cristo;
             él vivió en santidad; En la Biblia yo lo leo,
             y yo sé que es la verdad.
             Cristo era santo en todo, el Cordero de la cruz;
             Quiero ser un fiel cristiano, seguidor de mi Jesús.
        - |-
          CORO
            ¡Oh, yo quiero andar con Cristo!
            ¡Oh, yo quiero vivir con Cristo!
            ¡Oh, yo quiero morir con Cristo!
            Quiero serle un testigo fiel.
        - |-
          3. ¡Oh! yo quiero andar con Cristo; de mi senda es la luz;
             Dejaré el perverso mundo; cargaré aquí mi cruz.
             Este mundo nada ofrece; Cristo ofrece salvación,
             Y es mi dulce esperanza gozar vida eterna en Sion.
        - |-
          CORO
            ¡Oh, yo quiero andar con Cristo!
            ¡Oh, yo quiero vivir con Cristo!
            ¡Oh, yo quiero morir con Cristo!
            Quiero serle un testigo fiel.
    - number: 413
      title: He decidido seguir a Cristo
      verses:
        - |-
          1. He decidido seguir a Cristo,
             He decidido seguir a Cristo,
             No vuelvo atrás, no vuelvo atrás.
        - |-
          2. La vida vieja la he dejado,
             La vida vieja la he dejado,
             No vuelvo atrás, no vuelvo atrás.
        - |-
          3. El Rey de gloria me ha transformado,
             El Rey de gloria me ha transformado,
             No vuelvo atrás, no vuelvo atrás.
    - number: 414
      title: Oh Cristo, anhelo agradarte
      verses:
        - |-
          1. Oh Cristo mío, yo anhelo agradarte,
             Tú que has hecho tanto para mí;
             Haz que mi vida sea rendida,
             Limpia y santa, consagrada a ti.
        - |-
          2. Te necesito, yo soy tan débil;
             Mas con tu ayuda puedo vencer;
             Oh Cristo mío, yo anhelo agradarte,
             Tú que has hecho tanto para mí.
    - number: 415
      title: Busca primero el reino de Dios
      verses:
        - |-
          1. Busca primero el reino de Dios
             Y su justicia perfecta,
             Y lo demás añadido será; Alelú, aleluya.
    - number: 416
      title: Cristo fiel te quiero ser
      verses:
        - |-
          1. Cristo, fiel te quiero ser,
             Dame el poder, dame el poder;
             Yo contigo quiero andar,
             Sin vacilar, sin vacilar.
        - |-
          CORO
            En tus pasos quiero seguir,
            Cerca de ti, cerca de ti;
            Y si encuentro pruebas aquí,
            Dame confianza en ti.
        - |-
          2. Con Jesús yo quiero hablar,
             Sólo con él, sólo con él;
             Paz y gozo yo tendré,
             Al serle fiel, al serle fiel.
        - |-
          CORO
            En tus pasos quiero seguir,
            Cerca de ti, cerca de ti;
            Y si encuentro pruebas aquí,
            Dame confianza en ti.
        - |-
          3. Dame ardiente corazón,
             Lleno de amor, lleno de amor;
             Y tu Espíritu, Señor,
             Como Guiador, como Guiador.
        - |-
          CORO
            En tus pasos quiero seguir,
            Cerca de ti, cerca de ti;
            Y si encuentro pruebas aquí,
            Dame confianza en ti.
        - |-
          4. Cada día quiero cumplir
             Tu voluntad, tu voluntad,
             Y servirte a ti, Señor,
             En humildad, en humildad.
        - |-
          CORO
            En tus pasos quiero seguir,
            Cerca de ti, cerca de ti;
            Y si encuentro pruebas aquí,
            Dame confianza en ti.
    - number: 417
      title: Sed puros y santos
      verses:
        - |-
          1. Sed puros y santos, mirad al Señor;
             Permaneced fieles siempre en oración;
             Leed la Palabra del buen Salvador;
             Socorred al débil, mostrad compasión.
        - |-
          2. Sed puros y santos, andad en la luz;
             Orad en secreto, respuesta vendrá;
             Su Espíritu Santo revela a Jesús,
             Y su semejanza en nosotros pondrá.
        - |-
          3. Sed puros y santos, Jesús nos guiará;
             Seguid su camino, y en él confiad;
             En paz o en pena, la calma dará
             Quien nos ha salvado de nuestra maldad.
    - number: 418
      title: Señor, tú me llamas
      verses:
        - |-
          1. Señor, tú me llamas por mi nombre
             desde lejos; Por mi nombre cada día tú
             me llamas. Señor, tú me ofreces una vida
             santa y limpia; Una vida sin pecado,
             sin maldad.
        - |-
          CORO
            Señor, nada tengo para darte;
            Solamente te ofrezco
            mi vida para que la uses tú.
            Señor, hazme hoy un siervo útil que anuncie
            el mensaje, el mensaje de la cruz.
        - |-
          2. Señor, tú me llamas por mi nombre
             desde lejos; Por mi nombre
             cada día tú me llamas.
             Señor, yo acudo a tu llamado
             a cada instante, pues mi gozo
             es servirte más y más.
        - |-
          CORO
            Señor, nada tengo para darte;
            Solamente te ofrezco
            mi vida para que la uses tú.
            Señor, hazme hoy un siervo útil que anuncie
            el mensaje, el mensaje de la cruz.
        - |-
          3. (Coda)
             Señor, tú me llamas por mi nombre desde lejos;
             Por mi nombre cada día tú me llamas.
    - number: 419
      title: Un vaso nuevo
      verses:
        - |-
          1. Yo quiero ser, Señor amado,
             Como el barro en manos del alfarero;
             Toma mi vida y hazla tuya;
             Yo quiero ser, yo quiero ser
             un vaso nuevo.
    - number: 420
      title: Te vengo a decir
      verses:
        - |-
          1. Te vengo a decir, te vengo a decir,
             oh mi Salvador, que yo te amo a ti,
             que yo te amo a ti, con el corazón.
             Te vengo a decir, te vengo a decir
             toda la verdad; Te quiero, Señor,
             te amo, Señor, con el corazón.
        - |-
          CORO
            Yo quiero cantar, yo quiero cantar
            de gozo y de paz; Yo quiero llorar,
            yo quiero llorar de felicidad.
            Te vengo a decir, toda la verdad;
            Te quiero, Señor, te amo, Señor,
            con el corazón.
        - |-
          2. Te quiero seguir, te quiero seguir,
             oh mi Salvador, y darte mi ser,
             y darte mi ser, mi Amigo, mi Dios.
             Te quiero servir, te quiero servir,
             mi Dios y mi Rey; Te vengo a poner
             todo lo que soy; recíbelo, Dios.
        - |-
          CORO
            Yo quiero cantar, yo quiero cantar
            de gozo y de paz; Yo quiero llorar,
            yo quiero llorar de felicidad.
            Te vengo a decir, toda la verdad;
            Te quiero, Señor, te amo, Señor,
            con el corazón.
    - number: 421
      title: Con mis labios
      verses:
        - |-
          1. Con mis labios y mi vida
             Te alabo, Señor, te alabo, Señor.
             Con mis labios y mi vida
             Te alabo, bendito Señor.
        - |-
          2. Porque tú has sido
             precioso para mí,
             precioso para mí, precioso para mí;
             Porque tú has sido precioso para mí,
             Te alabo, bendito Señor.
    - number: 422
      title: Que el sentir de Jesucristo
      verses:
        - |-
          1. Que el sentir de Jesucristo
             todo el tiempo esté en mí;
             Que su amor mi guía sea
             en lo que hago aquí.
             Que yo pueda su Palabra día en día atesorar;
             Y así en mí su imagen se haga reflejar.
        - |-
          2. Que la paz de Dios mi Padre
             reine en mi corazón;
             Para que a los afligidos dé consolación.
             Que el amor de Jesucristo,
             más profundo que la mar,
             Sea el móvil que me impulse siempre a triunfar.
        - |-
          3. Que yo siga la carrera con paciencia y valor,
             La mirada puesta en Cristo, de mi fe autor.
             Que refleje su belleza al buscar al pecador,
             Y que vean no al siervo, sino a su Señor.
    - number: 423
      title: Hazme un instrumento
      verses:
        - |-
          1. Hazme un instrumento de tu paz;
             donde haya odio lleve tu amor,
             Donde haya heridas lleve tu perdón,
             donde haya dudas, fe en ti.
        - |-
          2. Hazme un instrumento de tu paz;
             Que lleve tu esperanza por doquier;
             Donde hay tinieblas, lleve yo tu luz,
             Donde hay tristeza, gozo en ti.
        - |-
          3. Maestro, yo quisiera aprender
             A no ser consolado sino consolar,
             Ser comprendido sino comprender,
             Ser amado, tanto como amar.
        - |-
          4. Hazme un instrumento de tu paz;
             Pues tu perdón disfruto al perdonar;
             Tu bendición recibo yo al dar,
             Y vivo al morir en ti.
    - number: 424
      title: Dejo el mundo y sigo a Cristo
      verses:
        - |-
          1. Dejo el mundo, y sigo a Cristo,
             porque el mundo pasará,
             Mas su amor, amor bendito,
             por los siglos durará.
        - |-
          CORO
            ¡Oh, qué gran misericordia!
            ¡Oh, de amor, sublime don!
            ¡Plenitud de vida eterna,
            prenda viva de perdón!
        - |-
          2. Dejo el mundo, y sigo a Cristo;
             paz y gozo en él tendré,
             Y al mirar que va conmigo yo feliz caminaré.
        - |-
          CORO
            ¡Oh, qué gran misericordia!
            ¡Oh, de amor, sublime don!
            ¡Plenitud de vida eterna,
            prenda viva de perdón!
        - |-
          3. Dejo el mundo, y sigo a Cristo;
             su sonrisa quiero ver
             Como luz que mi camino
             haga aquí resplandecer.
        - |-
          CORO
            ¡Oh, qué gran misericordia!
            ¡Oh, de amor, sublime don!
            ¡Plenitud de vida eterna,
            prenda viva de perdón!
        - |-
          4. Dejo el mundo, y sigo a Cristo,
             acogiéndome a su cruz,
             Y después iré a verle
             cara a cara en plena luz.
        - |-
          CORO
            ¡Oh, qué gran misericordia!
            ¡Oh, de amor, sublime don!
            ¡Plenitud de vida eterna,
            prenda viva de perdón!
    - number: 425
      title: Bendito el Señor
      verses:
        - |-
          1. Bendito el Señor por su poder,
             bendito el Señor por su amor.
             Bendito el Señor por su poder,
             bendito el Señor por su amor.
        - |-
          2. Te alabamos, Señor, con sinceridad,
             Nos rendimos a ti con integridad.
             Te alabamos, Señor, con sinceridad,
             Nos rendimos a ti
             con integridad.
    - number: 426
      title: Tú has venido a la orilla
      verses:
        - |-
          1. Tú has venido a la orilla,
             no has buscado ni a sabios ni a ricos;
             tan sólo quieres que yo te siga.
        - |-
          CORO
            Señor, me has mirado a los ojos,
            sonriendo has dicho mi nombre,
            en la arena he dejado mi barca,
            junto a ti buscaré otro mar.
        - |-
          2. Tú sabes bien lo que tengo,
             en mi barca no hay oro ni espadas,
             tan sólo redes y mi trabajo.
        - |-
          CORO
            Señor, me has mirado a los ojos,
            sonriendo has dicho mi nombre,
            en la arena he dejado mi barca,
            junto a ti buscaré otro mar.
        - |-
          3. Tú necesitas mis manos,
             mi cansancio que a otros descanse,
             amor que quiera seguir amando.
        - |-
          CORO
            Señor, me has mirado a los ojos,
            sonriendo has dicho mi nombre,
            en la arena he dejado mi barca,
            junto a ti buscaré otro mar.
        - |-
          4. Tú, pescador de otros mares,
             ansia eterna de almas que esperan,
             amigo bueno, que así me llamas.
        - |-
          CORO
            Señor, me has mirado a los ojos,
            sonriendo has dicho mi nombre,
            en la arena he dejado mi barca,
            junto a ti buscaré otro mar.
    - number: 427
      title: Dios cuidará de ti
      verses:
        - |-
          1. En tus afanes y en tu dolor, Dios cuidará de ti;
             Bajo las alas de su amor, Dios cuidará de ti.
        - |-
          CORO
            Dios cuidará de ti, y por doquier contigo irá;
            Dios cuidará de ti, nada te faltará.
        - |-
          2. Si desfalleces en tu labor, Dios cuidará de ti;
             Si ves peligros en derredor, Dios cuidará de ti.
        - |-
          CORO
            Dios cuidará de ti, y por doquier contigo irá;
            Dios cuidará de ti, nada te faltará.
        - |-
          3. Nunca en la prueba sucumbirás, Dios cuidará de ti,
             En su regazo te apoyarás, Dios cuidará de ti.
        - |-
          CORO
            Dios cuidará de ti, y por doquier contigo irá;
            Dios cuidará de ti, nada te faltará.
    - number: 428
      title: Vencedor
      verses:
        - |-
          1. Muchas veces he pensado,
             De problemas tan cargado, me pregunto,
             ¿por qué hay tanta prueba y dolor?
             Pero en cada circunstancia
             Dios me da más de su gracia,
             Y me muestra que soy más que vencedor.
        - |-
          CORO
            ¡Vencedor! (Yo soy) ¡Vencedor!
            Yo en Cristo he confiado, mi fe está en Dios;
            ¡Vencedor! (Yo soy) ¡Vencedor!
            Sí, ahora yo soy más que vencedor (vencedor).
        - |-
          2. En el mundo agitado,
             De la multitud rodeado,
             Nadie ve mi soledad y llanto, Señor;
             Mas en cada hora oscura,
             Tu Espíritu asegura
             Que contigo yo soy más que vencedor.
        - |-
          CORO
            ¡Vencedor! (Yo soy) ¡Vencedor!
            Yo en Cristo he confiado, mi fe está en Dios;
            ¡Vencedor! (Yo soy) ¡Vencedor!
            Sí, ahora yo soy más que vencedor (vencedor).
        - |-
          3. Gracias doy por las victorias;
             Gracias doy por las derrotas.
             A Dios gracias por el duelo abrumador.
             A través de los problemas
             Veo sus misericordias,
             Y en todo yo soy más que vencedor.
        - |-
          CORO
            ¡Vencedor! (Yo soy) ¡Vencedor!
            Yo en Cristo he confiado, mi fe está en Dios;
            ¡Vencedor! (Yo soy) ¡Vencedor!
            Sí, ahora yo soy más que vencedor (vencedor).
    - number: 429
      title: Yo no quiero pecar
      verses:
        - |-
          1. Yo no quiero pecar, yo no quiero errar;
             Ofender a mi Dios, yo no quiero jamás.
             Quiero andar en la luz que me da mi Jesús;
             Mas no quiero pecar contra Dios.
        - |-
          2. Santamente vivir es la vida mejor;
             Es la vida que agrada y deleita al Señor;
             Santamente vivir es la vida mejor,
             Es la vida que agrada al Señor.
    - number: 430
      title: Entenderemos
      verses:
        - |-
          1. Cuando tentado, yo he deseado
             Saber por qué hay muchos aquí
             Que andan sin pruebas y sin cuidado
             Mientras el mal me asecha a mí.
        - |-
          CORO
            Entenderemos nuestras angustias,
            Entenderemos nuestro pesar;
            Hermano mío, nunca desmayes,
            Todo en el cielo se ha de aclarar.
        - |-
          2. "Hasta la muerte", dijo el Maestro,
             "Serás tú fiel y trabajarás;
             Todo tu afán habrás de dejarlo,
             Cuando al celeste hogar entrarás".
        - |-
          CORO
            Entenderemos nuestras angustias,
            Entenderemos nuestro pesar;
            Hermano mío, nunca desmayes,
            Todo en el cielo se ha de aclarar.
        - |-
          3. Cuando vendrá Jesús de la gloria,
             Todos al cielo nos llevará;
             Cuando le veamos en aquel día,
             Lo entenderemos, sí, más allá.
        - |-
          CORO
            Entenderemos nuestras angustias,
            Entenderemos nuestro pesar;
            Hermano mío, nunca desmayes,
            Todo en el cielo se ha de aclarar.
    - number: 431
      title: Tentado, no cedas
      verses:
        - |-
          1. Tentado, no cedas, ceder es pecar;
             Mejor es con Cristo luchar y triunfar.
             ¡Valor, pues cristiano! domina tu mal,
             Dios puede librarte de asalto mortal.
        - |-
          CORO
            En Jesús, pues confía;
            en sus brazos tu alma
            Hallará dulce calma; él te hará vencedor.
        - |-
          2. Evita el pecado, procura agradar
             A Dios, a quien debes por siempre ensalzar.
             No manches tus labios; gobierna tu voz;
             Tu corazón guarda de ofensas a Dios.
        - |-
          CORO
            En Jesús, pues confía;
            en sus brazos tu alma
            Hallará dulce calma; él te hará vencedor.
        - |-
          3. Fiel a la Palabra y enérgico sé;
             En Cristo tu amigo pon toda tu fe.
             Sé siempre honesto; de Dios es tu ser.
             Corona te espera, y vas a vencer.
        - |-
          CORO
            En Jesús, pues confía;
            en sus brazos tu alma
            Hallará dulce calma; él te hará vencedor.
    - number: 432
      title: Firme Estaré
      verses:
        - |-
          1. Cristo guarda siempre, puedo en él
             confiar; No me deja nunca,
             puedo en él confiar, pues, cual la Roca
             eterna de los siglos, Firme estaré.
        - |-
          CORO
            ¡Nada, no, nada me ha de mover! (¡No , nada!)
            ¡Nada, no, nada me ha de mover! Pues, cual la Roca
            eterna de los siglos, Firme estaré.
        - |-
          2. Fuerte es Jesucristo, puedo en él
             confiar; Todo me ha provisto,
             puedo en él confiar, pues, cual la Roca
             eterna de los siglos, Firme estaré.
        - |-
          CORO
            ¡Nada, no, nada me ha de mover! (¡No , nada!)
            ¡Nada, no, nada me ha de mover! Pues, cual la Roca
            eterna de los siglos, Firme estaré.
        - |-
          3. En la noche oscura, puedo en él
             confiar; Mi alma está segura,
             puedo en él confiar, pues, cual la Roca
             eterna de los siglos, Firme estaré.
        - |-
          CORO
            ¡Nada, no, nada me ha de mover! (¡No , nada!)
            ¡Nada, no, nada me ha de mover! Pues, cual la Roca
            eterna de los siglos, Firme estaré.
        - |-
          4. Muchos me abandonan, puedo en él
             confiar; Otros me engañan,
             puedo en él confiar, pues, cual la Roca
             eterna de los siglos, Firme estaré.
        - |-
          CORO
            ¡Nada, no, nada me ha de mover! (¡No , nada!)
            ¡Nada, no, nada me ha de mover! Pues, cual la Roca
            eterna de los siglos, Firme estaré.
    - number: 433
      title: Después de la tormenta
      verses:
        - |-
          1. Después de la tormenta
             viene la calma, viene la paz;
             Si a Cristo, de rodillas, tú se la pides, él te la da.
             No importa que legiones
             del enemigo te hagan sufrir,
             Si al nombre de mi Cristo,
             sagrado nombre, tendrán que huir.
        - |-
          2. La noche más oscura
             tiene su aurora, tiene su albor;
             La vida más perdida tiene esperanza del Salvador.
             No importa que el pecado
             te haya manchado con su maldad,
             Pues Cristo te perdona y te corona de santidad.
        - |-
          3. Jesús hoy nos invita con voz bendita a ir a él;
             Su paz nos asegura en prueba dura; es siempre fiel.
             Con Cristo triunfaremos
             y en él tenemos buen General;
             Marchemos victoriosos,
             siempre gozosos, hasta el final.
    - number: 434
      title: Victoria en Cristo
      verses:
        - |-
          1. Oí bendita historia de Jesús quien de su gloria,
             Al Calvario decidió venir para salvarme a mí.
             Su sangre derramada se aplicó feliz a mi alma;
             Me dio victoria sin igual cuando me arrepentí.
        - |-
          CORO
            Ya tengo la victoria, pues Cristo me salva.
            Buscóme y compróme con su divino amor.
            Me imparte de su gloria,
            su paz inunda mi alma;
            Victoria me concedió cuando por mí murió.
        - |-
          2. Oí que en amor tierno, él sanó a los enfermos;
             A los cojos los mandó correr, al ciego lo hizo ver.
             Entonces suplicante le pedí al Cristo amante,
             Le diera a mi alma la salud y fe para vencer.
        - |-
          CORO
            Ya tengo la victoria, pues Cristo me salva.
            Buscóme y compróme con su divino amor.
            Me imparte de su gloria,
            su paz inunda mi alma;
            Victoria me concedió cuando por mí murió.
        - |-
          3. Oí que allí en la gloria, hay mansiones de victoria,
             Que su santa mano preparó para los que él salvó.
             Espero unir mi canto al del grupo sacrosanto
             Que victorioso rendirá tributo al Redentor.
        - |-
          CORO
            Ya tengo la victoria, pues Cristo me salva.
            Buscóme y compróme con su divino amor.
            Me imparte de su gloria,
            su paz inunda mi alma;
            Victoria me concedió cuando por mí murió.
    - number: 435
      title: Débil Soy
      verses:
        - |-
          1. Débil soy; tu fuerza es tal
             que me guardarás del mal;
             Satisfecho estoy, oh sí,
             al andar, Señor, junto a ti.
        - |-
          CORO
            A tu lado andar, Señor,
            esta es mi oración;
            Cada día en tu amor siempre guárdame, Salvador.
        - |-
          2. En la prueba y dolor
             cuídame, oh Buen Señor;
             Y al fin en tu mansión gozaré de tu comunión.
        - |-
          CORO
            A tu lado andar, Señor,
            esta es mi oración;
            Cada día en tu amor siempre guárdame, Salvador.
    - number: 436
      title: ¡Bendiciones, cuántas tienes!
      verses:
        - |-
          1. Cuando combatido por la adversidad
             Creas ya perdida tu felicidad,
             Mira lo que el cielo para ti guardó;
             Cuenta las riquezas que el Señor te dio.
        - |-
          CORO
            ¡Bendiciones, cuántas tienes ya!
            Bendiciones, Dios te manda más;
            Bendiciones, te sorprenderás
            Cuando veas lo que Dios por ti hará.
        - |-
          2. ¿Andas agobiado por algún pesar?
             ¿Duro te parece amarga cruz llevar?
             Cuenta las promesas del Señor Jesús,
             Y de las tinieblas nacerá la luz.
        - |-
          CORO
            ¡Bendiciones, cuántas tienes ya!
            Bendiciones, Dios te manda más;
            Bendiciones, te sorprenderás
            Cuando veas lo que Dios por ti hará.
        - |-
          3. Cuando de otros veas la prosperidad
             Y tus pies claudiquen tras de su maldad,
             Cuenta las riquezas que tendrás por fe
             Donde el oro es polvo que hollará tu pie.
        - |-
          CORO
            ¡Bendiciones, cuántas tienes ya!
            Bendiciones, Dios te manda más;
            Bendiciones, te sorprenderás
            Cuando veas lo que Dios por ti hará.
    - number: 437
      title: Yo quiero vencer
      verses:
        - |-
          1. Yo quiero vencer, yo quiero triunfar
             por fe en mi Cristo; Yo quiero obtener,
             yo quiero alcanzar corona en el cielo.
             Quiero obedecer, fiel siempre servir
             a mi Salvador; Yo quiero vencer,
             yo quiero triunfar por fe en mi Señor.
        - |-
          2. Anhelo ir en pos, muy cerca de Dios
             por toda mi vida; Y ante su altar
             ansío llevar otra alma perdida.
             ¡Qué dicha será ver siempre la faz
             de mi Redentor! Yo quiero vencer,
             y corresponder a su gran amor.
        - |-
          3. Por fe en mi Jesús hoy vivo en la luz
             que lleva al cielo; No habrá de temer,
             pues Cristo ha de ser mi eterno consuelo.
             Yo quiero sentir placer de servir
             con abnegación; Yo quiero triunfar
             y siempre morar allí en su mansión.
    - number: 438
      title: Su gracia es mayor
      verses:
        - |-
          1. Su gracia es mayor si las cargas aumentan;
             Su fuerza es mayor si la prueba es más cruel;
             Si es grande la lucha mayor es su gracia,
             Si más son las penas, mayor es su paz.
        - |-
          CORO
            Su amor no termina, su gracia no acaba,
            Un límite no hay al poder del Señor,
            Pues de sus inmensas riquezas en gloria,
            abunda su gracia, abunda su amor.
        - |-
          2. Si nuestros recursos se han agotado,
             si fuerzas nos faltan para terminar,
             Si al punto ya estamos de desesperarnos,
             el tiempo ha llegado en que Dios puede obrar.
        - |-
          CORO
            Su amor no termina, su gracia no acaba,
            Un límite no hay al poder del Señor,
            Pues de sus inmensas riquezas en gloria,
            abunda su gracia, abunda su amor.
    - number: 439
      title: En este mundo de misterio
      verses:
        - |-
          1. Señor, en este mundo de misterio
             Cuya causa no podemos conocer,
             Vemos la humildad de los pequeños
             Y los grandes su gloria enaltecer.
        - |-
          2. La viuda que dio lo que tenía,
             El joven llevando pan y peces,
             El mozo que de cerca lo seguía,
             Sin llevar la gloria de sus creces.
        - |-
          3. Oh Señor, ¿por qué tanto silencio?
             ¿Por qué no llevan ninguna gloria?
             ¿Por qué ni sus nombres aparecen
             En el gran escenario de la historia?
        - |-
          4. No te afanes por la vida pasajera,
             Ni del cruel olvido tengas pena,
             Que las glorias de este mundo son ficticias
             Y las glorias venideras son eternas.
    - number: 440
      title: Pon tus ojos en Cristo
      verses:
        - |-
          1. Pon tus ojos en Cristo,
             Tan lleno de gracia y amor,
             Y lo terrenal sin valor será
             A la luz del glorioso Señor.
    - number: 441
      title: Jehová-jireh
      verses:
        - |-
          1. Jehová-jireh es mi Proveedor,
             Su gracia es suficiente para mí, para mí.
        - |-
          2. Mis necesidades suplirá
             conforme a sus riquezas en gloria.
        - |-
          3. A sus ángeles manda
             que cuiden de mí;
             Su gracia es suficiente para mí, para mí,
             Su gracia es suficiente para mí.
    - number: 442
      title: El conoce mi camino
      verses:
        - |-
          1. Mas él conoce mi camino,
             ¡Viva mi Redentor!
        - |-
          2. Me probará y saldré como oro,
             ¡Viva mi Redentor!
    - number: 443
      title: El Señor es bueno
      verses:
        - |-
          1. El Señor es bueno, fortaleza en
             el día de angustia.
        - |-
          2. El Señor es bueno, y conoce
             a los que en él confían.
        - |-
          3. El Señor es bueno, fortaleza en
             el día de angustia.
    - number: 444
      title: Hasta Entonces
      verses:
        - |-
          1. Mi corazón cantando está de Cristo
             Cuando me acuerdo de su gran amor.
             Aunque la vida esté atribulada
             Espero un día ver al Salvador.
        - |-
          CORO
            Mas hasta entonces seguiré cantando,
            Cantando de Jesús y de su amor;
            Hasta aquel día cuando en plena gloria
            Veré la faz de mi Señor.
        - |-
          2. El pobre mundo irá pronto al olvido,
             Tan pasajera es la vida aquí;
             Por tal engaño y pena no me afano
             Porque en la gloria a Cristo le veré.
        - |-
          CORO
            Mas hasta entonces seguiré cantando,
            Cantando de Jesús y de su amor;
            Hasta aquel día cuando en plena gloria
            Veré la faz de mi Señor.
        - |-
          3. Gran alegría es la del redimido
             Al ser librado al fin de su dolor;
             No habrá más muerte, lágrimas, tristeza
             En la presencia eterna del Señor.
        - |-
          CORO
            Mas hasta entonces seguiré cantando,
            Cantando de Jesús y de su amor;
            Hasta aquel día cuando en plena gloria
            Veré la faz de mi Señor.
    - number: 445
      title: Triunfo en las pruebas
      verses:
        - |-
          1. Pues tengo por cierto que las aflicciones
             del tiempo presente no son comparables
             con la gloria venidera que en nosotros ha
             de manifestarse.
        - |-
          2. Y sabemos que a los que aman a Dios, todas
             las cosas les ayudan a bien, esto es, a los que
             conforme a su propósito son llamados.
        - |-
          3. ¿Qué, pues, diremos a esto? Si Dios es por
             nosotros, ¿quién contra nosotros?
        - |-
          4. Antes, en todas estas cosas somos más
             que vencedores por medio de aquel que
             nos amó.
        - |-
          5. Vosotros os alegráis, aunque ahora por un
             poco de tiempo, si es necesario, tengáis que
             ser afligidos en diversas pruebas,
        - |-
          6. Para que sometida a prueba vuestra fe,
             mucho más preciosa que el oro, el cual
             aunque perecedero se prueba con fuego,
             sea hallada en alabanza, gloria y honra
             cuando sea manifestado Jesucristo.
    - number: 446
      title: Regocijad
      verses:
        - |-
          1. ¡Regocijad en el Señor!
             Os digo: ¡Regocijad!
        - |-
          2. ¡Regocijad! Os digo: ¡Regocijad!
    - number: 447
      title: Dad Gracias
      verses:
        - |-
          1. Dad gracias, de todo corazón;
             Dad gracias al Dios santísimo;
             Dad gracias porque a su Hijo Jesucristo nos dio.
        - |-
          2. Y ahora diga el débil, "Fuerte soy",
             Diga el pobre, "Rico soy",
             Por lo que hizo el Señor por mí.
        - |-
          3. Dad gracias.
    - number: 448
      title: La Iglesia sin mancha
      verses:
        - |-
          1. ¿Quiénes son los que han venido?
             ¿Hacia dónde marcharán?
             De pureza van vestidos, ropas blancas llevan ya.
        - |-
          CORO
            Es la Iglesia fiel, sin mancha ni arruga,
            que el Salvador redimió.
        - |-
          2. ¿Puedes escuchar los cantos
             que conmueven todo ser?
             Es el grupo de los santos que al Cordero quieren ver.
        - |-
          CORO
            Es la Iglesia fiel, sin mancha ni arruga,
            que el Salvador redimió.
        - |-
          3. No te asusten las tristezas,
             nunca cedas ante el mal.
             Triunfarás en tus pobrezas, tendrás gozo celestial.
        - |-
          CORO
            Es la Iglesia fiel, sin mancha ni arruga,
            que el Salvador redimió.
        - |-
          4. El pendón de tu alabanza
             debes hoy enarbolar;
             En tu Rey pon tu esperanza y él victoria te dará.
        - |-
          CORO
            Es la Iglesia fiel, sin mancha ni arruga,
            que el Salvador redimió.
    - number: 449
      title: Mi Iglesia querida
      verses:
        - |-
          1. Una iglesia prefiere mi alma,
             una iglesia que aviva mi fe;
             Hallo en ella la paz y la calma
             que en el mundo busqué y no hallé.
        - |-
          CORO
            Oh, ven, ven, ven, ven, ven a gozar
            entre hermanos, oh ven a adorar al Señor.
            Hallarás fortaleza y consuelo
            a los pies de tu buen Salvador.
        - |-
          2. Siempre da su mensaje consuelo
             a las almas que buscan a Dios;
             Porque quiere que vayan al cielo,
             del divino Maestro en pos.
        - |-
          CORO
            Oh, ven, ven, ven, ven, ven a gozar
            entre hermanos, oh ven a adorar al Señor.
            Hallarás fortaleza y consuelo
            a los pies de tu buen Salvador.
        - |-
          3. Cuán alegres resuenan sus cantos,
             porque son de su fe la expresión;
             Son el grito triunfal de los santos,
             un mensaje de amor y perdón.
        - |-
          CORO
            Oh, ven, ven, ven, ven, ven a gozar
            entre hermanos, oh ven a adorar al Señor.
            Hallarás fortaleza y consuelo
            a los pies de tu buen Salvador.
        - |-
          4. Hoy celebra esta iglesia querida otro año de vida por fe;
             La conserve el Señor siempre unida,
             y victoria en su nombre le dé.
        - |-
          CORO
            Oh, ven, ven, ven, ven, ven a gozar
            entre hermanos, oh ven a adorar al Señor.
            Hallarás fortaleza y consuelo
            a los pies de tu buen Salvador.
    - number: 450
      title: De la Iglesia el fundamento
      verses:
        - |-
          1. De la Iglesia el fundamento es Jesús el Salvador;
             Por la obra de su gracia le dio vida su Señor;
             Para hacerla esposa suya de los cielos descendió,
             Y su sangre por limpiarla en la cruz él derramó.
        - |-
          2. De entre todas las naciones escogida en variedad,
             A través de las edades se presenta en unidad;
             En diversidad de pueblos sólo tiene un Señor,
             Una fe y un nacimiento, un constante y puro amor.
        - |-
          3. Ella alaba sólo un nombre, sigue una sola luz;
             Guarda una esperanza y su gloria es una cruz.
             Por el celo que la anima, de las almas corre en pos,
             Y ambiciona por la gracia conducirlas hacia Dios.
        - |-
          4. A través de sufrimientos, de fatigas y dolor,
             El glorioso día espera en que vuelva su Señor;
             Consumada su carrera, ya sin mancha estará;
             A las Bodas del Cordero victoriosa entrará.
    - number: 451
      title: Iglesia de Cristo
      verses:
        - |-
          1. Iglesia de Cristo, reanima tu amor,
             Y espera velando a tu augusto Señor;
             Jesús el Esposo, vestido de honor,
             Viniendo se anuncia con fuerte clamor.
        - |-
          2. Si falta en algunos el santo fervor,
             La fe sea de todos el despertador.
             Velad, compañeros, velad sin temor,
             Que está con nosotros el Consolador.
        - |-
          3. Quien sigue la senda del vil pecador,
             Se entrega en los brazos de un sueño traidor;
             Mas para los siervos del buen Salvador,
             Velar esperando es su anhelo mejor.
    - number: 452
      title: Cristo y su Iglesia
      verses:
        - |-
          1. Vosotros sois el cuerpo de Cristo, y miembros suyos
             individualmente, y además, él es la cabeza del cuerpo,
             que es la iglesia.
        - |-
          2. Aun todas las cosas las sometió Dios bajo sus pies y le
             puso a él por cabeza sobre todas las cosas para la iglesia,
        - |-
          3. La cual es su cuerpo, la plenitud de
             aquel que todo lo llena en todo.
        - |-
          4. En él también vosotros, habiendo oído la palabra de
             verdad, el evangelio de vuestra salvación, y habiendo
             creído en él, fuisteis sellados con el Espíritu Santo.
    - number: 453
      title: En la Iglesia
      verses:
        - |-
          1. En la Iglesia la gloria es para él,
             para él, para él;
             En la Iglesia la gloria es para él
             ahora y por la eternidad.
        - |-
          CORO
            Para él (para él), para él (para él),
            para él (para él), para él (para él).
            En la Iglesia la gloria es para él
            ahora y por la eternidad.
        - |-
          2. En mi vida la gloria es para él,
             para él, para él;
             En mi vida la gloria es para él
             ahora y por la eternidad.
        - |-
          CORO
            Para él (para él), para él (para él),
            para él (para él), para él (para él).
            En mi vida la gloria es para él
            ahora y por la eternidad.
    - number: 454
      title: Ardan nuestros corazones
      verses:
        - |-
          1. ¡Ardan nuestros corazones
             adorando al Salvador,
             Y en amor ferviente unidos,
             busquen paz en el Señor!
             De su cuerpo somos miembros,
             de su luz reflejo fiel:
             Entre hermanos es Maestro,
             suyos somos, nuestro es él.
        - |-
          2. Oh, Amor, tú has ordenado
             que arda nuestro corazón;
             Vivifica nuestras almas,
             líbralas de confusión.
             ¡Prende tú la llama viva
             del amor que así unirá
             A los hijos que ha engendrado
             nuestro Padre celestial!
    - number: 455
      title: Dios de gracia, Dios de gloria
      verses:
        - |-
          1. Dios de gracia, Dios de gloria,
             danos presto tu poder;
             A tu amada Iglesia adorna con un nuevo florecer.
             Danos luz y valentía
             en la hora del deber, (del deber,)
             en la hora del deber.
        - |-
          2. Hoy las fuerzas del maligno
             nos acosan sin cesar;
             De temor y duda, Cristo puede al alma resguardar.
             Danos luz y valentía
             para nunca desmayar, (desmayar,)
             para nunca desmayar.
        - |-
          3. Nuestros odios inhumanos
             cura con tu inmenso amor;
             Líbranos de goces vanos, sin conciencia o sin valor.
             Danos luz y valentía
             frente a toda tentación, (tentación,)
             frente a toda tentación.
        - |-
          4. Guíanos por las más altas
             rutas de la santidad,
             Proclamando para el alma verdadera libertad.
             Danos luz y valentía
             y firmeza en tu verdad, (tu verdad,)
             y firmeza en tu verdad.
    - number: 456
      title: Hoy por los santos
      verses:
        - |-
          1. Hoy, por los santos que descansan ya,
             Después de confesarte por la fe,
             Tu nombre, oh Cristo, hemos de alabar,
             ¡Aleluya! ¡Aleluya!
        - |-
          2. Tú fuiste amparo, roca y defensor;
             En la batalla, recio Capitán;
             Tu luz venció las sombras del temor.
             ¡Aleluya! ¡Aleluya!
        - |-
          3. Oh bendecida y santa comunión
             De los que aún luchan o en la gloria están;
             Un solo cuerpo, porque tuyos son.
             ¡Aleluya! ¡Aleluya!
        - |-
          4. Y cuando ruda la batalla es,
             Del cielo se oye un cántico triunfal;
             Se afirma el brazo, vence al fin la fe:
             ¡Aleluya! ¡Aleluya!
        - |-
          5. La aurora eterna ya despuntará;
             Las huestes fieles llegarán al Rey,
             Cantando alegres a la Trinidad:
             ¡Aleluya! ¡Aleluya! (Amén.)
    - number: 457
      title: La familia de Dios
      verses:
        - |-
          1. Soy feliz porque soy
             de la familia de Dios;
             Me lavó en la sangre mi Salvador.
             Heredero con Cristo,
             hijo soy por su amor;
             Soy feliz en la familia, la familia de Dios.
    - number: 458
      title: Un solo cuerpo
      verses:
        - |-
          1. Todos somos miembros de un solo cuerpo;
             Siendo muchos somos uno en Jesús.
        - |-
          2. Todos fuimos bautizados en un cuerpo;
             Todos por el Santo Espíritu de Dios.
        - |-
          3. Del Espíritu sed llenos, mis hermanos;
             Para hacer la buena voluntad de Dios.
        - |-
          4. Y por todo demos gracias siempre al Padre;
             Alabando y cantando al Señor.
    - number: 459
      title: "REFLEXION: Mi querida iglesia"
      verses:
        - |-
          1. Señor, tú me has puesto en una familia muy
             especial, donde encuentro el amor y el
             apoyo de hermanos. Me has colocado en un
             maravilloso cuerpo en el cual cada miembro
             contribuye para beneficio de los demás.
        - |-
          2. Me has hecho parte de un nuevo pueblo que
             traspasa las barreras de raza, cultura y nivel
             social. Es tu Iglesia, y ¡cuánto te agradezco
             el inmenso privilegio de ser parte de ella!
        - |-
          3. Te reconozco como Jefe y Cabeza de la iglesia.
             Sé que te agradamos al reunirnos para
             estudiar tu Palabra y alabar tu nombre.
             Te honramos al participar de tu mesa.
        - |-
          4. La comunión entre nosotros y la demostración
             de tu amor en nuestro servicio también te com-
             placen. Te gozas cuando cumplimos tu mandato
             de proclamar el evangelio y hacer discípulos.
        - |-
          5. Espero el día gozoso cuando presentarás a tu
             Iglesia perfecta, sin mancha ni arruga.
             Mientras tanto, ¡qué hermoso es unir mi voz a
             la de mis hermanos en salmos, himnos y
             cánticos espirituales!
    - number: 460
      title: Amémonos, Hermanos
      verses:
        - |-
          1. Amémonos, hermanos,
             con tierno y puro amor;
             Un solo cuerpo somos,
             y nuestro Padre es Dios.
             Amémonos, hermanos,
             lo quiere el Salvador,
             Quien su preciosa sangre por todos derramó.
        - |-
          2. Amémonos, hermanos,
             en dulce comunión,
             Y paz, afecto y gracia, dará el Consolador.
             Amémonos, hermanos,
             y en nuestra santa unión
             No existan asperezas ni discordante voz.
        - |-
          3. Amémonos, hermanos,
             y al mundo pecador
             Mostremos cómo viven, los que son del Señor.
             Amémonos, hermanos,
             con todo el corazón;
             Lo ordena el Dios y Padre; su ley es ley de amor.
    - number: 461
      title: Somos uno en Cristo
      verses:
        - |-
          1. Somos uno en Cristo,
             somos uno,
             somos uno, uno solo.
             Somos uno en Cristo,
             somos uno, somos uno, uno solo.
        - |-
          2. Un solo Dios,
             un solo Señor,
             una sola fe,
             un solo amor,
             Un solo bautismo,
             un solo Espíritu, Y ese es el Consolador.
    - number: 462
      title: Unidos en Cristo
      verses:
        - |-
          1. Porque de la manera que en un cuerpo
             tenemos muchos miembros, pero no todos
             los miembros tienen la misma función,
        - |-
          2. Así nosotros, siendo muchos, somos un
             cuerpo en Cristo, y todos miembros los
             unos de los otros.
        - |-
          3. De manera que, teniendo diferentes dones,
             según la gracia que nos es dada,
        - |-
          4. Si el de profecía, úsese conforme a la
             medida de la fe;
        - |-
          5. O si de servicio, en servir; o el que enseña,
             en la enseñanza;
        - |-
          6. El que exhorta, en la exhortación; el que
             reparte, con liberalidad;
        - |-
          7. El que preside, con solicitud; el que hace
             misericordia, con alegría.
        - |-
          8. El amor sea sin fingimiento. Aborreced lo
             malo, seguid lo bueno.
        - |-
          9. Amaos los unos a los otros con amor fraternal;
             en cuanto a honra, prefiriéndoos los unos a los
             otros.
        - |-
          10. ¡Mirad cuán bueno y cuán delicioso es
              habitar los hermanos juntos en armonía!
    - number: 463
      title: Miren qué bueno
      verses:
        - |-
          1. ¡Miren qué bueno,
             qué bueno es!
             Miren qué bueno es cuando
             los creyentes están juntos,
             Es como aceite bueno
             derramado sobre Aarón.
        - |-
          2. ¡Miren qué bueno, qué bueno es!
             Miren qué bueno es cuando
             los creyentes están juntos,
             Se parece al rocío sobre
             los montes de Sion.
        - |-
          3. ¡Miren qué bueno, qué bueno es!
             Miren qué bueno es cuando
             los creyentes están juntos,
             Porque el Señor nos manda
             vida eterna y bendición.
    - number: 464
      title: Nuevas Alegres
      verses:
        - |-
          1. Nuevas alegres para decirles
             tengo ahora y estas son:
             Que mis pecados son perdonados,
             y con Jesús tendré galardón.
             Y que también aún queda lugar
             en el palacio celestial
             Para aquellos los que quisieren
             la salvación aceptar.
        - |-
          2. Goces mundanos ya he dejado,
             No quiero más tan falso placer;
             Paz prometieron, mas engañaron;
             no me pudieron satisfacer.
             Mas bien estoy con mi Salvador;
             al cielo voy por su favor;
             Cristo me guía todos los días en su amor y verdad.
        - |-
          3. Ya no me importa lo que dijeron
             los enemigos de mi Señor.
             El me ha buscado y me ha salvado;
             voy a la gloria, reino de amor.
             Siempre yo tengo luchas aquí;
             dulce descanso tengo allí;
             ¡Oh, qué gran gozo para mi alma
             cuando me llame el Señor!
    - number: 465
      title: No te dé temor
      verses:
        - |-
          1. No te dé temor hablar por Cristo;
             Haz que brille en ti su luz;
             Al que te salvó confiesa siempre;
             Todo debes a Jesús.
        - |-
          CORO
            No te dé temor, nunca, nunca, nunca;
            Es tu amante Salvador; nunca, pues, te dé temor.
        - |-
          2. No te dé temor hacer por Cristo
             cuanto de tu parte esté;
             Obra con amor, con fe y constancia;
             tus trabajos premiará.
        - |-
          CORO
            No te dé temor, nunca, nunca, nunca;
            Es tu amante Salvador; nunca, pues, te dé temor.
        - |-
          3. No te dé temor sufrir por Cristo
             los reproches, o el dolor;
             Sufre con amor tus pruebas todas,
             cual sufrió tu Salvador.
        - |-
          CORO
            No te dé temor, nunca, nunca, nunca;
            Es tu amante Salvador; nunca, pues, te dé temor.
        - |-
          4. No te dé temor morir por Cristo,
             vía, verdad y vida es él;
             El te llevará con su ternura a su cálico vergel.
        - |-
          CORO
            No te dé temor, nunca, nunca, nunca;
            Es tu amante Salvador; nunca, pues, te dé temor.
    - number: 466
      title: Testifica
      verses:
        - |-
          1. Si sientes compasión por tus amigos
             entonces háblales de tu Señor.
        - |-
          2. Háblales de Cristo; cuenta a tus amigos
             Lo que el Salvador hizo por ti.
        - |-
          3. Testifica, testifica,
             testifica de Cristo por doquier.
    - number: 467
      title: Recibiréis Poder
      verses:
        - |-
          1. Recibiréis poder, recibiréis poder
             Cuando haya venido sobre vosotros
             el Espíritu de Dios,
             Cuando haya venido sobre vosotros
             el Espíritu de Dios,
             Y testificaréis y testificaréis
             En Jerusalén, Judea también,
             Samaria y hasta el final.
        - |-
          2. En Jerusalén, Judea también,
             Samaria y hasta el final.
    - number: 468
      title: Grato es decir la historia
      verses:
        - |-
          1. Grato es decir la historia del celestial favor,
             De Cristo y de su gloria, de Cristo y de su amor;
             Me agrada referirla, pues sé que es la verdad;
             Y nada satisface cual ella, mi ansiedad.
        - |-
          CORO
            ¡Cuán bella es esa historia!
            Mi tema allí en la gloria
            Será la antigua historia de Cristo y de su amor.
        - |-
          2. Grato es decir la historia que brilla cual fanal,
             Y en glorias y portentos no reconoce igual;
             Me agrada referirla, pues me hace mucho bien;
             Por eso a ti deseo decírtela también.
        - |-
          CORO
            ¡Cuán bella es esa historia!
            Mi tema allí en la gloria
            Será la antigua historia de Cristo y de su amor.
        - |-
          3. Grato es decir la historia que antigua, sin vejez,
             Parece al repetirla más dulce cada vez;
             Me agrada referirla, pues hay quien nunca oyó
             Que para hacerle salvo el buen Jesús murió.
        - |-
          CORO
            ¡Cuán bella es esa historia!
            Mi tema allí en la gloria
            Será la antigua historia de Cristo y de su amor.
    - number: 469
      title: En el nombre del Señor Jesús
      verses:
        - |-
          1. En el nombre del Señor Jesús,
             Dios me perdonó, y renací, Y el amor que recibí,
             Quiero compartirlo contigo aquí.
        - |-
          CORO
            Dijo: Libremente te di mi amor, Libremente da.
            Ve en mi nombre y porque tú crees,
            Otros también creerán.
        - |-
          2. En su nombre, él nos da poder
             En el cielo, tierra y doquier, Y el poder que recibí,
             Quiero compartirlo contigo aquí.
        - |-
          CORO
            Dijo: Libremente te di mi amor, Libremente da.
            Ve en mi nombre y porque tú crees,
            Otros también creerán.
    - number: 470
      title: ¡Vamos!
      verses:
        - |-
          1. Vamos, todos con gran decisión
             a hablar de nuestro Señor;
             De Jesús que su vida entregó
             así brindado su amor.
             ¡Qué maravilla es junto a Jesús estar!
             disfrutando su luz.
             Vamos, todos ¡hay que avanzar!
             Con el poder del Señor;
             Vamos, todos ¡a trabajar!
             las fuerzas vienen de Dios.
        - |-
          2. Todo el mundo nos ha de escuchar
             hablando del Salvador;
             Viviremos con la santidad
             que Dios nos manda tener.
             ¡Qué gozo nos dará!
             ¡Cuánta felicidad!
             pregonando su paz.
             Vida nueva tenemos ya,
             otros la deben tener;
             Vamos, todos llenos de fe
             su amor a demostrar.
    - number: 471
      title: Los que con lágrimas
      verses:
        - |-
          1. Los que con lágrimas sembraron,
             con regocijo segarán;
             Donde sus lágrimas regaron,
             hermosas plantas crecerán.
        - |-
          CORO
            Andando irán, (Andando irán,)
            Llorando irán, (llorando irán,) Pero felices volverán.
        - |-
          2. Trayendo al hombro sus gavillas,
             y en la garganta una canción;
             No se perdieron las semillas,
             mas dieron fruto en bendición.
        - |-
          CORO
            Andando irán, (Andando irán,)
            Llorando irán, (llorando irán,) Pero felices volverán.
    - number: 472
      title: Anhelo trabajar por el Señor
      verses:
        - |-
          1. Anhelo trabajar por el Señor;
             confiando en su Palabra y en su amor,
             Quiero yo cantar y orar,
             y ocupado siempre estar en la viña del Señor.
        - |-
          CORO
            Trabajar y orar,
            (Trabajar y orar, trabajar y orar;)
            en la viña, en la viña del Señor; (del Señor;)
            Mi anhelo es orar, y ocupado siempre estar
            en la viña del Señor.
        - |-
          2. Anhelo cada día trabajar,
             y esclavos del pecado libertar,
             Conducirlos a Jesús, nuestro Guía, nuestra Luz,
             en la viña del Señor.
        - |-
          CORO
            Trabajar y orar,
            (Trabajar y orar, trabajar y orar;)
            en la viña, en la viña del Señor; (del Señor;)
            Mi anhelo es orar, y ocupado siempre estar
            en la viña del Señor.
        - |-
          3. Anhelo ser obrero de valor,
             confiando en el poder del Salvador;
             El que quiera trabajar hallará también lugar
             en la viña del Señor.
        - |-
          CORO
            Trabajar y orar,
            (Trabajar y orar, trabajar y orar;)
            en la viña, en la viña del Señor; (del Señor;)
            Mi anhelo es orar, y ocupado siempre estar
            en la viña del Señor.
    - number: 473
      title: El mundo hoy
      verses:
        - |-
          1. El mundo hoy se encuentra en agonía,
             pecado y dolor;
             Con guerras, odios y envidias sufre
             sin Dios y sin amor, sin amor, sin amor.
        - |-
          CORO
            Tenemos Buenas Nuevas para darles
            de Jesús el Salvador;
            Con hechos y palabras demostremos
            la verdad del gran amor del Señor, hmmm, hmmm.
        - |-
          2. Al mundo afligido el Evangelio con gozo proclamad;
             Cual luminares en un siglo oscuro,
             a Cristo levantad, levantad, levantad.
        - |-
          CORO
            Tenemos Buenas Nuevas para darles
            de Jesús el Salvador;
            Con hechos y palabras demostremos
            la verdad del gran amor del Señor, hmmm, hmmm.
    - number: 474
      title: Ved los millones
      verses:
        - |-
          1. Ved los millones que entre las tinieblas
             Viven, perdidos, sin un Salvador.
             ¿Quién, quién irá las nuevas proclamando
             Que por Jesús Dios salva al pecador?
        - |-
          CORO
            Todo poder mi Dios me dio,
            y a mis siervos mando yo:
            "Id al mundo y proclamad el Evangelio,
            y estoy con vosotros siempre".
        - |-
          2. "A mí venid" la voz divina llama;
             Clamad "venid" en nombre de Jesús.
             Para salvarnos de la muerte eterna
             Su vida él ofreció en la dura cruz.
        - |-
          CORO
            Todo poder mi Dios me dio,
            y a mis siervos mando yo:
            "Id al mundo y proclamad el Evangelio,
            y estoy con vosotros siempre".
        - |-
          3. Que venga pronto el día tan glorioso,
             en que los redimidos se unirán
             En coro excelso, santo y jubiloso;
             eternamente gloria a Dios darán.
        - |-
          CORO
            Todo poder mi Dios me dio,
            y a mis siervos mando yo:
            "Id al mundo y proclamad el Evangelio,
            y estoy con vosotros siempre".
    - number: 475
      title: Hasta lo último
      verses:
        - |-
          1. Hasta lo último, hasta lo último,
             hasta lo último iremos.
        - |-
          2. Hasta lo último, hasta lo último
             con Cristo nuestro Salvador.
        - |-
          3. Con el poder del Espíritu
             en el pueblo del Señor,
             Seguiremos el perfecto plan de Dios.
        - |-
          4. Hasta lo último, hasta lo último,
             con Cristo nuestro Salvador.
    - number: 476
      title: La gran comisión
      verses:
        - |-
          1. Por tanto, id, y haced discípulos a
             todas las naciones, bautizándolos
             en el nombre del Padre, y del Hijo,
             y del Espíritu Santo;
        - |-
          2. Enseñándoles que guarden
             todas las cosas que os he
             mandado; y he aquí yo estoy
             con vosotros todos los días,
             hasta el fin del mundo. Amén.
    - number: 477
      title: Mensajeros del Maestro
      verses:
        - |-
          1. Mensajeros del Maestro, anunciad al corazón
             De Jesús la Buena Nueva, que nos brinda salvación.
             De la cumbre de los montes, en los valles y en el mar,
             Por doquier el Evangelio prestos id a declarar.
        - |-
          2. En los antros del pecado y en los sitios de aflicción,
             Proclamad la paz de Cristo que traerá consolación.
             Predicad a los cautivos su gloriosa libertad;
             Al cansado y al caído Buenas Nuevas anunciad.
    - number: 478
      title: La paz os dejo
      verses:
        - |-
          1. La paz os dejo, mi paz os doy,
             No como el mundo da;
             Id pues y proclamad:
             Dios nos da paz.
    - number: 479
      title: Heme Aquí
      verses:
        - |-
          1. Heme aquí, yo iré, Señor;
             heme aquí, yo iré, Señor.
             Envíame a mí,
             que dispuesto estoy;
             Llevaré tu gloria
             a las naciones.
    - number: 480
      title: A prisa Iglesia
      verses:
        - |-
          1. ¡A prisa, Iglesia! tu Señor espera;
             al mundo entero di que Dios es luz,
             Que el Creador no quiere que se pierda
             una sola alma, lejos de Jesús.
        - |-
          CORO
            Nuevas proclama de gozo y paz,
            Nuevas de Cristo, salud y libertad.
        - |-
          2. Ve cuántos miles yacen retenidos
             Por el pecado en lóbrega prisión;
             No saben de aquel que ha sufrido
             En vida y cruz por darles redención.
        - |-
          CORO
            Nuevas proclama de gozo y paz,
            Nuevas de Cristo, salud y libertad.
        - |-
          3. A todo pueblo y raza, fiel, proclama
             Que Dios, en quien existen, es amor;
             Que él bajó para salvar sus almas;
             Por darles vida, muerte él sufrió.
        - |-
          CORO
            Nuevas proclama de gozo y paz,
            Nuevas de Cristo, salud y libertad.
        - |-
          4. Tus hijos da, que lleven su palabra,
             Y con tus bienes hazlos proseguir.
             Por ellos tu alma en oración derrama,
             Que todo, Cristo te ha de retribuir.
        - |-
          CORO
            Nuevas proclama de gozo y paz,
            Nuevas de Cristo, salud y libertad.
    - number: 481
      title: Todo aquel que invocare
      verses:
        - |-
          1. Y ¿cómo podrán invocar si aún no han creído?
             Y ¿cómo creerán, si no han oído?
        - |-
          CORO
            Todo aquel que invocare el nombre del Señor,
            Todo aquel que invocare el nombre del Señor,
            Salvo será. Salvo será.
            Y ¿qué harán los que aún no le conocen?
        - |-
          2. Y ¿cómo oirán, sin haber, sin haber quien les predique?
             Y ¿quién predicará, si no enviamos?
        - |-
          ULTIMO CORO
             América abre sus ojos porque Dios tiene poder,
             Para salvar, para salvar A todo aquel que aún no le conoce.
    - number: 482
      title: Oh qué amigo nos es Cristo
      verses:
        - |-
          1. ¡Oh qué amigo nos es Cristo! El llevó nuestro dolor;
             El nos manda que llevemos todo a Dios en oración.
             ¿Vive el hombre desprovisto de paz, gozo y santo amor?
             Esto es porque no llevamos todo a Dios en oración.
        - |-
          2. ¿Andas débil y cargado de cuidados y temor?
             A Jesús, refugio eterno, dile todo en oración.
             ¿Te desprecian tus amigos?
             Cuéntaselo en oración;
             En sus brazos de amor tierno,
             paz tendrá tu corazón.
        - |-
          3. Jesucristo es nuestro Amigo:
             de esto prueba nos mostró,
             Pues a redimirnos vino; por nosotros se humanó.
             El castigo de su pueblo en su muerte él sufrió;
             Cristo es un Amigo eterno;
             sólo en él confío yo.
    - number: 483
      title: Deléitate asimismo en el Señor
      verses:
        - |-
          1. Deléitate asimismo en el Señor,
             Deléitate asimismo en el Señor,
             Y él te concederá
             las peticiones de tu corazón;
             Confía en él, y él hará.
        - |-
          2. Y él te concederá
             las peticiones de tu corazón;
             Confía en él, y él hará.
    - number: 484
      title: Gracias, Señor
      verses:
        - |-
          1. De día, mandará el Señor su misericordia;
        - |-
          2. Y de noche, su canción estará conmigo,
             la oración al Dios de mi vida.
        - |-
          3. Clamaré al Dios altísimo, al Dios que me
             favorece.
        - |-
          4. Al anochecer, al amanecer y al mediodía
             oraré y clamaré; y él oirá mi voz.
        - |-
          5. Sean gratos los dichos de mi boca y la meditación
             de mi corazón delante de ti, oh Señor, Roca mía
             y Redentor mío.
        - |-
          6. ¡Cuán preciosos me son, oh Dios, tus
             pensamientos!
        - |-
          7. ¡Cuán grande es la suma de ellos!
        - |-
          8. Te doy gracias con todo mi corazón; el día
             que clamé, me respondiste; mucho valor
             infundiste a mi alma.
    - number: 485
      title: A solas al huerto yo voy
      verses:
        - |-
          1. A solas al huerto yo voy,
             Cuando duerme aún la floresta;
             Y en quietud y paz con Jesús estoy
             Oyendo absorto allí su voz.
        - |-
          CORO
            El conmigo está, puedo oír su voz,
            Me asegura de su amor;
            Tan preciosa es nuestra comunión,
            A solas con mi Señor.
        - |-
          2. Tan dulce es la voz del Señor,
             que las aves guardan silencio;
             Y tan sólo se oye su voz de amor,
             que inmensa paz al alma da.
        - |-
          CORO
            El conmigo está, puedo oír su voz,
            Me asegura de su amor;
            Tan preciosa es nuestra comunión,
            A solas con mi Señor.
        - |-
          3. Me encanta a solas estar
             con mi Cristo allí en el huerto,
             Mas me manda ir para compartir
             las buenas nuevas de su amor.
        - |-
          CORO
            El conmigo está, puedo oír su voz,
            Me asegura de su amor;
            Tan preciosa es nuestra comunión,
            A solas con mi Señor.
    - number: 486
      title: Oh Señor, de mañana oirás
      verses:
        - |-
          1. Oh Señor, de mañana oirás mi voz,
             De mañana me presentaré delante de ti, y esperaré.
        - |-
          2. Porque tú no eres un Dios
             que se complace en la maldad;
             el malo no habitará junto a ti.
        - |-
          3. Oh Señor, de mañana oirás mi voz,
             De mañana me presentaré delante de ti, y esperaré.
    - number: 487
      title: Cristo, queremos dar gracias
      verses:
        - |-
          1. Cristo, queremos dar gracias;
             Dar gracias por tu gran bondad.
        - |-
          2. Cristo, queremos servirte;
             Servirte por tu gran bondad.
        - |-
          3. Cristo, sabemos que vienes;
             E iremos contigo a tu hogar.
    - number: 488
      title: Gracias, oh Señor
      verses:
        - |-
          1. Gracias, oh Señor,
             por escucharnos hoy,
             por tu presencia acá,
             por darnos tu paz.
             Amén.
    - number: 489
      title: Abre mis ojos
      verses:
        - |-
          1. Abre mis ojos,
             quiero ver a Cristo;
             Sentir su presencia,
             decir que le amo;
             Abre mi oído;
             ayúdame a oírte;
             Abre mis ojos,
             quiero ver a Cristo.
    - number: 490
      title: Dilo a Cristo
      verses:
        - |-
          1. Cuando estás cansado y abatido,dilo a Cristo,
             dilo a Cristo; Si te sientes débil,
             confundido, dilo a Cristo el Señor.
        - |-
          CORO #1
            Dilo a Cristo, dilo a Cristo,
            él es tu amigo más fiel;
            No hay otro amigo como Cristo, dilo tan sólo a él.
        - |-
          2. Cuando estás de tentación cercado, mira a
             Cristo, mira a Cristo; Cuando rujan
             huestes de pecado, mira a Cristo el Señor.
        - |-
          CORO #2
            Mira a Cristo, mira a Cristo, él es
            tu amigo más fiel; No hay otro amigo
            como Cristo, dilo tan sólo a él.
        - |-
          3. Cuando llegue la final jornada, fía en Cristo,
             fía en Cristo; Te dará al cielo franca
             entrada, fía en Cristo el Señor.
        - |-
          CORO #3
            Fía en Cristo, fía en Cristo, él es
            tu amigo más fiel; No hay otro amigo
            como Cristo, dilo tan sólo a él.
    - number: 491
      title: Padre nuestro celestial
      verses:
        - |-
          1. Padre nuestro celestial,
             Dios inmenso de bondad,
             Tú nos mandas que pidamos
             bendición por nuestro pan.
        - |-
          2. Tú nos mandas que pidamos
             bendición por nuestro pan.
    - number: 492
      title: Gracias damos, Señor
      verses:
        - |-
          1. Gracias damos, Señor, por el pan,
             gracias damos, Señor, por el pan;
             Por el pan espiritual,
             que alimenta a cada cual,
             y también por el pan material.
    - number: 493
      title: Dulce Oración
      verses:
        - |-
          1. Dulce oración, dulce oración,
             de toda influencia mundanal
             elevas tú mi corazón,
             al tierno Padre celestial.
             ¡Oh, cuántas veces tuve en ti
             auxilio en ruda tentación,
             y cuántos bienes recibí,
             mediante ti, dulce oración!
        - |-
          2. Dulce oración, dulce oración, al trono excelso
             de bondad tú llevarás mi petición
             a Dios que escucha con piedad.
             Por fe espero recibir la gran divina
             bendición, y siempre a mi Señor
             servir por tu virtud, dulce oración.
        - |-
          3. Dulce oración, dulce oración, que aliento
             y gozo al alma das, en esta tierra
             de aflicción consuelo siempre me serás.
             Hasta el momento en que veré a Cristo
             en cálica mansión, entonces me despediré,
             feliz, de ti, dulce oración.
    - number: 494
      title: Abba Padre
      verses:
        - |-
          1. Estamos aquí cantando juntos como familia,
             Unidos dando alabanzas al Rey de reyes,
             Cantando: "¡Abba Padre, digno eres tú!"
        - |-
          2. "¡Abba Padre, digno eres tú!"
    - number: 495
      title: Por estos alimentos, Dios
      verses:
        - |-
          1. Por estos alimentos, Dios,
             te damos gracias hoy.
    - number: 496
      title: ¿Has oído, Señor?
      verses:
        - |-
          1. ¿Has oído, Señor, mis oraciones?
             ¿Por ventura has oído mi clamor?
             Pues derrama tus ricas bendiciones;
             dame fe y alegría, oh Señor.
        - |-
          2. No pretendo riquezas con polilla
             cual los bienes terrenos que se van;
             Quiero, sí, que me des sabiduría,
             así como le diste a San Juan.
        - |-
          3. No pretendo, Señor, cosas terrenas;
             no pretendo, mi Dios, más que tu amor;
             Que me enseñes las cosas que son buenas,
             que edifican, dan vida y dan valor.
        - |-
          4. Yo no dudo, Señor, que tú has oído
             mis humildes querellas, mi oración;
             No lo dudo, Señor, porque he creído
             que me has dado tu amor y tu perdón.
        - |-
          5. Yo ya sé que tú quieres corazones
             humillados, sin sombras de maldad;
             Tú no quieres orgullos ni pasiones;
             quieres fe, mansedumbre, paz, bondad.
        - |-
          6. ¡Oh, Señor! tu piedad es infinita;
             la he sentido latir dentro mi ser;
             Aquí estoy a tus pies, Padre bendito,
             no permitas que vuelva yo a caer.
        - |-
          7. Yo no quiero seguir la vieja historia
             y caer, pues me has dado tu perdón,
             Y espero estar contigo en gloria,
             disfrutando de eterno galardón.
        - |-
          8. Si contestas, mi Dios, mis peticiones,
             no caeré otra vez dentro del mal;
             Y yo sé que allí en las mansiones
             me veré en tu reino celestial.
    - number: 497
      title: Avívanos, Señor
      verses:
        - |-
          1. Avívanos, Señor,
             con nueva bendición;
             Inflama el fuego de tu amor
             en cada corazón.
    - number: 498
      title: Yo te sirvo
      verses:
        - |-
          1. Yo te sirvo porque te amo;
             tú me has dado salvación.
             No era nada y me buscaste, y me diste tu perdón.
        - |-
          CORO
            Vidas hechas pedazos,
            Corazones tristes, quebrantados,
            En ti encuentran vida por tu muerte en la cruz.
        - |-
          2. Yo te sirvo porque me amaste;
             pues te diste, oh Dios, por mí.
             Tú bajaste a este mundo,
             y sufriste aquí por mí.
        - |-
          CORO
            Vidas hechas pedazos,
            Corazones tristes, quebrantados,
            En ti encuentran vida por tu muerte en la cruz.
    - number: 499
      title: Obreros para la mies
      verses:
        - |-
          1. Recorría Jesús todas las ciudades y
             aldeas, enseñando en las sinagogas de ellos, y predicando el evangelio
             del reino, y sanando toda enfermedad y toda dolencia
             en el pueblo.
        - |-
          2. Y al ver las multitudes, tuvo compasión de ellas;
             porque estaban desamparadas y dispersas como
             ovejas que no tienen pastor.
        - |-
          3. Entonces dijo a sus discípulos: A la verdad la mies es
             mucha, mas los obreros pocos.
        - |-
          4. Rogad, pues, al Señor de la mies, que envíe
             obreros a su mies.
    - number: 500
      title: A servir a Cristo
      verses:
        - |-
          1. A servir a Cristo sin temor iré,
             Donde él dirija mi inseguro pie;
             Sin su compañía todo es turbación,
             Mas si él me guía no tendré temor.
        - |-
          CORO
            Con Jesús por doquier, sin temor iré,
            Si Jesús me guía nada temeré.
        - |-
          2. Con Jesús por guía dondequiera voy;
             Caminando en pos de él seguro estoy.
             Y aunque padre y madre me hayan de faltar,
             Jesucristo nunca me abandonará.
        - |-
          CORO
            Con Jesús por doquier, sin temor iré,
            Si Jesús me guía nada temeré.
        - |-
          3. Dondequiera con Jesús, en tierra y mar,
             Quiero ser su fiel testigo sin cesar,
             Y si por desierto mi camino va,
             Un seguro albergue mi Jesús será.
        - |-
          CORO
            Con Jesús por doquier, sin temor iré,
            Si Jesús me guía nada temeré.
    - number: 501
      title: Solamente Temed
      verses:
        - |-
          1. Solamente temed a Jehová,
             solamente temed a Jehová;
             y servidle de verdad,
             y servidle de verdad
             con todo vuestro corazón,
             con todo vuestro corazón.
        - |-
          2. Solamente temed a Jehová,
             solamente temed a Jehová;
             pues considerad cuan grandes cosas
             ha hecho por nosotros Jehová.
    - number: 502
      title: Sed fieles, hermanos
      verses:
        - |-
          1. Sed fieles, hermanos,
             luchando por nuestro Dios;
             En su ministerio, soldados del Evangelio.
             Fervientes sembrad, las almas ganad,
             es tiempo de trabajar;
             La sana doctrina de Dios exponed,
             las huestes del mal venced.
        - |-
          CORO
            Sed fieles, hermanos,
            luchando por nuestro Dios;
            En su ministerio, soldados del Evangelio.
        - |-
          2. Alzad la Palabra con ánimo y valor;
             Con fe predicadla, espada es de victoria.
             Constantes orad, gozosos obrad,
             corona Dios os dará;
             Al mundo sin Dios sed la sal y la luz,
             mirando al Señor Jesús.
        - |-
          CORO
            Sed fieles, hermanos,
            luchando por nuestro Dios;
            En su ministerio, soldados del Evangelio.
    - number: 503
      title: Despertad, Despertad
      verses:
        - |-
          1. ¡Despertad, despertad, oh cristianos!
             vuestro sueño funesto dejad,
             Que el cruel enemigo os acecha,
             y cautivos os quiere llevar.
             ¡Despertad! las tinieblas pasaron;
             de la noche no sois hijos ya,
             Que lo sois de la luz y del día,
             Y tenéis el deber de luchar.
        - |-
          2. Despertad y bruñid vuestras armas;
             vuestros lomos ceñid de verdad,
             Y calzad vuestros pies aprestados
             con el grato evangelio de paz.
             Basta ya de profundas tinieblas,
             basta ya de pereza mortal;
             Revestid, revestid vuestro pecho
             de la cota de fe y caridad.
        - |-
          3. La gloriosa armadura de Cristo
             acudid con anhelo a tomar;
             No temáis, pues el dardo enemigo
             no la puede romper ni pasar.
             ¡Oh cristianos, antorcha del mundo!
             de esperanza el yelmo tomad;
             Embrazad de la fe el escudo
             y sin miedo corred a luchar.
        - |-
          4. No temáis, pues de Dios revestidos,
             ¿Qué enemigo venceros podrá,
             Si tomáis por espada la Biblia,
             la Palabra de Dios de verdad?
             En la cruz hallaréis la bandera,
             en Jesús hallaréis Capitán;
             En el cielo obtendréis la corona:
             ¡A luchar, a luchar, a luchar!
    - number: 504
      title: Oh, háblame y hablaré
      verses:
        - |-
          1. Oh, háblame y hablaré,
             Señor, en eco de tu voz;
             Y con tu ayuda buscaré
             al que anda lejos y sin Dios.
        - |-
          2. Oh, guíame y guiaré
             en tus caminos, oh Señor,
             Al vacilante y débil pie
             que va por sendas de error.
        - |-
          3. Enséñame, y enseñaré
             palabras tuyas de verdad;
             Dame alimento y daré
             a los hambrientos tu maná.
        - |-
          4. Oh, lléname, Señor Jesús;
             rebose tu amor en mí;
             Que fiel refleje yo tu luz,
             y glorifique sólo a ti.
        - |-
          5. Oh, úsame, mi Salvador,
             según tu santa voluntad;
             Servirte es mi sumo honor
             ahora y en la eternidad.
             Amén.
    - number: 505
      title: Demos con alegría
      verses:
        - |-
          1. Demos con alegría y no por necesidad
             Al Dios de toda gracia con gran liberalidad;
             Ministrando y supliendo,
             gratitud siempre expresando
             Al Señor, el Creador,
             la ofrenda de nuestro amor.
        - |-
          CORO
            Todo lo que respira, alabe a Jehová.
            Todo lo que respira, alabe a Jehová.
            Alabadle sol y luna y vosotros todos
            sus santos,
            Alabad y bendecid el nombre de Jehová.
        - |-
          2. Nunca escasamente mas siempre de corazón
             Y generosamente con gozo y oración;
             Ayudando y ofrendando como Dios
             nos ha enseñado;
             El nos ve y nos provee;
             su amor es perfecta ley.
        - |-
          CORO
            Todo lo que respira, alabe a Jehová.
            Todo lo que respira, alabe a Jehová.
            Alabadle sol y luna y vosotros todos
            sus santos,
            Alabad y bendecid el nombre de Jehová.
    - number: 506
      title: Para siempre es su bondad
      verses:
        - |-
          1. ¿Qué podemos ofrendar?
             ¿Qué presente digno dar?
             Dediquemos hoy a él
             bienes, vida, alma fiel;
             Para siempre es su bondad;
             al Señor magnificad.
        - |-
          2. De la nada nos formó,
             y la vida él nos dio;
             El nos cuida en su bondad,
             y nos guía en la verdad;
             Para siempre es su bondad;
             al Señor magnificad.
    - number: 507
      title: Oh, cumple tu ministerio
      verses:
        - |-
          1. Oh, cumple tu ministerio en la obra del Señor;
             Oh, cumple tu ministerio, trabajando con fervor.
        - |-
          CORO
            Oh, cumple tu ministerio,
            sirviendo en amor;
            Oh, cumple tu ministerio
            en la obra del Señor.
        - |-
          2. Haz obra de evangelista en la mies del Salvador,
             Llevando las Buenas Nuevas
             donde está el pecador.
        - |-
          CORO
            Oh, cumple tu ministerio,
            sirviendo en amor;
            Oh, cumple tu ministerio
            en la obra del Señor.
        - |-
          3. Predica la Santa Biblia
             con mensajes de valor,
             Instando en todo tiempo,
             proclamando con vigor.
        - |-
          CORO
            Oh, cumple tu ministerio,
            sirviendo en amor;
            Oh, cumple tu ministerio
            en la obra del Señor.
        - |-
          4. Exhorta, pues, con paciencia,
             siempre lleno de candor;
             Enseña doctrina sana,
             combatiendo todo error.
        - |-
          CORO
            Oh, cumple tu ministerio,
            sirviendo en amor;
            Oh, cumple tu ministerio
            en la obra del Señor.
    - number: 508
      title: Los Talentos
      verses:
        - |-
          1. Todos recibieron sus talentos del Señor;
             Cada siervo así conforme a su capacidad
             Recibió la suma exacta, lo que le tocó,
             Para ser usada, pues, según su habilidad.
        - |-
          CORO
            Uno, dos, o cinco, ¿Cuántos tienes tú?
            Uno, dos, o cinco, Cristo te los dio.
            Usa hoy tus dones mientras puedas trabajar;
            Desarrolla tus talentos, ¡Sirve a tu Señor!
        - |-
          2. El que recibió los cinco, cinco más ganó,
             Y el que dos tenía, con sudor los duplicó.
             Pero el de un talento, sólo lo enterró,
             Y de su Señor reproche duro recibió.
        - |-
          CORO
            Uno, dos, o cinco, ¿Cuántos tienes tú?
            Uno, dos, o cinco, Cristo te los dio.
            Usa hoy tus dones mientras puedas trabajar;
            Desarrolla tus talentos, ¡Sirve a tu Señor!
    - number: 509
      title: Ofrenda al Señor
      verses:
        - |-
          1. Ofrenda al Señor porque él es bueno,
             Ofrenda a su santo nombre.
        - |-
          2. Demos al Señor lo que es suyo,
             Ofrenda a su santo nombre.
        - |-
          3. Dios ama al dador alegre,
             Ofrenda a su santo nombre.
    - number: 510
      title: Fiel mayordomo seré
      verses:
        - |-
          1. Vengo rendido a tus pies, Señor;
             quiero fielmente depositar
             Tiempo, dinero, mi don de amor;
             ofrenda grata hoy vengo a dar.
        - |-
          CORO
            Todo buen don viene de Dios;
            ¿Cómo negarlo podré?
            Fiel mayordomo de Cristo seré,
            y un día, "Fiel siervo", oiré.
        - |-
          2. "Probadme en esto", dice el Señor,
             "y bendiciones derramaré".
             Fiel a mis votos de fe seré,
             testigo digno de mi Señor.
        - |-
          CORO
            Todo buen don viene de Dios;
            ¿Cómo negarlo podré?
            Fiel mayordomo de Cristo seré,
            y un día, "Fiel siervo", oiré.
        - |-
          3. Tú vas conmigo, no dudaré;
             en tus promesas yo confiaré.
             De lo que es tuyo te daré,
             y almas preciosas cosecharé.
        - |-
          CORO
            Todo buen don viene de Dios;
            ¿Cómo negarlo podré?
            Fiel mayordomo de Cristo seré,
            y un día, "Fiel siervo", oiré.
    - number: 511
      title: Gozo da servir a Cristo
      verses:
        - |-
          1. Gozo da servir a Cristo,
             en la vida diaria aquí;
             Gozo, que con alegría, siempre él me da a mí.
        - |-
          CORO
            Gozo hay, sí, en servir a Cristo;
            gozo en el corazón.
            Cada día él da poder, me ayuda a vencer,
            y da gozo, gozo en el corazón.
        - |-
          2. Gozo da servir a Cristo,
             gozo que triunfante está
             En la pena o tristeza; Cristo en todo vence ya.
        - |-
          CORO
            Gozo hay, sí, en servir a Cristo;
            gozo en el corazón.
            Cada día él da poder, me ayuda a vencer,
            y da gozo, gozo en el corazón.
        - |-
          3. Gozo da servir a Cristo,
             gozo en la oscuridad,
             Porque tengo el secreto de la luz de la verdad.
        - |-
          CORO
            Gozo hay, sí, en servir a Cristo;
            gozo en el corazón.
            Cada día él da poder, me ayuda a vencer,
            y da gozo, gozo en el corazón.
    - number: 512
      title: En las aguas de la muerte
      verses:
        - |-
          1. En las aguas de la muerte, sumergido
             fue Jesús, mas su amor no fue
             apagado por sus penas en la cruz.
             Levantóse de la tumba, sus cadenas
             quebrantó, y triunfante y victorioso
             a los cielos ascendió.
        - |-
          2. En las aguas del bautismo hoy confieso
             yo mi fe: Jesucristo me ha salvado
             y en su amor me gozaré;
             Me bautizo en testimonio que a Jesús
             siguiendo estoy, desde ahora para
             el mundo y el pecado muerto soy.
        - |-
          3. Yo que estoy crucificado, ¿Cómo más
             podré pecar? Ya que soy resucitado,
             santa vida he de llevar.
             Son las aguas del bautismo mi señal
             de salvación, y yo quiero consagrarme
             al que obró mi redención.
    - number: 513
      title: Los que somos bautizados
      verses:
        - |-
          1. Los que somos bautizados con el
             Salvador Jesús, al pecado somos muertos;
             hoy andemos en su luz; Sepultados
             juntamente somos con el Salvador
             en figura de la muerte
             que sufrió el buen Señor.
        - |-
          2. Si por fe con él morimos (el bautismo
             es la señal) con él ya resucitamos
             por su vida espiritual; Y no andamos
             como antes en caminos de pecar,
             sino en novedad de vida
             que el Señor aquí nos da.
        - |-
          3. ¡Cuán gloriosa vida ha dado
             Cristo a los que él redimió! El, de muerte
             a vida ahora, con poder los traspasó;
             Y el bendito amor de Cristo
             nos constriñe, pues murió
             para que ya no vivamos
             para sí, mas para Dios.
    - number: 514
      title: Yo vivía en el pecado
      verses:
        - |-
          1. Yo vivía en el pecado,
             y doctrinas del error
             Me guiaban, engañado, a una muerte de terror.
             Soy salvado del abismo, con Jesús al cielo voy,
             Y confieso por bautismo
             que del mundo ya no soy.
        - |-
          2. Tuve el corazón muy triste pues en vano,
             paz busqué, Pero a mí, Señor, dijiste:
             "Hoy descanso te daré". Es la sangre que me
             salva y en paz me guardará;
             El Espíritu me sella y me santificará.
        - |-
          3. Antes muerto en el pecado,
             ya he muerto con Jesús,
             Y del mundo separado, yo me juzgo por la cruz.
             En el agua sumergido, testimonio a todos doy
             Que en Cristo he creído y por él ya salvo soy.
    - number: 515
      title: El testimonio del bautismo
      verses:
        - |-
          1. Con Cristo estoy juntamente crucificado,
             y ya no vivo yo, mas vive Cristo en mí;
        - |-
          2. Y lo que ahora vivo en la carne, lo vivo
             en la fe del Hijo de Dios, el cual me amó
             y se entregó a sí mismo por mí.
        - |-
          3. ¿O no sabéis que todos los que hemos sido bautizados
             en Cristo Jesús, hemos sido bautizados en su muerte?
        - |-
          4. Así también vosotros consideraos muertos al pecado,
             pero vivos para Dios en Cristo Jesús, Señor nuestro.
    - number: 516
      title: La cruz excelsa
      verses:
        - |-
          1. La cruz excelsa al contemplar
             do Cristo allí por mí murió,
             De todo cuanto estimo aquí,
             lo más precioso es su amor.
        - |-
          2. No busco gloria ni honor
             sino en la cruz de mi Señor.
             Las cosas que me encantan más
             las sacrifico por su amor.
        - |-
          3. De su cabeza, manos, pies,
             preciosa sangre corrió allí.
             Corona de espinas fue
             la que Jesús llevó por mí.
        - |-
          4. El mundo entero no será
             dádiva digna de ofrecer.
             Amor tan grande y sin igual
             en cambio exige todo el ser.
    - number: 517
      title: Obediente a tu mandato
      verses:
        - |-
          1. Obediente a tu mandato participa hoy tu grey
             De la cena, y con gozo la recibe nuestra fe;
             Tu dolor en el Calvario y tu pena y gran amor
             Anunciamos en tu nombre, amantísimo Señor.
        - |-
          2. Recordamos la tristeza que afligió tu corazón,
             Y la copa de amargura que por todo pecador
             En el Gólgota tomaste, despreciando tu dolor;
             Te pedimos que fervientes, te sigamos con valor.
        - |-
          3. Gracias, oh Jesús,
             te damos por tu infinito amor;
             Gracias mil, pues disfrutamos
             tu clemencia y tu favor.
             Tuya fue la cruz, mas nuestra
             es la dicha y es la paz;
             Tuya sea pues la gloria,
             hoy y por la eternidad.
             Amén.
    - number: 518
      title: Rey de mi vida
      verses:
        - |-
          1. Rey de mi vida tú eres ya:
             gloria te doy, Jesús;
             No me permitas olvidar
             tu obra en la cruenta cruz.
        - |-
          CORO
            Si olvido del Getsemaní, tu sufrimiento agudo allí,
            Y tu divino amor por mí, Cristo, hazme ver tu cruz.
        - |-
          2. Por fe la tumba puedo ver
             que ya vacía está;
             Angeles santos de poder
             fueron tu guardia allí.
        - |-
          CORO
            Si olvido del Getsemaní, tu sufrimiento agudo allí,
            Y tu divino amor por mí, Cristo, hazme ver tu cruz.
        - |-
          3. Yo, cual María, quien su amor
             te demostró, Jesús,
             Quiero servirte fiel, Señor,
             al recordar tu cruz.
        - |-
          CORO
            Si olvido del Getsemaní, tu sufrimiento agudo allí,
            Y tu divino amor por mí, Cristo, hazme ver tu cruz.
        - |-
          4. Hazme dispuesto a llevar
             la dura cruz por ti;
             Con gozo sufriré, Señor;
             fuiste a la cruz por mí.
        - |-
          CORO
            Si olvido del Getsemaní, tu sufrimiento agudo allí,
            Y tu divino amor por mí, Cristo, hazme ver tu cruz.
    - number: 519
      title: Aquí del pan partido tomaré
      verses:
        - |-
          1. Aquí del pan partido tomaré,
             y de la copa de tu comunión.
             El nombre de mi Dios invocaré,
             gozándome en la paz de salvación.
        - |-
          2. La culpa del pecado mía fue,
             mas tuya fue la sangre de la cruz.
             Por ella y tu justicia tengo, sé,
             perdón, consuelo y paz, Señor Jesús.
        - |-
          3. Nos levantamos de la cena aquí;
             la fiesta pasa, mas no así el amor.
             Todo se va, mas tú te quedas, sí,
             cerca, muy cerca, amado Salvador.
    - number: 520
      title: Hoy venimos, cual hermanos
      verses:
        - |-
          1. Hoy venimos, cual hermanos,
             a la cena del Señor.
             Acerquémonos, cristianos,
             respirando tierno amor.
        - |-
          2. En memoria de su muerte
             y la sangre que vertió,
             celebremos el banquete
             que en su amor nos ordenó.
        - |-
          3. Recordando las angustias
             que sufriera el Redentor,
             dividida está nuestra alma
             entre el gozo y el dolor.
        - |-
          4. Nos da vida por su muerte,
             gozo por su aflicción;
             Alabemos al Cordero
             por su eterna salvación.
    - number: 521
      title: Llegamos a tu mesa
      verses:
        - |-
          1. Llegamos a tu mesa, oh Señor,
             a celebrar de nuevo tu amor;
             Amor vertido en la terrible cruz,
             cuando por mí moriste, mi Jesús.
        - |-
          2. Oh, examina y lávame, Señor;
             yo dignamente quiero hoy tomar
             Tu cena con un limpio corazón,
             contigo y con tu pueblo en comunión.
        - |-
          3. Tu cuerpo fue herido por mi bien;
             corona de espinas en tu sien.
             Tu cuerpo como el pan partido fue,
             el pan que como aquí con gozo y fe.
        - |-
          4. En el madero de la maldición
             tu sangre me compró la redención.
             La sangre, caro precio de favor,
             recuerdo en esta copa de amor.
        - |-
          5. Oh Salvador, en tu memoria es
             que el vino y pan tomamos cada vez
             Hasta que vengas, y tu gran bondad
             celebraremos por la eternidad.
    - number: 522
      title: Es la cena del Señor
      verses:
        - |-
          1. Es la cena del Señor memorial de su amor;
             Representa en verdad
             su perfecta y gran bondad;
             Me recuerda de la cruz y la muerte de Jesús.
        - |-
          2. Al partir el pan aquí, me acordaré de ti,
             De tu cuerpo en la cruz que entregaste, oh Jesús;
             ¡Cuánto te amo, oh Salvador,
             por comprarme, con amor!
        - |-
          3. Al tomar la copa aquí, me acordaré de ti,
             De la sangre carmesí que vertiste tú por mí;
             Pues tu angustia y cruel dolor,
             nunca olvidaré, Señor.
        - |-
          4. Tuya, oh Cristo, la pasión;
             mío el cielo y redención;
             Quiero dedicarme a ti, pues te diste tú por mí;
             Con amor te serviré y tu nombre alabaré.
    - number: 523
      title: La mesa del Señor
      verses:
        - |-
          1. La copa de bendición que bendecimos,
             ¿no es la comunión de la sangre de Jesucristo?
             El pan que partimos, ¿no es la comunión
             del cuerpo de Cristo?
        - |-
          2. Siendo uno solo el pan, nosotros, con ser
             muchos, somos un cuerpo; pues todos
             participamos de aquel mismo pan.
        - |-
          3. No podéis beber la copa del Señor, y la copa
             de los demonios;
        - |-
          4. No podéis participar de la mesa del Señor,
             y de la mesa de los demonios.
        - |-
          5. De manera que cualquiera que comiere este
             pan o bebiere esta copa del Señor indignamente,
             será culpado del cuerpo y de la sangre del Señor.
        - |-
          6. Por tanto, pruébese cada uno a sí mismo, y
             coma así del pan, y beba de la copa.
        - |-
          7. Porque todas las veces que coméis este pan
             y bebéis esta copa,
             La muerte del Señor proclamáis hasta que
             él venga.
    - number: 524
      title: Hay un precioso manantial
      verses:
        - |-
          1. Hay un precioso manantial de sangre
             de Emanuel, que purifica a cada cual
             que se sumerge en él. Que se sumerge en él,
             que se sumerge en él. Que purifica a cada cual
             que se sumerge en él.
        - |-
          2. El malhechor se convirtió pendiente
             de una cruz; El vio la fuente y se lavó,
             creyendo en Jesús. Creyendo en Jesús,
             creyendo en Jesús. El vio la fuente y se lavó,
             creyendo en Jesús.
        - |-
          3. Y yo también mi pobre ser allí logré lavar;
             La gloria de su gran poder me gozo
             en ensalzar. Me gozo en ensalzar,
             me gozo en ensalzar.
             La gloria de su gran poder
             me gozo en ensalzar.
        - |-
          4. ¡Eterna fuente carmesí! ¡Raudal de puro
             amor! Se lavará por siempre en ti
             el pueblo del Señor. El pueblo del Señor,
             el pueblo del Señor. Se lavará por siempre
             en ti el pueblo del Señor.
    - number: 525
      title: Vengan a la mesa
      verses:
        - |-
          1. Cristo extiende su mano
             con tierna invitación;
             El nos convida a la cena
             de la conmemoración.
        - |-
          CORO
            Vengan a la mesa,
            vengan a celebrar.
            Vengan con gran gozo,
            vengan a adorar.
        - |-
          2. Juntos tomemos la cena
             con gratitud al Señor
             Cristo Jesús nos dio vida,
             Es nuestro gran Salvador.
        - |-
          CORO
            Vengan a la mesa,
            vengan a celebrar.
            Vengan con gran gozo,
            vengan a adorar.
        - |-
          3. Somos un Cuerpo en Cristo;
             con su amor nos unió;
             Hoy compartimos con gozo,
             hijos de un solo Dios.
        - |-
          CORO
            Vengan a la mesa,
            vengan a celebrar.
            Vengan con gran gozo,
            vengan a adorar.
    - number: 526
      title: Cristo su preciosa sangre
      verses:
        - |-
          1. Cristo su preciosa sangre en la cruz vertió;
             Por nosotros pecadores él la dio.
             Con su sangre meritoria hizo redención,
             Y por eso Dios te brinda el perdón.
        - |-
          2. Es la sangre tan preciosa del buen Salvador
             La que quita los pecados y el temor.
             Sin la sangre es imposible que haya remisión;
             Por las obras no se alcanza salvación.
        - |-
          3. Cristo invita a los perdidos al celeste hogar;
             Al hambriento él ofrece pan sin par.
             Muy preciosa es la sangre, porque me compró
             Vida eterna en el cielo; ¡Gloria a Dios!
    - number: 527
      title: Recordad al Señor
      verses:
        - |-
          1. Recordad al Señor, bendecid
             su santo nombre; celebremos su gloria
             y amor. Fue levantado en la cruz,
             dió su vida por nosotros;
             Recordemos al Salvador Jesús.
        - |-
          2. Alabad al Señor, y cantad su santo
             nombre; celebremos su gloria y honor;
             Si no cantamos al Señor, aun las rocas
             cantarían; Alabemos al Salvador Jesús.
        - |-
          3. Exaltad al Señor, y honrad su santo
             nombre; celebremos su gloria con fervor;
             En esta cena del Señor, en memoria del Cordero,
             de su sangre, su cuerpo y su amor.
        - |-
          4. Demostrad su amor, y hacedlo en su
             nombre, ante el mundo unidos en amor;
             En testimonio de la luz, como fieles
             seguidores estrechemos los lazos del amor.
    - number: 528
      title: Siervos de Jesús
      verses:
        - |-
          1. Siervos de Jesús, hombres de verdad,
             Guardas del deber, somos, sí.
             Libres de maldad, ricos en bondad,
             Fieles en la lid seremos, sí.
        - |-
          CORO
            ¡Firmes! ¡Fuertes! Alcen la bandera,
            Grande, noble emblema del Señor.
            ¡Prontos! ¡Bravos! Pasen la consigna:
            Marchen, todos, vamos a vencer.
        - |-
          2. Nuestro Capitán es ya vencedor,
             él nos redimió por su cruz.
             Guardas del deber, él nos da poder,
             y nos guiará hasta la luz.
        - |-
          CORO
            ¡Firmes! ¡Fuertes! Alcen la bandera,
            Grande, noble emblema del Señor.
            ¡Prontos! ¡Bravos! Pasen la consigna:
            Marchen, todos, vamos a vencer.
        - |-
          3. Invencibles son los que con afán
             cada día van al deber.
             Triunfos obtendrán y recibirán
             magno galardón del Redentor.
        - |-
          CORO
            ¡Firmes! ¡Fuertes! Alcen la bandera,
            Grande, noble emblema del Señor.
            ¡Prontos! ¡Bravos! Pasen la consigna:
            Marchen, todos, vamos a vencer.
    - number: 529
      title: A ti, oh Señor
      verses:
        - |-
          1. A ti, oh Señor,
             levantaré mi alma;
             A ti, oh, Señor,
             levantaré mi alma;
             Dios mío, en ti confío;
             no sea avergonzado,
             no se alegren de mí mis
             enemigos.
    - number: 530
      title: Fe la victoria es
      verses:
        - |-
          1. Soldados del Señor Jesús,
             valientes hoy luchad;
             Constantes, mientras haya luz las armas empuñad.
             Al enemigo combatid con fuerza y no temáis,
             Pues la victoria en la lid por fe la obtendréis.
        - |-
          CORO
            Fe la victoria es, (Fe la victoria es,)
            fe la victoria es; (fe la victoria es;)
            Fe nuestra victoria es,
            que al mundo vencerá.
        - |-
          2. Con la bandera de su amor y espada de verdad
             Seguimos fiel al Salvador, quien triunfos nos dará.
             Marchamos tras los santos que luchando contra el mal
             Lo derrotaron por la fe, y en gloria hoy están.
        - |-
          CORO
            Fe la victoria es, (Fe la victoria es,)
            fe la victoria es; (fe la victoria es;)
            Fe nuestra victoria es,
            que al mundo vencerá.
        - |-
          3. Al que venciere, el Señor de blanco vestirá;
             Su nombre ante el Padre Dios, Jesús confesará.
             Las alabanzas del gran Rey su pueblo cantará
             Por siglos mil, pues por la fe, victoria siempre da.
        - |-
          CORO
            Fe la victoria es, (Fe la victoria es,)
            fe la victoria es; (fe la victoria es;)
            Fe nuestra victoria es,
            que al mundo vencerá.
    - number: 531
      title: Soldados de Dios
      verses:
        - |-
          1. Por lo demás, fortaleceos en el Señor y en el poder
             de su fuerza. Vestíos de toda la armadura de Dios,
             para que podáis hacer frente a las intrigas del diablo;
        - |-
          2. Porque nuestra lucha no es contra sangre ni carne,
             sino contra principados, contra autoridades, contra
             los gobernantes de estas tinieblas, contra espíritus
             de maldad en los lugares celestiales.
        - |-
          3. Por esta causa, tomad toda la armadura de Dios,
             para que podáis resistir en el día malo, y después
             de haberlo logrado todo, quedar firmes.
        - |-
          4. Permaneced, pues, firmes, ceñidos con el
             cinturón de la verdad, vestidos con la coraza
             de justicia y calzados vuestros pies con la
             preparación para proclamar el evangelio de paz.
        - |-
          5. Tomad también el casco de la salvación y la espada del
             Espíritu, que es la palabra de Dios, orando en
             todo tiempo.
        - |-
          6. La noche está muy avanzada, y el día está cerca.
             Despojémonos, pues, de las obras de las
             tinieblas y vistámonos con las armas de la luz.
        - |-
          7. Andemos decentemente, como de día; no con
             glotonerías y borracheras, ni en pecados sexuales
             y desenfrenos, ni en peleas y envidia.
        - |-
          8. Mas bien, vestíos del Señor Jesucristo,
             y no hagáis provisión para satisfacer los
             malos deseos de la carne.
    - number: 532
      title: ¡A Combatir!
      verses:
        - |-
          1. ¡A combatir! resuena la guerrera voz
             del buen Jesús, que hoy llamando está;
             Sin desmayar seguidle siempre con valor,
             y la victoria plena os dará.
        - |-
          CORO
            ¡A la batalla, oh cristiano!
            con el escudo de la cruz;
            Sé buen soldado, pues a tu lado está el príncipe Jesús.
            El con su gracia te sostiene, y con potencia sin igual
            Su brazo extiende y te defiende
            en esta lucha contra el mal.
        - |-
          2. ¡A combatir! nos llama nuestro Salvador;
             Salid, luchad con nuestro Capitán;
             En la constante lid, seguid sin vacilar
             y venceréis las huestes de Satán.
        - |-
          CORO
            ¡A la batalla, oh cristiano!
            con el escudo de la cruz;
            Sé buen soldado, pues a tu lado está el príncipe Jesús.
            El con su gracia te sostiene, y con potencia sin igual
            Su brazo extiende y te defiende
            en esta lucha contra el mal.
        - |-
          3. Al Rey de reyes, nuestro Salvador Jesús,
             Honor y gloria todos tributad,
             Pues ya los suyos gozan de su plenitud
             y pronto reinará la santidad.
        - |-
          CORO
            ¡A la batalla, oh cristiano!
            con el escudo de la cruz;
            Sé buen soldado, pues a tu lado está el príncipe Jesús.
            El con su gracia te sostiene, y con potencia sin igual
            Su brazo extiende y te defiende
            en esta lucha contra el mal.
    - number: 533
      title: Estad por Cristo firmes
      verses:
        - |-
          1. ¡Estad por Cristo firmes, soldados de la cruz!
             Alzad hoy la bandera, en nombre de Jesús.
             Es vuestra la victoria, con él por Capitán;
             Por él serán vencidas las huestes de Satán.
        - |-
          2. ¡Estad por Cristo firmes! os llama él a la lid;
             ¡Con él, pues, a la lucha, soldados todos id!
             Probad que sois valientes,
             luchando contra el mal;
             Es fuerte el enemigo, mas Cristo es sin igual.
        - |-
          3. ¡Estad por Cristo firmes!
             las fuerzas vienen de él;
             El brazo de los hombres es débil y es infiel.
             Vestíos la armadura, velad en oración;
             Deberes y peligros demandan gran tesón.
    - number: 534
      title: Adelante con valor
      verses:
        - |-
          1. Cual pendón hermoso despleguemos hoy
             la bandera de la cruz;
             La verdad del Evangelio, el blasón
             del soldado de Jesús.
        - |-
          CORO
            ¡Adelante, adelante!
            en pos de nuestro Salvador.
            Nos da gozo y paz nuestro Rey,
            ¡Adelante con valor!
        - |-
          2. En el mundo proclamemos con fervor
             esta historia de la cruz;
             Bendigamos sin cesar al Redentor,
             quien nos trajo paz y luz.
        - |-
          CORO
            ¡Adelante, adelante!
            en pos de nuestro Salvador.
            Nos da gozo y paz nuestro Rey,
            ¡Adelante con valor!
        - |-
          3. En el cielo nuestro cántico será
             alabanzas a Jesús;
             Nuestro corazón allí rebosará
             de amor y gratitud.
        - |-
          CORO
            ¡Adelante, adelante!
            en pos de nuestro Salvador.
            Nos da gozo y paz nuestro Rey,
            ¡Adelante con valor!
    - number: 535
      title: ¡Gloria, gloria, aleluya!
      verses:
        - |-
          1. Es el Dios de los ejércitos en quien yo confiaré;
             y con címbalos de gozo al Señor ensalzaré.
             El despide los relámpagos, mas nunca temeré;
             él es mi Protector.
        - |-
          CORO
            ¡Gloria, gloria, aleluya!
            ¡Gloria, gloria, aleluya!
            ¡Gloria, gloria, aleluya!
            A Cristo doy loor.
        - |-
          2. Con ejército no gana sus victorias el Señor;
             ni con armas lucha contra Satanás, el Tentador.
             La potencia del Espíritu, ha dicho el Dios de amor,
             es lo que vencerá.
        - |-
          CORO
            ¡Gloria, gloria, aleluya!
            ¡Gloria, gloria, aleluya!
            ¡Gloria, gloria, aleluya!
            A Cristo doy loor.
        - |-
          3. En Belén de Palestina el Señor Jesús nació,
             y después de treinta años, en la cruenta cruz murió.
             Pero vive para siempre, pues la tumba ya venció;
             su nombre alabaré.
        - |-
          CORO
            ¡Gloria, gloria, aleluya!
            ¡Gloria, gloria, aleluya!
            ¡Gloria, gloria, aleluya!
            A Cristo doy loor.
    - number: 536
      title: Resurrección
      verses:
        - |-
          1. Tras la noche tenebrosa
             Y el rugir del vendaval,
             Tiende el alba majestuosa
             Cortinaje de cristal;
             Y aparece un claro día
             Sin las brumas del dolor,
             Donde el ama se extasía
             Y se goza el puro amor.
             Tras la nota vespertina
             Que oprimiera el corazón.
             Viene aquella matutina
             Que se alarga en fiel canción.
        - |-
          2. Cual la ninfa misteriosa
             Que en su tumba se guardó,
             Y en brillante mariposa
             Con el tiempo se tornó,
             Tal aquel que duerme en Cristo,
             De su sueño al despertar,
             Con ropaje nunca visto,
             Lo veréis resucitar.
        - |-
          3. Y la tienda que aprisiona
             Cual gusano en vil zurrón,
             Con poder se desmorona,
             ¿Qué es, o muerte, tu aguijón?
    - number: 537
      title: La segunda venida de Cristo
      verses:
        - |-
          1. Tampoco queremos, hermanos, que ignoréis acerca
             de los que duermen, para que no os entristezcáis
             como los otros que no tienen esperanza.
        - |-
          2. Porque si creemos que Jesús murió
             y resucitó, así también traerá Dios con
             Jesús a los que durmieron en él.
        - |-
          3. Por lo cual os decimos esto en palabra del Señor:
             que nosotros que vivimos, que habremos quedado
             hasta la venida del Señor, no precederemos a los
             que durmieron.
        - |-
          4. Porque el Señor mismo con voz de mando,
             con voz de arcángel, y con trompeta de
             Dios, descenderá del cielo; y los muertos
             en Cristo resucitarán primero.
        - |-
          5. Luego nosotros los que vivimos, los que hayamos
             quedado, seremos arrebatados juntamente con
             ellos en las nubes para recibir al Señor en el aire,
        - |-
          6. Y así estaremos siempre con el Señor. Por
             tanto, alentaos los unos a los otros con estas
             palabras.
        - |-
          7. He peleado la buena batalla, he acabado la carrera,
             he guardado la fe.
        - |-
          8. Por lo demás, me está guardada la corona
             de justicia, la cual me dará el Señor, juez
             justo, en aquel día; y no sólo a mí, sino
             también a todos los que aman su venida.
    - number: 538
      title: ¿Soy yo soldado de Jesús?
      verses:
        - |-
          1. ¿Soy yo soldado de Jesús y siervo del Señor?
             No temeré llevar su cruz,
             sufriendo por su amor.
        - |-
          CORO
            Después de la batalla nos coronará,
            Dios nos coronará,
            Dios nos coronará;
            Después de la batalla
            nos coronará
            En aquella santa Sion.
        - |-
          2. Lucharon otros por la fe; valiente anhelo ser.
             Por mi Señor yo pelearé,
             confiando en su poder.
        - |-
          CORO
            Después de la batalla nos coronará,
            Dios nos coronará,
            Dios nos coronará;
            Después de la batalla
            nos coronará
            En aquella santa Sion.
        - |-
          3. Es menester que sea fiel, que nunca vuelva atrás,
             Que siga siempre en pos de él,
             y me guiará en paz.
        - |-
          CORO
            Después de la batalla nos coronará,
            Dios nos coronará,
            Dios nos coronará;
            Después de la batalla
            nos coronará
            En aquella santa Sion.
    - number: 539
      title: Firmes y adelante
      verses:
        - |-
          1. Firmes y adelante, huestes de la fe,
             sin temor alguno, que Jesús nos ve.
             Jefe soberano, Cristo al frente va,
             y la regia enseña tremolando está.
        - |-
          CORO
            Firmes y adelante, huestes de la fe,
            Sin temor alguno, que Jesús nos ve. (Amén)
        - |-
          2. Al sagrado nombre de nuestro Adalid,
             Tiembla el enemigo y huye de la lid.
             Nuestra es la victoria, dad a Dios loor;
             Y óigalo el averno lleno de pavor.
        - |-
          CORO
            Firmes y adelante, huestes de la fe,
            Sin temor alguno, que Jesús nos ve. (Amén)
        - |-
          3. Muévese potente la Iglesia de Dios;
             De los ya gloriosos marchamos en pos;
             Somos sólo un cuerpo, y uno es el Señor,
             Una la esperanza, y uno nuestro amor.
        - |-
          CORO
            Firmes y adelante, huestes de la fe,
            Sin temor alguno, que Jesús nos ve. (Amén)
        - |-
          4. Tronos y coronas pueden perecer;
             De Jesús la Iglesia constante ha de ser;
             Nada en contra suya prevalecerá,
             Porque la promesa nunca faltará.
        - |-
          CORO
            Firmes y adelante, huestes de la fe,
            Sin temor alguno, que Jesús nos ve. (Amén)
    - number: 540
      title: Sale a la lucha
      verses:
        - |-
          1. Sale a la lucha el Salvador,
             corona a conquistar;
             Su insignia luce por doquier,
             flamante al frente va;
        - |-
          2. Su cáliz ¿quién lo beberá
             triunfando del dolor?
             Aquel que lleva aquí su cruz
             del Cristo es seguidor.
    - number: 541
      title: A la victoria Jesús nos llama
      verses:
        - |-
          1. A la victoria Jesús nos llama,
             va con nosotros el Capitán;
             Marchemos, pues, a combatir
             a los ejércitos de Satán.
        - |-
          2. A la victoria Jesús nos llama,
             nos llama a todos los de su grey;
             Hay que triunfar contra el mal,
             que con nosotros va nuestro Rey.
        - |-
          3. A la victoria Jesús nos llama,
             sin detenernos, sin ir atrás,
             Hasta triunfar, hasta vencer
             las fieras huestes de Satanás.
        - |-
          4. A la victoria Jesús nos llama,
             ya los clarines sonando están,
             Pues al vencer contra el mal,
             los mismos cielos se alegrarán.
    - number: 542
      title: Cristo nuestro Jefe
      verses:
        - |-
          1. Cristo, nuestro Jefe, nos lleva a la lid;
             Nunca temeremos si él nos dice, "Id".
             Aún su justa causa se suele ignorar,
             mas le seguiremos fiel.
        - |-
          CORO
            Adelante es la orden del Señor;
            Adelante vamos sin temor.
            "Adelante" canta ya su grey;
            La victoria es cierta con el Rey.
        - |-
          2. Nuestro estandarte luce por doquier,
             Con poder y gloria siempre se ha de ver.
             Cristo nuestro Jefe al mundo ya venció
             Y le seguiremos fiel.
        - |-
          CORO
            Adelante es la orden del Señor;
            Adelante vamos sin temor.
            "Adelante" canta ya su grey;
            La victoria es cierta con el Rey.
        - |-
          3. La furiosa lucha larga no será,
             Y a los vencedores nos congregará,
             Donde cantaremos un himno triunfal;
             Sí, le seguiremos fiel.
        - |-
          CORO
            Adelante es la orden del Señor;
            Adelante vamos sin temor.
            "Adelante" canta ya su grey;
            La victoria es cierta con el Rey.
    - number: 543
      title: Ya Cristo viene
      verses:
        - |-
          1. Ya Cristo viene, lo prometió;
             Cumplido el tiempo vendrá otra vez.
             Los corazones se turban hoy;
             Creed en Dios, confiad en él.
        - |-
          CORO
            "¡Jesús amado, ven pronto, ven!"
            Clamaba Juan, y yo también;
        - |-
          2. El mundo en crisis se encuentra hoy;
             Pleitos y guerras, señales son.
             Falsos maestros abundan hoy;
             El Salvador pronto vendrá.
        - |-
          CORO
            "¡Jesús amado, ven pronto, ven!"
            Clamaba Juan, y yo también;
    - number: 544
      title: La venida de Cristo
      verses:
        - |-
          1. La venida de Cristo se acerca;
             Pronto viene su Iglesia a buscar.
             No durmamos, estemos alerta;
             ¡Vigilad, vigilad, vigilad!
        - |-
          CORO
            Pronto viene Jesús y nos lleva
            A la hermosa mansión celestial.
            Pronto viene Jesús por su Iglesia;
            Nos iremos con él a morar.
        - |-
          2. Ya queremos que Cristo nos lleve
             A los cielos con él a morar.
             No seamos jamás negligentes;
             ¡Trabajad, trabajad, trabajad!
        - |-
          CORO
            Pronto viene Jesús y nos lleva
            A la hermosa mansión celestial.
            Pronto viene Jesús por su Iglesia;
            Nos iremos con él a morar.
        - |-
          3. Arreglemos, estemos a cuentas
             Con Jesús, el Cordero de Dios.
             Del que ofende tengamos clemencia;
             ¡Perdonad, perdonad, perdonad!
        - |-
          CORO
            Pronto viene Jesús y nos lleva
            A la hermosa mansión celestial.
            Pronto viene Jesús por su Iglesia;
            Nos iremos con él a morar.
        - |-
          4. Perdonando, Jesús nos perdona,
             Y nos lleva con él a reinar.
             Ganaremos también la corona;
             ¡Vigilad, trabajad, perdonad!
        - |-
          CORO
            Pronto viene Jesús y nos lleva
            A la hermosa mansión celestial.
            Pronto viene Jesús por su Iglesia;
            Nos iremos con él a morar.
    - number: 545
      title: Viene otra vez
      verses:
        - |-
          1. Notas alegres cantad, Y con fervor proclamad
             Esta gloriosa verdad: Cristo muy pronto vendrá.
        - |-
          CORO
            Viene otra vez, viene otra vez,
            Tal vez al amanecer, O tal vez al anochecer.
            Viene otra vez, viene otra vez,
            Día glorioso será para mí; Al mundo viene otra vez.
        - |-
          2. Pena y dolor pasarán, Y se regocijarán
             Todos los que en Cristo están,
             Cuando regrese el Señor.
        - |-
          CORO
            Viene otra vez, viene otra vez,
            Tal vez al amanecer, O tal vez al anochecer.
            Viene otra vez, viene otra vez,
            Día glorioso será para mí; Al mundo viene otra vez.
    - number: 546
      title: Un día Cristo volverá
      verses:
        - |-
          1. Un día Cristo volverá; Es la promesa del Señor;
             Tal como fue así vendrá,
             Y su pueblo ha de ver al Salvador.
        - |-
          CORO
            Muy pronto, sí, Jesús vendrá,
            y alegre le verá su pueblo.
            ¡Velad! ¡Orad! el Rey vendrá,
            los suyos arrebatará. (arrebatará.)
        - |-
          2. Los mensajeros del Señor
             Anuncian que Jesús vendrá; Señales hay alrededor;
             El vendrá y a los suyos llevará.
        - |-
          CORO
            Muy pronto, sí, Jesús vendrá,
            y alegre le verá su pueblo.
            ¡Velad! ¡Orad! el Rey vendrá,
            los suyos arrebatará. (arrebatará.)
        - |-
          3. En busca de su grey vendrá,
             Con toda gloria y honor; Su Iglesia esperando está,
             Y aclamará con gozo a su Señor.
        - |-
          CORO
            Muy pronto, sí, Jesús vendrá,
            y alegre le verá su pueblo.
            ¡Velad! ¡Orad! el Rey vendrá,
            los suyos arrebatará. (arrebatará.)
        - |-
          4. ¡Oh bienvenido, Rey Jesús!
             Tus hijos te esperan ya;
             Muy pronto han de ver la luz
             Y gozar en tu presencia siempre allá.
        - |-
          CORO
            Muy pronto, sí, Jesús vendrá,
            y alegre le verá su pueblo.
            ¡Velad! ¡Orad! el Rey vendrá,
            los suyos arrebatará. (arrebatará.)
    - number: 547
      title: El cielo y la tierra pasarán
      verses:
        - |
          1. Nadie sabe la hora cuando él vendrá;
             De repente con gloria Cristo llegará.
             ¡Mirad! ¡Mirad! ¡Mirad!
        - |-
          CORO
            El cielo y la tierra pasarán, sí, pasarán;
            El cielo y la tierra pasarán, sí, pasarán;
            El cielo y la tierra pasarán, sí, pasarán;
            Pero mis palabras no, no pasarán.
        - |-
          2. Cristo como un hombre pronto a viajar,
             Entregó a sus siervos toda autoridad.
             ¡Velad! ¡Velad! ¡Velad!
        - |-
          CORO
            El cielo y la tierra pasarán, sí, pasarán;
            El cielo y la tierra pasarán, sí, pasarán;
            El cielo y la tierra pasarán, sí, pasarán;
            Pero mis palabras no, no pasarán.
        - |-
          3. Con poder y con gloria aparecerá,
             Y los suyos al cielo Cristo llevará.
             ¡Orad! ¡Orad! ¡Orad!
        - |-
          CORO
            El cielo y la tierra pasarán, sí, pasarán;
            El cielo y la tierra pasarán, sí, pasarán;
            El cielo y la tierra pasarán, sí, pasarán;
            Pero mis palabras no, no pasarán.
    - number: 548
      title: El Rey ya viene
      verses:
        - |-
          1. ¡Oh, el Rey ya viene,
             el Rey ya viene!
             Sonará la gran trompeta,
             y su rostro yo veré;
             ¡Oh, el Rey ya viene,
             el Rey ya viene!
             ¡Gloria a Dios!
             ¡El viene por mí!
    - number: 549
      title: La mañana gloriosa
      verses:
        - |-
          1. Cuán gloriosa será la mañana,
             cuando venga Jesús el Salvador;
             Los creyentes unidos como hermanos,
             bienvenida daremos al Señor.
        - |-
          CORO
            No habrá necesidad de la luz el resplandor,
            ni el sol dará su luz, ni tampoco su calor;
            Allí llanto no habrá, ni tristeza, ni dolor,
            Porque entonces Jesús el Rey del cielo
            para siempre será Consolador.
        - |-
          2. Esperamos la mañana gloriosa
             para dar la bienvenida al Dios de amor,
             Donde todo será color de rosa
             en la santa fragancia del Señor.
        - |-
          CORO
            No habrá necesidad de la luz el resplandor,
            ni el sol dará su luz, ni tampoco su calor;
            Allí llanto no habrá, ni tristeza, ni dolor,
            Porque entonces Jesús el Rey del cielo
            para siempre será Consolador.
        - |-
          3. El cristiano fiel y verdadero
             y también el obrero de valor
             Y la Iglesia, esposa del Cordero,
             estarán en los brazos del Señor.
        - |-
          CORO
            No habrá necesidad de la luz el resplandor,
            ni el sol dará su luz, ni tampoco su calor;
            Allí llanto no habrá, ni tristeza, ni dolor,
            Porque entonces Jesús el Rey del cielo
            para siempre será Consolador.
    - number: 550
      title: Con las nubes viene Cristo
      verses:
        - |-
          1. Con las nubes viene Cristo,
             el que en la cruz murió;
             Santos miles le alaban, quien la muerte conquistó.
             ¡Aleluya! ¡Aleluya! Sobre todo ya triunfó.
        - |-
          2. Todos le verán, glorioso, ataviado en majestad,
             Y los que le rechazaron en su incredulidad
             Con gran llanto,
             con gran llanto al Mesías mirarán.
        - |-
          3. En su cuerpo ya glorioso las heridas llevará,
             Que su excelso sacrificio en la cruz recordarán,
             Y con gozo,
             y con gozo su Iglesia las verá.
        - |-
          4. Toda la creación se postre a tus pies para adorar;
             De poder, dominio y gloria, Cristo, eres digno ya.
             ¡Aleluya! ¡Aleluya!
             ¡Oh, ven pronto a reinar!
    - number: 551
      title: Cuando anuncie el arcángel
      verses:
        - |-
          1. Cuando anuncie el arcángel
             que más tiempo no habrá
             Y aclare esplendoroso el día final;
             Cuando todos los salvados se congreguen ante Dios,
             Entre ellos yo también tendré lugar.
        - |-
          CORO
            Cuando allá se pase lista,
            A mi nombre yo feliz responderé.
            (Cuando allá se pase lista, yo estaré,
            cuando allá se pase lista, yo estaré,
            cuando allá se pase lista,
            a mi nombre yo feliz responderé.)
        - |-
          2. Resucitarán gloriosos
             los que han muerto en Jesús,
             Las delicias del Paraíso a gozar,
             Y triunfantes entrarán en las mansiones de la luz;
             Para mí, también habrá un dulce hogar.
        - |-
          CORO
            Cuando allá se pase lista,
            A mi nombre yo feliz responderé.
            (Cuando allá se pase lista, yo estaré,
            cuando allá se pase lista, yo estaré,
            cuando allá se pase lista,
            a mi nombre yo feliz responderé.)
        - |-
          3. Trabajemos para Cristo anunciando su amor,
             Mientras dure nuestra vida terrenal,
             Y al fin de la jornada, con los salvos por Jesús,
             Entraremos en la patria celestial.
        - |-
          CORO
            Cuando allá se pase lista,
            A mi nombre yo feliz responderé.
            (Cuando allá se pase lista, yo estaré,
            cuando allá se pase lista, yo estaré,
            cuando allá se pase lista,
            a mi nombre yo feliz responderé.)
    - number: 552
      title: El poder del Espíritu
      verses:
        - |-
          1. Si el poder del Espíritu que a Cristo levantó
             mora en mí, (mora en mí,)
             mora en mí (mora en mí).
        - |-
          2. Si el poder del Espíritu que a Cristo levantó
             mora en mí (mora en mí),
             mora en mí (mora en mí),
        - |-
          3. Vivificará mi cuerpo el Espíritu de Dios.
             (el Espíritu de Dios, de Dios).
        - |-
          4. Vivificará mi cuerpo el Espíritu de Dios.
             (el Espíritu de Dios).
    - number: 553
      title: Muy cercano está el día
      verses:
        - |-
          1. Muy cercano está el día
             cuando volverá Jesús,
             Con la majestad y gloria que le dio su Padre Dios;
             De sus santos rodeados en la nube bajará;
             Ya de Cristo es el reinado y el pecado quitará.
        - |-
          CORO
            Ven, Señor Jesús, ven pronto,
            claman todos con ardor;
            "He aquí yo vengo presto, presto", dice el Salvador.
        - |-
          2. Su venida, victoriosa, librará la humanidad
             De Satán, autor inicuo de su gran calamidad;
             Cesarán todos los males por el reino de Jesús;
             ¡Alegraos, oh mortales! ¡Ved el triunfo de su cruz!
        - |-
          CORO
            Ven, Señor Jesús, ven pronto,
            claman todos con ardor;
            "He aquí yo vengo presto, presto", dice el Salvador.
        - |-
          3. ¡Cuánto anhelan y desean la venida de Jesús
             Los creyentes redimidos por la obra de su cruz!
             "Ven y siéntate conmigo en mi trono", el Rey dirá:
             "Has sufrido y has vencido; de mi gloria goza ya".
        - |-
          CORO
            Ven, Señor Jesús, ven pronto,
            claman todos con ardor;
            "He aquí yo vengo presto, presto", dice el Salvador.
    - number: 554
      title: Cristo viene otra vez
      verses:
        - |-
          1. Es mi Salvador eterno,
             Cristo viene otra vez;
             Es mi Salvador eterno,
             Cristo viene otra vez.
             Viene, viene, viene otra vez.
        - |-
          2. Con el son de la trompeta,
             Cristo viene otra vez;
             Con el son de la trompeta,
             Cristo viene otra vez.
             Viene, viene, viene otra vez.
        - |-
          3. Y seremos como él es,
             Cristo viene otra vez;
             Y seremos como él es,
             Cristo viene otra vez.
             Viene, viene, viene otra vez.
    - number: 555
      title: Le Veremos
      verses:
        - |-
          1. Los cielos se abren con gloria indecible;
             Los astros aplauden en triunfante fulgor.
             Destellan las nubes luz indescriptible,
             Y en gran majestad desciende el Señor.
        - |-
          CORO
            ¡Vendrá Jesucristo y le veremos
            cara a cara en toda su gloria!
            ¡Vendrá Jesucristo y le veremos
            cara a cara a Jesús, el Rey y Señor!
        - |-
          2. Brillante esplendor rodeará su venida;
             En ese instante Cristo nos reunirá.
             La gran esperanza será ya cumplida;
             Veremos su rostro y nos llevará.
        - |-
          CORO
            ¡Vendrá Jesucristo y le veremos
            cara a cara en toda su gloria!
            ¡Vendrá Jesucristo y le veremos
            cara a cara a Jesús, el Rey y Señor!
        - |-
          3. Con son de trompeta y gran voz de mando
             Los muertos en Cristo ya resucitarán;
             Y los que vivimos, también transformados,
             con él gozaremos vida eternal.
        - |-
          CORO
            ¡Vendrá Jesucristo y le veremos
            cara a cara en toda su gloria!
            ¡Vendrá Jesucristo y le veremos
            cara a cara a Jesús, el Rey y Señor!
    - number: 556
      title: En presencia estar de Cristo
      verses:
        - |-
          1. En presencia estar de Cristo,
             ver su rostro, ¡qué será,
             Cuando al fin en pleno gozo
             mi alma le contemplará!
        - |-
          CORO
            Cara a cara espero verle,
            más allá del cielo azul;
            Cara a cara en plena gloria he de ver a mi Jesús.
        - |-
          2. Sólo tras oscuro velo
             hoy lo puedo aquí mirar,
             Más ya pronto viene el día
             que su gloria ha de mostrar.
        - |-
          CORO
            Cara a cara espero verle,
            más allá del cielo azul;
            Cara a cara en plena gloria he de ver a mi Jesús.
        - |-
          3. ¡Cuánto gozo habrá con Cristo
             cuando no haya más dolor,
             Cuando cesen los peligros y
             ya estemos en su amor!
        - |-
          CORO
            Cara a cara espero verle,
            más allá del cielo azul;
            Cara a cara en plena gloria he de ver a mi Jesús.
        - |-
          4. Cara a cara, ¡cuán glorioso ha de ser así vivir!
             ¡Ver el rostro de quien quiso
             nuestras almas redimir!
        - |-
          CORO
            Cara a cara espero verle,
            más allá del cielo azul;
            Cara a cara en plena gloria he de ver a mi Jesús.
    - number: 557
      title: Yo sólo espero ese día
      verses:
        - |-
          1. Yo sólo espero ese día cuando Cristo volverá,
             Yo sólo espero ese día cuando Cristo reinará.
             Afán y todo trabajo para mí terminarán;
             Cuando Cristo venga a su reino me llevará.
        - |-
          2. Ya no me importa que el mundo
             me desprecie por doquier;
             Ya no soy más de este mundo,
             soy del reino celestial.
             Yo sólo espero ese día cuando me levantaré
             De la tumba fría con un cuerpo ya inmortal.
        - |-
          3. Entonces allí triunfante y victorioso estaré;
             A mi Señor Jesucristo cara a cara le veré.
             Allí no habrá más tristezas, ni aflicciones para mí;
             Con los redimidos al Cordero alabaré.
    - number: 558
      title: Pudiera bien ser
      verses:
        - |-
          1. Pudiera bien ser cuando el día amanezca
             Y el sol otra vez en el cielo aparezca
             Que al mundo ya resplandeciente
             de gloria, Jesús por los suyos vendrá.
        - |-
          CORO
            ¿Cuándo, oh buen Salvador, Oiremos la grata canción?
            "¡Aleluya! ¡Cristo viene!
            ¡Aleluya! Amén. ¡Aleluya! Amén".
        - |-
          2. También puede ser que, cual orbe de día,
             Flamee la tarde o la noche sombría
             En luz eternal, porque al mundo con gloria
             Jesús por los suyos vendrá.
        - |-
          CORO
            ¿Cuándo, oh buen Salvador, Oiremos la grata canción?
            "¡Aleluya! ¡Cristo viene!
            ¡Aleluya! Amén. ¡Aleluya! Amén".
        - |-
          3. Los santos del cielo descienden y cantan
             Con ángeles mil que al Señor acompañan,
             Pues ya con poder, majestad y gran gloria
             Jesús por los suyos vendrá.
        - |-
          CORO
            ¿Cuándo, oh buen Salvador, Oiremos la grata canción?
            "¡Aleluya! ¡Cristo viene!
            ¡Aleluya! Amén. ¡Aleluya! Amén".
        - |-
          4. Del mundo salir ¡Oh qué gozo sería!
             Sin lágrimas, muerte, temor o agonía;
             Así puede ser, pues al mundo con gloria
             Jesús por los suyos vendrá.
        - |-
          CORO
            ¿Cuándo, oh buen Salvador, Oiremos la grata canción?
            "¡Aleluya! ¡Cristo viene!
            ¡Aleluya! Amén. ¡Aleluya! Amén".
    - number: 559
      title: Yo podré reconocerle
      verses:
        - |-
          1. Cuando al fin se termine aquí mi vida terrenal,
             Y el río oscuro tenga que cruzar,
             En la otra ribera al Salvador conoceré;
             Su sonrisa bienvenida me dará.
        - |-
          CORO
            Yo podré reconocerle; (Yo podré reconocerle;)
            Sus heridas allí contemplaré.
            Bien podré (Bien podré) reconocerle
            Cuando a Cristo en la gloria le veré.
        - |-
          2. ¡Oh qué gozo será vivir allí con el Señor,
             Y su rostro y hermosura contemplar!
             Con los santos gozosos en perfecta comunión
             Le adoraré por la eternidad.
        - |-
          CORO
            Yo podré reconocerle; (Yo podré reconocerle;)
            Sus heridas allí contemplaré.
            Bien podré (Bien podré) reconocerle
            Cuando a Cristo en la gloria le veré.
        - |-
          3. Por los bellos portales me conducirá Jesús;
             No habrá pecado, ni ningún dolor;
             Gozaré con los suyos alabanzas entonar,
             Mas primero quiero ver a mi Señor.
        - |-
          CORO
            Yo podré reconocerle; (Yo podré reconocerle;)
            Sus heridas allí contemplaré.
            Bien podré (Bien podré) reconocerle
            Cuando a Cristo en la gloria le veré.
    - number: 560
      title: Roca de la eternidad
      verses:
        - |-
          1. Roca de la eternidad, fuiste abierta tú por mí;
             Sé mi escondedero fiel; sólo encuentro paz en ti,
             Rico, limpio manantial, en el cual lavado fui.
        - |-
          2. Aunque sea siempre fiel, aunque llore sin cesar,
             Del pecado no podré justificación lograr;
             Sólo en ti teniendo fe, deuda tal podré pagar.
        - |-
          3. Mientras haya de vivir, y al instante de expirar,
             Cuando vaya a responder en tu augusto tribunal,
             Sé mi escondedero fiel, Roca de la eternidad.
    - number: 561
      title: El Señor de los cielos
      verses:
        - |-
          1. Es Señor de los cielos, la tierra y el mar,
             de todo es Creador;
             El Señor es del tiempo y la eternidad
             y de todo será el Señor.
             Te adoro y te alabo, mi Rey;
             Te adoro y te alabo, mi Rey;
             De mi vida tú eres Señor,
             Y Señor de señores serás.
        - |-
          2. Es el Rey de la historia, y la creación,
             Rey soberano, triunfal;
             Es el Rey de la gloria, sublime, eternal,
             Y el Rey de los reyes será.
             Te adoro y te alabo, mi Rey;
             Te adoro y te alabo, mi Rey;
             De mi vida tú eres Señor,
             Y el Rey de los reyes serás.
    - number: 562
      title: Soneto al Crucificado
      verses:
        - |-
          1. No me mueve, mi Dios, para quererte
             el cielo que me tienes prometido,
             ni me mueve el infierno tan temido
             para dejar por eso de ofenderte.
        - |-
          2. Tú me mueves, Señor; muéveme el verte
             clavado en una cruz y escarnecido;
             muéveme ver tu cuerpo tan herido;
             muévemen tus afrentas y tu muerte.
        - |-
          3. Muéveme, al fin, tu amor, y en tal manera,
             que aunque no hubiera cielo, yo te amara,
             y aunque no hubiera infierno, te temiera.
        - |-
          4. No me tienes que dar porque te quiera,
             pues aunque lo que espero no esperara,
             lo mismo que te quiero te quisiera.
    - number: 563
      title: La nueva Jerusalén
      verses:
        - |-
          1. Hay un río que fluye sin cesar
             en la nueva Jerusalén;
             Que me habla de eterno bienestar
             en la nueva Jerusalén. Celeste es el manantial,
             Pristino cual el cristal en la gran Ciudad de Dios.
        - |-
          2. Hay un árbol de vida sin igual
             en la nueva Jerusalén;
             Cada mes da su fruto a raudal
             en la nueva Jerusalén. Sus hojas dan sanidad,
             A pueblos Dios da bondad en la gran Ciudad de Dios.
        - |-
          3. No tendremos la luna ni el sol
             en la nueva Jerusalén;
             Mas la gloria de Dios en arrebol,
             en la nueva Jerusalén. Dolor no habrá allá,
             Tampoco enfermedad en la gran Ciudad de Dios.
        - |-
          4. El Cordero un Libro tiene allí
             en la nueva Jerusalén;
             Mi morada eterna conseguí
             en la nueva Jerusalén. Inscrito mi nombre está,
             Y nadie lo borrará en la gran Ciudad de Dios.
    - number: 564
      title: Más allá del sol
      verses:
        - |-
          1. Aunque en esta vida no tengo riquezas,
             Sé que allí en la gloria tengo una mansión;
             Cual alma perdida entre las pobrezas,
             De mí, Jesucristo tuvo compasión.
        - |-
          CORO
            Más allá del sol, más allá del sol,
            Yo tengo un hogar, hogar, bello hogar,
            más allá del sol.
        - |-
          2. Así por el mundo yo voy caminando,
             De pruebas rodeado y de tentación;
             Pero a mi lado viene, consolando,
             Mi bendito Cristo en la turbación.
        - |-
          CORO
            Más allá del sol, más allá del sol,
            Yo tengo un hogar, hogar, bello hogar,
            más allá del sol.
        - |-
          3. A los pueblos todos del linaje humano
             Cristo quiere darles plena salvación;
             También una casa para cada hermano
             Fue a prepararles a la Santa Sion.
        - |-
          CORO
            Más allá del sol, más allá del sol,
            Yo tengo un hogar, hogar, bello hogar,
            más allá del sol.
    - number: 565
      title: Bellas Mansiones
      verses:
        - |-
          1. Mansión gloriosa tengo yo en el cielo,
             Do las maldades nunca entrarán.
             Toda tristeza cambiará en consuelo,
             Y en dulce canto el dolor y afán.
        - |-
          CORO
            Bellas mansiones hay allá en la gloria;
            Tendré en la mía el gozo sin par.
            Suenan las notas de la grata victoria;
            Voy pues con gozo a mi dulce hogar.
        - |-
          2. En este mundo predomina el llanto,
             Somos sujetos al dolor fatal.
             Mas en el cielo cesará el quebranto
             Y por los siglos nunca habrá más mal.
        - |-
          CORO
            Bellas mansiones hay allá en la gloria;
            Tendré en la mía el gozo sin par.
            Suenan las notas de la grata victoria;
            Voy pues con gozo a mi dulce hogar.
        - |-
          3. Amigo mío, cuánto anhelo yo verte
             Libre de penas y de turbación.
             A Jesucristo debes ya entregarte;
             Tendrás también una bella mansión.
        - |-
          CORO
            Bellas mansiones hay allá en la gloria;
            Tendré en la mía el gozo sin par.
            Suenan las notas de la grata victoria;
            Voy pues con gozo a mi dulce hogar.
    - number: 566
      title: No se turbe vuestro corazón
      verses:
        - |-
          1. No se turbe vuestro corazón,
             En la casa de mi Padre muchas moradas hay;
             En la casa de mi Padre muchas moradas hay.
        - |-
          2. Creéis en Dios,
             creed también en mí, Voy pues a preparar lugar
             Para vosotros, para vosotros, Un lugar para vosotros.
        - |-
          3. No se turbe vuestro corazón,
             En la casa de mi Padre muchas moradas hay;
             En la casa de mi Padre muchas moradas hay.
    - number: 567
      title: En la mansión do Cristo está
      verses:
        - |-
          1. En la mansión do Cristo está,
             allí no habrá tribulación,
             Ningún dolor, ningún pesar,
             que me quebrante el corazón.
        - |-
          CORO
            Allí no habrá tribulación,
            ningún pesar, ningún dolor;
            Feliz será mi corazón en la presencia del Señor.
        - |-
          2. Yo gozo cada día aquí
             su protección y gran amor,
             Pero es mejor estar allí
             en la presencia del Señor.
        - |-
          CORO
            Allí no habrá tribulación,
            ningún pesar, ningún dolor;
            Feliz será mi corazón en la presencia del Señor.
        - |-
          3. Perfecto amor encontraré
             con el Señor en su mansión;
             Perfecta paz allí tendré,
             con mi Jesús en comunión.
        - |-
          CORO
            Allí no habrá tribulación,
            ningún pesar, ningún dolor;
            Feliz será mi corazón en la presencia del Señor.
        - |-
          4. Entonces, sí, yo gozaré
             de toda la felicidad,
             Y ya con Cristo estaré
             por toda la eternidad.
        - |-
          CORO
            Allí no habrá tribulación,
            ningún pesar, ningún dolor;
            Feliz será mi corazón en la presencia del Señor.
    - number: 568
      title: Cuando mis luchas terminen
      verses:
        - |-
          1. Cuando mis luchas terminen aquí
             Y ya seguro en los cielos esté,
             Cuando al Señor yo contemple allí,
             ¡Gloria por siempre será para mí!
        - |-
          CORO
            ¡Esa será (¡Esa será)
            gloria sin fin, (gloria sin fin,)
            Gloria sin fin, (Gloria sin fin,)
            gloria sin fin! (gloria sin fin!)
            Cuando por gracia su faz pueda ver,
            ¡Gloria por siempre por mí ha de ser!
        - |-
          2. Cuando por gracia yo pueda tener
             En sus mansiones morada de paz,
             Cuando por siempre su faz pueda ver,
             ¡Gloria por siempre será para mí!
        - |-
          CORO
            ¡Esa será (¡Esa será)
            gloria sin fin, (gloria sin fin,)
            Gloria sin fin, (Gloria sin fin,)
            gloria sin fin! (gloria sin fin!)
            Cuando por gracia su faz pueda ver,
            ¡Gloria por siempre por mí ha de ser!
        - |-
          3. Gozo infinito será contemplar
             A los salvados que allí estarán,
             Mas la presencia de Cristo gozar,
             ¡Gloria por siempre será para mí!
        - |-
          CORO
            ¡Esa será (¡Esa será)
            gloria sin fin, (gloria sin fin,)
            Gloria sin fin, (Gloria sin fin,)
            gloria sin fin! (gloria sin fin!)
            Cuando por gracia su faz pueda ver,
            ¡Gloria por siempre por mí ha de ser!
    - number: 569
      title: Victoria sobre la muerte
      verses:
        - |-
          1. Sabemos que si nuestra casa terrenal, esta tienda
             temporal, se deshace, tenemos un edificio de parte
             de Dios, una casa no hecha de manos, eterna en
             los cielos.
        - |-
          2. Así vivimos, confiando siempre y
             comprendiendo que durante nuestra estancia
             en el cuerpo peregrinamos ausentes del Señor.
        - |-
          3. Pues confiamos y consideramos mejor estar
             ausentes del cuerpo, y estar presentes delante
             del Señor.
        - |-
          4. Por lo tanto, estemos presentes o ausentes,
             nuestro anhelo es serle agradables.
        - |-
          5. El transformará nuestro cuerpo de humillación
             para que tenga la misma forma de su cuerpo de
             gloria, según la operación de su poder.
        - |-
          6. Amados, ahora somos hijos de Dios,
             y aún no se ha manifestado lo que seremos.
        - |-
          7. Pero sabemos que cuando él sea manifestado,
             seremos semejantes a él, porque le veremos
             tal como él es.
        - |-
          8. Pero ahora, Cristo sí ha resucitado de entre
             los muertos, como primicias de los que
             durmieron.
        - |-
          9. He aquí, os digo un misterio: No todos dormiremos,
             pero todos seremos transformados
        - |-
          10. En un instante, en un abrir y cerrar de ojos,
              a la trompeta final.
        - |-
          11. Porque sonará la trompeta, y los muertos serán
              resucitados sin corrupción; y nosotros seremos
              transformados.
        - |-
          12. Porque es necesario que esto corruptible
              sea vestido de incorrupción, y que esto
              mortal sea vestido de inmortalidad.
        - |-
          13. Y cuando esto corruptible se vista de incorrupción
              y esto mortal se vista de inmortalidad, entonces
              se cumplirá la palabra que está escrita: ¡Sorbida
              es la muerte en victoria!
        - |-
          14. Pero gracias a Dios, quien nos da la victoria
              por medio de nuestro Señor Jesucristo.
    - number: 570
      title: Alabanzas dad a Cristo
      verses:
        - |-
          1. Alabanzas dad a Cristo, ensalzad al Redentor;
             Tributadle, santos todos, grande gloria y loor.
        - |-
          CORO
            Cuando estemos en gloria,
            (Cuando estemos en gloria,)
            En presencia de nuestro Redentor,
            (en presencia de nuestro Redentor,)
            A una voz la historia
            (a una voz la historia)
            Diremos del gran Vencedor.
            (del gran, del gran Vencedor).
        - |-
          2. La victoria es segura
             a las huestes del Señor;
             ¡Oh, pelead con la mirada puesta en el Protector!
        - |-
          CORO
            Cuando estemos en gloria,
            (Cuando estemos en gloria,)
            En presencia de nuestro Redentor,
            (en presencia de nuestro Redentor,)
            A una voz la historia
            (a una voz la historia)
            Diremos del gran Vencedor.
            (del gran, del gran Vencedor).
        - |-
          3. ¡Adelante en la lucha, oh soldados de la fe!
             Por su gracia triunfaremos,
             ¡gloria a Cristo, nuestro Rey!
        - |-
          CORO
            Cuando estemos en gloria,
            (Cuando estemos en gloria,)
            En presencia de nuestro Redentor,
            (en presencia de nuestro Redentor,)
            A una voz la historia
            (a una voz la historia)
            Diremos del gran Vencedor.
            (del gran, del gran Vencedor).
    - number: 571
      title: "REFLEXION: Mi glorioso futuro"
      verses:
        - |-
          1. ¡Oh, Cristo, Rey de reyes! Eres el Señor de la his-
             toria. Por tu Palabra entiendo que todo lo que sucede
             forma parte de tu plan soberano, el cual culminará en
             tu triunfo, para alabanza de tu gloria.
        - |-
          2. Antes sentía miedo al pensar en el futuro; pero
             ahora que soy tuyo, gozo de paz y seguridad. Sé que
             al dejar esta vida terrenal, iré a estar contigo.
        - |-
          3. Anhelo el día cuando vendrás para llevar a tu
             Iglesia. Resucitarás a los creyentes que murieron y
             transformarás a los vivos. Participaremos de tu victo-
             ria cuando regreses a la tierra para establecer tu reino
             de paz y justicia.
        - |-
          4. Tú, Señor, me has librado del terrible castigo del
             infierno y me has preparado un hogar eterno en la
             refulgente ciudad celestial. Esta bendita esperanza
             me inspira a una vida de servicio y santidad.
        - |-
          5. No logro comprender totalmente el glorioso futuro
             que me espera, pero sé que te veré y gozaré de tu pre-
             sencia. Así como lo haré en aquel día, uno hoy mi voz
             al gran coro de los redimidos para celebrar tu gloria.
    - number: 572
      title: Cristo me ama
      verses:
        - |-
          1. Cristo me ama, me ama a mí, su Palabra dice así;
             Niños pueden ir a él, quien es nuestro amigo fiel.
        - |-
          CORO
            Sí, Cristo me ama; sí, Cristo me ama;
            Sí, Cristo me ama; la Biblia dice así.
        - |-
          2. Cristo me ama, él murió, y la gloria nos abrió;
             Mis pecados borrará, me dará la entrada allí.
        - |-
          CORO
            Sí, Cristo me ama; sí, Cristo me ama;
            Sí, Cristo me ama; la Biblia dice así.
        - |-
          3. Cristo me ama, es verdad, y me cuida en su bondad;
             Cuando muera, bien lo sé, que al cielo yo iré.
        - |-
          CORO
            Sí, Cristo me ama; sí, Cristo me ama;
            Sí, Cristo me ama; la Biblia dice así.
    - number: 573
      title: Jesús me ama
      verses:
        - |-
          1. Jesús me ama, vino a salvarme, Jesús me ama,
             murió por mí; Por eso canto siempre,
             "El me ama, Jesús me ama, mi Salvador".
        - |-
          2. Yo era preso del vil pecado, yo era preso,
             mas me libró; Por eso canto siempre,
             "El me ama, Jesús me ama, mi Salvador".
        - |-
          3. Lo que merezco es el castigo, lo que merezco,
             Jesús pagó; Por eso canto siempre,
             "El me ama, Jesús me ama, mi Salvador".
        - |-
          4. Ahora entrego mi vida y alma,
             ahora entrego todo al Señor;
             Por eso canto siempre,
             "El me ama, Jesús me ama, mi Salvador".
    - number: 574
      title: Cristo me ama, esto sé
      verses:
        - |-
          1. Cristo me ama, esto sé,
             Y a la cruz, él mismo fue.
             Su sangre dio, del pecado me libró,
             Su sangre dio, del pecado me libró,
             Y mi vida transformó.
    - number: 575
      title: Gozo me da la Palabra leer
      verses:
        - |-
          1. Gozo me da la Palabra leer;
             cosas preciosas allí puedo ver,
             Y sobre todo, que el gran Redentor
             es de los niños el tierno Pastor.
        - |-
          CORO
            Con alegría yo cantaré
            al Redentor, tierno Pastor,
            Que en el Calvario por mí murió,
            sí, sí, por mí murió.
        - |-
          2. Me ama Jesús, pues por mí él murió,
             y de su amor a los niños habló:
             "Dejad que vengan los niños a mí,
             para salvarlos mi sangre vertí".
        - |-
          CORO
            Con alegría yo cantaré
            al Redentor, tierno Pastor,
            Que en el Calvario por mí murió,
            sí, sí, por mí murió.
        - |-
          3. Si alguien pregunta que cómo lo sé;
             "Busca a Jesús, pecador", le diré;
             "Por su Palabra, que tienes aquí,
             puedes saber que te ama a ti".
        - |-
          CORO
            Con alegría yo cantaré
            al Redentor, tierno Pastor,
            Que en el Calvario por mí murió,
            sí, sí, por mí murió.
    - number: 576
      title: Dejad a los niños que vengan
      verses:
        - |-
          1. "¡Dejad a los niños que vengan!"
             les dijo el buen Salvador;
             Con manos de suma ternura los bendijo con amor.
        - |-
          2. Sus dones están aún latentes,
             botones que quieren brotar;
             Esperan la luz de nosotros y el apoyo del hogar.
        - |-
          3. Mostremos ahora a ellos
             que todos poseen valor;
             Jesús afirmó, "De los tales es el reino del Señor".
    - number: 577
      title: Jesús bendice a los niños
      verses:
        - |-
          1. Fue al pie de unas palmeras.
             Las turbas silenciosas que no sienten fatiga,
             y olvidadas del pan, escuchan de los labios de Jesús
             altas cosas y ante el hondo misterio pensativas están...
        - |-
          2. Unos niños levantan sus caritas de rosas;
             de los ojos divinos les atrae el imán;
             acercarse quisieran, mas las manos rugosas
             de los viejos apóstoles se oponen a su afán.
        - |-
          3. Y Jesús dijo entonces; "Dejadles", "y risueños
             a Cristo presentaron los niños pequeños;
             "Dejadles que a mí vengan e imitad su candor,
             si queréis formar parte de mi reino bendito".
        - |-
          4. En seguida inclinóse hasta el más pequeñito,
             y lo besó, lo mismo que se besa una flor....
    - number: 578
      title: Acuérdate
      verses:
        - |-
          1. Acuérdate de tu Creador
             en los días de tu juventud;
             Acuérdate de tu Creador en los días de tu juventud,
        - |-
          2. Antes que vengan los días malos,
             Y lleguen los años de los cuales digas:
             "No tengo en ellos contentamiento,
             No tengo en ellos contentamiento".
        - |-
          3. Acuérdate de tu Creador
             en los días de tu juventud;
             Acuérdate de tu Creador en los días de tu juventud.
    - number: 579
      title: Corazones siempre alegres
      verses:
        - |-
          1. Corazones siempre alegres, rebosando gratitud,
             Somos los que a Dios amamos,
             redimida juventud.
        - |-
          CORO
            Siempre alegres vamos todos,
            llenos de felicidad;
            Hermosísimo el camino hacia la eternidad.
            Hermosísimo el camino hacia la eternidad.
        - |-
          2. Dios nos guía de la mano, nos ampara su poder;
             Es su brazo poderoso
             que nos quiere defender.
        - |-
          CORO
            Siempre alegres vamos todos,
            llenos de felicidad;
            Hermosísimo el camino hacia la eternidad.
            Hermosísimo el camino hacia la eternidad.
        - |-
          3. Si nos viera desmayados
             en nuestra debilidad,
             Con su gracia nos anima,
             nos levanta su bondad.
        - |-
          CORO
            Siempre alegres vamos todos,
            llenos de felicidad;
            Hermosísimo el camino hacia la eternidad.
            Hermosísimo el camino hacia la eternidad.
        - |-
          4. En sus fuerzas llevaremos
             aun con gozo nuestra cruz;
             Luego con él cantaremos
             en la gloria de su luz.
        - |-
          CORO
            Siempre alegres vamos todos,
            llenos de felicidad;
            Hermosísimo el camino hacia la eternidad.
            Hermosísimo el camino hacia la eternidad.
    - number: 580
      title: Quinceañera Feliz
      verses:
        - |-
          . ESTROFA
            Quince años Dios te concede
            en este mundo vivir
            Y guardarte siempre quiere, oh quinceañera feliz;
            Dale a Cristo la gloria por tu feliz existir,
            Nunca desprecies su gracia;
            quiérele siempre servir.
        - |-
          CORO
            Gózate hoy, quinceañera feliz;
            dale al Señor tu vida y corazón;
            Y vivirás bajo su fiel protección,
            Y en cada paso que das tú tendrás gran bendición.
    - number: 581
      title: Oración de un joven
      verses:
        - |-
          1. Lo que soy y lo que puedo yo lo debo a mi Señor
             Y a sus pies postrado quedo, asombrado de su amor.
        - |-
          2. Lejos, pues de mí gloriarme, ni de bienes ni de talento.
             No me es dado el ensalzarme sino en el madero cruento.
        - |-
          3. Todo es tuyo, oh Dios mío, nada puede en mí valer,
             Dueño eres de mi albedrío, toma, sí, mi entero ser.
    - number: 582
      title: Proclamad, juventud redimida
      verses:
        - |-
          1. Proclamad, juventud redimida,
             el glorioso evangelio de amor,
             que transforma del hombre la vida,
             proveyéndole vida mejor.
             Proclamad las verdades gloriosas,
             levantando hasta el cielo la voz;
             Proclamad las verdades hermosas
             Que descienden del trono de Dios.
        - |-
          2. ¡Adelante con Cristo, adelante! ¡Adelante,
             febril juventud! Caminad victoriosa y triunfante,
             proclamando a los hombres salud.
             Levantad la bandera imponente,
             la bandera que Dios os legó,
             En el Norte, en el Sur y el Oriente,
             Pues la hora del triunfo sonó.
        - |-
          3. ¡Juventud fervorosa, adelante! ¡Adelante
             con Cristo Jesús! Caminemos en marcha triunfante,
             dando al mundo irredento la luz, esa luz redentora
             que alumbra, que irradia con gran plenitud,
             Que destruye la horrenda penumbra,
             ¡Adelante, febril juventud!
    - number: 583
      title: Dios mío eres tú
      verses:
        - |-
          1. Dios, Dios mío eres tú;
             de madrugada te buscaré;
             Mi alma tiene sed de ti,
             y mi carne te anhela,
             En tierra seca y árida
             donde aguas no hay. (no hay.)
    - number: 584
      title: La Juventud
      verses:
        - |-
          1. Acuérdate de tu Creador en los días de tu juventud...
        - |-
          2. Sé ejemplo de los creyentes en palabra, conducta,
             amor, espíritu, fe y pureza...
        - |-
          3. Ocupate en la lectura, la exhortación y la enseñanza.
        - |-
          4. Huye también de las pasiones juveniles, y sigue la
             justicia, la fe, el amor y la paz, con los que de
             corazón limpio invocan al Señor.
    - number: 585
      title: La Reina Ester
      verses:
        - |-
          1. El rey persa, buscando otra reina,
             escogió a la huérfana, Ester;
             Fiel judía, doncella muy risueña,
             la primera del reino vino a ser.
        - |-
          CORO
            Del Señor puedo ver la providencia,
            cada día me guía en su amor;
            Me pregunto ahora: "¿Y quién sabe
            si por esto aquí me trajo Dios?"
        - |-
          2. Su buen padre adoptivo, Mardoqueo,
             confrontó el complot del cruel Amán,
             Quien odió con vehemencia al hebreo;
             acabar con la raza fue su afán.
        - |-
          CORO
            Del Señor puedo ver la providencia,
            cada día me guía en su amor;
            Me pregunto ahora: "¿Y quién sabe
            si por esto aquí me trajo Dios?"
        - |-
          3. Ayunaron tres días los hebreos;
             fue su parte en el atrevido plan;
             Dijo Ester ante el trono de Asuero:
             "Si yo muero, que muera; Dios sabrá".
        - |-
          CORO
            Del Señor puedo ver la providencia,
            cada día me guía en su amor;
            Me pregunto ahora: "¿Y quién sabe
            si por esto aquí me trajo Dios?"
        - |-
          4. El malvado Amán fue a la horca
             y el pueblo judío se salvó;
             Mardoqueo del rey obtuvo honra,
             y Ester gran ejemplo nos dejó.
        - |-
          CORO
            Del Señor puedo ver la providencia,
            cada día me guía en su amor;
            Me pregunto ahora: "¿Y quién sabe
            si por esto aquí me trajo Dios?"
    - number: 586
      title: Hacedores del bien
      verses:
        - |-
          1. Pero habla tú lo que está de acuerdo con la sana
             doctrina; que los hombres mayores sean sobrios,
             serios y prudentes, sanos en la fe, en el amor y
             en la perseverancia.
        - |-
          2. Asimismo, que las mujeres mayores sean reverentes
             en conducta, no calumniadoras ni esclavas del
             mucho vino, maestras de lo bueno,
        - |-
          3. De manera que encaminen en la prudencia
             a las mujeres jóvenes: a que amen a sus maridos
             y a sus hijos,
        - |-
          4. Para que la palabra de Dios no sea desacreditada.
        - |-
          5. Exhorta asimismo a los jóvenes a que sean prudentes,
             mostrándote en todo como ejemplo de buenas obras.
        - |-
          6. No os engañéis; Dios no puede ser burlado.
             Todo lo que el hombre siembre, eso mismo
             cosechará.
        - |-
          7. No nos cansemos, pues, de hacer el bien; porque
             a su tiempo cosecharemos, si no desmayamos.
        - |-
          8. Por lo tanto, mientras tengamos oportunidad,
             hagamos el bien a todos, y en especial a los de
             la familia de la fe.
    - number: 587
      title: Henos en tus huestes, Señor
      verses:
        - |-
          1. ¿Quién está en las huestes del buen Salvador,
             Pronto a dedicarse fiel a su Señor?
             ¿Quién abandonando su falaz vivir
             Quiere acá servir y aun con él sufrir?
        - |-
          CORO
            Por tu rica gracia, (por tu rica gracia,)
            por tu gran amor, (por tu gran amor,)
            Henos en tus huestes, junto a ti, Señor.
        - |-
          2. No ambicionamos gloria ni poder,
             Mas queremos ya tu voluntad hacer;
             Quien tu perdurable gracia llega a ver,
             Vése constreñido de tu parte a ser.
        - |-
          CORO
            Por tu rica gracia, (por tu rica gracia,)
            por tu gran amor, (por tu gran amor,)
            Henos en tus huestes, junto a ti, Señor.
        - |-
          3. No con oro o plata, oh Jesús, Señor;
             Tú nos redimiste con divino amor;
             Con tu propia sangre, ¡santa libación!
             Fue que tú efectuaste nuestra redención.
        - |-
          CORO
            Por tu rica gracia, (por tu rica gracia,)
            por tu gran amor, (por tu gran amor,)
            Henos en tus huestes, junto a ti, Señor.
        - |-
          4. La batalla dura siempre habrá de ser;
             Enemigos fuertes hemos de tener,
             Mas omnipotente es nuestro Capitán;
             Ha vencido ya las fuerzas de Satán.
        - |-
          CORO
            Por tu rica gracia, (por tu rica gracia,)
            por tu gran amor, (por tu gran amor,)
            Henos en tus huestes, junto a ti, Señor.
    - number: 588
      title: El varón próspero
      verses:
        - |-
          1. Mas Jehová estaba con José,
             y fue varón próspero.
        - |-
          2. Su bendición estaba con José,
             y fue varón próspero.
        - |-
          3. No pecaría contra Dios, José,
             y fue varón próspero.
        - |-
          4. Mas Jehová estaba con José,
             Su bendición estaba con José,
             No pecaría contra Dios, José,
             y fue varón próspero.
    - number: 589
      title: Dicha grande es la del hombre
      verses:
        - |-
          1. Dicha grande es la del hombre
             cuyas sendas rectas son;
             No anda con los pecadores,
             en actuar de perversión.
             A los malos consejeros deja,
             porque teme el mal;
             Huye de la burladora gente impía e inmoral.
        - |-
          2. Antes, en la ley divina cifra su mayor placer,
             Meditando noche y día en su divinal saber;
             Este, como el árbol verde,
             bien regado y en sazón,
             Frutos abundantes rinde y
             hojas que perennes son.
        - |-
          3. El prospera en lo que emprende
             y le sale todo bien;
             Mas funestos resultados los impíos siempre ven;
             Porque Dios la senda mira
             por la cual los suyos van;
             Otra es la de los impíos: al infierno bajarán.
    - number: 590
      title: Las mujeres cristianas
      verses:
        - |-
          1. Las mujeres cristianas trabajan con amor,
             con paciencia y con fe;
             Mejorar el hogar sólo buscan,
             implorando de Dios el poder.
        - |-
          CORO
            Nuestra fe (Nuestra fe)
            triunfará, (triunfará,)
            Expresada en trabajo tenaz;
            El amor (El amor) unirá (unirá)
            Nuestras almas en grato solaz.
        - |-
          2. Con tesoros de amor en el alma,
             con potencia incansable en el bien,
             Halle gracia divina y sea sabia
             cada madre al cumplir su deber.
        - |-
          CORO
            Nuestra fe (Nuestra fe) triunfará, (triunfará,)
            Expresada en trabajo tenaz;
            El amor (El amor) unirá (unirá)
            Nuestras almas en grato solaz.
        - |-
          3. Extendidos los brazos formemos,
             de constancia y valor, noble unión;
             Trabajando y cantando elevemos
             nuestro ser, el hogar, la nación.
        - |-
          CORO
            Nuestra fe (Nuestra fe) triunfará, (triunfará,)
            Expresada en trabajo tenaz;
            El amor (El amor) unirá (unirá)
            Nuestras almas en grato solaz.
    - number: 591
      title: Rut la Moabita
      verses:
        - |-
          1. Nació entre ídolos Rut en Moab,
             Mas con un hebreo, feliz se casó;
             Su suegra Noemí le brindó amistad;
             Por ella, del Dios verdadero aprendió.
        - |-
          CORO
            Dios nuestro Padre, te loamos por tu amor;
            Dios poderoso, pedimos protección;
            Dios soberano, dirígenos, Señor,
            Hasta llegar a tu celestial mansión.
        - |-
          2. Murió su esposo y cuñado también,
             Las viudas sufrieron gran adversidad;
             Noemí, pues, dispuso volver a Belén,
             Y Rut demostró su amor y lealtad.
        - |-
          CORO
            Dios nuestro Padre, te loamos por tu amor;
            Dios poderoso, pedimos protección;
            Dios soberano, dirígenos, Señor,
            Hasta llegar a tu celestial mansión.
        - |-
          3. "Tu pueblo", Rut dijo, "mi pueblo será,
             A donde tú fueres contigo iré;
             Tu Dios seguiré, y me amparará;
             No más a los ídolos adoraré".
        - |-
          CORO
            Dios nuestro Padre, te loamos por tu amor;
            Dios poderoso, pedimos protección;
            Dios soberano, dirígenos, Señor,
            Hasta llegar a tu celestial mansión.
        - |-
          4. La joven humilde a Booz acudió,
             Y como pariente él la redimió;
             La hizo su esposa, amor le brindó,
             Y de la pareja, David descendió.
        - |-
          CORO
            Dios nuestro Padre, te loamos por tu amor;
            Dios poderoso, pedimos protección;
            Dios soberano, dirígenos, Señor,
            Hasta llegar a tu celestial mansión.
    - number: 592
      title: Perfecto Amor
      verses:
        - |-
          1. Perfecto amor, que al hombre es transcendente,
             Concede a éstos, Dios, tu bendición,
             Que su amor perdure eternamente,
             No dos, sino uno en perfecta unión.
        - |-
          2. Vida perfecta, que de tu abundancia
             Demuestren caridad y gran valor,
             Dulce esperanza, fe y perseverancia;
             Que en tiempo adverso vivan sin temor.
        - |-
          3. Concédeles tu gozo en la tristeza,
             Y en el afán tu gracia eficaz;
             Cuando se abaten, dales tu promesa
             De aquel celeste hogar de amor y paz.
    - number: 593
      title: Dios bendiga las almas unidas
      verses:
        - |-
          1. Dios bendiga las almas unidas
             por los lazos de amor sacrosanto,
             Y las guarde de todo quebranto
             en un mundo de espinas y error.
        - |-
          2. Que el hogar que a formarse comienza
             con la unión de estos dos corazones,
             Goce siempre de mil bendiciones
             al amparo del Dios de Israel.
        - |-
          3. Que el Señor, con su dulce presencia,
             cariñoso estas bodas presida,
             Y conduzca por sendas de vida
             a los que hoy se prometen lealtad.
        - |-
          4. Les recuerde que nada en el mundo
             es eterno, que todo termina,
             Y por tanto con gracia divina,
             cifrar deben la dicha en su Dios.
        - |-
          5. Que los dos que aquí se aproximan
             a jurarse su fe mutuamente,
             Busquen siempre en Cristo la fuente
             de amor y de dicha inmortal.
        - |-
          6. Y si acaso de duelo y tristeza
             se empañase su senda un día,
             En Jesús hallarán dulce guía
             que consuelo y paz les dará.
    - number: 594
      title: Oración de matrimonio
      verses:
        - |-
          1. Padre eterno, hoy humildemente,
             Te dirigimos nuestra oración;
             Tú que trasciendes al entendimiento,
             Une a estas almas en tu bendición.
        - |-
          2. Tú, de la vida inspirador supremo,
             Sella este pacto con tu santo amor;
             Y en tus promesas y en tu compañía
             Vivan tus hijos sin ningún temor.
        - |-
          3. Ante las pruebas dales valentía,
             Y aquella fe que vence al vendaval;
             Sea la luz de cada nuevo día
             Aurora plena de felicidad.
        - |-
          4. Padre, que en este hogar, que hoy se forma,
             Arda inefable el fuego de tu amor;
             Esta unión, por ti santificada,
             Fiel se consagre siempre a ti, Señor. Amén.
    - number: 595
      title: La familia bíblica
      verses:
        - |-
          1. Esposas, estad sujetas a vuestros
             esposos, como conviene en el Señor.
        - |-
          2. Esposos, amad a vuestras
             esposas y no os amarguéis contra ellas.
        - |-
          3. Hijos, obedeced a vuestros padres
             en todo, porque esto es agradable en el Señor.
        - |-
          4. Padres, no irritéis a vuestros
             hijos, para que no se desanimen.
    - number: 596
      title: La familia cristiana
      verses:
        - |-
          1. Dios ordenó la familia,
             bendijo a los padres e hijos,
             Y en su omnisciencia divina les dio leyes para guiarlos.
        - |-
          CORO
            Sujetaos unos a otros
            en fraterno y santo amor,
            Mutuamente sirviéndoos en el temor del Señor.
        - |-
          2. A vuestros propios esposos,
             casadas, estad, pues, sujetas,
             Como si fuese a Cristo, sumisas y muy respetuosas.
        - |-
          CORO
            Sujetaos unos a otros
            en fraterno y santo amor,
            Mutuamente sirviéndoos en el temor del Señor.
        - |-
          3. Amad a vuestras esposas, maridos, amad sin medida,
             Cual Cristo amó a la Iglesia,
             por ella entregando su vida.
        - |-
          CORO
            Sujetaos unos a otros
            en fraterno y santo amor,
            Mutuamente sirviéndoos en el temor del Señor.
        - |-
          4. Obedeced a los padres, hijitos, pues eso es justo;
             Mandato es con promesa, hacedlo al Padre con gusto.
        - |-
          CORO
            Sujetaos unos a otros
            en fraterno y santo amor,
            Mutuamente sirviéndoos en el temor del Señor.
        - |-
          5. Padres, criad a los hijos con calma y sin provocarlos,
             En disciplina cristiana,
             confiando que Dios va a cuidarlos.
        - |-
          CORO
            Sujetaos unos a otros
            en fraterno y santo amor,
            Mutuamente sirviéndoos en el temor del Señor.
    - number: 597
      title: Un feliz hogar
      verses:
        - |-
          1. Gran felicidad se goza en el hogar
             donde el amor es dulce cual la miel;
             Porque Cristo tiene el primer lugar
             donde cada familiar le sigue fiel.
        - |-
          CORO
            Danos un feliz hogar,
            lleno de tu santo amor.
            Cristo, reina en nuestro hogar,
            y en mi corazón, Señor.
        - |-
          2. Padres, a sus hijos deben educar,
             explicando los preceptos del Señor;
             En la corrección no deben provocar
             ira en los hijos sino el amor.
        - |-
          CORO
            Danos un feliz hogar,
            lleno de tu santo amor.
            Cristo, reina en nuestro hogar,
            y en mi corazón, Señor.
        - |-
          3. Hijos, a sus padres deben respetar,
             siempre obedientes y con gratitud;
             El vivir así produce bienestar,
             largos días de alegría y salud.
        - |-
          CORO
            Danos un feliz hogar,
            lleno de tu santo amor.
            Cristo, reina en nuestro hogar,
            y en mi corazón, Señor.
    - number: 598
      title: Cuando las bases
      verses:
        - |-
          1. Cuando las bases de este mundo tiemblan
             Y el mal corrompe nuestra sociedad,
             Nuestras plegarias hacia ti se elevan
             Por la familia, por la humanidad.
        - |-
          CORO
            Nuestros hogares guarda, Señor;
            Haz que proclamen tu verdad y tu amor.
        - |-
          2. Haz que los lazos que en amor estrecha
             La recta y santa vida conyugal,
             Suaves y tiernos, pero firmes sean;
             Nada los pueda nunca quebrantar.
        - |-
          CORO
            Nuestros hogares guarda, Señor;
            Haz que proclamen tu verdad y tu amor.
        - |-
          3. Los padres críen con temor sus hijos,
             Sin irritarlos, en amor y fe;
             Sean los hijos siempre agradecidos;
             Nunca se aparten de tu santa ley.
        - |-
          CORO
            Nuestros hogares guarda, Señor;
            Haz que proclamen tu verdad y tu amor.
        - |-
          4. Que ni el dinero ni el placer se tornen
             En falsa meta del moderno hogar;
             Busque servirte y ofrecer sus dones
             A un mundo lleno de necesidad.
        - |-
          CORO
            Nuestros hogares guarda, Señor;
            Haz que proclamen tu verdad y tu amor.
    - number: 599
      title: Danos un bello hogar
      verses:
        - |-
          1. Danos un bello hogar:
             donde la Biblia nos guíe fiel,
             Donde tu amor bienestar nos dé,
             donde en ti todos tengan fe.
             ¡Danos un bello hogar!
        - |-
          2. Danos un bello hogar:
             donde el padre es fuerte y fiel,
             y su ejemplo se pueda ver,
             donde tu amor reine en nuestro ser.
             ¡Danos un bello hogar!
        - |-
          3. Danos un bello hogar:
             donde la madre con devoción
             Sepa mostrarnos tu compasión,
             do todos vivan en comunión.
             ¡Danos un bello hogar!
        - |-
          4. Danos un bello hogar:
             donde los hijos con decisión
             Sigan a Cristo de corazón,
             do se respire tu bendición.
             ¡Danos un bello hogar!
             Amén.
    - number: 600
      title: Dios el Creador y Dueño
      verses:
        - |-
          1. Dios, el Creador y Dueño de cuanto en el mundo está,
             Nos ha honrado al llamarse nuestro Padre Celestial.
             Tiernamente él nos guía; suple en necesidad;
             Fiel es en la disciplina, generoso en su bondad.
        - |-
          2. La familia ha formado para nuestro gozo y bien;
             Padre humano le ha dado como líder y sostén.
             A los padres hoy honramos, son de Dios precioso don;
             Con amor agradezcamos lo que hacen, lo que son.
        - |-
          3. Dios, concede en tu gracia que los padres hoy aquí
             Cumplan con tus enseñanzas, imitándote a ti.
             Dales gran sabiduría, dales fuerzas y amor;
             Que ejemplo y guía sean; Oh, bendíceles, Señor. Amén.
    - number: 601
      title: Familia Feliz
      verses:
        - |-
          1. Hay un lugar que Dios me dio,
             para crecer y para vivir;
             Es el hogar lugar de Dios,
             donde el amor puedo sentir.
        - |-
          2. Familia feliz es donde reina Dios;
             Familia feliz, gran bendición de Dios.
        - |-
          3. Hay un lugar que Dios me dio,
             para crecer y para vivir;
             Es el hogar lugar de Dios,
             donde el amor puedo sentir.
    - number: 602
      title: El primer matrimonio
      verses:
        - |-
          1. Dar quiso Dios al hombre compañía
             Igual en dignidad y hermosura,
             Y para componer tan gran figura,
             Sueño y saber a un tiempo le infundía:
        - |-
          2. De su costilla la mujer hacía
             Sabia, linda y honesta criatura;
             Y el hombre arrebatado en su dulzura,
             "Mi carne eres y hueso", le decía.
    - number: 603
      title: Honor a las madres
      verses:
        - |-
          1. Ante tu presencia, Dios, reunidos, a una voz,
             Hoy rendimos todo honor a las madres, oh Señor,
             Por su amor y comprensión, y su tierna compasión.
        - |-
          2. Con profunda gratitud, por su leal solicitud,
             Su constante y fiel labor, te alabamos, Salvador;
             Son inmensa bendición al hogar y la nación.
        - |-
          3. Oye, pues, la petición de esta fiel congregación;
             Te rogamos con fervor por las madres, Dios de amor;
             Que con tu divino bien coronadas hoy estén.
    - number: 604
      title: Honor a los padres
      verses:
        - |-
          1. Ante nuestro Padre Dios le alabamos con la voz
             Por su Hijo único quien al mundo él mandó;
             Hoy brindamos todo honor a los padres con amor.
        - |-
          2. Dios al padre Adán creó y la vida en él sopló;
             A su imagen lo formó y su comunión buscó;
             Hoy brindamos todo honor a los padres con amor.
        - |-
          3. Del hogar, cabeza es él, a su esposa siempre es fiel;
             Por su ejemplo y dirección, por su amor y provisión,
             Hoy brindamos todo honor a los padres con amor.
        - |-
          4. Sabio líder familiar,
             digno y fuerte para guiar;
             Loor al Padre celestial por el padre terrenal;
             Hoy brindamos todo honor a los padres con amor.
    - number: 605
      title: Bienaventurada
      verses:
        - |-
          1. Hoy reconocemos con amor y alegría
             Todo lo que hace la madre en su hogar,
             Cómo sus palabras y su sabiduría
             Dan a la familia consuelo y bienestar.
        - |-
          2. Madres compasivas dan al necesitado;
             Valen más que perlas, son joyas del Señor.
             Madres tan activas, siempre a nuestro lado,
             Con sus mil labores nos muestran su amor.
        - |-
          3. Bienaventuradas son las madres virtuosas
             Que confían siempre, temiendo al Señor;
             La Palabra dice que son fieles esposas,
             Cuidadosas madres y dignas de honor.
    - number: 606
      title: Tú honraste a las madres
      verses:
        - |-
          1. Tú honraste a las madres, oh bendito Salvador,
             Al nacer en este mundo como hijo de mujer;
             Haz, Señor, que cada madre cumpla siempre su deber,
             Que te honre en todo tiempo y te sirva con amor.
        - |-
          2. Tú, Señor, que disfrutaste del cuidado maternal,
             Hoy bendice a las madres, te venimos a pedir;
             Que enseñen a sus hijos tus caminos a seguir,
             Cólmales de paz y gozo con tu mano divinal.
        - |-
          3. Tú, Jesús, que el trabajo con José lo hiciste bien,
             Haz que fieles te sigamos con paciencia y humildad;
             Que la vida hogareña muestre siempre tu bondad,
             Que las madres sean ejemplo de constancia
             y fe también.
        - |-
          4. Tú, oh Cristo, que buscaste a las almas con amor,
             Tú, que a todos atrajiste con ternura y compasión,
             Haz que sea nuestra vida un canal de bendición;
             Que las madres traigan gloria a tu nombre,
             oh Señor.
    - number: 607
      title: A mi madre
      verses:
        - |-
          1. A mi madre tan querida
             yo jamás podré olvidar
             Mientras dure aquí mi vida,
             mientras mi alma pueda amar.
        - |-
          CORO
            A mi madre tan querida,
            la honraré toda la vida;
            Su bondad fue sin medida;
            gracias, Dios, por su amor.
        - |-
          2. La bendita madre mía
             en la infancia me instruyó;
             Ella fue luz y alegría que mis penas mitigó.
        - |-
          CORO
            A mi madre tan querida,
            la honraré toda la vida;
            Su bondad fue sin medida;
            gracias, Dios, por su amor.
        - |-
          3. Su mirada de ternura,
             bello obsequio del Señor,
             Su cariño y dulzura, los recuerdo con amor.
        - |-
          CORO
            A mi madre tan querida,
            la honraré toda la vida;
            Su bondad fue sin medida;
            gracias, Dios, por su amor.
    - number: 608
      title: Un año más
      verses:
        - |-
          1. ¡Un año más nos da el Salvador,
             un año más de gracia y amor,
             Para servirle de corazón,
             para servir a Cristo!
        - |-
          CORO
            Quiero servir a mi Jesús,
            Quiero esparcir doquier su luz;
            Quiero anunciar su amor y su cruz.
            ¡Quiero servir a Cristo!
        - |-
          2. Un año más; yo quiero ser fiel,
             y dar mi vida sólo por él.
             ¡Qué privilegio es vivir así,
             para servir a Cristo!
        - |-
          CORO
            Quiero servir a mi Jesús,
            Quiero esparcir doquier su luz;
            Quiero anunciar su amor y su cruz.
            ¡Quiero servir a Cristo!
        - |-
          3. Un año más, ¡qué dicha será!
             tal vez muy pronto Cristo vendrá.
             ¡Qué poco tiempo nos queda ya
             para servir a Cristo!
        - |-
          CORO
            Quiero servir a mi Jesús,
            Quiero esparcir doquier su luz;
            Quiero anunciar su amor y su cruz.
            ¡Quiero servir a Cristo!
    - number: 609
      title: Dad a Dios inmortal alabanza
      verses:
        - |-
          1. Dad a Dios inmortal alabanza, su merced,
             su verdad nos inunda;
             Es su gracia en prodigios fecunda,
             sus mercedes, humildes, cantad.
        - |-
          2. ¡Al Señor de señores
             dad gloria, Rey de reyes, poder sin segundo!
             Morirán los señores del mundo,
             mas su reino no acaba jamás.
        - |-
          3. Vio los pueblos en vicios sumidos
             y sintió compasión en su seno; De prodigios de gracia
             está lleno, sus mercedes, humildes, cantad.
             A su pueblo llevó por la mano
             a la tierra por él prometida.
             Por los siglos sin fin le da vida;
             y el pecado y la muerte caerán.
        - |-
          4. A su Hijo envió por salvarnos
             del pecado y la muerte eterna;
             De prodigios de gracia es torrente, sus mercedes,
             humildes, cantad. Por el mundo su mano nos lleva
             y al celeste descanso nos guía; Su bondad vivirá eterno día,
             cuando el mundo no exista ya más.
    - number: 610
      title: Principia un año nuevo
      verses:
        - |-
          1. Principia un año nuevo; que sea, oh Señor,
             Un año en que nos muestres de nuevo tu amor;
             Un año de progreso y de prosperidad,
             Un año en que gocemos tu gran fidelidad.
        - |-
          2. Principia un año nuevo; en ti hemos de confiar;
             Seguros en tu mano podemos descansar.
             Tu gran misericordia, tu gracia y bondad
             En este nuevo año queremos disfrutar.
        - |-
          3. Principia un año nuevo; ayúdanos, oh Dios,
             A ser más consagrados, más prestos a tu voz;
             Y sea allí contigo, o en la tierra aquí,
             Que todo lo que hagamos te glorifique a ti.
             Amén.
    - number: 611
      title: Con alegres corazones
      verses:
        - |-
          1. Con alegres corazones alabamos al Señor;
             Celebrando tu cumpleaños, hoy cantamos con fervor;
             Te deseamos muchos años de completa bendición;
             Que tu vida sea en Cristo, tu delicia y tu porción.
        - |-
          CORO
            Cantad, cantad, (sí, cantad,) felicidad (sí, cantad,)
            deseamos hoy de corazón; su nombre alabad, (alabad,)
            Su nombre alabad, (alabad,) que Dios te dé su protección.
            El buen Pastor (el Pastor) te guiará (te guiará)
            en sendas de paz y amor; pues que contigo Cristo
            siempre está, ¡cantad, cantad, cantad!
        - |-
          2. El Señor te dio la vida; con su imagen te dotó,
             Para gloria de su nombre, ricos dones te legó.
             Dios que vela tus pisadas y a tu lado siempre va,
             Por su gracia te sustenta con el cálico maná.
        - |-
          CORO
            A Dios loor (sí loor), porque en su amor (su amor)
            un año más te concedió; Dio bendición (bendición)
            y protección (protección) y con sus alas te cubrió
            Te cuidará (cuidará) y guiará (guiará)
            y en todo te prosperará,
            Pues a tu lado ha prometido estar;
            ¡A Dios todo loor!
    - number: 612
      title: Feliz, feliz cumpleaños
      verses:
        - |-
          1. Feliz, feliz cumpleaños deseamos para ti;
             Que el Dios omnipotente te quiera bendecir.
        - |-
          CORO
            ¡Feliz, feliz cumpleaños! Que Dios en su bondad
            Te dé muy larga vida, salud, felicidad.
        - |-
          2. A Dios le damos gracias que con amor sin par,
             Al fin de otro año hermoso te permitió llegar.
        - |-
          CORO
            ¡Feliz, feliz cumpleaños! Que Dios en su bondad
            Te dé muy larga vida, salud, felicidad.
        - |-
          3. Oremos pues, unidos, que te bendiga aún más,
             Te colme en lo futuro de bien, prosperidad.
        - |-
          CORO
            ¡Feliz, feliz cumpleaños! Que Dios en su bondad
            Te dé muy larga vida, salud, felicidad.
        - |-
          4. (Letra optativa para aniversarios)
             Feliz aniversario, queremos hoy decir;
             Que el Dios omnipotente les quiera bendecir.
             ¡Feliz aniversario! que Dios en su bondad
             Les dé muy larga vida, salud, felicidad.
    - number: 613
      title: Nuestra Patria
      verses:
        - |-
          1. Nuestra patria será para Cristo,
             si unidos luchamos por él;
             Una tierra que honre al Bendito
             y que muestre de Dios el poder.
        - |-
          2. A luchar, pues, con santo entusiasmo;
             prediquemos de Cristo doquier.
        - |-
          3. ¡Oh Cristianos, luchad! Vuestra patria salvad,
             que Jesús pronto vendrá. ¡Oh Cristianos, luchad!
             Vuestra patria salvad, que Jesús pronto vendrá.
    - number: 614
      title: América será para Cristo
      verses:
        - |-
          1. América será para Cristo,
             el único camino hacia Dios;
             Verá lo que sus ojos no han visto,
             con sólo caminar de él en pos.
        - |-
          2. América será para el cielo, el cielo que Jesús preparó,
             El día que tras rápido vuelo, al lado de Jehová se sentó.
        - |-
          3. Despierta, pues, América amada;
             alístate en las filas de Dios;
             Escucha del Señor la llamada,
             pues es tan cariñosa su voz.
        - |-
          4. Llamando está a tu puerta el Cordero
             que derramó su sangre en la cruz;
             Que sea el Nuevo Mundo el primero,
             en ir a las mansiones de luz.
        - |-
          5. Colombia, Panamá y Venezuela,
             Bolivia, Paraguay, Ecuador,
             Tendrán la paz de Dios que consuela,
             la paz que nos dejó el Redentor.
        - |-
          6. Y Chile, el Perú, la Argentina,
             y Cuba, Uruguay y el Brasil,
             Y el grupo de las islas marinas,
             tendrán sus bendiciones a mil.
        - |-
          7. Los pueblos que han estado dormidos
             sabrán que Dios les ama en verdad:
             Jamaica, los Estados Unidos,
             y México y también Canadá.
        - |-
          8. Los pueblos que componen el Istmo,
             y todos los del sur lo sabrán;
             Sin Cristo nunca habrá cristianismo;
             sin Cristo sólo reina Satán.
        - |-
          9. La bella Guatemala y Honduras,
             la hermosa Nicaragua, también,
             Tendrán en las edades futuras
             la vida y la salud del Edén.
        - |-
          10. Y Dios bendecirá a Costa Rica;
              y Dios bendecirá a El Salvador,
              Naciones que, aunque sean tan chicas,
              son grandes a la faz del Señor.
    - number: 615
      title: Oración por la patria
      verses:
        - |-
          1. Te damos gracias, Dios,
             por nuestra amada patria
             Que alumbras con tu sol y
             con tus mares bañas. La luz primera
             aquí pudimos contemplar;
             Que en ella brille al fin la luz de tu verdad.
        - |-
          2. Oh Padre Celestial, bendice a nuestra patria;
             Concédele tu paz, otórgale tu gracia;
             Que pueda prosperar en rectitud y bien,
             Y a Cristo proclamar por Salvador y Rey.
    - number: 616
      title: A Dios, naciones, dad loor
      verses:
        - |-
          1. A Dios, naciones, dad loor,
             porque es el único Señor;
             A él con gozo alabad,
             y sus bondades celebrad.
        - |-
          2. Es infinito su poder;
             en él tenemos nuestro ser,
             Pues que del polvo nos formó,
             y de la muerte nos salvó.
        - |-
          3. Universal es tu bondad;
             será eterna tu verdad;
             Inagotable es tu amor,
             ¡Omnipotente Dios, Señor!
    - number: 617
      title: Supremo Dios
      verses:
        - |-
          1. Supremo Dios, te ruego por mi patria;
             Gobierna con tu mano de justicia.
             Seas honrado y glorificado
             En toda la nación.
        - |-
          2. Hincha los ríos, fecundiza el campo,
             Llena las huertas, el taller visita;
             Y a todo hombre dale de tus bienes
             Lo que es menester.
        - |-
          3. Para tu reino sea nuestra patria;
             Tu voluntad la ley que veneremos;
             La cruz de Cristo la gloriosa enseña
             Que tremolemos.
        - |-
          4. Sobre la tierra que por patria amada
             Te plugo darnos, libertades brillen.
             Y no consientas que se forjen nunca
             Yugos de esclavitud.
        - |-
          5. Caigan las aras de mentidos dioses
             Que al hombre vana salvación le brindan.
             Sé tú el Dios nuestro, y el debido culto
             Todos te rindan hoy.
    - number: 618
      title: En toda la nación
      verses:
        - |-
          1. Exhorto, pues, ante todo que se hagan
             rogativas, oraciones, peticiones y acciones
             de gracias por todos los hombres;...
        - |-
          2. Por todos los que están en autoridad,
             para que podamos vivir una vida tranquila
             y sosegada con toda piedad y dignidad.
        - |-
          3. Porque esto es bueno y agradable delante
             de Dios nuestro Salvador,
        - |-
          4. El cual quiere que todos los hombres sean salvos y
             vengan al pleno conocimiento de la verdad.
    - number: 619
      title: Alabad a Jehová
      verses:
        - |-
          1. Alabad a Jehová,
             naciones todas;
             pueblos todos, alabadle.
             Porque ha engrandecido
             sobre nosotros su misericordia,
             Y la verdad de Jehová
             es para siempre, ¡Aleluya, amén!
        - |-
          2. Y la verdad de Jehová
             es para siempre, ¡Aleluya, amén!
    - number: 620
      title: Dios os guarde
      verses:
        - |-
          1. Dios os guarde siempre en santo amor;
             hasta el día en que lleguemos
             a la patria do estaremos
             para siempre con el Salvador.
        - |-
          CORO
            Al venir Jesús nos veremos,
            a los pies de nuestro Salvador; Reunidos todos, seremos
            un redil con nuestro buen Pastor.
        - |-
          2. Dios os guarde siempre en santo amor;
             en la senda peligrosa
             de esta vida tormentosa,
             os conserve en paz y sin temor.
        - |-
          CORO
            Al venir Jesús nos veremos,
            a los pies de nuestro Salvador; Reunidos todos, seremos
            un redil con nuestro buen Pastor.
        - |-
          3. Dios os guarde siempre en santo amor;
             os conduzca su bandera,
             y os esfuerce en gran manera
             con su Espíritu Consolador.
        - |-
          CORO
            Al venir Jesús nos veremos,
            a los pies de nuestro Salvador; Reunidos todos, seremos
            un redil con nuestro buen Pastor.
        - |-
          4. Dios os guarde siempre en santo amor;
             con su gracia os sostenga,
             hasta que el Maestro venga
             a fundar su reino en esplendor.
        - |-
          CORO
            Al venir Jesús nos veremos,
            a los pies de nuestro Salvador; Reunidos todos, seremos
            un redil con nuestro buen Pastor.
    - number: 621
      title: Gracias, Dios
      verses:
        - |-
          1. Gracias, Dios, por los pastores,
             fieles siervos tuyos son;
             Y con gran visión y amor,
             siempre luchan con fervor.
             Gracias, Dios, por los pastores, ¡Gracias, Dios!
        - |-
          2. Gracias, Dios, por los pastores,
             por su ejemplo y su fe;
             Instrumentos son del Rey,
             siempre velan por la grey.
             Gracias, Dios, por los pastores, ¡Gracias, Dios!
    - number: 622
      title: Gratitud por el pastor
      verses:
        - |-
          1. Hoy damos gracias al Señor por ti,
             Pues él te hizo fiel y buen pastor
             Que a sus ovejas sabe conducir
             Por los caminos de su Salvador.
        - |-
          2. Hoy damos gracias al Señor por ti,
             Pues él te hizo sabio sembrador
             Que la Palabra sale a esparcir;
             Dios fruto te dará por tu labor.
        - |-
          3. Hoy damos gracias al Señor por ti,
             Pues él te hizo edificador;
             Con piedras vivas sabes construir
             La casa que da gloria al Redentor.
    - number: 623
      title: Este templo dedicamos
      verses:
        - |-
          1. Este templo dedicamos a tu gloria, oh Señor,
             Para el culto de tus hijos que te sirven con amor.
             De las manos es hechura, expresión de nuestra fe;
             Es tributo que te ofrendan los creyentes, Padre fiel.
        - |-
          2. Por tu gracia, Dios eterno, gran artífice y Señor,
             Esta ofrenda hoy bendice con tu Espíritu de amor.
             Este templo dedicamos a tu gloria, oh Señor,
             Para el culto de tus hijos que te sirven con amor.
    - number: 624
      title: A Dios el Padre celestial
      verses:
        - |-
          1. A Dios el Padre Celestial,
             Al Hijo nuestro Redentor,
             Y al Eternal Consolador,
             Unidos todos alabad. Amén.
    - number: 625
      title: Celebremos el amor de Dios
      verses:
        - |-
          1. Celebremos el amor de Dios
             y la gracia de su Hijo,
             Y su comunión,
             la comunión del Espíritu divino
             En mi corazón,
             y en tu corazón.
             ¡Gloria a Dios! Amén y amén.
    - number: 626
      title: Gloria demos al Padre
      verses:
        - |-
          1. Gloria demos al Padre,
             Al Hijo y al Santo Espíritu;
             Como eran al principio,
             Son hoy y habrán de ser
             Eternamente. Amén.
    - number: 627
      title: Alabad al Dios de los cielos
      verses:
        - |-
          1. Varones: Alabad a Jehová, porque él es bueno,
             Todos: Porque para siempre es su misericordia.
        - |-
          2. Damas: Alabad al Dios de los dioses,
             Todos: Porque para siempre es su misericordia.
        - |-
          3. Jóvenes: Alabad al Señor de los señores,
             Todos: Porque para siempre es su misericordia.
        - |-
          4. Niños: Al único que hace grandes maravillas,
             Todos: Porque para siempre es su misericordia.
        - |-
          5. Varones: Al que hizo los cielos con entendimiento,
             Todos: Porque para siempre es su misericordia.
        - |-
          6. Damas: Al que extendió la tierra sobre las aguas.
             Todos: Porque para siempre es su misericordia.
        - |-
          7. Jóvenes: Al que hizo las grandes lumbreras,
             Todos: Porque para siempre es su misericordia.
        - |-
          8. Niños: El sol para que señorease en el día,
             Todos: Porque para siempre es su misericordia.
        - |-
          9. Varones: El que da alimento a todo ser viviente,
             Todos: Porque para siempre es su misericordia.
        - |-
          10. Todos: Alabad al Dios de los cielos,
              Todos: Porque para siempre es su misericordia.
    - number: 628
      title: Para siempre es
      verses:
        - |-
          1. Porque para siempre
             su misericordia,
             Su misericordia para
             siempre es.
    - number: 629
      title: Eterno Rey
      verses:
        - |-
          1. Eterno Rey, celebraremos tu gloria;
             Oh Padre Dios, recordaremos la historia
             De tu amor y bondad; nos salvaste en verdad.
             A ti alabaremos por siempre y siempre.
             Amén.
        - |-
          2. Gran Salvador, celebraremos tu gloria;
             Buen Redentor, ensalzaremos la victoria
             Que ganaste, Jesús, al morir en la cruz.
             A ti alabaremos por siempre y siempre.
             Amén.
        - |-
          3. Espíritu, celebraremos tu gloria;
             Consolador, loamos tu gran misericordia;
             Nos das gozo y solaz, nos cobija tu paz.
             A ti alabaremos por siempre y siempre.
             Amén.
    - number: 630
      title: Tu pueblo calla ante ti, Señor
      verses:
        - |-
          1. Tu pueblo calla ante ti, Señor,
             Omnipotente y soberano Rey;
             Reunidos, te adoramos
             Al contemplar tu santidad y gloria.
        - |-
          2. Te loamos, te amamos,
             oh eterno Dios.
             Amén.
    - number: 631
      title: Te Alabamos
      verses:
        - |-
          1. Nuestra alma en ti confía:
             Cuerpo y mente ¡oh Señor!
             Te alabamos ¡oh Señor! Te ofrendamos con amor.
             Tu poder y reino honramos:
             Te adoramos ¡oh Señor! Padre nuestro, escúchanos.
             Por tus obras te gloriamos: Cólmanos de bendiciones:
             Dios de fuerza y de bondad, Muéstranos tu rostro ¡oh
             Desde la eternidad. Dios!
        - |-
          2. Por tu grande salvación, Presta, Espíritu, tus dones;
             Te alabamos noche y día, ¡Jesucristo, pronto ven!
             Tuyo es nuestro corazón, ¡Gloria a ti, Señor! Amén.
    - number: 632
      title: Engrandecido sea Dios
      verses:
        - |-
          1. Engrandecido sea Dios
             en esta reunión, en esta reunión;
             Alegres, juntos a una voz,
        - |-
          CORO
            Dad gloria, gloria, gloria, gloria,
            Dad gloria a nuestro Dios,
            Amén.
            (Dad gloria, gloria, gloria, gloria,
            gloria, gloria, gloria,
            dad gloria a nuestro Dios. Amén.)
        - |-
          2. Durante el día que pasó
             la mano del Señor, la mano del Señor
             De muchos males nos salvó:
        - |-
          CORO
            Dad gloria, gloria, gloria, gloria,
            Dad gloria a nuestro Dios,
            Amén.
            (Dad gloria, gloria, gloria, gloria,
            gloria, gloria, gloria,
            dad gloria a nuestro Dios. Amén.)
        - |-
          3. Pues hasta aquí nos ayudó,
             y siempre proveerá, y siempre proveerá;
             Con gratitud, placer y amor.
        - |-
          CORO
            Dad gloria, gloria, gloria, gloria,
            Dad gloria a nuestro Dios,
            Amén.
            (Dad gloria, gloria, gloria, gloria,
            gloria, gloria, gloria,
            dad gloria a nuestro Dios. Amén.)
    - number: 633
      title: Ven te invito
      verses:
        - |-
          1. (Primera vez - despacio)
             Ven, te invito a cantar al Señor,
             ven, te invito a deleitarte en él;
             Ven, te invito a cantar al Señor
             con toda tu voz, con todo tu amor.
        - |-
          2. (Segunda vez - moderado)
             Ven, te invito a cantar al Señor,
             ven, te invito a deleitarte en él;
             Ven, te invito a cantar al Señor
             con toda tu voz, con todo tu amor.
        - |-
          3. (lento)
             (Mujeres) Suenen violines,
             (Hombres) Toquen trompetas;
             (rápido)
             (Todos) Alzad las voces, ¡Alabad a Dios!
             Hombres y mujeres, niños y ancianos,
             sanos y enfermos ¡Alabad a Dios! ¡Ey!
        - |-
          4. (Ultima vez - más rápido)
             Ven, te invito a cantar al Señor,
             ven, te invito a deleitarte en él;
             Ven, te invito a cantar al Señor
             con toda tu voz, con todo tu amor.
    - number: 634
      title: Cantad alegres, cantad a Dios
      verses:
        - |-
          1. Cantad alegres, cantad a Dios,
             habitantes de toda la tierra.
             Servid a Dios con alegría;
             servid a Dios con regocijo.
        - |-
          CORO
            Aleluya, gloria aleluya (Amén.)
        - |-
          2. Reconoced que Jehová es Dios.
             El nos hizo y no nosotros mismos;
             Pueblo suyo, suyo somos
             y ovejas de su prado.
        - |-
          CORO
            Aleluya, gloria aleluya (Amén.)
        - |-
          3. Entrad por sus puertas con acción de gracias,
             Por sus atrios con cantos de alabanza;
             Alabadle con canciones, bendecid su santo nombre.
        - |-
          CORO
            Aleluya, gloria aleluya (Amén.)
        - |-
          4. Porque Jehová, Jehová es bueno,
             para siempre es su misericordia,
             Y su verdad permanece
             por todas las generaciones.
        - |-
          CORO
            Aleluya, gloria aleluya (Amén.)
    - number: 635
      title: ¡Bienvenido!
      verses:
        - |-
          1. Con gran gozo y placer
             nos volvemos hoy a ver;
             Nuestras manos otra vez estrechamos.
             Se contenta el corazón ensanchándose de amor;
             Todos a una voz a Dios gracias damos.
        - |-
          CORO
            ¡Bienvenido! ¡Bienvenido!
            Los hermanos hoy aquí nos gozamos en decir:
            ¡Bienvenido! ¡Bienvenido!
            Al volvernos a reunir, ¡Bienvenido!
        - |-
          2. Hasta aquí Dios te ayudó,
             ni un momento te dejó,
             Y a nosotros te volvió, ¡Bienvenido!
             El Señor te acompañó,
             su presencia te amparó,
             Del peligro te guardó, ¡Bienvenido!
        - |-
          CORO
            ¡Bienvenido! ¡Bienvenido!
            Los hermanos hoy aquí nos gozamos en decir:
            ¡Bienvenido! ¡Bienvenido!
            Al volvernos a reunir, ¡Bienvenido!
        - |-
          3. Dios nos guarde en este amor,
             para que de corazón,
             Consagrados al Señor, le alabemos.
             En la eterna reunión do no habrá separación,
             Ni tristeza ni aflicción: ¡Bienvenido!
        - |-
          CORO
            ¡Bienvenido! ¡Bienvenido!
            Los hermanos hoy aquí nos gozamos en decir:
            ¡Bienvenido! ¡Bienvenido!
            Al volvernos a reunir, ¡Bienvenido!
    - number: 636
      title: ¡Hola! ¿Cómo estás?
      verses:
        - |-
          1. ¡Hola! ¿Cómo estás?
             Doy gracias a Dios
             porque estamos aquí alabando su nombre.
        - |-
          CORO
            ¡Bienvenido seas! ¡Bienvenido seas,
            alabemos al Señor!
        - |-
          2. ¡Hola! ¿Cómo estás?
             Qué hermoso es reunirnos
             y así compartir el amor del Señor.
        - |-
          CORO
            ¡Bienvenido seas! ¡Bienvenido seas,
            alabemos al Señor!
    - number: 637
      title: En la escuela dominical
      verses:
        - |-
          1. En la escuela dominical
             a mi clase gozoso voy;
             Fiel alumno de Cristo soy, la Biblia me habla hoy.
        - |-
          2. En la escuela dominical
             yo escucharé con amor
             La Palabra de mi Señor, Divino Sembrador.
        - |-
          3. En la escuela dominical
             por mi clase yo oraré;
             Gran verdad y luz yo veré, que luego cumpliré.
    - number: 638
      title: Por siempre, amén
      verses:
        - |-
          1. Engrandecido seas,
             Jehová nuestro Dios,
             Por todas las edades,
             por siempre. Amén.
    - number: 639
      title: Tu pueblo jubiloso
      verses:
        - |-
          1. Tu pueblo jubiloso se acerca a ti, Señor,
             Y con triunfantes voces hoy canta tu loor;
             Por todas tus bondades, que das en plenitud,
             Tu pueblo humildemente te expresa gratitud.
        - |-
          2. Acceso a ti, oh Padre tenemos por Jesús;
             Sin verte en tu gloria gozamos santa luz.
             Aunque eres infinito, excelso Creador,
             Habita en nosotros tu Espíritu, Señor.
        - |-
          3. Oh Cristo, te alabamos de todo corazón;
             en ti tenemos vida y eterna salvación.
             Tu gracia nos derrama constante bendición;
             Te damos honra, gloria y fiel adoración.
    - number: 640
      title: Oh Padre en los cielos
      verses:
        - |-
          1. Oh, Padre en los cielos, venimos a ti,
             Pedimos que tu reino ya venga;
             Que tu voluntad sea hecha aquí.
             Santificado sea tu nombre.
        - |-
          2. El pan cotidiano hoy danos, Señor,
             Pedimos que tu reino ya venga;
             Provee al hambriento por tu gran amor,
             Santificado sea tu nombre.
        - |-
          3. Perdón te pedimos por nuestro pecar,
             Pedimos que tu reino ya venga;
             Debemos a otros así perdonar,
             Santificado sea tu nombre.
        - |-
          4. Del mal y el maligno protege también,
             Pedimos que tu reino ya venga;
             A ti sea gloria por siempre. Amén.
             Santificado sea tu nombre.
    - number: 641
      title: La oración del Señor
      verses:
        - |-
          1. Padre nuestro que estás en los cielos,
             santificado sea tu nombre.
             Venga tu reino. Hágase tu voluntad,
             como en el cielo, así también en la tierra.
             El pan nuestro de cada día, dánoslo hoy.
             Y perdónanos nuestras deudas,
             como también nosotros perdonamos
             a nuestros deudores.
             Y no nos metas en tentación, mas líbranos
             del mal; porque tuyo es el reino,
             y el poder, y la gloria,
             por todos los siglos. Amén.
    - number: 642
      title: Apertura del culto
      verses:
        - |-
          1. Del SEÑOR es la tierra y todo lo que hay en
             ella; el mundo y los que en él habitan. ¿Quién
             es este Rey de la gloria? El SEÑOR de los
             ejércitos, él es el Rey de la gloria.
        - |-
          2. ¡Venid, cantemos con gozo al Señor!
             Aclamemos con júbilo a la roca de nuestra
             salvación. Acerquémonos ante su presencia
             con acción de gracias; aclamémosle con salmos.
        - |-
          3. Venid, adoremos y postrémonos; doblemos la
             rodilla ante el SEÑOR nuestro Hacedor.
             Porque él es nuestro Dios, y nosotros el
             pueblo de su prado, y las ovejas de su mano.
        - |-
          4. Cantad alegres a Dios, habitantes de toda la
             tierra. Servid a Jehová con alegría; venid ante
             su presencia con regocijo.
        - |-
          5. Entrad por sus puertas con acción de gracias, y
             a sus atrios con alabanza. Dadle gracias, ben-
             decid su nombre. Porque el SEÑOR es bueno;
             para siempre es su misericordia, y su fidelidad
             por todas las generaciones.
        - |-
          6. ¡Aleluya! Alabad a Dios en su santuario;
             alabadle en su majestuoso firmamento.
             Alabadle por sus hechos poderosos;
             alabadle según la excelencia de su grandeza.
             Todo lo que respira alabe al SEÑOR. ¡Aleluya!
        - |-
          7. Venid a mí todos los que estáis trabajados y
             cansados, y yo os haré descansar. Llevad mi
             yugo sobre vosotros, y aprended de mí, que
             soy manso y humilde de corazón; y hallaréis
             descanso para vuestras almas, porque mi yugo
             es fácil, y ligera mi carga.
        - |-
          8. Perpetuamente cantaré las misericordias del
             Señor; con mi boca daré a conocer tu fidelidad
             de generación en generación. Diré: Para siem-
             pre será edificada la misericordia; en los mis-
             mos cielos establecerás tu fidelidad.
        - |-
          9. Bueno es alabar al Señor, cantar salmos a tu
             nombre, oh Altísimo. Bueno es anunciar por
             la mañana tu misericordia y tu verdad en las
             noches.
    - number: 643
      title: El credo de los apóstoles
      verses:
        - |-
          1. Creo en Dios Padre Todopoderoso, Creador del
             cielo y la tierra;
        - |-
          2. Y en Jesucristo, su único Hijo, Señor nuestro; que
             fue concebido del Espíritu Santo, nació de la
             virgen María, padeció bajo el poder de Poncio
             Pilato; fue crucificado, muerto y sepultado;
             descendió a los infiernos; al tercer día resucitó
             de entre los muertos; subió al cielo, y está
             sentado a la diestra del Dios Padre
             Todopoderoso; y desde allí vendrá al fin del
             mundo a juzgar a los vivos y a los muertos.
        - |-
          3. Creo en el Espíritu Santo, la santa Iglesia universal,
             la comunión de los santos, el perdón de los
             pecados, la resurrección del cuerpo y la vida
             perdurable. Amén.
    - number: 644
      title: Bendiciones Finales
      verses:
        - |-
          1. El SEÑOR te bendiga y te guarde; el SEÑOR haga
             resplandecer su rostro sobre ti, y tenga de ti miseri-
             cordia; el SEÑOR alce sobre ti su rostro y te dé paz.
        - |-
          2. La gracia del Señor Jesucristo, el amor de Dios, y la
             comunión del Espíritu Santo sean con todos
             vosotros. Amén.
        - |-
          3. Y a Aquel que es poderoso para hacer todas las cosas
             mucho más abundantemente de lo que pedimos o
             entendemos, según el poder que actúa en nosotros, a él
             sea gloria en la iglesia en Cristo Jesús por todas las
             edades, por los siglos de los siglos. Amén.
        - |-
          4. La gracia de nuestro Señor Jesucristo sea con
             vosotros. Amén.
        - |-
          5. Y el mismo Jesucristo Señor nuestro, y Dios nuestro
             Padre, el cual nos amó y nos dio consolación eterna
             y buena esperanza por gracia, conforte vuestros
             corazones, y os confirme en toda buena palabra y
             obra.
        - |-
          6. Por tanto, al Rey de los siglos, inmortal, invisible, al
             único y sabio Dios, sea honor y gloria por los siglos
             de los siglos. Amén.
        - |-
          7. Y el Dios de paz que resucitó de los muertos a nues-
             tro Señor Jesucristo, el gran pastor de las ovejas, por
             la sangre del pacto eterno, os haga aptos en toda
             obra buena para que hagáis su voluntad, haciendo
             él en vosotros lo que es agradable delante de él por
             Jesucristo, al cual sea la gloria por los siglos de los
             siglos. Amén.
        - |-
          8. Mas el Dios de toda gracia, que nos llamó a su gloria
             eterna en Jesucristo, después que hayáis padecido un
             poco de tiempo, él mismo os perfeccione, afirme, for-
             talezca y establezca. A él sea la gloria y el imperio
             por los siglos de los siglos. Amén.
        - |-
          9. Y a Aquel que es poderoso para guardaros sin
             caída, y presentaros sin mancha delante de su gloria
             con gran alegría, al único y sabio Dios, nuestro
             Salvador, sea gloria y majestad, imperio y potencia,
             ahora y por todos los siglos. Amén.
    - number: 645
      title: Sagrado es el amor
      verses:
        - |-
          1. Sagrado es el amor
             que ha unido aquí,
             A los que un Dios y Salvador
             gozamos en servir.
        - |-
          2. A nuestro Padre Dios,
             rogamos con fervor,
             Alúmbrenos la misma luz,
             nos una el mismo amor.
        - |-
          3. Nos vamos a ausentar,
             mas nuestra firme unión
             Jamás podráse quebrantar
             por la separación.
        - |-
          4. Allí en la eternidad
             nos hemos de reunir,
             Y en dulce comunión y paz
             por siempre convivir.
    - number: 646
      title: Después de haber tenido aquí
      verses:
        - |-
          1. Después, Señor, de haber tenido aquí
             De tu Palabra la bendita luz,
             A nuestro hogar condúcenos y allí
             De todos cuida, ¡buen Pastor Jesús!
        - |-
          2. En nuestras almas graba con poder
             Tu fiel Palabra, cada exhortación;
             Y que tu ley pudiendo comprender,
             Contigo estemos en mayor unión.
        - |-
          3. Danos tu paz, la senda al transitar
             De alegrías, pruebas o dolor,
             Y cuando al fin podamos descansar,
             Nos cubra el manto de tu inmenso amor. Amén
    - number: 647
      title: El Señor te bendiga
      verses:
        - |-
          1. El Señor te bendiga y te guarde;
             El haga resplandecer su faz sobre ti;
             Y tenga de (tenga de ti)
             ti misericordia; (misericordia);
             El Señor alce sobre ti su rostro,
             Y te dé paz, (te dé paz,)
             y te dé paz, (te dé paz);
             Y te dé paz, y te dé paz, (te dé paz).
    - number: 648
      title: Amén (séptuplo)
      verses:
        - |-
          1. Amén, amén, amén, amén,
             amen, amén, amén.
    - number: 649
      title: Amén (triple)
      verses:
        - |-
          1. Amén, amén, amén.
    - number: 650
      title: Amén (duplo)
      verses:
        - |-
          1. Amén, amén.
    - number: 651
      title: Amén (quíntuplo)
      verses:
        - |-
          1. Amén, amén, amén, amén, amén.
    - number: 652
      title: Al que está sentado
      verses:
        - |-
          1. Al que está sentado
             en el trono y al Cordero,
             Sea la alabanza, y la honra,
             y la gloria y el poder
             por los siglos de los siglos.
             Amén.
             

suplementario:
  name: Suplementario
  hymns:
    - number: 1
      title: Sé Tú Mi Visión
      verses:
        - |-
          1. Oh Dios, de mi alma, sé Tú mi visión,
          Nada te aparte de mi corazón.
          Noche y día siempre yo pienso en Ti,
          Y Tu presencia es luz para mí.
        - |-
          2. Sabiduría, sé Tú en mi ser,
          Quiero a Tu lado mi senda correr;
          Como a Tu hijo amado me tienes Señor,
          Siempre morando en un mismo amor.
        - |-
          3. Riquezas vanas no anhelo, Señor,
          Ni el vano halago de la adulación;
          Tú eres mi herencia y Tú mi porción,
          Rey de los cielos, tesoro mejor.
        - |-
          4. Oh Rey de gloria, del triunfo al final,
          Guíame al cielo a morar en Tu hogar;
          Luz de mi alma mi dueño y Señor,
          En vida o muerte, sé Tú mi visión.
    - number: 2
      title: Jesús Te Necesito
      verses:
        - |-
          1. Jesús, te necesito: pecado mora en mí,
          Mi corazón corrupto culpable es ante Ti;
          Es Tu obra redentora mi justificación,
          Tu sangre purifica de toda transgresión.
        - |-
          2. Jesús, Te necesito, pues indigente soy,
          Un peregrino pobre: por tierra ajena voy.
          La senda es ardua y larga; mas Tú me sostendrás.
          Dirigirás mis pasos; me fortalecerás.
        - |-
          3. Jesús, Te necesito, pues ciego soy sin Ti,
          Mi mente es necia y débil; errante voy aquí
          La senda es peligrosa: me es menester Tu luz
          Que guía a salvo al cielo, do Te veré, Jesús.
        - |-
          4. Espero verte pronto, sentado en potestad,
          Envuelto en arcoiris, en gloria y majestad,
          Con los que redimiste por sangre, oh Señor
          Mi gozo está en loarte, Jesús mi Salvador.
    - number: 3
      title: Tranquila Mi Alma
      verses:
        - |-
          1. ¡Tranquila, mi alma! Dios es tu Refugio
          Espera en Él, paciente en la afflicción
          Jesús te es fiel en toda tu congoja
          Jesús, tu Dios, tu Amigo y Salvación,
          ¡Tranquila! Dios, en medio de lo oscuro,
          Hará brillar Su gloria y compasión.
        - |-
          2. ¡Silencio, mi alma! El Salvador gobierna:
          El mar rugiente Le obedecerá
          Tu Padre reina: Él obra en tu quebranto:
          Mediante pruebas te acrisolará.
          Aliviará tu duelo y sufrimiento:
          Lo turbador preciado fin tendrá.
        - |-
          3. ¡Tranquila, mi alma! En lágrimas, o en luto,
          Al Dios excelso puedes acudir
          Él cerca está: Su gracia y condolencia,
          En tu dolor, saldrán a relucir.
          Espera en Dios: el Rey del universo
          Podrá tu angustia y duelo bendecir.
        - |-
          4. Tranquila, espera, mi alma: el tiempo avanza:
          Con tu Señor por siempre morarás:
          Con Él no habrá más llanto ni dolores:
          Será tu Dios; y tú Le servirás
          Entonces, mi alma, libre del pecado
          Tu redentor por siempre adorarás.
        - |-
          5. Ahora, mi alma, alaba al Rey benigno,
          Confía en Dios; y Dios se acercará
          Medita, mi alma, en Su Palabra santa:
          Así tu fe se fortalecerá.
          Tranquila, espera: en medio de lo oscuro
          El Sol de Vida resplandecerá.
    - number: 4
      title: Ante el trono Celestial
      verses:
        - |-
          1. Ante el trono celestial
          Él intercede hoy por mí;
          Gran Sacerdote es Jesús
          Quien por siempre vivirá.
          Y en Sus manos por Su amor
          Mi nombre ya grabado está;
          Y mientras en Su trono esté,
          Nadie de Él me apartará,
          Nadie de Él me apartará.
        - |-
          2. Cuando he caído en tentación
          Y al sentir condenación
          Al ver al cielo encontraré
          Al inocente quien murió.
          Y por Su muerte el Salvador
          Ya mi pecado perdonó
          Pues Dios, el justo, aceptó
          Su sacrificio hecho por mí,
          Su sacrificio hecho por mí.
        - |-
          3. He aquí el Cordero Redentor,
          Quién al morir resucitó,
          El inmutable gran Yo Soy,
          El Rey de gloria y majestad.
          Unido a Él no moriré,
          Pues con Su sangre me compró;
          Mi vida escondida está
          En Cristo Dios mi Salvador,
          En Cristo Dios mi Salvador.
    - number: 5
      title: Oh, qué amor incomparable
      verses:
        - |-
          1. Oh qué amor incomparable
          Jesucristo nos mostró,
          Cuando Su preciosa sangre,
          Por nosotros derramó.
          ¿De Su amor, quién no recuerda?
          ¿Quién no le adorará?
          Que exaltado siempre sea
          Nuestro Príncipe de Paz.
        - |-
          2. En el monte del Calvario,
          Fuentes de infinito amor;
          Aquel gran día se abrieron,
          ¡Oh, qué inmerecido don!
          Cuál gran río, de lo alto,
          Sin cesar Su amor fluyó
          Sobre el mundo derramando
          Paz, justicia y amor.
        - |-
          3. Que busquemos cada día
          Solo el reino del Señor,
          Y entreguemos nuestra vida,
          Como ofrenda de amor.
          Solo en Él nos gloriaremos,
          Nada más importará;
          Cristo salva, Él lo ha dicho,
          Solo en Él hay libertad.
        - |-
          4. Su Palabra es mi guía
          Y me guía a no pecar;
          En mi Cristo yo confío,
          Nada en Él me ha de faltar.
          De Su plenitud derrama
          Su amor y Su poder,
          En mi ser y sin medida,
          Al rendirme a Sus pies.
    - number: 6
      title: Levántate Iglesia
      verses:
        - |-
          1. Levántate, iglesia del Señor, cíñete de Su armadura;
          Oye la voz de Cristo el Capitán; de Su fuerza el débil tomará.
          Con el escudo de la fe, al diablo no hemos de temer.
          Ejército, armado de amor, ve y alcanza a los perdidos.
        - |-
          2. Nuestra misión será servir y amar, combatiendo al enemigo.
          La espada de Su Espíritu traerá libertad a los cautivos.
          Aunque haya pruebas por doquier, segura es Su salvación;
          Jesús tendrá lo que ganó al morir: una herencia de naciones.
        - |-
          3. Mira en la cruz la gracia y el perdón, donde el Hijo fue inmolado;
          Mas aplastados yacen a los pies del Señor Sus enemigos.
          Conquistador, Se levantó, es Cristo quien resucitó;
          Se cantará Su triunfo hasta que todo ojo pueda verlo.
        - |-
          4. Su Espíritu nos llene de valor, nos dé fuerza a cada paso.
          Nos dé la fe para el premio obtener de un siervo fiel y bueno.
          Los santos que lucharon ya celebran Su fidelidad;
          Dios les guardó y así nos guardará hasta estar con Él en gloria.
    - number: 7
      title: Sólo En Jesús
      verses:
        - |-
          1. Solo en Jesús está mi fe, mi esperanza y mi canción.
          Piedra angular, firme sostén, inconmovible en la aflicción.
          Cuán grande amor, inmensa paz, en el temor o adversidad.
          Consolador, amigo fiel, yo en Su amor me sostendré.
        - |-
          2. Solo en Jesús, Hijo de Dios, quien se humilló por nuestro bien.
          Cordero de mi salvación, por este mundo herido fue.
          En una cruz fue a morir, y Dios mostró Su gracia ahí.
          Pues mi pecado Él llevó, en Su aflicción vida me dio.
        - |-
          3. En un sepulcro, Él yació, el cuerpo inerte del Señor.
          Mas el tercer día llegó: ¡resucitó en gloriosa luz!
          Y al triunfar sobre el mal, perdió el pecado potestad.
          De Él suyo soy, Él mío es, pues con Su sangre me compró.
        - |-
          4. Desde el nacer hasta el morir, sea el poder de Cristo en mí.
          No temeré, seguro estoy, mi vida yo a Él le doy.
          Ningún poder, ningún afán de Él me arrebatará.
          Hasta que Él venga otra vez, en Su poder me sostendrá.
    - number: 8
      title: Hubo Quien Por Mis Culpas
      verses:
        - |-
          1. Hubo quien por mis culpas muriera en la cruz,
          Aunque indigno y vil como soy.
          Soy feliz, pues su sangre vertió mi Jesús,
          Y con ella mis culpas borró.
        - |-
          CORO
          Mis pecados llevó, en la cruz do murió
          El sublime, el tierno Jesús.
          Los desprecios sufrió, y mi alma salvó.
          Él cambió mis tinieblas en luz.
        - |-
          2. Él es tierno y amante cual nadie lo fue,
          Pues convierte al infiel corazón.
          Y por esa paciencia y ternura yo sé
          Que soy libre de condenación.
        - |-
          CORO
          Mis pecados llevó, en la cruz do murió
          El sublime, el tierno Jesús.
          Los desprecios sufrió, y mi alma salvó.
          Él cambió mis tinieblas en luz.
        - |-
          3. Es mi anhelo constante a Cristo seguir.
          Mi camino su ejemplo marcó.
          Y por darme la vida Él quiso morir.
          En la cruz mi pecado clavó.
        - |-
          CORO
          Mis pecados llevó, en la cruz do murió
          El sublime, el tierno Jesús.
          Los desprecios sufrió, y mi alma salvó.
          Él cambió mis tinieblas en luz.
    - number: 9
      title: Por La Excelsa Majestad
      verses:
        - |-
          1. Por la excelsa majestad de los cielos, tierra y mar;
          por las alas de tu amor que nos cubren sin cesar;
          Te ofrecemos, oh Señor, alabanzas con fervor.
        - |-
          2. Por la calma nocturnal, por la tibia luz del sol,
          por el amplio cielo azul, por el árbol, por la flor;
          Te ofrecemos, oh Señor, alabanzas con fervor.
        - |-
          3. Por la mente, el corazón, los sentidos que nos das,
          que tu inmensa creación nos permiten apreciar;
          Te ofrecemos, oh Señor, alabanzas con fervor.
        - |-
          4. Por los lazos del amor, que en familia y amistad,
          nos acercan hoy aquí y a los que partieron ya;
          Te ofrecemos, oh Señor, alabanzas con fervor.
        - |-
          5. Por Tu Iglesia universal que no cesa de rendir
          su tributo de oración y de gratitud a Ti;
          Te ofrecemos, oh Señor, alabanzas con fervor.
        - |-
          6. Por las dádivas sin par que en el Salvador nos das:
          del pecado remisión, santidad y vida y paz;
          Te ofrecemos, oh Señor, alabanzas con fervor.
    - number: 10
      title: Doxología
      verses:
        - |-
          1. A Dios el Padre Celestial,
          Al Hijo nuestro Redentor,
          Y al Eternal Consolador,
          Unidos todos alabad.
          Amén.
